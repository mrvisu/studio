                                 <div key={idx} className="flex justify-between items-center bg-slate-900 p-2.5 rounded-lg border border-slate-700">
                                    <div className="flex items-center gap-3 text-sm">
                                        <span className="font-bold text-slate-200">{addon.name}</span>
                                        {addon.date && <span className="text-xs text-slate-500">({formatDateOnly(addon.date)})</span>}
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className="font-bold text-pink-400 text-sm">{addon.price} ج.م</span>
                                        <button type="button" onClick={()=>handleRemoveAddon(idx)} className="text-red-400 hover:text-red-300"><i className="ph ph-x"></i></button>
                                    </div>
                                 </div>
                              ))}
                           </div>
                        </div>

                        {/* Section 5: Totals */}
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                          <input type="number" placeholder="الإجمالي" required className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-pink-500 text-sm font-bold" value={formData.total} onChange={e => setFormData({...formData, total: e.target.value})} />
                          <input type="number" placeholder="المدفوع الان" required className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-green-500 text-sm font-bold" value={formData.paid} onChange={e => setFormData({...formData, paid: e.target.value})} />
                          <select className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-indigo-500 col-span-2 md:col-span-1 text-sm font-bold" value={formData.paymentMethod} onChange={e => setFormData({...formData, paymentMethod: e.target.value})}>
                             <option value="cash">دفع نقدي</option>
                             <option value="electronic">دفع إلكتروني (محافظ)</option>
                          </select>
                        </div>
                        <div className={`p-3 rounded-xl text-center font-black text-lg border ${(formData.total - formData.paid) > 0 ? 'bg-red-950/40 text-red-400 border-red-900/50' : 'bg-green-950/40 text-green-400 border-green-900/50'}`}>
                          الباقي: {formatCurrency((formData.total || 0) - (formData.paid || 0))}
                        </div>
                        <button type="submit" className="w-full bg-pink-600 text-white hover:bg-pink-500 font-black py-3 rounded-xl shadow-lg text-sm"><i className="ph ph-check-circle text-lg ml-2 align-middle"></i>تأكيد حجز الزفاف</button>
                      </form>
                    </div>
                  </div>
                )}

                {/* Modals for Details and Payment... reused logic */}
                {payModal && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 w-full max-w-md relative">
                      <button onClick={() => setPayModal(null)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400"><i className="ph ph-x text-2xl"></i></button>
                      <h3 className="text-2xl font-black mb-4 border-b border-slate-800 pb-4 text-center text-slate-100">
                          {payModal.paymentType === 'electronic' ? 'سداد إلكتروني (إنستاباي/محافظ)' : 'سداد نقدي'}
                      </h3>
                      <div className="mb-6 bg-slate-950 p-4 rounded-xl text-center border border-slate-800">
                        <p className="text-slate-300">العميل: <b className="text-white text-lg">{payModal.type === 'wedding' ? payModal.groomName : payModal.clientName}</b></p>
                        <p className="text-red-400 font-bold mt-2">الباقي المستحق: {payModal.remaining} ج.م</p>
                      </div>
                      <form onSubmit={async (e) => {
                        e.preventDefault();
                        const amount = parseFloat(e.target.amount.value);
                        const updated = { 
                            ...payModal, 
                            paid: payModal.paid + amount, 
                            electronicPaid: (payModal.electronicPaid || 0) + (payModal.paymentType === 'electronic' ? amount : 0),
                            remaining: payModal.total - (payModal.paid + amount) 
                        };
                        if (updated.pendingReceipt) delete updated.pendingReceipt;
                        delete updated.paymentType;
                        const targetCol = updated.type === 'wedding' ? 'weddings' : 'transactions';
                        await setDoc(doc(db, `artifacts/studio-marakby/public/data/${targetCol}`, updated.id), updated);
                        setPayModal(null);
                      }} className="space-y-4">
                        <input type="number" name="amount" required min="1" max={payModal.remaining} defaultValue={payModal.remaining} className="w-full p-4 border border-slate-700 bg-slate-950 text-white rounded-xl text-2xl font-black text-center outline-none focus:border-blue-500 shadow-inner"/>
                        <button type="submit" className={`w-full text-white font-black py-4 rounded-xl shadow-lg transition-all text-lg ${payModal.paymentType === 'electronic' ? 'bg-indigo-600 hover:bg-indigo-500 shadow-indigo-900/20' : 'bg-green-600 hover:bg-green-500 shadow-green-900/20'}`}>تأكيد تحصيل المبلغ</button>
                      </form>
                    </div>
                  </div>
                )}
                
                {receiptImageModal && (
                  <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
                    <div className="relative max-w-2xl w-full flex flex-col items-center">
                      <button onClick={() => setReceiptImageModal(null)} className="absolute -top-14 right-0 p-2 text-white hover:text-red-400 bg-slate-800 rounded-full shadow-lg border border-slate-700 transition-colors"><i className="ph ph-x text-2xl"></i></button>
                      <img src={receiptImageModal} alt="إيصال تحويل" className="max-w-full max-h-[85vh] rounded-2xl shadow-2xl border border-slate-700 object-contain bg-slate-900" />
                    </div>
                  </div>
                )}

                {txnDetailsModal && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setTxnDetailsModal(null)}>
                    <div className="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 w-full max-w-lg relative max-h-[90vh] overflow-y-auto custom-scrollbar" onClick={e => e.stopPropagation()}>
                      <button onClick={() => setTxnDetailsModal(null)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400 transition-colors"><i className="ph ph-x text-2xl"></i></button>
                      
                      <h3 className="text-2xl font-black mb-6 border-b border-slate-800 pb-4 text-slate-100 flex items-center gap-2">
                        {txnDetailsModal.type === 'wedding' ? <i className="ph ph-heart text-pink-500"></i> : <i className="ph ph-files text-blue-500"></i>}
                        تفاصيل {txnDetailsModal.type === 'wedding' ? 'حجز زفاف' : 'الإيصال'} #{txnDetailsModal.receiptNo}
                      </h3>

                      <div className="space-y-5">
                        <div className="flex justify-between items-center bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <div>
                              <p className="text-slate-500 text-xs mb-1">الاسم</p>
                              <p className="font-bold text-lg text-slate-100">
                                {txnDetailsModal.type === 'wedding' ? `${txnDetailsModal.groomName} و ${txnDetailsModal.brideName}` : txnDetailsModal.clientName}
                              </p>
                           </div>
                           <div className="text-left">
                              <p className="text-slate-500 text-xs mb-1">رقم الهاتف</p>
                              <p className="font-mono text-slate-300">{txnDetailsModal.phone}</p>
                           </div>
                        </div>

                        {txnDetailsModal.type === 'wedding' && (
                            <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 grid grid-cols-2 gap-4">
                                <div><p className="text-slate-500 text-xs mb-1">موعد الزفاف</p><p className="font-bold text-slate-200">{formatDateOnly(txnDetailsModal.weddingDate)}</p></div>
                                <div><p className="text-slate-500 text-xs mb-1">اللوكيشن</p><p className="font-bold text-slate-200">{txnDetailsModal.location}</p></div>
                                <div><p className="text-slate-500 text-xs mb-1">الميك أب</p><p className="font-bold text-slate-200">{txnDetailsModal.makeupArtist}</p></div>
                                <div><p className="text-slate-500 text-xs mb-1">وقت الخروج</p><p className="font-bold text-slate-200">{txnDetailsModal.leaveTime}</p></div>
                                <div className="col-span-2 border-t border-slate-800 pt-3 mt-1"><p className="text-slate-500 text-xs mb-1">العنوان</p><p className="font-bold text-slate-200">{txnDetailsModal.groomAddress}</p></div>
                            </div>
                        )}

                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <p className="text-slate-500 text-xs mb-2">المطلوب (الخدمات والمنتجات)</p>
                           <p className="text-slate-200 leading-relaxed font-medium whitespace-pre-wrap">
                               {txnDetailsModal.type === 'wedding' 
                                   ? `الباقة: ${txnDetailsModal.package?.name}\nالسيشن: ${txnDetailsModal.sessionType}\nالكاجوال: ${txnDetailsModal.casualShootDate ? formatDateOnly(txnDetailsModal.casualShootDate) : 'بدون'}\nإضافات: ${txnDetailsModal.addons?.length > 0 ? txnDetailsModal.addons.map(a=>a.name).join(' + ') : 'بدون'}`
                                   : txnDetailsModal.requirements}
                           </p>
                        </div>

                        {txnDetailsModal.photoNo && (
                            <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                               <span className="text-slate-500 text-sm">رقم الصورة:</span>
                               <span className="font-bold text-slate-200">{txnDetailsModal.photoNo}</span>
                            </div>
                        )}

                        <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 grid grid-cols-2 gap-4 relative overflow-hidden">
                           <div className={`absolute top-0 right-0 w-1 h-full ${txnDetailsModal.type === 'wedding' ? 'bg-pink-500' : 'bg-blue-500'}`}></div>
                           <div><p className="text-slate-500 text-xs mb-1">الإجمالي</p><p className="font-bold text-slate-100">{txnDetailsModal.total} ج.م</p></div>
                           <div><p className="text-slate-500 text-xs mb-1">إجمالي المدفوع</p><p className="font-bold text-green-400">{txnDetailsModal.paid} ج.م</p></div>
                           <div><p className="text-slate-500 text-xs mb-1">الدفع النقدي</p><p className="font-bold text-emerald-400">{(txnDetailsModal.paid || 0) - (txnDetailsModal.electronicPaid || 0)} ج.م</p></div>
                           <div><p className="text-slate-500 text-xs mb-1">الدفع الإلكتروني</p><p className="font-bold text-indigo-400">{txnDetailsModal.electronicPaid || 0} ج.م</p></div>
                           <div className="col-span-2 pt-4 mt-2 border-t border-slate-800 flex justify-between items-center">
                              <span className="text-slate-400 text-sm">الباقي المستحق:</span>
                              <span className={`font-black text-xl ${txnDetailsModal.remaining > 0 ? 'text-red-400' : 'text-green-400'}`}>{txnDetailsModal.remaining} ج.م</span>
                           </div>
                        </div>

                        {txnDetailsModal.pendingReceipt && (
                            <div className="bg-indigo-950/20 p-4 rounded-xl border border-indigo-500/30">
                               <p className="text-indigo-300 text-sm font-bold mb-3 flex items-center gap-2">
                                   <i className="ph ph-image text-lg"></i> صورة التحويل الإلكتروني المرفقة
                               </p>
                               <img src={txnDetailsModal.pendingReceipt} alt="Receipt" className="w-full rounded-lg border border-indigo-500/50 cursor-pointer hover:opacity-90 transition-opacity" onClick={() => setReceiptImageModal(txnDetailsModal.pendingReceipt)} />
                            </div>
                        )}
                        
                        <div className="text-xs text-slate-500 text-center mt-4">تاريخ التسجيل: {formatDate(txnDetailsModal.dateTime)}</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          };

          const TransactionCard = ({ txn, onDelete, onPayRemaining, onViewReceipt, sendInvoice, updateStatus, onViewDetails }) => {
            const [showWaMenu, setShowWaMenu] = useState(false);
            const currentStatus = txn.status || 0;
            const cashPaid = (txn.paid || 0) - (txn.electronicPaid || 0);
            const isWedding = txn.type === 'wedding';
            const displayName = isWedding ? `${txn.groomName} و ${txn.brideName}` : txn.clientName;

            return (
              <div className="bg-slate-900 p-5 rounded-2xl shadow-sm border border-slate-800 flex flex-col md:flex-row gap-6 justify-between hover:border-slate-700 transition-all cursor-pointer group" onClick={() => onViewDetails && onViewDetails(txn)}>
                <div className="flex-1 flex flex-col justify-between">
                  <div className="space-y-3">
                      <div className="flex justify-between items-start">
                        <h3 className={`text-lg font-bold flex items-center gap-2 transition-colors ${isWedding ? 'text-pink-100 group-hover:text-pink-400' : 'text-slate-100 group-hover:text-blue-400'}`}>
                           {isWedding ? <i className="ph ph-heart text-pink-500 text-2xl group-hover:text-pink-400"></i> : <i className="ph ph-user-circle text-slate-500 text-2xl group-hover:text-blue-500"></i>}
                           {displayName}
                        </h3>
                        <span className="bg-slate-800 text-slate-400 text-xs px-2 py-1 rounded border border-slate-700 font-mono">#{txn.receiptNo}</span>
                      </div>
                      <div className="text-sm text-slate-400 flex flex-wrap gap-x-4">
                        <span>📞 {txn.phone}</span>
                        <span>⏱️ {formatDate(txn.dateTime)}</span>
                        {isWedding && <span className="text-pink-400">💍 {formatDateOnly(txn.weddingDate)}</span>}
                      </div>
                      
                      <div className="flex flex-col gap-3 pt-2 text-sm">
                        <div className="flex flex-wrap gap-2 items-center bg-slate-950 p-3 rounded-xl border border-slate-800/50 mt-1">
                          <span className="text-slate-300">الإجمالي: <b className="text-white">{txn.total}</b></span>
                          <div className="hidden sm:block w-px h-4 bg-slate-700 mx-1"></div>
                          <span className="text-green-400">المدفوع: <b className="text-green-300">{txn.paid}</b></span>
                          {(cashPaid > 0 || txn.electronicPaid > 0) && <div className="hidden sm:block w-px h-4 bg-slate-700 mx-1"></div>}
                          {cashPaid > 0 && <span className="text-emerald-400 text-xs bg-emerald-950/30 px-2 py-1 rounded border border-emerald-900/50 flex items-center gap-1"><i className="ph ph-money text-base"></i> نقدي: {cashPaid}</span>}
                          {txn.electronicPaid > 0 && <span className="text-indigo-400 text-xs bg-indigo-950/30 px-2 py-1 rounded border border-indigo-900/50 flex items-center gap-1"><i className="ph ph-wallet text-base"></i> إلكتروني: {txn.electronicPaid}</span>}
                          <div className="hidden sm:block w-px h-4 bg-slate-700 mx-1"></div>
                          <span className={txn.remaining > 0 ? "text-red-400" : "text-green-400"}>الباقي: <b>{txn.remaining}</b></span>
                        </div>
                      </div>

                      {txn.pendingReceipt && (
                          <div className="mt-3 p-3 bg-indigo-950/20 border border-indigo-500/30 rounded-xl flex items-center gap-4" onClick={(e) => e.stopPropagation()}>
                              <img 
                                  src={txn.pendingReceipt} 
                                  alt="إيصال تحويل مرفق" 
                                  className="w-14 h-14 object-cover rounded-lg cursor-pointer border border-indigo-500/50 hover:scale-105 transition-transform shadow-md"
                                  onClick={() => onViewReceipt(txn.pendingReceipt)}
                                  title="اضغط للتكبير"
                              />
                              <div>
                                  <h4 className="text-sm font-bold text-indigo-300 flex items-center gap-1"><i className="ph ph-warning-circle text-lg"></i> إيصال قيد المراجعة</h4>
                                  <p className="text-xs text-indigo-200/70 mt-1">العميل قام برفع إيصال، راجع الصورة ثم اضغط (سداد إلكتروني) لتأكيد التحصيل وإضافته.</p>
                              </div>
                          </div>
                      )}
                  </div>

                  <div className="mt-5 pt-4 border-t border-slate-800" onClick={e => e.stopPropagation()}>
                    <h4 className="text-xs font-bold text-slate-400 mb-3">تحديث حالة الطلب (التتبع):</h4>
                    <div className="flex gap-2">
                        {ORDER_STATUSES.map(s => (
                            <button
                                key={s.id}
                                onClick={() => updateStatus(txn.id, s.id)}
                                className={`flex-1 py-2 px-1 rounded-xl text-xs font-bold transition-all flex flex-col items-center gap-1 border ${currentStatus === s.id ? s.activeClass : s.inactiveClass}`}
                            >
                                <i className={`ph ${s.icon} text-lg`}></i>
                                <span className="text-[10px] sm:text-xs text-center">{s.label}</span>
                            </button>
                        ))}
                    </div>
                  </div>
                </div>

                <div className="flex flex-col gap-2 min-w-[160px] justify-start border-t md:border-t-0 md:border-r border-slate-800 pt-4 md:pt-0 md:pr-6" onClick={e => e.stopPropagation()}>
                  <button onClick={sendInvoice} className="bg-blue-600 hover:bg-blue-500 text-white px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all shadow-sm">
                    <i className="ph ph-receipt text-xl"></i> إرسال الفاتورة
                  </button>
                  
                  <div className="relative w-full">
                    <button onClick={() => setShowWaMenu(!showWaMenu)} className="w-full bg-green-600 hover:bg-green-500 text-white px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all">
                      <i className="ph ph-whatsapp-logo text-xl"></i> رسائل واتساب
                    </button>
                    {showWaMenu && (
                      <div className="absolute right-0 mt-2 w-48 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl z-10 p-1 flex flex-col overflow-hidden">
                        <button onClick={() => {openWhatsApp(txn.phone, generateWA_Message('tracking', txn, isWedding)); setShowWaMenu(false);}} className="text-right px-3 py-2.5 text-sm text-blue-300 hover:bg-slate-700 font-bold border-b border-slate-700">📍 رابط التتبع للعميل</button>
                        <button onClick={() => {openWhatsApp(txn.phone, generateWA_Message('welcome', txn, isWedding)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-slate-200 hover:bg-slate-700">👋 رسالة ترحيب</button>
                        <button onClick={() => {openWhatsApp(txn.phone, generateWA_Message('ready', txn, isWedding)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-slate-200 hover:bg-slate-700">🎉 الشغل خلص</button>
                        <button onClick={() => {openWhatsApp(txn.phone, generateWA_Message('reminder', txn, isWedding)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-slate-200 hover:bg-slate-700">⚠️ تذكير بالباقي</button>
                      </div>
                    )}
                  </div>

                  {txn.remaining > 0 && (
                      <div className="flex gap-2 w-full mt-2">
                        <button onClick={() => onPayRemaining({...txn, paymentType: 'cash'})} className="flex-1 bg-yellow-500 hover:bg-yellow-400 text-slate-900 px-2 py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1 transition-all shadow-sm"><i className="ph ph-money text-lg"></i> نقدي</button>
                        <button onClick={() => onPayRemaining({...txn, paymentType: 'electronic'})} className="flex-1 bg-indigo-500 hover:bg-indigo-400 text-white px-2 py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1 transition-all shadow-sm"><i className="ph ph-wallet text-lg"></i> إلكتروني</button>
                      </div>
                  )}
                  
                  <button onClick={() => onDelete(txn.id)} className="bg-red-950/40 hover:bg-red-900/60 text-red-400 border border-red-900/30 px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all mt-auto"><i className="ph ph-trash text-xl"></i> حذف الإيصال</button>
                </div>
              </div>
            );
          };

          const ExpensesTab = () => {
            const [expData, setExpData] = useState({ amount: '', category: settings.expenseCategories[0], notes: '' });
            
            const handleAddExpense = async (e) => {
              e.preventDefault();
              const newExp = { id: Date.now().toString(), date: new Date().toISOString(), amount: parseFloat(expData.amount), category: expData.category, notes: expData.notes, month: new Date().getMonth() + 1, year: new Date().getFullYear() };
              const appId = 'studio-marakby';
              await setDoc(doc(db, `artifacts/${appId}/public/data/expenses`, newExp.id), newExp);
              setExpData({ amount: '', category: settings.expenseCategories[0], notes: '' });
            };

            const todaysExpenses = expenses.filter(e => new Date(e.date).toDateString() === new Date().toDateString());
            
            const inventoryItemsList = useMemo(() => {
               const prods = (settings.products || []).map(p => typeof p === 'string' ? p : p.name);
               return ["ورق طباعة صور", "أحبار طابعة", ...prods];
            }, [settings.products]);

            return (
              <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
                <div className="xl:col-span-2 space-y-6">
                   <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                     <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-100 border-b border-slate-800 pb-4"><i className="ph ph-money text-red-400 text-2xl"></i> تسجيل مصروفات</h2>
                     <form onSubmit={handleAddExpense} className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                       <div>
                         <label className="block text-sm font-bold text-slate-400 mb-2">المبلغ (ج.م)</label>
                         <input type="number" required placeholder="المبلغ" value={expData.amount} onChange={e => setExpData({...expData, amount: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-red-500 font-bold" />
                       </div>
                       <div>
                         <label className="block text-sm font-bold text-slate-400 mb-2">بند المصروف</label>
                         <select value={expData.category} onChange={e => setExpData({...expData, category: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-red-500">
                           {settings.expenseCategories.map((cat, idx) => <option key={idx} value={cat}>{cat}</option>)}
                         </select>
                       </div>
                       <div>
                         <label className="block text-sm font-bold text-slate-400 mb-2">ملاحظات</label>
                         <input type="text" placeholder="اختياري..." value={expData.notes} onChange={e => setExpData({...expData, notes: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-red-500 placeholder-slate-500" />
                       </div>
                       <button type="submit" className="sm:col-span-3 w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-lg shadow-md transition-all flex items-center justify-center gap-2"><i className="ph ph-plus-circle text-xl"></i> إضافة المصروف</button>
                     </form>
                   </div>
                   <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                      <h2 className="text-xl font-bold mb-4 flex justify-between text-slate-100 border-b border-slate-800 pb-4">
                       <span>مصروفات اليوم</span>
                       <span className="text-red-400 text-sm bg-red-950/40 px-3 py-1 rounded border border-red-900/50">الإجمالي: {formatCurrency(todaysExpenses.reduce((s,e)=>s+e.amount,0))}</span>
                     </h2>
                     <div className="space-y-3">
                       {todaysExpenses.length === 0 ? <p className="text-slate-500 text-center p-6 bg-slate-950 rounded-xl border border-slate-800 border-dashed">لم يتم تسجيل مصروفات اليوم.</p> : todaysExpenses.map(exp => (
                         <div key={exp.id} className="flex justify-between items-center p-4 bg-slate-950 rounded-xl border border-slate-800">
                           <div>
                               <p className="font-bold text-slate-200">{exp.category} <span className="text-red-400 mr-2">{exp.amount} ج.م</span></p>
                               {exp.notes && <p className="text-xs text-slate-500 mt-1">{exp.notes}</p>}
                               <p className="text-xs text-slate-600 mt-2 font-mono">{formatDate(exp.date)}</p>
                           </div>
                           <button onClick={async () => await deleteDoc(doc(db, `artifacts/studio-marakby/public/data/expenses`, exp.id))} className="text-slate-500 hover:text-red-400 p-2"><i className="ph ph-trash text-xl"></i></button>
                         </div>
                       ))}
                     </div>
                   </div>
                </div>

                <div className="xl:col-span-1">
                   <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 sticky top-24">
                      <h2 className="text-xl font-bold mb-2 flex items-center gap-2 text-slate-100 border-b border-slate-800 pb-4">
                          <i className="ph ph-stack text-purple-400 text-2xl"></i> إدارة المخزون
                      </h2>
                      <p className="text-xs text-slate-500 mb-5 leading-relaxed bg-slate-950 p-3 rounded-lg border border-slate-800">
                        يتم خصم البضاعة من المخزون <span className="font-bold text-purple-400">تلقائياً</span> بمجرد بيعها من واجهة الإضافة.
                      </p>
                      
                      <div className="space-y-3 max-h-[60vh] overflow-y-auto custom-scrollbar pr-2">
                         {inventoryItemsList.map(item => (
                            <div key={item} className="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center p-3 bg-slate-950 rounded-xl border border-slate-800 gap-3 hover:border-slate-700 transition-colors">
                               <span className="font-bold text-slate-300 text-sm leading-snug">{item}</span>
                               <div className="flex items-center gap-1 bg-slate-900 p-1 rounded-lg border border-slate-700 shadow-sm w-full sm:w-auto justify-center shrink-0">
                                  <button type="button" onClick={()=>updateInventory(item, -1)} className="text-red-400 hover:bg-slate-800 p-2 rounded-md transition-colors"><i className="ph ph-minus text-sm"></i></button>
                                  <span className="font-black text-base w-8 text-center text-slate-100">{inventory[item] || 0}</span>
                                  <button type="button" onClick={()=>updateInventory(item, 1)} className="text-green-400 hover:bg-slate-800 p-2 rounded-md transition-colors"><i className="ph ph-plus text-sm"></i></button>
                               </div>
                            </div>
                         ))}
                      </div>
                   </div>
                </div>
              </div>
            );
          };

          const ReportsTab = () => {
            const currentMonth = new Date().getMonth() + 1;
            const currentYear = new Date().getFullYear();
            const [filter, setFilter] = useState({ month: currentMonth, year: currentYear });
            const [payModal, setPayModal] = useState(null);
            
            const filteredTxns = transactions.filter(t => t.month == filter.month && t.year == filter.year);
            const filteredWeds = weddings.filter(t => t.month == filter.month && t.year == filter.year);
            const filteredExp = expenses.filter(e => e.month == filter.month && e.year == filter.year);
            
            const studioStats = useMemo(() => {
              const expected = filteredTxns.reduce((sum, t) => sum + t.total, 0);
              const collected = filteredTxns.reduce((sum, t) => sum + t.paid, 0);
              const electronic = filteredTxns.reduce((sum, t) => sum + (t.electronicPaid || 0), 0);
              return { expected, collected, cash: collected - electronic, electronic, debts: filteredTxns.reduce((sum, t) => sum + t.remaining, 0) };
            }, [filteredTxns]);

            const wedStats = useMemo(() => {
              const expected = filteredWeds.reduce((sum, t) => sum + t.total, 0);
              const collected = filteredWeds.reduce((sum, t) => sum + t.paid, 0);
              const electronic = filteredWeds.reduce((sum, t) => sum + (t.electronicPaid || 0), 0);
              return { expected, collected, cash: collected - electronic, electronic, debts: filteredWeds.reduce((sum, t) => sum + t.remaining, 0) };
            }, [filteredWeds]);

            const expensesTotal = useMemo(() => filteredExp.reduce((sum, e) => sum + e.amount, 0), [filteredExp]);
            const totalCollectedAll = studioStats.collected + wedStats.collected;
            const netProfit = totalCollectedAll - expensesTotal;

            return (
              <div className="space-y-6">
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 flex flex-wrap gap-4 items-end justify-between">
                  <h2 className="text-xl font-bold flex items-center gap-2 text-slate-100"><i className="ph ph-calendar-blank text-blue-400 text-2xl"></i> تقارير شهرية شاملة ومفصلة</h2>
                  <div className="flex gap-2">
                    <select value={filter.month} onChange={e => setFilter({...filter, month: e.target.value})} className="p-2 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none">{Array.from({length: 12}, (_, i) => i + 1).map(m => <option key={m} value={m}>شهر {m}</option>)}</select>
                    <select value={filter.year} onChange={e => setFilter({...filter, year: e.target.value})} className="p-2 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none">{[currentYear-1, currentYear, currentYear+1].map(y => <option key={y} value={y}>{y}</option>)}</select>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <StatCard title="التحصيل العام (استوديو + زفاف)" value={totalCollectedAll} color="blue" highlight />
                  <StatCard title="إجمالي المصروفات" value={expensesTotal} color="red" highlight />
                  <StatCard title="صافي الربح الفعلي" value={netProfit} color={netProfit >= 0 ? "emerald" : "rose"} highlight />
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  {/* تقرير الاستوديو */}
                  <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 flex flex-col">
                    <h3 className="text-lg font-bold text-blue-400 mb-4 border-b border-slate-800 pb-2 flex items-center gap-2"><i className="ph ph-camera text-xl"></i> تقرير الاستوديو (تصوير عادي)</h3>
                    <div className="grid grid-cols-2 gap-3 mb-6">
                      <StatCard title="إجمالي الشغل" value={studioStats.expected} color="blue" />
                      <StatCard title="التحصيل الفعلي" value={studioStats.collected} color="green" />
                      <StatCard title="محصل نقدي" value={studioStats.cash} color="green" />
                      <StatCard title="محصل إلكتروني" value={studioStats.electronic} color="indigo" />
                    </div>
                    
                    <div className="mt-auto">
                        <h4 className="font-bold text-red-400 mb-3 flex items-center justify-between bg-red-950/20 p-3 rounded-lg border border-red-900/30">
                            <span>ديون الاستوديو المتأخرة</span>
                            <span className="text-sm font-black">{formatCurrency(studioStats.debts)}</span>
                        </h4>
                        <div className="space-y-2 max-h-64 overflow-y-auto custom-scrollbar pr-2">
                          {filteredTxns.filter(t => t.remaining > 0).map(txn => (
                            <div key={txn.id} className="flex flex-col sm:flex-row justify-between items-start sm:items-center p-3 bg-slate-950 rounded-xl border border-slate-800 gap-2">
                              <div>
                                  <span className="font-bold text-slate-200 text-sm">{txn.clientName}</span>
                                  <div className="text-xs text-slate-500 mt-1 font-mono">📞 {txn.phone} | #{txn.receiptNo}</div>
                              </div>
                              <div className="flex items-center gap-1.5">
                                <span className="text-red-400 font-bold text-xs ml-2">{txn.remaining} ج.م</span>
                                <button onClick={() => openWhatsApp(txn.phone, `مرحباً أ. ${txn.clientName} 🌟\nتذكير بمبلغ متبقي لحسابكم في ${settings.studioName} بقيمة ${txn.remaining} ج.م.\nيمكن التحويل فودافون كاش أو إنستاباي على رقم: 01201260040`)} className="bg-green-600 hover:bg-green-500 text-white p-2 rounded-lg text-xs transition-colors" title="إرسال تذكير عبر الواتس"><i className="ph ph-whatsapp-logo text-base"></i></button>
                                <button onClick={() => setPayModal({...txn, paymentType: 'cash'})} className="bg-yellow-500 hover:bg-yellow-400 text-slate-900 p-2 rounded-lg text-xs transition-colors" title="سداد نقدي"><i className="ph ph-money text-base"></i></button>
                                <button onClick={() => setPayModal({...txn, paymentType: 'electronic'})} className="bg-indigo-500 hover:bg-indigo-400 text-white p-2 rounded-lg text-xs transition-colors" title="سداد إلكتروني"><i className="ph ph-wallet text-base"></i></button>
                              </div>
                            </div>
                          ))}
                          {filteredTxns.filter(t => t.remaining > 0).length === 0 && <p className="text-slate-500 text-xs text-center py-4 bg-slate-950 rounded-xl border border-slate-800 border-dashed">لا توجد ديون للاستوديو مسجلة.</p>}
                        </div>
                    </div>
                  </div>

                  {/* تقرير الزفاف */}
                  <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 flex flex-col">
                    <h3 className="text-lg font-bold text-pink-400 mb-4 border-b border-slate-800 pb-2 flex items-center gap-2"><i className="ph ph-heart text-xl"></i> تقرير حجوزات الزفاف</h3>
                    <div className="grid grid-cols-2 gap-3 mb-6">
                      <StatCard title="إجمالي الحجوزات" value={wedStats.expected} color="blue" />
                      <StatCard title="العربون المحصل" value={wedStats.collected} color="green" />
                      <StatCard title="محصل نقدي" value={wedStats.cash} color="green" />
                      <StatCard title="محصل إلكتروني" value={wedStats.electronic} color="indigo" />
                    </div>
                    
                    <div className="mt-auto">
                        <h4 className="font-bold text-red-400 mb-3 flex items-center justify-between bg-red-950/20 p-3 rounded-lg border border-red-900/30">
                            <span>بواقي الزفاف المتأخرة</span>
                            <span className="text-sm font-black">{formatCurrency(wedStats.debts)}</span>
                        </h4>
                        <div className="space-y-2 max-h-64 overflow-y-auto custom-scrollbar pr-2">
                          {filteredWeds.filter(t => t.remaining > 0).map(txn => (
                            <div key={txn.id} className="flex flex-col sm:flex-row justify-between items-start sm:items-center p-3 bg-slate-950 rounded-xl border border-slate-800 gap-2">
                              <div>
                                  <span className="font-bold text-pink-300 text-sm">{txn.groomName} و {txn.brideName}</span>
                                  <div className="text-xs text-slate-500 mt-1 font-mono">📞 {txn.phone} | #{txn.receiptNo}</div>
                              </div>
                              <div className="flex items-center gap-1.5">
                                <span className="text-red-400 font-bold text-xs ml-2">{txn.remaining} ج.م</span>
                                <button onClick={() => openWhatsApp(txn.phone, `مرحباً العريس ${txn.groomName} 🌟\nتذكير بمبلغ متبقي لحجز الزفاف في ${settings.studioName} بقيمة ${txn.remaining} ج.م.\nيمكن التحويل فودافون كاش أو إنستاباي على رقم: 01201260040`)} className="bg-green-600 hover:bg-green-500 text-white p-2 rounded-lg text-xs transition-colors" title="إرسال تذكير عبر الواتس"><i className="ph ph-whatsapp-logo text-base"></i></button>
                                <button onClick={() => setPayModal({...txn, paymentType: 'cash'})} className="bg-yellow-500 hover:bg-yellow-400 text-slate-900 p-2 rounded-lg text-xs transition-colors" title="سداد نقدي"><i className="ph ph-money text-base"></i></button>
                                <button onClick={() => setPayModal({...txn, paymentType: 'electronic'})} className="bg-indigo-500 hover:bg-indigo-400 text-white p-2 rounded-lg text-xs transition-colors" title="سداد إلكتروني"><i className="ph ph-wallet text-base"></i></button>
                              </div>
                            </div>
                          ))}
                          {filteredWeds.filter(t => t.remaining > 0).length === 0 && <p className="text-slate-500 text-xs text-center py-4 bg-slate-950 rounded-xl border border-slate-800 border-dashed">لا توجد بواقي زفاف مستحقة.</p>}
                        </div>
                    </div>
                  </div>
                </div>

                {payModal && (
                   <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 w-full max-w-md relative">
                      <button onClick={() => setPayModal(null)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400"><i className="ph ph-x text-2xl"></i></button>
                      <h3 className="text-2xl font-black mb-4 border-b border-slate-800 pb-4 text-center text-slate-100">
                          {payModal.paymentType === 'electronic' ? 'سداد إلكتروني (إنستاباي/محافظ)' : 'سداد نقدي'}
                      </h3>
                      <div className="mb-6 bg-slate-950 p-4 rounded-xl text-center border border-slate-800">
                        <p className="text-slate-300">العميل: <b className="text-white text-lg">{payModal.type === 'wedding' ? payModal.groomName : payModal.clientName}</b></p>
                        <p className="text-red-400 font-bold mt-2">الباقي المستحق: {payModal.remaining} ج.م</p>
                      </div>
                      <form onSubmit={async (e) => {
                        e.preventDefault();
                        const amount = parseFloat(e.target.amount.value);
                        const updated = { 
                            ...payModal, 
                            paid: payModal.paid + amount, 
                            electronicPaid: (payModal.electronicPaid || 0) + (payModal.paymentType === 'electronic' ? amount : 0),
                            remaining: payModal.total - (payModal.paid + amount) 
                        };
                        if (updated.pendingReceipt) delete updated.pendingReceipt;
                        delete updated.paymentType;
                        const targetCol = updated.type === 'wedding' ? 'weddings' : 'transactions';
                        await setDoc(doc(db, `artifacts/studio-marakby/public/data/${targetCol}`, updated.id), updated);
                        setPayModal(null);
                      }} className="space-y-4">
                        <input type="number" name="amount" required min="1" max={payModal.remaining} defaultValue={payModal.remaining} className="w-full p-4 border border-slate-700 bg-slate-950 text-white rounded-xl text-2xl font-black text-center outline-none focus:border-blue-500 shadow-inner"/>
                        <button type="submit" className={`w-full text-white font-black py-4 rounded-xl shadow-lg transition-all text-lg ${payModal.paymentType === 'electronic' ? 'bg-indigo-600 hover:bg-indigo-500 shadow-indigo-900/20' : 'bg-green-600 hover:bg-green-500 shadow-green-900/20'}`}>تأكيد تحصيل المبلغ</button>
                      </form>
                    </div>
                  </div>
                )}
              </div>
            );
          };

          const StatCard = ({title, value, color, highlight}) => {
            const colors = { 
                green: "bg-green-950/30 text-green-400 border-green-900/50", 
                red: "bg-red-950/30 text-red-400 border-red-900/50", 
                blue: "bg-blue-950/30 text-blue-400 border-blue-900/50", 
                indigo: "bg-indigo-950/30 text-indigo-400 border-indigo-900/50",
                emerald: "bg-emerald-600 text-white border-emerald-500", 
                rose: "bg-rose-600 text-white border-rose-500" 
            };
            return (
              <div className={`p-5 rounded-2xl border ${colors[color]} ${highlight ? 'shadow-lg scale-105' : ''}`}>
                <h4 className="text-xs opacity-80 mb-2">{title}</h4>
                <div className="text-xl sm:text-2xl font-black">{formatCurrency(value)}</div>
              </div>
            );
          };

          const MarketingTab = () => {
            const [promoMessage, setPromoMessage] = useState("أهلاً بك أ. {name} 👋\nكل عام وأنتم بخير! 🎉\nنتمنى لكم أوقاتاً سعيدة مع من تحبون.\n\nشرفتنا في {studio} 📸✨");
            const [searchTerm, setSearchTerm] = useState('');
            const [copyText, setCopyText] = useState('نسخ جميع الأرقام لعمل قائمة بث');
            const [customNumbersInput, setCustomNumbersInput] = useState('');

            const uniqueClients = useMemo(() => {
              const clientsMap = new Map();
              [...transactions, ...weddings].forEach(t => {
                if (t.phone && t.phone.trim() !== '') {
                  if (!clientsMap.has(t.phone)) {
                    clientsMap.set(t.phone, { clientName: t.type === 'wedding' ? t.groomName : t.clientName, phone: t.phone });
                  }
                }
              });
              return Array.from(clientsMap.values());
            }, [transactions, weddings]);

            const customClients = useMemo(() => {
              if (!customNumbersInput.trim()) return [];
              const numbers = customNumbersInput.split(/[,،\n]/).map(n => n.trim()).filter(n => n.length >= 8);
              const uniqueNums = [...new Set(numbers)];
              const existingPhones = new Set(uniqueClients.map(c => c.phone));
              const newUniqueNums = uniqueNums.filter(n => !existingPhones.has(n));
              return newUniqueNums.map(n => ({ clientName: 'عميل (رقم خارجي)', phone: n, isCustom: true }));
            }, [customNumbersInput, uniqueClients]);

            const allClients = [...uniqueClients, ...customClients];
            const filteredClients = allClients.filter(c => c.clientName.includes(searchTerm) || c.phone.includes(searchTerm));

            const handleCopyNumbers = () => {
              const numbersList = allClients.map(c => c.phone).join('\n');
              const el = document.createElement('textarea');
              el.value = numbersList;
              document.body.appendChild(el);
              el.select();
              document.execCommand('copy');
              document.body.removeChild(el);
              setCopyText('تم النسخ بنجاح ✓');
              setTimeout(() => setCopyText('نسخ جميع الأرقام لعمل قائمة بث'), 3000);
            };

            const handleSendPromo = (client) => {
              let msg = promoMessage;
              msg = msg.replace(/{name}/g, client.clientName || 'العميل');
              msg = msg.replace(/{studio}/g, settings.studioName || 'الاستوديو');
              openWhatsApp(client.phone, msg);
            };

            return (
              <div className="space-y-6">
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-100 border-b border-slate-800 pb-4">
                    <i className="ph ph-megaphone text-yellow-500 text-2xl"></i> التسويق والرسائل الجماعية
                  </h2>
                  <div className="space-y-6 mt-6">
                     <div>
                        <label className="block text-sm font-bold mb-3 text-slate-400">
                            محتوى رسالة التهنئة / العرض <br/>
                            <span className="text-xs font-normal opacity-70 mt-1 block">يمكنك كتابة المتغير <code className="bg-slate-800 px-1.5 py-0.5 rounded text-blue-300 font-mono">{'{name}'}</code> لادراج اسم العميل تلقائياً في الرسالة لتبدو شخصية.</span>
                        </label>
                        <textarea rows="4" value={promoMessage} onChange={e => setPromoMessage(e.target.value)} className="w-full p-4 border border-slate-700 bg-slate-950 text-slate-200 rounded-xl focus:border-yellow-500 outline-none text-sm font-mono custom-scrollbar transition-colors" />
                     </div>

                     <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                        <label className="block text-sm font-bold mb-3 text-blue-400">
                            <i className="ph ph-list-plus text-lg ml-1 align-middle"></i> إضافة أرقام خارجية (مفصولة بفاصلة) <br/>
                            <span className="text-xs font-normal text-slate-500 mt-1 block">الصق الأرقام هنا مفصولة بفاصلة (,) أو كل رقم في سطر جديد. سيتم إضافتها فوراً للقائمة بالأسفل.</span>
                        </label>
                        <textarea 
                            rows="2" 
                            value={customNumbersInput} 
                            onChange={e => setCustomNumbersInput(e.target.value)} 
                            className="w-full p-4 border border-slate-700 bg-slate-900 text-slate-200 rounded-xl focus:border-blue-500 outline-none text-sm font-mono custom-scrollbar transition-colors" 
                            placeholder="مثال: 01000000000, 01111111111" 
                        />
                     </div>

                     <div className="flex flex-col sm:flex-row gap-4 items-center bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                        <button onClick={handleCopyNumbers} className="w-full sm:w-auto bg-slate-950 hover:bg-slate-800 text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors border border-slate-600 whitespace-nowrap shadow-sm">
                          <i className={copyText.includes('✓') ? "ph ph-check text-green-400 text-xl" : "ph ph-copy text-xl"}></i> {copyText} ({allClients.length})
                        </button>
                        <p className="text-xs text-slate-400 flex-1 leading-relaxed text-center sm:text-right">
                          <strong className="text-slate-300">طريقة الإرسال الجماعي:</strong> قم بنسخ جميع الأرقام من الزر، ثم اذهب لتطبيق WhatsApp Business في هاتفك وقم بإنشاء "رسالة جماعية جديدة" (Broadcast List) والصق الأرقام لإرسال العرض للجميع بضغطة واحدة!
                        </p>
                     </div>
                  </div>
                </div>

                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                   <div className="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 border-b border-slate-800 pb-4">
                      <h3 className="text-lg font-bold text-slate-100 flex items-center gap-2">
                          <i className="ph ph-users text-blue-400 text-xl"></i> إجمالي الأرقام المستهدفة ({filteredClients.length})
                      </h3>
                      <div className="relative w-full sm:w-64">
                          <i className="ph ph-magnifying-glass absolute right-3 top-2.5 text-slate-500"></i>
                          <input type="text" placeholder="بحث بالاسم أو الرقم..." className="w-full py-2 pr-9 pl-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-yellow-500 text-sm" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                      </div>
                   </div>

                   {filteredClients.length === 0 ? (
                       <div className="text-center py-10 text-slate-500">لا يوجد عملاء أو أرقام مطابقة للبحث.</div>
                   ) : (
                       <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 max-h-[500px] overflow-y-auto custom-scrollbar pr-2 pb-2">
                          {filteredClients.map(client => (
                              <div key={client.phone} className={`p-4 rounded-xl border flex flex-col justify-between gap-4 transition-colors ${client.isCustom ? 'bg-blue-950/20 border-blue-900/30 hover:border-blue-700' : 'bg-slate-950 border-slate-800 hover:border-slate-700'}`}>
                                  <div>
                                      <div className={`font-bold text-sm truncate ${client.isCustom ? 'text-blue-300' : 'text-slate-200'}`} title={client.clientName}>{client.clientName}</div>
                                      <div className="text-xs text-slate-500 mt-1 font-mono">{client.phone}</div>
                                  </div>
                                  <button onClick={() => handleSendPromo(client)} className="w-full bg-green-600 hover:bg-green-500 text-white py-2.5 rounded-lg text-xs font-bold transition-colors flex items-center justify-center gap-2 shadow-sm">
                                      <i className="ph ph-whatsapp-logo text-lg"></i> إرسال التهنئة
                                  </button>
                              </div>
                          ))}
                       </div>
                   )}
                </div>
              </div>
            );
          };

          if (!authReady) return <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-100"><div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div><p className="font-bold">جاري المزامنة مع السحابة...</p></div>;

          return (
            <div className="min-h-screen bg-slate-950 text-slate-100 pb-20">
              {authError && <div className="bg-red-600 text-white text-center py-1 font-bold text-xs">{authError}</div>}
              {isTracking ? null : <Navigation />}
              <main className={`max-w-7xl mx-auto ${isTracking ? '' : 'p-4 md:p-6'}`}>
                {isTracking ? null : (
                    <>
                        {activeTab === 'dashboard' && <DashboardTab />}
                        {activeTab === 'weddings' && <WeddingsTab />}
                        {activeTab === 'expenses' && <ExpensesTab />}
                        {activeTab === 'reports' && <ReportsTab />}
                        {activeTab === 'marketing' && <MarketingTab />}
                        {activeTab === 'settings' && <SettingsTab />}
                    </>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
