                       </div>
                       <div onClick={() => setShowMonthModal(true)} className="bg-gradient-to-l from-red-950/40 to-slate-900 border border-red-900/50 p-5 rounded-2xl flex items-center justify-between shadow-inner cursor-pointer hover:border-red-500/30 hover:bg-red-950/20 transition-all group">
                           <div><p className="text-slate-400 text-sm font-bold group-hover:text-slate-300">مصروفات الشهر الحالي</p><p className="text-2xl font-black text-red-400 mt-1">{formatCurrency(monthTotalExp)}</p></div>
                           <div className="w-12 h-12 bg-red-500/20 rounded-full flex items-center justify-center text-red-400 border border-red-500/30 group-hover:scale-110 transition-transform"><i className="ph-fill ph-calendar-check text-2xl"></i></div>
                       </div>
                   </div>

                   <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                     <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-100 border-b border-slate-800 pb-4"><i className="ph ph-money text-red-400 text-2xl"></i> تسجيل مصروفات</h2>
                     <form onSubmit={handleAddExpense} className="grid grid-cols-1 sm:grid-cols-4 gap-4">
                       <div><label className="block text-sm font-bold text-slate-400 mb-2">المبلغ (ج.م)</label><input type="number" required placeholder="المبلغ" value={expData.amount} onChange={e => setExpData({...expData, amount: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-red-500 font-bold" /></div>
                       <div><label className="block text-sm font-bold text-slate-400 mb-2">بند المصروف</label><select value={expData.category} onChange={e => setExpData({...expData, category: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-red-500">{settings.expenseCategories.map((cat, idx) => <option key={idx} value={cat}>{cat}</option>)}</select></div>
                       <div><label className="block text-sm font-bold text-slate-400 mb-2">نوع المصروف</label><select value={expData.type} onChange={e => setExpData({...expData, type: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-red-500 font-bold"><option value="studio">الاستوديو</option><option value="wedding">حجوزات الزفاف</option></select></div>
                       <div><label className="block text-sm font-bold text-slate-400 mb-2">ملاحظات (اختياري)</label><input type="text" placeholder="ملاحظات..." value={expData.notes} onChange={e => setExpData({...expData, notes: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-red-500 placeholder-slate-500" /></div>
                       <button type="submit" className="sm:col-span-4 w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-lg shadow-md transition-all flex items-center justify-center gap-2"><i className="ph ph-plus-circle text-xl"></i> إضافة المصروف</button>
                     </form>
                   </div>
                   
                   <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                      <h2 className="text-xl font-bold mb-4 flex justify-between items-center text-slate-100 border-b border-slate-800 pb-4"><span>سجل مصروفات اليوم</span></h2>
                      <div className="space-y-3">
                        {todaysExpenses.length === 0 ? <p className="text-slate-500 text-center p-6 bg-slate-950 rounded-xl border border-slate-800 border-dashed">لم يتم تسجيل مصروفات اليوم.</p> : todaysExpenses.map(exp => (
                          <div key={exp.id} className="flex justify-between items-center p-4 bg-slate-950 rounded-xl border border-slate-800">
                            <div>
                                <div className="flex items-center gap-2">
                                    <p className="font-bold text-slate-200">{exp.category} <span className="text-red-400 mr-2">{exp.amount} ج.م</span></p>
                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${exp.type === 'wedding' ? 'bg-pink-900/40 text-pink-400' : 'bg-blue-900/40 text-blue-400'}`}>{exp.type === 'wedding' ? 'زفاف' : 'استوديو'}</span>
                                </div>
                                {exp.notes && <p className="text-xs text-slate-500 mt-1">{exp.notes}</p>}
                            </div>
                            <button onClick={async () => { const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby'; await deleteDoc(doc(db, `artifacts/${appId}/public/data/expenses`, exp.id)); }} className="text-slate-500 hover:text-red-400 p-2"><i className="ph ph-trash text-xl"></i></button>
                          </div>
                        ))}
                      </div>
                   </div>
                </div>

                <div className="xl:col-span-1">
                   <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 sticky top-24">
                      <h2 className="text-xl font-bold mb-2 flex items-center gap-2 text-slate-100 border-b border-slate-800 pb-4"><i className="ph ph-stack text-purple-400 text-2xl"></i> إدارة وإحصائيات المخزون</h2>
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-1 2xl:grid-cols-2 gap-4 max-h-[65vh] overflow-y-auto custom-scrollbar pr-2 pb-2">
                         {inventoryItemsList.map((item, idx) => {
                            const isProduct = item.price !== undefined; const itemName = item.name; const currentStock = inventory[itemName] !== undefined ? inventory[itemName] : (item.totalQty || 0);
                            return (
                            <div key={idx} className="flex flex-col p-4 bg-slate-950 rounded-2xl border border-slate-800 hover:border-purple-500/50 transition-all shadow-md">
                               <div className="text-center mb-4"><span className="font-bold text-slate-200 text-sm block truncate">{itemName}</span></div>
                               <div className="flex items-center justify-between bg-slate-900 p-1.5 rounded-xl border border-slate-700 shadow-inner mb-4">
                                  <button type="button" onClick={()=>updateInventory(itemName, -1)} className="text-red-400 hover:bg-slate-800 w-8 h-8 rounded-lg flex items-center justify-center"><i className="ph ph-minus text-base font-bold"></i></button>
                                  <span className="font-bold text-2xl text-white tracking-wider">{currentStock}</span>
                                  <button type="button" onClick={()=>updateInventory(itemName, 1)} className="text-green-400 hover:bg-slate-800 w-8 h-8 rounded-lg flex items-center justify-center"><i className="ph ph-plus text-base font-bold"></i></button>
                               </div>
                               {isProduct && (
                                  <div className="flex flex-col gap-2 text-[11px] sm:text-xs font-bold mt-auto bg-slate-900/50 p-3 rounded-xl border border-slate-800/50">
                                      <div className="flex justify-between items-center"><span className="text-slate-500">العدد الكلي:</span> <b className="text-blue-400">{item.totalQty || 0}</b></div>
                                      <div className="flex justify-between items-center"><span className="text-slate-500">المباع:</span> <b className="text-orange-400">{(item.totalQty || 0) - currentStock}</b></div>
                                      <div className="flex justify-between items-center"><span className="text-slate-500">سعر البيع:</span> <b className="text-purple-400">{item.price || 0} ج.م</b></div>
                                  </div>
                               )}
                            </div>
                         )})}
                      </div>
                   </div>
                </div>

                {showMonthModal && (
                    <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setShowMonthModal(false)}>
                        <div className="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 w-full max-w-2xl relative max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>
                            <button onClick={() => setShowMonthModal(false)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400 z-10"><i className="ph ph-x text-2xl"></i></button>
                            <h3 className="text-xl font-black mb-4 border-b border-slate-800 pb-4 text-red-400 flex items-center justify-between">
                                <div className="flex items-center gap-2"><i className="ph-fill ph-calendar-check text-2xl"></i> تفاصيل مصروفات الشهر الحالي</div>
                                <span className="text-sm bg-red-950/50 px-3 py-1 rounded-lg border border-red-900/50 hidden sm:block">{formatCurrency(monthTotalExp)}</span>
                            </h3>
                            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-3">
                                {thisMonthExpenses.length === 0 ? <p className="text-slate-500 text-center py-6 bg-slate-950 rounded-xl border border-slate-800 border-dashed">لا توجد مصروفات.</p> : thisMonthExpenses.map(exp => (
                                    <div key={exp.id} className="flex justify-between items-center p-4 bg-slate-950 rounded-xl border border-slate-800 hover:border-red-500/30 transition-colors">
                                        <div>
                                            <p className="font-bold text-slate-200">{exp.category} <span className="text-red-400 mx-2">{exp.amount} ج.م</span> <span className={`text-[10px] px-2 py-0.5 rounded ${exp.type === 'wedding' ? 'bg-pink-900/40 text-pink-400' : 'bg-blue-900/40 text-blue-400'}`}>{exp.type === 'wedding' ? 'زفاف' : 'استوديو'}</span></p>
                                            {exp.notes && <p className="text-xs text-slate-500 mt-1">{exp.notes}</p>}
                                            <p className="text-xs text-slate-600 mt-1 font-mono">{formatDate(exp.date)}</p>
                                        </div>
                                        <button onClick={async () => { const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby'; await deleteDoc(doc(db, `artifacts/${appId}/public/data/expenses`, exp.id)); }} className="text-slate-500 hover:text-red-400 p-2"><i className="ph ph-trash text-xl"></i></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                )}
              </div>
            );
        };

        const ReportsTab = ({ settings, transactions, weddings, expenses, setReceiptImageModal }) => {
            const currentMonth = new Date().getMonth() + 1; const currentYear = new Date().getFullYear();
            const [filter, setFilter] = useState({ month: currentMonth, year: currentYear });
            const [archiveQuery, setArchiveQuery] = useState(''); const [electronicDetails, setElectronicDetails] = useState(null); const [showAmounts, setShowAmounts] = useState(false);
            
            const filteredTxns = transactions.filter(t => t.month == filter.month && t.year == filter.year);
            const filteredWeds = weddings.filter(t => t.month == filter.month && t.year == filter.year);
            const filteredExp = expenses.filter(e => e.month == filter.month && e.year == filter.year);
            
            const targetDateObj = new Date(filter.year, filter.month - 1, 1);
            const studioCollectedStats = useMemo(() => calculatePeriodRevenue(transactions, targetDateObj, 'month'), [transactions, filter]);
            const wedCollectedStats = useMemo(() => calculatePeriodRevenue(weddings, targetDateObj, 'month'), [weddings, filter]);

            const studioExpTotal = useMemo(() => filteredExp.filter(e => e.type !== 'wedding').reduce((sum, e) => sum + e.amount, 0), [filteredExp]);
            const weddingExpTotal = useMemo(() => filteredExp.filter(e => e.type === 'wedding').reduce((sum, e) => sum + e.amount, 0), [filteredExp]);

            const studioStats = useMemo(() => {
              const expected = filteredTxns.reduce((sum, t) => sum + (parseFloat(t.total)||0), 0);
              return { expected, collected: studioCollectedStats.total, cash: studioCollectedStats.cash, electronic: studioCollectedStats.electronic, debts: filteredTxns.reduce((sum, t) => sum + (parseFloat(t.remaining)||0), 0), expenses: studioExpTotal, netProfit: studioCollectedStats.total - studioExpTotal };
            }, [filteredTxns, studioCollectedStats, studioExpTotal]);

            const wedStats = useMemo(() => {
              const expected = filteredWeds.reduce((sum, t) => sum + (parseFloat(t.total)||0), 0);
              return { expected, collected: wedCollectedStats.total, cash: wedCollectedStats.cash, electronic: wedCollectedStats.electronic, debts: filteredWeds.reduce((sum, t) => sum + (parseFloat(t.remaining)||0), 0), expenses: weddingExpTotal, netProfit: wedCollectedStats.total - weddingExpTotal };
            }, [filteredWeds, wedCollectedStats, weddingExpTotal]);

            const allCompleted = useMemo(() => [...filteredTxns.filter(t => t.status === 3), ...filteredWeds.filter(t => t.status === 6)].sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime)), [filteredTxns, filteredWeds]);
            const closedRevenue = allCompleted.reduce((sum, t) => sum + (parseFloat(t.total) || 0), 0);
            const searchedArchive = allCompleted.filter(t => (`${t.groomName || ''} ${t.brideName || ''} ${t.clientName || ''}`).includes(archiveQuery) || (t.phone || '').includes(archiveQuery) || (t.receiptNo?.toString() || '').includes(archiveQuery));

            return (
              <div className="space-y-4">
                <div className="bg-slate-900 p-4 sm:p-5 rounded-2xl shadow-sm border border-slate-800 flex flex-wrap gap-3 items-center justify-between">
                  <h2 className="text-lg sm:text-xl font-bold flex items-center gap-2 text-slate-100"><i className="ph ph-calendar-blank text-blue-400 text-xl sm:text-2xl"></i> تقارير شهرية شاملة ومفصلة</h2>
                  <div className="flex gap-2">
                    <button onClick={() => setShowAmounts(!showAmounts)} className="bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors" title={showAmounts ? "إخفاء المبالغ" : "إظهار المبالغ"}>
                        <i className={`ph ${showAmounts ? 'ph-eye-slash' : 'ph-eye'} text-lg`}></i>
                    </button>
                    <select value={filter.month} onChange={e => setFilter({...filter, month: e.target.value})} className="py-1.5 px-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none text-sm font-bold">{Array.from({length: 12}, (_, i) => i + 1).map(m => <option key={m} value={m}>شهر {m}</option>)}</select>
                    <select value={filter.year} onChange={e => setFilter({...filter, year: e.target.value})} className="py-1.5 px-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none text-sm font-bold">{[currentYear-1, currentYear, currentYear+1].map(y => <option key={y} value={y}>{y}</option>)}</select>
                  </div>
                </div>

                <div className="grid grid-cols-1 gap-6">
                  
                  {/* قسم تقرير الاستوديو */}
                  <div className="bg-slate-900 p-5 rounded-2xl shadow-sm border border-slate-800 flex flex-col relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-2 h-full bg-blue-500"></div>
                    <h3 className="text-lg font-bold text-blue-400 mb-4 border-b border-slate-800 pb-3 flex items-center justify-between">
                        <span className="flex items-center gap-2"><i className="ph-fill ph-camera"></i> تقرير الاستوديو (تفصيلي)</span>
                    </h3>
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-3">
                      <StatCard hideValue={!showAmounts} title="إجمالي الشغل المطلوب (هذا الشهر)" value={studioStats.expected} color="blue" />
                      <StatCard hideValue={!showAmounts} title="إجمالي المحصل الفعلي (هذا الشهر)" value={studioStats.collected} color="green" />
                      <StatCard hideValue={!showAmounts} title="إجمالي مصروفات الاستوديو (هذا الشهر)" value={studioStats.expenses} color="red" />
                      <StatCard hideValue={!showAmounts} title="ديون متبقية لشغل (هذا الشهر)" value={studioStats.debts} color="rose" />
                      <StatCard hideValue={!showAmounts} title="صافي ربح الاستوديو الفعلي" value={studioStats.netProfit} color="yellow" highlight />
                    </div>
                    <div className="mt-3 pt-3 border-t border-slate-800 grid grid-cols-2 gap-3 max-w-lg">
                        <StatCard hideValue={!showAmounts} title="محصل نقدي (كاش)" value={studioStats.cash} color="emerald" />
                        <StatCard hideValue={!showAmounts} title="محصل إلكتروني (محافظ/انستاباي)" value={studioStats.electronic} color="indigo" onClick={() => setElectronicDetails({ title: 'الدفع الإلكتروني (استوديو)', data: transactions.filter(t => t.payments && t.payments.some(p => p.method === 'electronic' && new Date(p.date).getMonth() + 1 == filter.month && new Date(p.date).getFullYear() == filter.year)) })} />
                    </div>
                  </div>

                  {/* قسم تقرير حجوزات الزفاف */}
                  <div className="bg-slate-900 p-5 rounded-2xl shadow-sm border border-slate-800 flex flex-col relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-2 h-full bg-pink-500"></div>
                    <h3 className="text-lg font-bold text-pink-400 mb-4 border-b border-slate-800 pb-3 flex items-center justify-between">
                        <span className="flex items-center gap-2"><i className="ph-fill ph-heart"></i> تقرير حجوزات الزفاف (تفصيلي)</span>
                    </h3>
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-3">
                      <StatCard hideValue={!showAmounts} title="إجمالي الحجوزات (المسجلة هذا الشهر)" value={wedStats.expected} color="pink" />
                      <StatCard hideValue={!showAmounts} title="إجمالي المحصل الفعلي (هذا الشهر)" value={wedStats.collected} color="green" />
                      <StatCard hideValue={!showAmounts} title="إجمالي مصروفات الزفاف (هذا الشهر)" value={wedStats.expenses} color="red" />
                      <StatCard hideValue={!showAmounts} title="ديون متبقية للحجوزات (هذا الشهر)" value={wedStats.debts} color="rose" />
                      <StatCard hideValue={!showAmounts} title="صافي ربح الزفاف الفعلي" value={wedStats.netProfit} color="yellow" highlight />
                    </div>
                    <div className="mt-3 pt-3 border-t border-slate-800 grid grid-cols-2 gap-3 max-w-lg">
                        <StatCard hideValue={!showAmounts} title="محصل نقدي (كاش)" value={wedStats.cash} color="emerald" />
                        <StatCard hideValue={!showAmounts} title="محصل إلكتروني (محافظ/انستاباي)" value={wedStats.electronic} color="indigo" onClick={() => setElectronicDetails({ title: 'الدفع الإلكتروني (زفاف)', data: weddings.filter(t => t.payments && t.payments.some(p => p.method === 'electronic' && new Date(p.date).getMonth() + 1 == filter.month && new Date(p.date).getFullYear() == filter.year)) })} />
                    </div>
                  </div>

                </div>

                <div className="bg-slate-900 p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-800 flex flex-col mt-4">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-800 pb-4 mb-4 gap-4">
                        <div>
                            <h3 className="text-lg sm:text-xl font-bold text-yellow-400 flex items-center gap-2">
                                <i className="ph-fill ph-archive-box text-2xl"></i> أرشيف العملاء (إعادة الاستهداف والتقييم)
                            </h3>
                            <p className="text-xs text-slate-400 mt-1">قائمة بالعملاء الذين استلموا أعمالهم، لطلب التقييم أو إرسال عروض ترويجية.</p>
                        </div>
                        <div className="bg-yellow-500/10 border border-yellow-500/30 px-4 py-2 rounded-xl text-yellow-400 flex flex-col items-center">
                            <span className="text-[10px] uppercase font-bold tracking-wider">أرباح الصفقات المغلقة</span>
                            <span className="text-lg font-black">{showAmounts ? formatCurrency(closedRevenue) : '••••••'}</span>
                        </div>
                    </div>

                    <div className="relative w-full mb-4">
                        <i className="ph ph-magnifying-glass absolute right-4 top-3.5 text-slate-500 text-lg"></i>
                        <input 
                            type="text" 
                            placeholder="ابحث في الأرشيف بالاسم، رقم الهاتف، أو رقم الإيصال..." 
                            className="w-full p-3 pr-11 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none text-sm transition-colors" 
                            value={archiveQuery} 
                            onChange={(e) => setArchiveQuery(e.target.value)} 
                        />
                    </div>

                    <div className="space-y-3 max-h-[400px] overflow-y-auto custom-scrollbar pr-1">
                        {searchedArchive.length === 0 ? (
                            <p className="text-center text-slate-500 py-10 bg-slate-950 rounded-xl border border-slate-800 border-dashed">لا يوجد عملاء استلموا أعمالهم في هذا الشهر.</p>
                        ) : (
                            searchedArchive.map(txn => {
                                const isWed = txn.type === 'wedding';
                                const name = isWed ? `${txn.groomName || ''} و ${txn.brideName || ''}`.trim() : txn.clientName;
                                return (
                                    <div key={txn.id} className="flex flex-col lg:flex-row justify-between items-start lg:items-center p-4 bg-slate-950 rounded-xl border border-slate-800 gap-4 hover:border-yellow-500/30 transition-all">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2 mb-1">
                                                <i className={`text-lg ${isWed ? 'ph-fill ph-heart text-pink-500' : 'ph-fill ph-camera text-blue-500'}`}></i>
                                                <span className="font-bold text-slate-200 text-base">{name || 'بدون اسم'}</span>
                                                <span className="bg-slate-800 text-slate-400 text-[10px] px-2 py-0.5 rounded font-mono">#{txn.receiptNo}</span>
                                            </div>
                                            <div className="text-xs text-slate-500 font-mono mt-1">📞 {txn.phone} | 📅 {formatDateOnly(txn.dateTime)} | 💰 {showAmounts ? `${txn.total} ج.م` : '••••••'}</div>
                                            
                                            {txn.confirmedReceipts && txn.confirmedReceipts.length > 0 && (
                                                <div className="flex items-center gap-2 mt-3">
                                                    <span className="text-xs text-slate-500"><i className="ph ph-check-circle text-green-500"></i> إيصالات السداد:</span>
                                                    {txn.confirmedReceipts.map((imgUrl, idx) => (
                                                        <img key={idx} src={imgUrl} alt="إيصال" className="w-8 h-8 object-cover rounded border border-slate-700 cursor-pointer hover:opacity-80 transition-all shadow-sm" onClick={() => setReceiptImageModal(imgUrl)} title="تكبير الإيصال" />
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        
                                        <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 w-full lg:w-auto shrink-0">
                                            {txn.clientRating > 0 ? (
                                                <div className="bg-yellow-950/30 border border-yellow-900/50 px-3 py-2 rounded-lg flex items-center gap-1 min-w-[120px] justify-center" title={txn.clientFeedback || 'بدون تعليق'}>
                                                    <span className="text-yellow-500 font-black text-sm">{txn.clientRating}</span>
                                                    <i className="ph-fill ph-star text-yellow-500 text-sm"></i>
                                                </div>
                                            ) : (
                                                <button 
                                                    onClick={() => {
                                                        const typeParam = isWed ? 'w' : 't';
                                                        const trackUrl = window.location.href.split('?')[0] + `?phone=${encodeURIComponent(txn.phone)}&receipt=${encodeURIComponent(txn.receiptNo)}&type=${typeParam}`;
                                                        const msg = `أهلاً بك أ. ${name || ''} 🌟\nبما إنك استلمت شغلك من ${settings.studioName}، يهمنا جداً نعرف رأيك وتقييمك للتجربة عبر هذا الرابط:\n${trackUrl}`;
                                                        openWhatsApp(txn.phone, msg);
                                                    }}
