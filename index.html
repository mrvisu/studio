<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو المراكبى - الإدارة والتتبع</title>
    
    <!-- Favicon (Modern SVG Camera matching Yellow-500) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23eab308'%3E%3Cpath d='M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z'/%3E%3C/svg%3E">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons (Modern & Chic) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap');
        
        * {
            font-family: 'Cairo', sans-serif !important;
        }
        body {
            font-weight: 400;
            background-color: #020617; /* slate-950 */
            color: #f1f5f9; /* slate-100 */
            margin: 0;
            padding: 0;
            color-scheme: dark;
        }
        
        main .font-bold { font-weight: 500 !important; }
        main .font-black { font-weight: 600 !important; }
        main b, main strong { font-weight: 500 !important; }
        
        /* Custom Scrollbar - Dark Theme */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* inputs background fix for autofill */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #020617 inset !important;
            -webkit-text-fill-color: white !important;
        }

        /* Hide number input arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const { useState, useEffect, useMemo } = React;

        // --- Order Statuses for Tracking ---
        const ORDER_STATUSES = [
          { 
              id: 0, label: 'تم التسجيل', icon: 'ph-clipboard-text', 
              activeClass: 'bg-blue-900/40 text-blue-400 border-blue-500/50 shadow-lg shadow-blue-900/20', 
              inactiveClass: 'bg-slate-900 text-slate-500 border-slate-800 hover:bg-slate-800',
              clientIconCompleted: 'bg-blue-500 text-white shadow-lg shadow-blue-500/40 border-blue-900',
              clientCardCurrent: 'bg-blue-900/20 border-blue-500/50 shadow-lg shadow-blue-900/20',
              clientTextCurrent: 'text-blue-400'
          },
          { 
              id: 1, label: 'جاري العمل', icon: 'ph-paint-brush-broad', 
              activeClass: 'bg-orange-900/40 text-orange-400 border-orange-500/50 shadow-lg shadow-orange-900/20', 
              inactiveClass: 'bg-slate-900 text-slate-500 border-slate-800 hover:bg-slate-800',
              clientIconCompleted: 'bg-orange-500 text-white shadow-lg shadow-orange-500/40 border-orange-900',
              clientCardCurrent: 'bg-orange-900/20 border-orange-500/50 shadow-lg shadow-orange-900/20',
              clientTextCurrent: 'text-orange-400'
          },
          { 
              id: 2, label: 'جاهز للاستلام', icon: 'ph-check-circle', 
              activeClass: 'bg-green-900/40 text-green-400 border-green-500/50 shadow-lg shadow-green-900/20', 
              inactiveClass: 'bg-slate-900 text-slate-500 border-slate-800 hover:bg-slate-800',
              clientIconCompleted: 'bg-green-500 text-white shadow-lg shadow-green-500/40 border-green-900',
              clientCardCurrent: 'bg-green-900/20 border-green-500/50 shadow-lg shadow-green-900/20',
              clientTextCurrent: 'text-green-400'
          },
          { 
              id: 3, label: 'تم التسليم', icon: 'ph-package', 
              activeClass: 'bg-purple-900/40 text-purple-400 border-purple-500/50 shadow-lg shadow-purple-900/20', 
              inactiveClass: 'bg-slate-900 text-slate-500 border-slate-800 hover:bg-slate-800',
              clientIconCompleted: 'bg-purple-500 text-white shadow-lg shadow-purple-500/40 border-purple-900',
              clientCardCurrent: 'bg-purple-900/20 border-purple-500/50 shadow-lg shadow-purple-900/20',
              clientTextCurrent: 'text-purple-400'
          }
        ];

        // --- Default Data & Settings ---
        const DEFAULT_SERVICES = [
          { name: "صورة شخصية", price: 70, desc: "مقاس 4x6 استلام بعد يوم من تاريخ التصوير" },
          { name: "صورة شخصية فورى", price: 90, desc: "استلام فورى بعد 10 دقائق" },
          { name: "صورة شخصية كارت", price: 70, desc: "مقاس الكارت 15x20 تسليم بعد يومين" },
          { name: "طابلوه خشب مقاس 20x30", price: 130, desc: "" },
          { name: "طابلوه خشب مقاس 30x40", price: 180, desc: "" },
          { name: "طابلوه خشب مقاس 40x50", price: 280, desc: "" },
          { name: "طابلوه خشب مقاس 50x70", price: 400, desc: "" },
          { name: "صور فون مقاس 10x15", price: 10, desc: "طباعه من الموبايل السعر لعدد اكتر من 10 صور" },
          { name: "صورة شخصيه", price: 45, desc: "تسليم موبايل فقط" }
        ];

        const DEFAULT_EXPENSE_CATEGORIES = [
          "أحبار وطباعة", "ورق صور", "صيانة كاميرات/معدات", 
          "إيجار الاستوديو", "كهرباء ومرافق", "رواتب مساعدين", "نثريات"
        ];

        const DEFAULT_WA_TEMPLATES = {
          welcome: "أهلاً بك أ. {name} في {studio} 📸. نورتنا وشرفتنا! تم تسجيل طلبك بنجاح. \nتفاصيل الطلب: {services}\nالإجمالي: {total} ج.م\nالمدفوع: {paid} ج.م\nالباقي: {remaining} ج.م",
          invoice: "أهلاً بك أ. {name} 👋\nنورتنا وشرفتنا في {studio} 📸✨\n\n🧾 فاتورة إلكترونية\n----------------------------------\n🧾 رقم الإيصال: {receipt}\n📅 التاريخ: {date}\n----------------------------------\n🛠️ الخدمات المطلوبة:\n{services}\n----------------------------------\n💰 إجمالي الحساب: {total} ج.م\n✅ المدفوع: {paid} ج.م\n🔴 الباقي: {remaining} ج.م\n----------------------------------\n📍 لمتابعة حالة طلبك خطوة بخطوة، تفضل بزيارة الرابط التالي:\n{track_url}\n\nشكراً لثقتكم بنا!",
          reminder: "مرحباً أ. {name} 🌟. نود تذكيركم بأن هناك مبلغ متبقي لحسابكم في {studio} بقيمة {remaining} ج.م. \nرقم الإيصال: {receipt}.",
          ready: "أهلاً أ. {name} 🎉. الطلب الخاص بك جاهز للاستلام في {studio}! \nباقي الحساب: {remaining} ج.م. نورتنا وشرفتنا!",
          deposit: "تم استلام عربون بقيمة {paid} ج.م من أ. {name} في {studio} 💸. \nإجمالي الطلب: {total} ج.م \nالمتبقي: {remaining} ج.م. شكراً لك!",
          tracking: "مرحباً أ. {name} 👋\nيمكنك الآن متابعة مراحل تجهيز طلبك (إيصال #{receipt}) لحظة بلحظة عبر الرابط التالي:\n{track_url}\n\nشرفتنا في {studio} 📸✨"
        };

        const firebaseConfig = {
          apiKey: "AIzaSyCI0L2fO4_bdltYF7Hddjcxa6seSDbrMwc",
          authDomain: "st.elmrakby@gmail.com",
          projectId: "studio-noot",
          storageBucket: "studio-noot.firebasestorage.app",
          messagingSenderId: "376391287753",
          appId: "1:376391287753:web:58219ac850bde7e2a79e18"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [user, setUser] = useState(null);
          const [authReady, setAuthReady] = useState(false);
          const [authError, setAuthError] = useState(null);
          const [dataLoaded, setDataLoaded] = useState(false);
          const [showNotFound, setShowNotFound] = useState(false);
          
          const [transactions, setTransactions] = useState([]);
          const [expenses, setExpenses] = useState([]);
          const [settings, setSettings] = useState({
            nextReceiptNo: 1000,
            services: DEFAULT_SERVICES,
            expenseCategories: DEFAULT_EXPENSE_CATEGORIES,
            waTemplates: DEFAULT_WA_TEMPLATES,
            studioName: "ستوديو المراكبى",
            studioLogo: ""
          });

          // Check if this is a tracking link view using phone and receipt
          const urlParams = new URLSearchParams(window.location.search);
          const trackPhone = urlParams.get('phone');
          const trackReceipt = urlParams.get('receipt');
          const isTracking = trackPhone && trackReceipt;

          useEffect(() => {
            const initAuth = async () => {
              try {
                await signInAnonymously(auth);
              } catch (error) {
                setAuthError("تنبيه: يوجد مشكلة في الاتصال بقاعدة البيانات.");
                setAuthReady(true);
              }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (u) => {
              setUser(u);
              setAuthReady(true);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const appId = 'studio-marakby';
            const basePath = `artifacts/${appId}/public/data`;

            const fetchSettings = async () => {
              const docSnap = await getDoc(doc(db, basePath, 'settings', 'main'));
              if (docSnap.exists()) {
                let data = docSnap.data();
                if (data.services && data.services.length > 0) {
                    data.services = data.services.map(s => {
                        if (typeof s === 'string') return { name: s, price: 0, desc: '' };
                        return { name: s.name, price: s.price || 0, desc: s.desc || '' };
                    });
                }
                if(!data.waTemplates.tracking) {
                    data.waTemplates.tracking = DEFAULT_WA_TEMPLATES.tracking;
                }
                
                if (data.waTemplates.invoice && !data.waTemplates.invoice.includes('{track_url}')) {
                    data.waTemplates.invoice = DEFAULT_WA_TEMPLATES.invoice;
                }

                setSettings(data);
              }
            };
            fetchSettings();

            const unsubTxns = onSnapshot(collection(db, basePath, 'transactions'), (snapshot) => {
              const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
              data.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
              setTransactions(data);
              setDataLoaded(true);
            });

            if(!isTracking) { // Only listen to expenses if not in tracking mode
                const unsubExps = onSnapshot(collection(db, basePath, 'expenses'), (snapshot) => {
                  const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                  data.sort((a, b) => new Date(b.date) - new Date(a.date));
                  setExpenses(data);
                });
                return () => { unsubTxns(); unsubExps(); };
            }

            return () => { unsubTxns(); };
          }, [user, isTracking]);

          useEffect(() => {
            if (!user || isTracking) return; // Prevent client from saving settings
            const timer = setTimeout(() => {
              const appId = 'studio-marakby';
              setDoc(doc(db, `artifacts/${appId}/public/data/settings`, 'main'), settings);
            }, 1500);
            return () => clearTimeout(timer);
          }, [settings, user, isTracking]);

          // فترة سماح لمنع ظهور رسالة الطلب غير موجود قبل اكتمال جلب البيانات
          useEffect(() => {
              if (isTracking && dataLoaded) {
                  const exists = transactions.some(t => t.phone === trackPhone && t.receiptNo.toString() === trackReceipt);
                  if (!exists) {
                      const timer = setTimeout(() => setShowNotFound(true), 2500);
                      return () => clearTimeout(timer);
                  } else {
                      setShowNotFound(false);
                  }
              }
          }, [isTracking, dataLoaded, transactions, trackPhone, trackReceipt]);

          const formatCurrency = (num) => Number(num || 0).toLocaleString('ar-EG') + ' ج.م';
          const formatDate = (dateStr) => new Date(dateStr).toLocaleString('ar-EG', { dateStyle: 'short', timeStyle: 'short' });
          const formatDateOnly = (dateStr) => new Date(dateStr).toLocaleDateString('ar-EG');
          
          const generateWA_Message = (templateKey, txn) => {
            let msg = settings.waTemplates[templateKey] || "";
            msg = msg.replace(/{name}/g, txn.clientName || 'العميل');
            msg = msg.replace(/{receipt}/g, txn.receiptNo || '');
            msg = msg.replace(/{total}/g, txn.total || 0);
            msg = msg.replace(/{paid}/g, txn.paid || 0);
            msg = msg.replace(/{remaining}/g, txn.remaining || 0);
            msg = msg.replace(/{services}/g, txn.requirements || 'خدمات تصوير');
            msg = msg.replace(/{studio}/g, settings.studioName || 'الاستوديو');
            msg = msg.replace(/{date}/g, formatDateOnly(txn.dateTime));
            
            const trackUrl = window.location.href.split('?')[0] + `?phone=${encodeURIComponent(txn.phone)}&receipt=${encodeURIComponent(txn.receiptNo)}`;
            msg = msg.replace(/{track_url}/g, trackUrl);
            return msg;
          };

          const openWhatsApp = (phone, msg) => {
            let formattedPhone = phone.trim();
            if (formattedPhone.startsWith('0')) formattedPhone = '2' + formattedPhone;
            else if (!formattedPhone.startsWith('2')) formattedPhone = '20' + formattedPhone;
            const url = `https://wa.me/${formattedPhone}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
          };

          // --- Client Tracking View ---
          if (isTracking && authReady) {
              const txn = transactions.find(t => t.phone === trackPhone && t.receiptNo.toString() === trackReceipt);

              if (!dataLoaded || (!txn && !showNotFound)) {
                  return (
                      <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-100 p-6 text-center">
                          <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                          <h2 className="text-xl font-bold mb-2 text-white">جاري البحث عن الطلب...</h2>
                          <p className="text-slate-400 text-sm">لحظات ونعرض لك التفاصيل</p>
                      </div>
                  );
              }
              
              if (!txn && showNotFound) return (
                  <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-400 p-6 text-center">
                      <i className="ph ph-magnifying-glass text-6xl mb-4 text-slate-600"></i>
                      <h2 className="text-2xl font-bold mb-2 text-white">الطلب غير موجود</h2>
                      <p>عذراً، لم نتمكن من العثور على طلب يطابق رقم الهاتف والإيصال المدخلين.</p>
                      <p className="mt-2 text-sm opacity-70">رقم الهاتف: {trackPhone} | رقم الإيصال: {trackReceipt}</p>
                  </div>
              );
              
              const currentStatus = txn.status || 0;

              return (
                  <div className="min-h-screen bg-slate-950 text-slate-100 p-4 md:p-6 flex flex-col items-center">
                      <div className="flex flex-col items-center gap-3 mb-8 mt-6">
                          {settings.studioLogo ? <img src={settings.studioLogo} className="w-24 h-24 rounded-2xl object-cover shadow-lg shadow-blue-900/20 border border-slate-800" /> : <i className="ph ph-camera text-6xl text-blue-500"></i>}
                          <h1 className="text-2xl font-black">{settings.studioName}</h1>
                          <p className="text-slate-400 text-sm">تتبع حالة الطلب الخاص بك</p>
                      </div>

                      <div className="bg-slate-900 w-full max-w-md p-6 rounded-3xl shadow-xl border border-slate-800 mb-8 relative overflow-hidden">
                          <div className="absolute top-0 right-0 w-2 h-full bg-blue-500"></div>
                          <div className="flex justify-between items-center mb-4 pb-4 border-b border-slate-800">
                              <span className="text-slate-400 text-sm">إيصال رقم</span>
                              <span className="text-2xl font-black font-mono text-white">#{txn.receiptNo}</span>
                          </div>
                          <h3 className="text-xl font-bold mb-2 text-blue-400 flex items-center gap-2"><i className="ph ph-user"></i> {txn.clientName}</h3>
                          <p className="text-sm text-slate-400 mb-5 leading-relaxed">{txn.requirements}</p>

                          <div className="flex justify-between bg-slate-950 p-4 rounded-2xl border border-slate-800 text-sm">
                               <div className="flex flex-col items-center gap-1">
                                   <span className="text-slate-500 text-xs">المدفوع</span>
                                   <span className="text-green-400 font-bold">{txn.paid} ج.م</span>
                               </div>
                               <div className="w-px bg-slate-800"></div>
                               <div className="flex flex-col items-center gap-1">
                                   <span className="text-slate-500 text-xs">الباقي الدفع</span>
                                   <span className="text-red-400 font-bold">{txn.remaining} ج.م</span>
                               </div>
                          </div>
                      </div>

                      <div className="w-full max-w-md bg-slate-900 p-6 sm:p-8 rounded-3xl shadow-xl border border-slate-800 mb-8">
                          <h3 className="font-bold text-lg mb-8 flex items-center gap-2 border-b border-slate-800 pb-4"><i className="ph ph-clock-counter-clockwise text-blue-500"></i> مراحل تجهيز الطلب:</h3>
                          
                          <div className="relative pl-4 space-y-8 pr-4">
                              <div className="absolute right-[31px] top-6 bottom-6 w-[2px] bg-slate-800"></div>

                              {ORDER_STATUSES.map((s, index) => {
                                  const isCompleted = currentStatus >= s.id;
                                  const isCurrent = currentStatus === s.id;
                                  return (
                                      <div key={s.id} className="relative flex items-start gap-5">
                                          <div className={`relative z-10 flex items-center justify-center w-12 h-12 rounded-full shrink-0 border-4 transition-colors ${isCompleted ? s.clientIconCompleted : 'border-slate-900 bg-slate-800 text-slate-600'}`}>
                                              <i className={`ph ${s.icon} text-xl`}></i>
                                          </div>
                                          <div className={`flex-1 p-4 rounded-2xl border transition-all mt-[-4px] ${isCurrent ? s.clientCardCurrent : isCompleted ? 'bg-slate-800/30 border-slate-800/50' : 'bg-slate-950/50 border-slate-800/30'}`}>
                                              <h4 className={`font-bold text-sm sm:text-base ${isCurrent ? s.clientTextCurrent : isCompleted ? 'text-slate-200' : 'text-slate-600'}`}>{s.label}</h4>
                                              {isCurrent && <p className={`text-xs mt-2 opacity-80 leading-relaxed ${s.clientTextCurrent}`}>هذه هي المرحلة الحالية لطلبك. سنقوم بتحديثها فور انتقالنا للمرحلة التالية.</p>}
                                              {(isCompleted && !isCurrent) && <p className="text-xs mt-1 text-slate-500"><i className="ph ph-check"></i> تمت بنجاح</p>}
                                          </div>
                                      </div>
                                  );
                              })}
                          </div>
                      </div>
                  </div>
              );
          }

          // --- Admin Components ---
          const Navigation = () => {
            const navItems = [
              { id: 'dashboard', icon: <i className="ph ph-squares-four text-xl"></i>, label: 'الرئيسية (إضافة وبحث)' },
              { id: 'expenses', icon: <i className="ph ph-printer text-xl"></i>, label: 'المصروفات' },
              { id: 'reports', icon: <i className="ph ph-calendar-blank text-xl"></i>, label: 'التقارير' },
              { id: 'marketing', icon: <i className="ph ph-megaphone text-xl"></i>, label: 'التسويق 📣' },
              { id: 'settings', icon: <i className="ph ph-gear text-xl"></i>, label: 'الإعدادات' },
            ];
            return (
              <nav className="bg-slate-950/80 backdrop-blur-xl border-b border-slate-800 text-white sticky top-0 z-50 shadow-2xl">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-20">
                    <div className="flex items-center gap-3">
                      <div className="w-12 h-12 flex items-center justify-center bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-xl shadow-lg shadow-yellow-500/20 transform transition hover:scale-105 overflow-hidden">
                        {settings.studioLogo ? <img src={settings.studioLogo} className="w-full h-full object-cover" /> : <i className="ph ph-camera text-slate-900 text-3xl"></i>}
                      </div>
                      <div className="flex flex-col">
                        <h1 className="text-xl sm:text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-l from-yellow-300 to-yellow-500" style={{ fontWeight: 900 }}>{settings.studioName}</h1>
                        <span className="text-[10px] sm:text-xs text-slate-400 font-medium">نظام الإدارة الذكي</span>
                      </div>
                    </div>
                    <div className="hidden lg:flex items-center space-x-1 space-x-reverse bg-slate-900 p-1.5 rounded-2xl border border-slate-800">
                      {navItems.map(btn => (
                        <button key={btn.id} onClick={() => setActiveTab(btn.id)} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-bold transition-all ${activeTab === btn.id ? 'bg-yellow-500 text-slate-900 shadow-md' : 'text-slate-300 hover:text-white hover:bg-slate-800'}`}>
                          {btn.icon}{btn.label}
                        </button>
                      ))}
                    </div>
                  </div>
                  
                  <div className="lg:hidden pb-4 overflow-x-auto hide-scrollbar">
                    <div className="flex items-center gap-2 min-w-max">
                      {navItems.map(btn => (
                        <button key={btn.id} onClick={() => setActiveTab(btn.id)} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold transition-all ${activeTab === btn.id ? 'bg-yellow-500 text-slate-900 shadow-md' : 'bg-slate-900 border border-slate-800 text-slate-300 hover:text-white'}`}>
                          {btn.icon}{btn.label}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </nav>
            );
          };

          const QuickServiceCard = ({ srvObj, onAdd }) => {
            const [qty, setQty] = useState(1);
            
            return (
              <div className="bg-slate-900 p-3 rounded-xl border border-slate-800 transition-all shadow-sm flex flex-col gap-2 group hover:border-slate-700">
                <div className="flex justify-between items-start">
                  <span className="text-blue-400 text-sm font-bold group-hover:text-blue-300">{srvObj.name}</span>
                  {srvObj.price > 0 && <span className="text-xs bg-slate-950 px-2 py-1 rounded-md text-blue-300 font-black">{srvObj.price} ج.م</span>}
                </div>
                {srvObj.desc && <span className="text-xs text-slate-500 leading-relaxed">{srvObj.desc}</span>}
                <div className="flex items-center gap-2 mt-auto pt-2 border-t border-slate-800/50">
                  <div className="flex items-center bg-slate-950 rounded-lg border border-slate-700 overflow-hidden">
                    <button type="button" onClick={(e) => { e.preventDefault(); setQty(Math.max(1, qty - 1)); }} className="px-2.5 py-1 text-slate-400 hover:text-white hover:bg-slate-800 transition-colors font-black">-</button>
                    <input type="number" min="1" value={qty} onChange={e => setQty(parseInt(e.target.value) || 1)} className="w-8 bg-transparent text-white text-center outline-none text-sm font-bold" />
                    <button type="button" onClick={(e) => { e.preventDefault(); setQty(qty + 1); }} className="px-2.5 py-1 text-slate-400 hover:text-white hover:bg-slate-800 transition-colors font-black">+</button>
                  </div>
                  <button type="button" onClick={(e) => { e.preventDefault(); onAdd(srvObj, qty); setQty(1); }} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-1.5 rounded-lg transition-colors flex justify-center items-center gap-1">
                    <i className="ph ph-plus-circle text-sm"></i> إضافة
                  </button>
                </div>
              </div>
            );
          };

          const DashboardTab = () => {
            const [showAddModal, setShowAddModal] = useState(false);
            const [formData, setFormData] = useState({ clientName: '', phone: '', photoNo: '', requirements: '', total: '', paid: '' });
            const [query, setQuery] = useState('');
            const [payModal, setPayModal] = useState(null);

            const handleAddService = (srv, qty) => {
              const validQty = parseInt(qty) || 1;
              const addedText = validQty > 1 ? `${validQty} × ${srv.name}` : srv.name;
              const addedPrice = (parseFloat(srv.price) || 0) * validQty;

              setFormData(prev => ({
                ...prev,
                requirements: prev.requirements ? `${prev.requirements} + ${addedText}` : addedText,
                total: (parseFloat(prev.total) || 0) + addedPrice
              }));
            };

            const handleSubmit = async (e) => {
              e.preventDefault();
              const total = parseFloat(formData.total) || 0;
              const paid = parseFloat(formData.paid) || 0;
              const newTxn = {
                id: Date.now().toString(),
                receiptNo: settings.nextReceiptNo || 1000,
                dateTime: new Date().toISOString(),
                clientName: formData.clientName,
                phone: formData.phone,
                photoNo: formData.photoNo,
                requirements: formData.requirements,
                total: total,
                paid: paid,
                remaining: total - paid,
                status: 0,
                month: new Date().getMonth() + 1,
                year: new Date().getFullYear()
              };
              await setDoc(doc(db, `artifacts/studio-marakby/public/data/transactions`, newTxn.id), newTxn);
              setSettings({...settings, nextReceiptNo: (settings.nextReceiptNo || 1000) + 1});
              setFormData({ clientName: '', phone: '', photoNo: '', requirements: '', total: '', paid: '' });
              setShowAddModal(false);
            };

            const handleDelete = async (id) => {
              if(window.confirm('هل أنت متأكد من حذف هذا الإيصال؟')) {
                await deleteDoc(doc(db, `artifacts/studio-marakby/public/data/transactions`, id));
              }
            };

            const updateTxnStatus = async (txnId, newStatus) => {
                const txnToUpdate = transactions.find(t => t.id === txnId);
                if(txnToUpdate) {
                    const updated = {...txnToUpdate, status: newStatus};
                    await setDoc(doc(db, `artifacts/studio-marakby/public/data/transactions`, updated.id), updated);
                }
            };

            const filteredTxns = query ? transactions.filter(t => t.clientName.includes(query) || t.phone.includes(query) || t.receiptNo.toString().includes(query)) : [];
            const todaysTxns = transactions.filter(t => new Date(t.dateTime).toDateString() === new Date().toDateString());

            return (
              <div className="space-y-6">
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 flex flex-col md:flex-row gap-4 items-center justify-between">
                  <button onClick={() => setShowAddModal(true)} className="w-full md:w-auto bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-blue-900/50">
                    <i className="ph ph-plus-circle text-2xl"></i> إضافة عملية جديدة
                  </button>
                  <div className="relative w-full md:w-1/2">
                    <i className="ph ph-magnifying-glass absolute right-4 top-4 text-slate-500 text-xl"></i>
                    <input type="text" placeholder="ابحث بالاسم، رقم الهاتف، رقم الإيصال..." className="w-full p-3 pr-10 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-lg transition-colors" value={query} onChange={(e) => setQuery(e.target.value)} />
                  </div>
                </div>

                {query && (
                  <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 space-y-4">
                    <h3 className="text-lg font-bold text-slate-300 border-b border-slate-800 pb-2">نتائج البحث ({filteredTxns.length})</h3>
                    {filteredTxns.map(txn => <TransactionCard key={txn.id} txn={txn} onDelete={handleDelete} onPayRemaining={setPayModal} sendInvoice={() => openWhatsApp(txn.phone, generateWA_Message('invoice', txn))} updateStatus={updateTxnStatus} />)}
                  </div>
                )}

                {!query && (
                  <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-100 border-b border-slate-800 pb-4">
                      <i className="ph ph-files text-blue-400 text-2xl"></i> عمليات اليوم ({todaysTxns.length})
                    </h2>
                    <div className="space-y-4">
                      {todaysTxns.length === 0 ? <p className="text-center p-10 text-slate-500">لا توجد عمليات مسجلة اليوم.</p> : todaysTxns.map(txn => <TransactionCard key={txn.id} txn={txn} onDelete={handleDelete} onPayRemaining={setPayModal} sendInvoice={() => openWhatsApp(txn.phone, generateWA_Message('invoice', txn))} updateStatus={updateTxnStatus} />)}
                    </div>
                  </div>
                )}

                {showAddModal && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-900 p-6 rounded-3xl shadow-2xl border border-slate-800 w-full max-w-2xl relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                      <button onClick={() => setShowAddModal(false)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400"><i className="ph ph-x text-2xl"></i></button>
                      <h2 className="text-2xl font-black mb-6 text-slate-100 border-b border-slate-800 pb-4">إضافة عملية جديدة</h2>
                      <form onSubmit={handleSubmit} className="space-y-5">
                        <div className="bg-blue-900/30 p-4 rounded-xl flex justify-between items-center text-sm font-bold text-blue-300 border border-blue-800/50">
                          <span>رقم الإيصال التلقائي:</span><span className="text-xl">#{settings.nextReceiptNo}</span>
                        </div>
                        <input type="text" placeholder="اسم العميل" required className="w-full p-4 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-blue-500 outline-none" value={formData.clientName} onChange={e => setFormData({...formData, clientName: e.target.value})} />
                        <div className="flex gap-4">
                          <input type="tel" placeholder="رقم الهاتف" required className="w-full p-4 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-blue-500 outline-none" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                          <input type="text" placeholder="رقم الصورة" className="w-1/2 p-4 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-blue-500 outline-none" value={formData.photoNo} onChange={e => setFormData({...formData, photoNo: e.target.value})} />
                        </div>
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                          <div className="flex justify-between items-center mb-3">
                              <label className="text-sm font-bold text-slate-400">الخدمات السريعة:</label>
                          </div>
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                            {settings.services.map((srv, idx) => {
                              const srvObj = typeof srv === 'string' ? {name: srv, price: 0, desc: ''} : srv;
                              return <QuickServiceCard key={idx} srvObj={srvObj} onAdd={handleAddService} />;
                            })}
                          </div>
                          <textarea placeholder="المطلوب بالتفصيل..." required rows="3" className="w-full p-4 border border-slate-700 bg-slate-900 text-white placeholder-slate-500 rounded-xl focus:border-blue-500 outline-none" value={formData.requirements} onChange={e => setFormData({...formData, requirements: e.target.value})} />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                          <input type="number" placeholder="الإجمالي" required className="p-4 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-blue-500" value={formData.total} onChange={e => setFormData({...formData, total: e.target.value})} />
                          <input type="number" placeholder="المدفوع" required className="p-4 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-green-500" value={formData.paid} onChange={e => setFormData({...formData, paid: e.target.value})} />
                        </div>
                        <div className={`p-4 rounded-xl text-center font-black text-xl border ${(formData.total - formData.paid) > 0 ? 'bg-red-950/40 text-red-400 border-red-900/50' : 'bg-green-950/40 text-green-400 border-green-900/50'}`}>
                          الباقي: {formatCurrency((formData.total || 0) - (formData.paid || 0))}
                        </div>
                        <button type="submit" className="w-full bg-blue-600 text-white hover:bg-blue-500 font-black py-4 rounded-xl shadow-lg"><i className="ph ph-floppy-disk text-2xl ml-2 align-middle"></i>حفظ الإيصال</button>
                      </form>
                    </div>
                  </div>
                )}
                
                {payModal && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 w-full max-w-md relative">
                      <button onClick={() => setPayModal(null)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400"><i className="ph ph-x text-2xl"></i></button>
                      <h3 className="text-2xl font-black mb-4 border-b border-slate-800 pb-4 text-slate-100">سداد باقي الحساب</h3>
                      <div className="mb-6 bg-slate-950 p-4 rounded-xl space-y-2 border border-slate-800">
                        <p className="text-slate-300">العميل: <b className="text-white">{payModal.clientName}</b></p>
                        <p className="text-red-400 font-bold">الباقي: {payModal.remaining} ج.م</p>
                      </div>
                      <form onSubmit={async (e) => {
                        e.preventDefault();
                        const amount = parseFloat(e.target.amount.value);
                        const updated = { ...payModal, paid: payModal.paid + amount, remaining: payModal.total - (payModal.paid + amount) };
                        await setDoc(doc(db, `artifacts/studio-marakby/public/data/transactions`, updated.id), updated);
                        setPayModal(null);
                      }} className="space-y-4">
                        <input type="number" name="amount" required min="1" max={payModal.remaining} defaultValue={payModal.remaining} className="w-full p-4 border border-slate-700 bg-slate-950 text-white rounded-xl text-2xl font-black text-center outline-none focus:border-green-500"/>
                        <button type="submit" className="w-full bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-xl">تأكيد التحصيل</button>
                      </form>
                    </div>
                  </div>
                )}
              </div>
            );
          };

          const TransactionCard = ({ txn, onDelete, onPayRemaining, sendInvoice, updateStatus }) => {
            const [showWaMenu, setShowWaMenu] = useState(false);
            const currentStatus = txn.status || 0;

            return (
              <div className="bg-slate-900 p-5 rounded-2xl shadow-sm border border-slate-800 flex flex-col md:flex-row gap-6 justify-between hover:border-slate-700 transition-all">
                <div className="flex-1 flex flex-col justify-between">
                  <div className="space-y-3">
                      <div className="flex justify-between items-start">
                        <h3 className="text-lg font-bold text-slate-100 flex items-center gap-2"><i className="ph ph-user-circle text-slate-500 text-2xl"></i> {txn.clientName}</h3>
                        <span className="bg-slate-800 text-slate-400 text-xs px-2 py-1 rounded border border-slate-700 font-mono">#{txn.receiptNo}</span>
                      </div>
                      <div className="text-sm text-slate-400 flex flex-wrap gap-x-4">
                        <span>📞 {txn.phone}</span>
                        <span>⏱️ {formatDate(txn.dateTime)}</span>
                      </div>
                      <div className="bg-slate-950 p-3 rounded-lg text-sm text-slate-300 border border-slate-800"><strong>المطلوب:</strong> {txn.requirements}</div>
                      
                      <div className="flex gap-4 pt-3 border-t border-slate-800 text-sm">
                        <span className="text-slate-300">الإجمالي: <b className="text-white">{txn.total}</b></span>
                        <span className="text-green-400">المدفوع: <b className="text-green-300">{txn.paid}</b></span>
                        <span className={txn.remaining > 0 ? "text-red-400" : "text-green-400"}>الباقي: <b>{txn.remaining}</b></span>
                      </div>
                  </div>

                  {/* Track Status Modifier */}
                  <div className="mt-5 pt-4 border-t border-slate-800">
                    <h4 className="text-xs font-bold text-slate-400 mb-3">تحديث حالة الطلب (التتبع):</h4>
                    <div className="flex gap-2">
                        {ORDER_STATUSES.map(s => (
                            <button
                                key={s.id}
                                onClick={() => updateStatus(txn.id, s.id)}
                                className={`flex-1 py-2 px-1 rounded-xl text-xs font-bold transition-all flex flex-col items-center gap-1 border ${currentStatus === s.id ? s.activeClass : s.inactiveClass}`}
                            >
                                <i className={`ph ${s.icon} text-lg`}></i>
                                <span className="text-[10px] sm:text-xs text-center">{s.label}</span>
                            </button>
                        ))}
                    </div>
                  </div>
                </div>

                <div className="flex flex-col gap-2 min-w-[160px] justify-start border-t md:border-t-0 md:border-r border-slate-800 pt-4 md:pt-0 md:pr-6">
                  <button onClick={sendInvoice} className="bg-blue-600 hover:bg-blue-500 text-white px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all shadow-sm">
                    <i className="ph ph-receipt text-xl"></i> إرسال الفاتورة
                  </button>
                  
                  <div className="relative w-full">
                    <button onClick={() => setShowWaMenu(!showWaMenu)} className="w-full bg-green-600 hover:bg-green-500 text-white px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all">
                      <i className="ph ph-whatsapp-logo text-xl"></i> رسائل واتساب
                    </button>
                    {showWaMenu && (
                      <div className="absolute right-0 mt-2 w-48 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl z-10 p-1 flex flex-col overflow-hidden">
                        <button onClick={() => {openWhatsApp(txn.phone, generateWA_Message('tracking', txn)); setShowWaMenu(false);}} className="text-right px-3 py-2.5 text-sm text-blue-300 hover:bg-slate-700 font-bold border-b border-slate-700">📍 رابط التتبع للعميل</button>
                        <button onClick={() => {openWhatsApp(txn.phone, generateWA_Message('welcome', txn)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-slate-200 hover:bg-slate-700">👋 رسالة ترحيب</button>
                        <button onClick={() => {openWhatsApp(txn.phone, generateWA_Message('ready', txn)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-slate-200 hover:bg-slate-700">🎉 الشغل خلص</button>
                        <button onClick={() => {openWhatsApp(txn.phone, generateWA_Message('reminder', txn)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-slate-200 hover:bg-slate-700">⚠️ تذكير بالباقي</button>
                      </div>
                    )}
                  </div>

                  {txn.remaining > 0 && <button onClick={() => onPayRemaining(txn)} className="bg-yellow-500 hover:bg-yellow-400 text-slate-900 px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all shadow-sm"><i className="ph ph-credit-card text-xl"></i> سداد الباقي</button>}
                  <button onClick={() => onDelete(txn.id)} className="bg-red-950/40 hover:bg-red-900/60 text-red-400 border border-red-900/30 px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all mt-auto"><i className="ph ph-trash text-xl"></i> حذف الإيصال</button>
                </div>
              </div>
            );
          };

          const ExpensesTab = () => {
            const [expData, setExpData] = useState({ amount: '', category: settings.expenseCategories[0], notes: '' });
            const handleAddExpense = async (e) => {
              e.preventDefault();
              const newExp = { id: Date.now().toString(), date: new Date().toISOString(), amount: parseFloat(expData.amount), category: expData.category, notes: expData.notes, month: new Date().getMonth() + 1, year: new Date().getFullYear() };
              await setDoc(doc(db, `artifacts/studio-marakby/public/data/expenses`, newExp.id), newExp);
              setExpData({ amount: '', category: settings.expenseCategories[0], notes: '' });
            };
            const todaysExpenses = expenses.filter(e => new Date(e.date).toDateString() === new Date().toDateString());
            return (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 h-fit">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-100 border-b border-slate-800 pb-4"><i className="ph ph-money text-red-400"></i> تسجيل مصروفات</h2>
                  <form onSubmit={handleAddExpense} className="space-y-4">
                    <input type="number" required placeholder="المبلغ" value={expData.amount} onChange={e => setExpData({...expData, amount: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-red-500 font-bold" />
                    <select value={expData.category} onChange={e => setExpData({...expData, category: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-red-500">
                      {settings.expenseCategories.map((cat, idx) => <option key={idx} value={cat}>{cat}</option>)}
                    </select>
                    <input type="text" placeholder="ملاحظات" value={expData.notes} onChange={e => setExpData({...expData, notes: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-red-500 placeholder-slate-500" />
                    <button type="submit" className="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-lg shadow-md transition-all">إضافة المصروف</button>
                  </form>
                </div>
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                  <h2 className="text-xl font-bold mb-4 flex justify-between text-slate-100 border-b border-slate-800 pb-4"><span>مصروفات اليوم</span><span className="text-red-400 text-sm">{formatCurrency(todaysExpenses.reduce((s,e)=>s+e.amount,0))}</span></h2>
                  <div className="space-y-3">
                    {todaysExpenses.map(exp => (
                      <div key={exp.id} className="flex justify-between items-center p-3 bg-slate-950 rounded-lg border border-slate-800">
                        <div><p className="font-bold text-slate-200">{exp.category} <span className="text-red-400 mr-2">{exp.amount} ج.م</span></p><p className="text-xs text-slate-500 mt-1">{exp.notes}</p></div>
                        <button onClick={async () => await deleteDoc(doc(db, `artifacts/studio-marakby/public/data/expenses`, exp.id))} className="text-slate-500 hover:text-red-400 p-2"><i className="ph ph-trash text-lg"></i></button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          };

          const ReportsTab = () => {
            const currentMonth = new Date().getMonth() + 1;
            const currentYear = new Date().getFullYear();
            const [filter, setFilter] = useState({ month: currentMonth, year: currentYear });
            const [payModal, setPayModal] = useState(null);
            const filteredTxns = transactions.filter(t => t.month == filter.month && t.year == filter.year);
            const filteredExp = expenses.filter(e => e.month == filter.month && e.year == filter.year);
            const stats = useMemo(() => {
              const totalCollected = filteredTxns.reduce((sum, t) => sum + t.paid, 0);
              const totalExpenses = filteredExp.reduce((sum, e) => sum + e.amount, 0);
              const totalDebts = filteredTxns.reduce((sum, t) => sum + t.remaining, 0);
              return { totalCollected, totalExpenses, totalDebts, net: totalCollected - totalExpenses };
            }, [filteredTxns, filteredExp]);

            return (
              <div className="space-y-6">
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 flex flex-wrap gap-4 items-end justify-between">
                  <h2 className="text-xl font-bold flex items-center gap-2 text-slate-100"><i className="ph ph-calendar-blank text-blue-400 text-2xl"></i> تقارير شهرية</h2>
                  <div className="flex gap-2">
                    <select value={filter.month} onChange={e => setFilter({...filter, month: e.target.value})} className="p-2 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none">{Array.from({length: 12}, (_, i) => i + 1).map(m => <option key={m} value={m}>شهر {m}</option>)}</select>
                    <select value={filter.year} onChange={e => setFilter({...filter, year: e.target.value})} className="p-2 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none">{[currentYear-1, currentYear, currentYear+1].map(y => <option key={y} value={y}>{y}</option>)}</select>
                  </div>
                </div>
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                  <StatCard title="التحصيل النقدي" value={stats.totalCollected} color="green" />
                  <StatCard title="المصروفات" value={stats.totalExpenses} color="red" />
                  <StatCard title="صافي الربح" value={stats.net} color={stats.net >= 0 ? "emerald" : "rose"} highlight />
                  <StatCard title="باقي الحسابات (ديون)" value={stats.totalDebts} color="blue" />
                </div>
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 mt-6">
                  <h3 className="text-lg font-bold text-red-400 mb-4 border-b border-slate-800 pb-2">تفاصيل الديون المستحقة</h3>
                  <div className="space-y-3">
                    {filteredTxns.filter(t => t.remaining > 0).map(txn => (
                      <div key={txn.id} className="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 bg-red-950/20 rounded-xl border border-red-900/30 gap-4">
                        <div><span className="font-bold text-slate-200">{txn.clientName}</span><div className="text-xs text-slate-400 mt-1">📞 {txn.phone} | إيصال #{txn.receiptNo}</div></div>
                        <div className="flex items-center gap-3 w-full sm:w-auto">
                          <span className="text-red-400 font-black ml-4">{txn.remaining} ج.م</span>
                          <button onClick={() => openWhatsApp(txn.phone, `مرحباً أ. ${txn.clientName} 🌟\nتذكير بمبلغ متبقي لحسابكم في ${settings.studioName} بقيمة ${txn.remaining} ج.م.\nيمكن التحويل فودافون كاش أو إنستاباي على رقم: 01126810107`)} className="bg-green-600 hover:bg-green-500 text-white px-3 py-2 rounded-lg text-xs font-bold transition-colors"><i className="ph ph-whatsapp-logo text-lg"></i></button>
                          <button onClick={() => setPayModal(txn)} className="bg-yellow-500 hover:bg-yellow-400 text-slate-900 px-3 py-2 rounded-lg text-xs font-bold transition-colors">سداد</button>
                        </div>
                      </div>
                    ))}
                    {filteredTxns.filter(t => t.remaining > 0).length === 0 && <p className="text-slate-500 text-sm">لا توجد ديون مستحقة لهذا الشهر.</p>}
                  </div>
                </div>
                {payModal && (
                   <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 w-full max-w-md relative">
                      <button onClick={() => setPayModal(null)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400"><i className="ph ph-x text-2xl"></i></button>
                      <h3 className="text-2xl font-black mb-4 border-b border-slate-800 pb-4 text-center text-slate-100">سداد باقي الحساب</h3>
                      <div className="mb-6 bg-slate-950 p-4 rounded-xl text-center border border-slate-800">
                        <p className="text-slate-300">العميل: <b className="text-white text-lg">{payModal.clientName}</b></p>
                        <p className="text-red-400 font-bold mt-2">الباقي المستحق: {payModal.remaining} ج.م</p>
                      </div>
                      <form onSubmit={async (e) => {
                        e.preventDefault();
                        const amount = parseFloat(e.target.amount.value);
                        const updated = { ...payModal, paid: payModal.paid + amount, remaining: payModal.total - (payModal.paid + amount) };
                        await setDoc(doc(db, `artifacts/studio-marakby/public/data/transactions`, updated.id), updated);
                        setPayModal(null);
                      }} className="space-y-4">
                        <input type="number" name="amount" required min="1" max={payModal.remaining} defaultValue={payModal.remaining} className="w-full p-4 border border-slate-700 bg-slate-950 text-white rounded-xl text-2xl font-black text-center outline-none focus:border-green-500 shadow-inner"/>
                        <button type="submit" className="w-full bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-xl shadow-lg transition-all text-lg">تأكيد تحصيل المبلغ</button>
                      </form>
                    </div>
                  </div>
                )}
              </div>
            );
          };

          const StatCard = ({title, value, color, highlight}) => {
            const colors = { 
                green: "bg-green-950/30 text-green-400 border-green-900/50", 
                red: "bg-red-950/30 text-red-400 border-red-900/50", 
                blue: "bg-blue-950/30 text-blue-400 border-blue-900/50", 
                emerald: "bg-emerald-600 text-white border-emerald-500", 
                rose: "bg-rose-600 text-white border-rose-500" 
            };
            return (
              <div className={`p-5 rounded-2xl border ${colors[color]} ${highlight ? 'shadow-lg scale-105' : ''}`}>
                <h4 className="text-xs opacity-80 mb-2">{title}</h4>
                <div className="text-xl sm:text-2xl font-black">{formatCurrency(value)}</div>
              </div>
            );
          };

          const MarketingTab = () => {
            const [promoMessage, setPromoMessage] = useState("أهلاً بك أ. {name} 👋\nكل عام وأنتم بخير! 🎉\nنتمنى لكم أوقاتاً سعيدة مع من تحبون.\n\nشرفتنا في {studio} 📸✨");
            const [searchTerm, setSearchTerm] = useState('');
            const [copyText, setCopyText] = useState('نسخ جميع الأرقام لعمل قائمة بث');
            const [customNumbersInput, setCustomNumbersInput] = useState('');

            // Extract unique clients by phone number from DB
            const uniqueClients = useMemo(() => {
              const clientsMap = new Map();
              transactions.forEach(t => {
                if (t.phone && t.phone.trim() !== '') {
                  if (!clientsMap.has(t.phone)) {
                    clientsMap.set(t.phone, { clientName: t.clientName, phone: t.phone });
                  }
                }
              });
              return Array.from(clientsMap.values());
            }, [transactions]);

            // Process custom pasted numbers
            const customClients = useMemo(() => {
              if (!customNumbersInput.trim()) return [];
              const numbers = customNumbersInput.split(/[,،\n]/).map(n => n.trim()).filter(n => n.length >= 8);
              const uniqueNums = [...new Set(numbers)];
              const existingPhones = new Set(uniqueClients.map(c => c.phone));
              const newUniqueNums = uniqueNums.filter(n => !existingPhones.has(n));
              return newUniqueNums.map(n => ({ clientName: 'عميل (رقم خارجي)', phone: n, isCustom: true }));
            }, [customNumbersInput, uniqueClients]);

            const allClients = [...uniqueClients, ...customClients];
            const filteredClients = allClients.filter(c => c.clientName.includes(searchTerm) || c.phone.includes(searchTerm));

            const handleCopyNumbers = () => {
              const numbersList = allClients.map(c => c.phone).join('\n');
              const el = document.createElement('textarea');
              el.value = numbersList;
              document.body.appendChild(el);
              el.select();
              document.execCommand('copy');
              document.body.removeChild(el);
              setCopyText('تم النسخ بنجاح ✓');
              setTimeout(() => setCopyText('نسخ جميع الأرقام لعمل قائمة بث'), 3000);
            };

            const handleSendPromo = (client) => {
              let msg = promoMessage;
              msg = msg.replace(/{name}/g, client.clientName || 'العميل');
              msg = msg.replace(/{studio}/g, settings.studioName || 'الاستوديو');
              openWhatsApp(client.phone, msg);
            };

            return (
              <div className="space-y-6">
                {/* Promo Message & Input Settings */}
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-100 border-b border-slate-800 pb-4">
                    <i className="ph ph-megaphone text-yellow-500 text-2xl"></i> التسويق والرسائل الجماعية
                  </h2>
                  <div className="space-y-6 mt-6">
                     
                     {/* Textarea for promo message */}
                     <div>
                        <label className="block text-sm font-bold mb-3 text-slate-400">
                            محتوى رسالة التهنئة / العرض <br/>
                            <span className="text-xs font-normal opacity-70 mt-1 block">يمكنك كتابة المتغير <code className="bg-slate-800 px-1.5 py-0.5 rounded text-blue-300 font-mono">{'{name}'}</code> لادراج اسم العميل تلقائياً في الرسالة لتبدو شخصية.</span>
                        </label>
                        <textarea rows="4" value={promoMessage} onChange={e => setPromoMessage(e.target.value)} className="w-full p-4 border border-slate-700 bg-slate-950 text-slate-200 rounded-xl focus:border-yellow-500 outline-none text-sm font-mono custom-scrollbar transition-colors" />
                     </div>

                     {/* Textarea for custom numbers */}
                     <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                        <label className="block text-sm font-bold mb-3 text-blue-400">
                            <i className="ph ph-list-plus text-lg ml-1 align-middle"></i> إضافة أرقام خارجية (مفصولة بفاصلة) <br/>
                            <span className="text-xs font-normal text-slate-500 mt-1 block">الصق الأرقام هنا مفصولة بفاصلة (,) أو كل رقم في سطر جديد. سيتم إضافتها فوراً للقائمة بالأسفل.</span>
                        </label>
                        <textarea 
                            rows="2" 
                            value={customNumbersInput} 
                            onChange={e => setCustomNumbersInput(e.target.value)} 
                            className="w-full p-4 border border-slate-700 bg-slate-900 text-slate-200 rounded-xl focus:border-blue-500 outline-none text-sm font-mono custom-scrollbar transition-colors" 
                            placeholder="مثال: 01000000000, 01111111111" 
                        />
                     </div>

                     <div className="flex flex-col sm:flex-row gap-4 items-center bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                        <button onClick={handleCopyNumbers} className="w-full sm:w-auto bg-slate-950 hover:bg-slate-800 text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors border border-slate-600 whitespace-nowrap shadow-sm">
                          <i className={copyText.includes('✓') ? "ph ph-check text-green-400 text-xl" : "ph ph-copy text-xl"}></i> {copyText} ({allClients.length})
                        </button>
                        <p className="text-xs text-slate-400 flex-1 leading-relaxed text-center sm:text-right">
                          <strong className="text-slate-300">طريقة الإرسال الجماعي:</strong> قم بنسخ جميع الأرقام من الزر، ثم اذهب لتطبيق WhatsApp Business في هاتفك وقم بإنشاء "رسالة جماعية جديدة" (Broadcast List) والصق الأرقام لإرسال العرض للجميع بضغطة واحدة!
                        </p>
                     </div>
                  </div>
                </div>

                {/* Clients List */}
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                   <div className="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 border-b border-slate-800 pb-4">
                      <h3 className="text-lg font-bold text-slate-100 flex items-center gap-2">
                          <i className="ph ph-users text-blue-400 text-xl"></i> إجمالي الأرقام المستهدفة ({filteredClients.length})
                      </h3>
                      <div className="relative w-full sm:w-64">
                          <i className="ph ph-magnifying-glass absolute right-3 top-2.5 text-slate-500"></i>
                          <input type="text" placeholder="بحث بالاسم أو الرقم..." className="w-full py-2 pr-9 pl-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-yellow-500 text-sm" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                      </div>
                   </div>

                   {filteredClients.length === 0 ? (
                       <div className="text-center py-10 text-slate-500">لا يوجد عملاء أو أرقام مطابقة للبحث.</div>
                   ) : (
                       <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 max-h-[500px] overflow-y-auto custom-scrollbar pr-2 pb-2">
                          {filteredClients.map(client => (
                              <div key={client.phone} className={`p-4 rounded-xl border flex flex-col justify-between gap-4 transition-colors ${client.isCustom ? 'bg-blue-950/20 border-blue-900/30 hover:border-blue-700' : 'bg-slate-950 border-slate-800 hover:border-slate-700'}`}>
                                  <div>
                                      <div className={`font-bold text-sm truncate ${client.isCustom ? 'text-blue-300' : 'text-slate-200'}`} title={client.clientName}>{client.clientName}</div>
                                      <div className="text-xs text-slate-500 mt-1 font-mono">{client.phone}</div>
                                  </div>
                                  <button onClick={() => handleSendPromo(client)} className="w-full bg-green-600 hover:bg-green-500 text-white py-2.5 rounded-lg text-xs font-bold transition-colors flex items-center justify-center gap-2 shadow-sm">
                                      <i className="ph ph-whatsapp-logo text-lg"></i> إرسال التهنئة
                                  </button>
                              </div>
                          ))}
                       </div>
                   )}
                </div>
              </div>
            );
          };

          const SettingsTab = () => {
            const handleAddList = (key, val) => { if(!val) return; setSettings({...settings, [key]: [...settings[key], val]}); };
            const handleRemoveList = (key, idx) => { const newList = [...settings[key]]; newList.splice(idx, 1); setSettings({...settings, [key]: newList}); };
            return (
              <div className="space-y-8">
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 border-b border-slate-800 pb-4 text-slate-100"><i className="ph ph-image text-purple-400"></i> هوية الاستوديو</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                      <label className="block font-bold text-sm text-slate-400 mb-2">اسم الاستوديو:</label>
                      <input type="text" value={settings.studioName} onChange={e => setSettings({...settings, studioName: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg focus:border-purple-500 outline-none" />
                    </div>
                    <div>
                      <label className="block font-bold text-sm text-slate-400 mb-2">الشعار (Logo):</label>
                      <input type="file" accept="image/*" onChange={e => {
                        const file = e.target.files[0];
                        if (file) {
                          const reader = new FileReader();
                          reader.onloadend = () => setSettings({...settings, studioLogo: reader.result});
                          reader.readAsDataURL(file);
                        }
                      }} className="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-slate-800 file:text-purple-400 hover:file:bg-slate-700 transition-colors" />
                    </div>
                  </div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                   <ServicesSettingsList title="قوالب الخدمات والأسعار" items={settings.services} onAdd={v => handleAddList('services', v)} onRemove={i => handleRemoveList('services', i)} />
                   <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                      <h3 className="font-bold mb-4 border-b border-slate-800 pb-2 text-slate-100">أقسام المصروفات</h3>
                      <div className="flex gap-2 mb-4">
                        <input type="text" id="newCat" className="flex-1 p-2 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-blue-500 placeholder-slate-500" placeholder="بند مصروف جديد..." />
                        <button onClick={() => { const v = document.getElementById('newCat').value; handleAddList('expenseCategories', v); document.getElementById('newCat').value=''; }} className="bg-blue-600 hover:bg-blue-500 text-white px-4 rounded-lg transition-colors"><i className="ph ph-plus text-xl"></i></button>
                      </div>
                      <div className="flex flex-wrap gap-2">
                        {settings.expenseCategories.map((c, i) => (
                          <span key={i} className="bg-slate-800 text-slate-300 px-3 py-1.5 rounded-full text-sm font-bold flex items-center gap-2 border border-slate-700">
                            {c} <button onClick={() => handleRemoveList('expenseCategories', i)} className="text-red-400 hover:text-red-300"><i className="ph ph-x text-sm"></i></button>
                          </span>
                        ))}
                      </div>
                   </div>
                </div>
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                  <h2 className="text-xl font-bold mb-4 border-b border-slate-800 pb-4 text-slate-100"><i className="ph ph-whatsapp-logo text-green-400"></i> قوالب رسائل الواتساب</h2>
                  <div className="space-y-4">
                    {Object.keys(settings.waTemplates).map(key => (
                      <div key={key}>
                        <label className="block text-sm font-bold mb-2 text-slate-400">
                            {key === 'invoice' ? 'شكل الفاتورة الإلكترونية' : 
                             key === 'tracking' ? 'رسالة تتبع الطلب (يرسل معها الرابط تلقائياً)' : key}
                        </label>
                        <textarea rows="3" value={settings.waTemplates[key]} onChange={e => setSettings({...settings, waTemplates: {...settings.waTemplates, [key]: e.target.value}})} className="w-full p-4 border border-slate-700 bg-slate-950 text-slate-300 rounded-xl focus:border-green-500 outline-none text-sm font-mono custom-scrollbar" />
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          };

          const ServicesSettingsList = ({title, items, onAdd, onRemove}) => {
            const [newName, setNewName] = useState('');
            const [newPrice, setNewPrice] = useState('');
            const [newDesc, setNewDesc] = useState('');
            return (
              <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                <h3 className="font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">{title}</h3>
                <div className="flex flex-col gap-3 mb-5">
                  <div className="flex gap-2">
                    <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} className="flex-1 p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-blue-500 placeholder-slate-500 text-sm" placeholder="اسم الخدمة..."/>
                    <input type="number" value={newPrice} onChange={e=>setNewPrice(e.target.value)} className="w-24 p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-blue-500 placeholder-slate-500 text-sm" placeholder="السعر..."/>
                  </div>
                  <div className="flex gap-2">
                    <input type="text" value={newDesc} onChange={e=>setNewDesc(e.target.value)} className="flex-1 p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-blue-500 placeholder-slate-500 text-sm" placeholder="تفاصيل صغيرة تحت الخدمة (اختياري)..."/>
                    <button onClick={()=>{if(newName){onAdd({name:newName, price:parseFloat(newPrice)||0, desc:newDesc});setNewName('');setNewPrice('');setNewDesc('');}}} className="bg-blue-600 hover:bg-blue-500 text-white px-5 rounded-lg transition-colors flex items-center justify-center"><i className="ph ph-plus text-xl"></i></button>
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  {items.map((item, idx) => {
                    const srv = typeof item === 'string' ? {name: item, price: 0, desc: ''} : item;
                    return (
                    <div key={idx} className="bg-slate-800 p-3 rounded-xl flex justify-between items-start border border-slate-700">
                      <div className="flex flex-col">
                        <span className="text-slate-300 text-sm font-bold flex items-center gap-2">
                          {srv.name} {srv.price > 0 && <span className="text-xs bg-slate-950 px-1.5 py-0.5 rounded text-blue-400">{srv.price} ج.م</span>}
                        </span>
                        {srv.desc && <span className="text-xs text-slate-500 mt-1">{srv.desc}</span>}
                      </div>
                      <button onClick={()=>onRemove(idx)} className="text-red-400 hover:text-red-300 bg-transparent rounded-full mr-2"><i className="ph ph-x text-base"></i></button>
                    </div>
                  )})}
                </div>
              </div>
            );
          };

          if (!authReady) return <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-100"><div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div><p className="font-bold">جاري المزامنة مع السحابة...</p></div>;

          return (
            <div className="min-h-screen bg-slate-950 text-slate-100 pb-20">
              {authError && <div className="bg-red-600 text-white text-center py-1 font-bold text-xs">{authError}</div>}
              {isTracking ? null : <Navigation />}
              <main className={`max-w-7xl mx-auto ${isTracking ? '' : 'p-4 md:p-6'}`}>
                {isTracking ? null : (
                    <>
                        {activeTab === 'dashboard' && <DashboardTab />}
                        {activeTab === 'expenses' && <ExpensesTab />}
                        {activeTab === 'reports' && <ReportsTab />}
                        {activeTab === 'marketing' && <MarketingTab />}
                        {activeTab === 'settings' && <SettingsTab />}
                    </>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
