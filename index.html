<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو المراكبى - الإدارة</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons (Modern & Chic) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap');
        
        * {
            font-family: 'Cairo', sans-serif !important;
        }
        body {
            font-weight: 400;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
        }
        
        main .font-bold { font-weight: 500 !important; }
        main .font-black { font-weight: 600 !important; }
        main b, main strong { font-weight: 500 !important; }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const { useState, useEffect, useMemo } = React;

        // --- Default Data & Settings ---
        const DEFAULT_SERVICES = [
          { name: "تصوير زفاف (فرح)", price: 2000 },
          { name: "سيشن خطوبة", price: 1500 },
          { name: "صور باسبور 4x6", price: 50 },
          { name: "طباعة تابلوه خشب", price: 200 },
          { name: "تصوير منتجات", price: 500 },
          { name: "فوتوسيشن خارجي", price: 1000 },
          { name: "تعديل صور (فوتوشوب)", price: 100 }
        ];

        const DEFAULT_EXPENSE_CATEGORIES = [
          "أحبار وطباعة", "ورق صور", "صيانة كاميرات/معدات", 
          "إيجار الاستوديو", "كهرباء ومرافق", "رواتب مساعدين", "نثريات"
        ];

        const DEFAULT_WA_TEMPLATES = {
          welcome: "أهلاً بك أ. {name} في {studio} 📸. نورتنا وشرفتنا! تم تسجيل طلبك بنجاح. \nتفاصيل الطلب: {services}\nالإجمالي: {total} ج.م\nالمدفوع: {paid} ج.م\nالباقي: {remaining} ج.م",
          invoice: "🧾 فاتورة إلكترونية - {studio}\n----------------------------------\n👤 العميل: {name}\n🧾 رقم الإيصال: {receipt}\n📅 التاريخ: {date}\n----------------------------------\n🛠️ الخدمات:\n{services}\n----------------------------------\n💰 إجمالي الحساب: {total} ج.م\n✅ المدفوع: {paid} ج.م\n🔴 الباقي: {remaining} ج.م\n----------------------------------\nشكراً لثقتكم بنا في {studio} 📸✨",
          reminder: "مرحباً أ. {name} 🌟. نود تذكيركم بأن هناك مبلغ متبقي لحسابكم في {studio} بقيمة {remaining} ج.م. \nرقم الإيصال: {receipt}.",
          ready: "أهلاً أ. {name} 🎉. الطلب الخاص بك جاهز للاستلام في {studio}! \nباقي الحساب: {remaining} ج.م. نورتنا وشرفتنا!",
          deposit: "تم استلام عربون بقيمة {paid} ج.م من أ. {name} في {studio} 💸. \nإجمالي الطلب: {total} ج.م \nالمتبقي: {remaining} ج.م. شكراً لك!"
        };

        const firebaseConfig = {
          apiKey: "AIzaSyB0G8-iLXf0UOZzJ3xuJZRMBfNPUooJpF0",
          authDomain: "gen-lang-client-0813248919.firebaseapp.com",
          projectId: "gen-lang-client-0813248919",
          storageBucket: "gen-lang-client-0813248919.firebasestorage.app",
          messagingSenderId: "609989118150",
          appId: "1:609989118150:web:783c577d877cde63412fc7",
          measurementId: "G-9RHXZTW54Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [user, setUser] = useState(null);
          const [authReady, setAuthReady] = useState(false);
          const [authError, setAuthError] = useState(null);
          
          const [transactions, setTransactions] = useState([]);
          const [expenses, setExpenses] = useState([]);
          const [settings, setSettings] = useState({
            nextReceiptNo: 1000,
            services: DEFAULT_SERVICES,
            expenseCategories: DEFAULT_EXPENSE_CATEGORIES,
            waTemplates: DEFAULT_WA_TEMPLATES,
            studioName: "ستوديو المراكبى",
            studioLogo: ""
          });

          useEffect(() => {
            const initAuth = async () => {
              try {
                await signInAnonymously(auth);
              } catch (error) {
                setAuthError("تنبيه: يوجد مشكلة في الاتصال بقاعدة البيانات.");
                setAuthReady(true);
              }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (u) => {
              setUser(u);
              setAuthReady(true);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const appId = 'studio-marakby';
            const basePath = `artifacts/${appId}/public/data`;

            const fetchSettings = async () => {
              const docSnap = await getDoc(doc(db, basePath, 'settings', 'main'));
              if (docSnap.exists()) setSettings(docSnap.data());
            };
            fetchSettings();

            const unsubTxns = onSnapshot(collection(db, basePath, 'transactions'), (snapshot) => {
              const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
              data.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
              setTransactions(data);
            });

            const unsubExps = onSnapshot(collection(db, basePath, 'expenses'), (snapshot) => {
              const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
              data.sort((a, b) => new Date(b.date) - new Date(a.date));
              setExpenses(data);
            });

            return () => { unsubTxns(); unsubExps(); };
          }, [user]);

          useEffect(() => {
            if (!user) return;
            const timer = setTimeout(() => {
              const appId = 'studio-marakby';
              setDoc(doc(db, `artifacts/${appId}/public/data/settings`, 'main'), settings);
            }, 1500);
            return () => clearTimeout(timer);
          }, [settings, user]);

          const formatCurrency = (num) => Number(num || 0).toLocaleString('ar-EG') + ' ج.م';
          const formatDate = (dateStr) => new Date(dateStr).toLocaleString('ar-EG', { dateStyle: 'short', timeStyle: 'short' });
          const formatDateOnly = (dateStr) => new Date(dateStr).toLocaleDateString('ar-EG');
          
          const generateWA_Message = (templateKey, txn) => {
            let msg = settings.waTemplates[templateKey] || "";
            msg = msg.replace(/{name}/g, txn.clientName || 'العميل');
            msg = msg.replace(/{receipt}/g, txn.receiptNo || '');
            msg = msg.replace(/{total}/g, txn.total || 0);
            msg = msg.replace(/{paid}/g, txn.paid || 0);
            msg = msg.replace(/{remaining}/g, txn.remaining || 0);
            msg = msg.replace(/{services}/g, txn.requirements || 'خدمات تصوير');
            msg = msg.replace(/{studio}/g, settings.studioName || 'الاستوديو');
            msg = msg.replace(/{date}/g, formatDateOnly(txn.dateTime));
            return msg;
          };

          const openWhatsApp = (phone, msg) => {
            let formattedPhone = phone.trim();
            if (formattedPhone.startsWith('0')) formattedPhone = '2' + formattedPhone;
            else if (!formattedPhone.startsWith('2')) formattedPhone = '20' + formattedPhone;
            const url = `https://wa.me/${formattedPhone}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
          };

          const Navigation = () => {
            const navItems = [
              { id: 'dashboard', icon: <i className="ph ph-squares-four text-xl"></i>, label: 'الرئيسية (إضافة وبحث)' },
              { id: 'expenses', icon: <i className="ph ph-printer text-xl"></i>, label: 'المصروفات' },
              { id: 'reports', icon: <i className="ph ph-calendar-blank text-xl"></i>, label: 'التقارير' },
              { id: 'settings', icon: <i className="ph ph-gear text-xl"></i>, label: 'الإعدادات' },
            ];
            return (
              <nav className="bg-slate-900/95 backdrop-blur-xl border-b border-slate-800 text-white sticky top-0 z-50 shadow-2xl">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-20">
                    <div className="flex items-center gap-3">
                      <div className="w-12 h-12 flex items-center justify-center bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-xl shadow-lg shadow-yellow-500/20 transform transition hover:scale-105 overflow-hidden">
                        {settings.studioLogo ? <img src={settings.studioLogo} className="w-full h-full object-cover" /> : <i className="ph ph-camera text-slate-900 text-3xl"></i>}
                      </div>
                      <div className="flex flex-col">
                        <h1 className="text-xl sm:text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-l from-yellow-300 to-yellow-500" style={{ fontWeight: 900 }}>{settings.studioName}</h1>
                        <span className="text-[10px] sm:text-xs text-slate-400 font-medium">نظام الإدارة الذكي</span>
                      </div>
                    </div>
                    <div className="hidden lg:flex items-center space-x-1 space-x-reverse bg-slate-800/50 p-1.5 rounded-2xl border border-slate-700/50">
                      {navItems.map(btn => (
                        <button key={btn.id} onClick={() => setActiveTab(btn.id)} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-bold transition-all ${activeTab === btn.id ? 'bg-yellow-500 text-slate-900 shadow-md' : 'text-slate-300 hover:text-white hover:bg-slate-700/50'}`}>
                          {btn.icon}{btn.label}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </nav>
            );
          };

          const DashboardTab = () => {
            const [showAddModal, setShowAddModal] = useState(false);
            const [formData, setFormData] = useState({ clientName: '', phone: '', photoNo: '', requirements: '', total: '', paid: '' });
            const [query, setQuery] = useState('');
            const [payModal, setPayModal] = useState(null);

            const handleAddService = (srv) => {
              setFormData(prev => ({
                ...prev,
                requirements: prev.requirements ? `${prev.requirements} + ${srv.name}` : srv.name,
                total: (parseFloat(prev.total) || 0) + (parseFloat(srv.price) || 0)
              }));
            };

            const handleSubmit = async (e) => {
              e.preventDefault();
              const total = parseFloat(formData.total) || 0;
              const paid = parseFloat(formData.paid) || 0;
              const newTxn = {
                id: Date.now().toString(),
                receiptNo: settings.nextReceiptNo || 1000,
                dateTime: new Date().toISOString(),
                clientName: formData.clientName,
                phone: formData.phone,
                photoNo: formData.photoNo,
                requirements: formData.requirements,
                total: total,
                paid: paid,
                remaining: total - paid,
                month: new Date().getMonth() + 1,
                year: new Date().getFullYear()
              };
              await setDoc(doc(db, `artifacts/studio-marakby/public/data/transactions`, newTxn.id), newTxn);
              setSettings({...settings, nextReceiptNo: (settings.nextReceiptNo || 1000) + 1});
              setFormData({ clientName: '', phone: '', photoNo: '', requirements: '', total: '', paid: '' });
              setShowAddModal(false);
            };

            const handleDelete = async (id) => {
              if(window.confirm('هل أنت متأكد من حذف هذا الإيصال؟')) {
                await deleteDoc(doc(db, `artifacts/studio-marakby/public/data/transactions`, id));
              }
            };

            const filteredTxns = query ? transactions.filter(t => t.clientName.includes(query) || t.phone.includes(query) || t.receiptNo.toString().includes(query)) : [];
            const todaysTxns = transactions.filter(t => new Date(t.dateTime).toDateString() === new Date().toDateString());

            return (
              <div className="space-y-6">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row gap-4 items-center justify-between">
                  <button onClick={() => setShowAddModal(true)} className="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-blue-500/30">
                    <i className="ph ph-plus-circle text-2xl"></i> إضافة عملية جديدة
                  </button>
                  <div className="relative w-full md:w-1/2">
                    <i className="ph ph-magnifying-glass absolute right-4 top-4 text-slate-400 text-xl"></i>
                    <input type="text" placeholder="ابحث بالاسم، رقم الهاتف، رقم الإيصال..." className="w-full p-3 pr-10 border-2 border-slate-200 rounded-xl focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none text-lg" value={query} onChange={(e) => setQuery(e.target.value)} />
                  </div>
                </div>

                {query && (
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                    <h3 className="text-lg font-bold text-slate-700 border-b pb-2">نتائج البحث ({filteredTxns.length})</h3>
                    {filteredTxns.map(txn => <TransactionCard key={txn.id} txn={txn} onDelete={handleDelete} onPayRemaining={setPayModal} sendInvoice={() => openWhatsApp(txn.phone, generateWA_Message('invoice', txn))} />)}
                  </div>
                )}

                {!query && (
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-800 border-b pb-4">
                      <i className="ph ph-files text-blue-500 text-2xl"></i> عمليات اليوم ({todaysTxns.length})
                    </h2>
                    <div className="space-y-4">
                      {todaysTxns.length === 0 ? <p className="text-center p-10 text-slate-500">لا توجد عمليات مسجلة اليوم.</p> : todaysTxns.map(txn => <TransactionCard key={txn.id} txn={txn} onDelete={handleDelete} onPayRemaining={setPayModal} sendInvoice={() => openWhatsApp(txn.phone, generateWA_Message('invoice', txn))} />)}
                    </div>
                  </div>
                )}

                {showAddModal && (
                  <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-2xl relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                      <button onClick={() => setShowAddModal(false)} className="absolute top-4 left-4 p-2 text-slate-400 hover:text-red-500"><i className="ph ph-x text-2xl"></i></button>
                      <h2 className="text-2xl font-black mb-6 text-slate-800 border-b pb-4">إضافة عملية جديدة</h2>
                      <form onSubmit={handleSubmit} className="space-y-5">
                        <div className="bg-blue-50 p-4 rounded-xl flex justify-between items-center text-sm font-bold text-blue-800 border border-blue-100">
                          <span>رقم الإيصال التلقائي:</span><span className="text-xl">#{settings.nextReceiptNo}</span>
                        </div>
                        <input type="text" placeholder="اسم العميل" required className="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none" value={formData.clientName} onChange={e => setFormData({...formData, clientName: e.target.value})} />
                        <div className="flex gap-4">
                          <input type="tel" placeholder="رقم الهاتف" required className="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                          <input type="text" placeholder="رقم الصورة" className="w-1/2 p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none" value={formData.photoNo} onChange={e => setFormData({...formData, photoNo: e.target.value})} />
                        </div>
                        <div className="bg-slate-50 p-4 rounded-xl">
                          <label className="text-sm font-bold text-slate-700 mb-3 block">الخدمات السريعة:</label>
                          <div className="flex flex-wrap gap-2 mb-3">
                            {settings.services.map((srv, idx) => (
                              <span key={idx} onClick={() => handleAddService(srv)} className="bg-white text-blue-700 text-sm px-3 py-1.5 rounded-full cursor-pointer hover:bg-blue-600 hover:text-white border border-blue-200 transition-all shadow-sm">
                                {srv.name} <span className="text-xs opacity-70">({srv.price} ج.م)</span>
                              </span>
                            ))}
                          </div>
                          <textarea placeholder="المطلوب بالتفصيل..." required rows="3" className="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none" value={formData.requirements} onChange={e => setFormData({...formData, requirements: e.target.value})} />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                          <input type="number" placeholder="الإجمالي" required className="p-4 border-2 border-slate-200 rounded-xl outline-none" value={formData.total} onChange={e => setFormData({...formData, total: e.target.value})} />
                          <input type="number" placeholder="المدفوع" required className="p-4 border-2 border-slate-200 rounded-xl outline-none" value={formData.paid} onChange={e => setFormData({...formData, paid: e.target.value})} />
                        </div>
                        <div className={`p-4 rounded-xl text-center font-black text-xl ${(formData.total - formData.paid) > 0 ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`}>
                          الباقي: {formatCurrency((formData.total || 0) - (formData.paid || 0))}
                        </div>
                        <button type="submit" className="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg"><i className="ph ph-floppy-disk text-2xl ml-2"></i>حفظ الإيصال</button>
                      </form>
                    </div>
                  </div>
                )}
                
                {payModal && (
                  <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white p-6 rounded-3xl shadow-xl w-full max-w-md relative">
                      <button onClick={() => setPayModal(null)} className="absolute top-4 left-4 p-2 text-slate-400 hover:text-red-500"><i className="ph ph-x text-2xl"></i></button>
                      <h3 className="text-2xl font-black mb-4 border-b pb-4">سداد باقي الحساب</h3>
                      <div className="mb-6 bg-slate-50 p-4 rounded-xl space-y-2">
                        <p>العميل: <b>{payModal.clientName}</b></p>
                        <p className="text-red-600 font-bold">الباقي: {payModal.remaining} ج.م</p>
                      </div>
                      <form onSubmit={async (e) => {
                        e.preventDefault();
                        const amount = parseFloat(e.target.amount.value);
                        const updated = { ...payModal, paid: payModal.paid + amount, remaining: payModal.total - (payModal.paid + amount) };
                        await setDoc(doc(db, `artifacts/studio-marakby/public/data/transactions`, updated.id), updated);
                        setPayModal(null);
                      }} className="space-y-4">
                        <input type="number" name="amount" required min="1" max={payModal.remaining} defaultValue={payModal.remaining} className="w-full p-4 border-2 border-slate-200 rounded-xl text-2xl font-black text-center outline-none focus:border-green-500"/>
                        <button type="submit" className="w-full bg-green-500 text-white font-black py-4 rounded-xl">تأكيد التحصيل</button>
                      </form>
                    </div>
                  </div>
                )}
              </div>
            );
          };

          const TransactionCard = ({ txn, onDelete, onPayRemaining, sendInvoice }) => {
            const [showWaMenu, setShowWaMenu] = useState(false);
            return (
              <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row gap-4 justify-between hover:shadow-md transition-all">
                <div className="flex-1 space-y-2">
                  <div className="flex justify-between items-start">
                    <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2"><i className="ph ph-user-circle text-slate-400 text-2xl"></i> {txn.clientName}</h3>
                    <span className="bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded border border-slate-200 font-mono">#{txn.receiptNo}</span>
                  </div>
                  <div className="text-sm text-slate-500 flex flex-wrap gap-x-4">
                    <span>📞 {txn.phone}</span>
                    <span>⏱️ {formatDate(txn.dateTime)}</span>
                  </div>
                  <div className="bg-slate-50 p-2 rounded text-sm text-slate-700 border border-slate-100"><strong>المطلوب:</strong> {txn.requirements}</div>
                  <div className="flex gap-4 pt-2 border-t mt-2 text-sm">
                    <span>الإجمالي: <b>{txn.total}</b></span>
                    <span className="text-green-600">المدفوع: <b>{txn.paid}</b></span>
                    <span className={txn.remaining > 0 ? "text-red-500" : "text-green-500"}>الباقي: <b>{txn.remaining}</b></span>
                  </div>
                </div>
                <div className="flex sm:flex-col gap-2 min-w-[140px]">
                  <button onClick={sendInvoice} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition-all shadow-sm">
                    <i className="ph ph-receipt text-xl"></i> إرسال الفاتورة
                  </button>
                  <div className="relative w-full">
                    <button onClick={() => setShowWaMenu(!showWaMenu)} className="w-full bg-green-500 hover:bg-green-600 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition-all">
                      <i className="ph ph-whatsapp-logo text-xl"></i> واتساب
                    </button>
                    {showWaMenu && (
                      <div className="absolute right-0 mt-1 w-48 bg-white border border-slate-200 rounded-lg shadow-xl z-10 p-1 flex flex-col">
                        <button onClick={() => {openWhatsApp(txn.phone, generateWA_Message('welcome', txn)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm hover:bg-slate-50 rounded">👋 رسالة ترحيب</button>
                        <button onClick={() => {openWhatsApp(txn.phone, generateWA_Message('ready', txn)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm hover:bg-slate-50 rounded">🎉 الشغل خلص</button>
                        <button onClick={() => {openWhatsApp(txn.phone, generateWA_Message('reminder', txn)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm hover:bg-slate-50 rounded">⚠️ تذكير بالباقي</button>
                      </div>
                    )}
                  </div>
                  {txn.remaining > 0 && <button onClick={() => onPayRemaining(txn)} className="bg-yellow-500 hover:bg-yellow-600 text-slate-900 px-3 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition-all shadow-sm"><i className="ph ph-credit-card text-xl"></i> سداد الباقي</button>}
                  <button onClick={() => onDelete(txn.id)} className="bg-red-50 hover:bg-red-100 text-red-600 px-3 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition-all sm:mt-auto"><i className="ph ph-trash text-xl"></i> حذف</button>
                </div>
              </div>
            );
          };

          const ExpensesTab = () => {
            const [expData, setExpData] = useState({ amount: '', category: settings.expenseCategories[0], notes: '' });
            const handleAddExpense = async (e) => {
              e.preventDefault();
              const newExp = { id: Date.now().toString(), date: new Date().toISOString(), amount: parseFloat(expData.amount), category: expData.category, notes: expData.notes, month: new Date().getMonth() + 1, year: new Date().getFullYear() };
              await setDoc(doc(db, `artifacts/studio-marakby/public/data/expenses`, newExp.id), newExp);
              setExpData({ amount: '', category: settings.expenseCategories[0], notes: '' });
            };
            const todaysExpenses = expenses.filter(e => new Date(e.date).toDateString() === new Date().toDateString());
            return (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-fit">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-800 border-b pb-4"><i className="ph ph-money text-red-500"></i> تسجيل مصروفات</h2>
                  <form onSubmit={handleAddExpense} className="space-y-4">
                    <input type="number" required placeholder="المبلغ" value={expData.amount} onChange={e => setExpData({...expData, amount: e.target.value})} className="w-full p-3 border rounded-lg outline-none text-red-600 font-bold" />
                    <select value={expData.category} onChange={e => setExpData({...expData, category: e.target.value})} className="w-full p-3 border rounded-lg outline-none">
                      {settings.expenseCategories.map((cat, idx) => <option key={idx} value={cat}>{cat}</option>)}
                    </select>
                    <input type="text" placeholder="ملاحظات" value={expData.notes} onChange={e => setExpData({...expData, notes: e.target.value})} className="w-full p-3 border rounded-lg outline-none" />
                    <button type="submit" className="w-full bg-red-500 text-white font-bold py-3 rounded-lg shadow-md hover:bg-red-600 transition-all">إضافة المصروف</button>
                  </form>
                </div>
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                  <h2 className="text-xl font-bold mb-4 flex justify-between text-slate-800 border-b pb-4"><span>مصروفات اليوم</span><span className="text-red-500 text-sm">{formatCurrency(todaysExpenses.reduce((s,e)=>s+e.amount,0))}</span></h2>
                  <div className="space-y-3">
                    {todaysExpenses.map(exp => (
                      <div key={exp.id} className="flex justify-between items-center p-3 bg-slate-50 rounded-lg border border-slate-100">
                        <div><p className="font-bold">{exp.category} <span className="text-red-500 mr-2">{exp.amount} ج.م</span></p><p className="text-xs text-slate-500">{exp.notes}</p></div>
                        <button onClick={async () => await deleteDoc(doc(db, `artifacts/studio-marakby/public/data/expenses`, exp.id))} className="text-slate-400 hover:text-red-500"><i className="ph ph-trash text-lg"></i></button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          };

          const ReportsTab = () => {
            const currentMonth = new Date().getMonth() + 1;
            const currentYear = new Date().getFullYear();
            const [filter, setFilter] = useState({ month: currentMonth, year: currentYear });
            const [payModal, setPayModal] = useState(null);
            const filteredTxns = transactions.filter(t => t.month == filter.month && t.year == filter.year);
            const filteredExp = expenses.filter(e => e.month == filter.month && e.year == filter.year);
            const stats = useMemo(() => {
              const totalCollected = filteredTxns.reduce((sum, t) => sum + t.paid, 0);
              const totalExpenses = filteredExp.reduce((sum, e) => sum + e.amount, 0);
              const totalDebts = filteredTxns.reduce((sum, t) => sum + t.remaining, 0);
              return { totalCollected, totalExpenses, totalDebts, net: totalCollected - totalExpenses };
            }, [filteredTxns, filteredExp]);

            return (
              <div className="space-y-6">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-end justify-between">
                  <h2 className="text-xl font-bold flex items-center gap-2 text-slate-800"><i className="ph ph-calendar-blank text-blue-500 text-2xl"></i> تقارير شهرية</h2>
                  <div className="flex gap-2">
                    <select value={filter.month} onChange={e => setFilter({...filter, month: e.target.value})} className="p-2 border rounded-lg bg-slate-50">{Array.from({length: 12}, (_, i) => i + 1).map(m => <option key={m} value={m}>شهر {m}</option>)}</select>
                    <select value={filter.year} onChange={e => setFilter({...filter, year: e.target.value})} className="p-2 border rounded-lg bg-slate-50">{[currentYear-1, currentYear, currentYear+1].map(y => <option key={y} value={y}>{y}</option>)}</select>
                  </div>
                </div>
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                  <StatCard title="التحصيل النقدي" value={stats.totalCollected} color="green" />
                  <StatCard title="المصروفات" value={stats.totalExpenses} color="red" />
                  <StatCard title="صافي الربح" value={stats.net} color={stats.net >= 0 ? "emerald" : "rose"} highlight />
                  <StatCard title="باقي الحسابات (ديون)" value={stats.totalDebts} color="blue" />
                </div>
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mt-6">
                  <h3 className="text-lg font-bold text-red-600 mb-4 border-b pb-2">تفاصيل الديون المستحقة</h3>
                  <div className="space-y-3">
                    {filteredTxns.filter(t => t.remaining > 0).map(txn => (
                      <div key={txn.id} className="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 bg-red-50 rounded-xl border border-red-100 gap-4">
                        <div><span className="font-bold text-slate-800">{txn.clientName}</span><div className="text-xs text-slate-500">📞 {txn.phone} | إيصال #{txn.receiptNo}</div></div>
                        <div className="flex items-center gap-3 w-full sm:w-auto">
                          <span className="text-red-600 font-black ml-4">{txn.remaining} ج.م</span>
                          <button onClick={() => openWhatsApp(txn.phone, `مرحباً أ. ${txn.clientName} 🌟\nتذكير بمبلغ متبقي لحسابكم في ${settings.studioName} بقيمة ${txn.remaining} ج.م.\nيمكن التحويل فودافون كاش أو إنستاباي على رقم: 01126810107`)} className="bg-green-500 text-white px-3 py-2 rounded-lg text-xs font-bold"><i className="ph ph-whatsapp-logo text-lg"></i></button>
                          <button onClick={() => setPayModal(txn)} className="bg-yellow-500 text-slate-900 px-3 py-2 rounded-lg text-xs font-bold">سداد</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                {payModal && (
                   <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white p-6 rounded-3xl shadow-xl w-full max-w-md relative">
                      <button onClick={() => setPayModal(null)} className="absolute top-4 left-4 p-2 text-slate-400 hover:text-red-500"><i className="ph ph-x text-2xl"></i></button>
                      <h3 className="text-2xl font-black mb-4 border-b pb-4 text-center">سداد باقي الحساب</h3>
                      <div className="mb-6 bg-slate-50 p-4 rounded-xl text-center">
                        <p>العميل: <b className="text-lg">{payModal.clientName}</b></p>
                        <p className="text-red-600 font-bold">الباقي المستحق: {payModal.remaining} ج.م</p>
                      </div>
                      <form onSubmit={async (e) => {
                        e.preventDefault();
                        const amount = parseFloat(e.target.amount.value);
                        const updated = { ...payModal, paid: payModal.paid + amount, remaining: payModal.total - (payModal.paid + amount) };
                        await setDoc(doc(db, `artifacts/studio-marakby/public/data/transactions`, updated.id), updated);
                        setPayModal(null);
                      }} className="space-y-4">
                        <input type="number" name="amount" required min="1" max={payModal.remaining} defaultValue={payModal.remaining} className="w-full p-4 border-2 border-slate-200 rounded-xl text-2xl font-black text-center outline-none focus:border-green-500 shadow-inner"/>
                        <button type="submit" className="w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-xl shadow-lg transition-all text-lg">تأكيد تحصيل المبلغ</button>
                      </form>
                    </div>
                  </div>
                )}
              </div>
            );
          };

          const StatCard = ({title, value, color, highlight}) => {
            const colors = { green: "bg-green-50 text-green-700 border-green-200", red: "bg-red-50 text-red-700 border-red-200", blue: "bg-blue-50 text-blue-700 border-blue-200", emerald: "bg-emerald-500 text-white border-emerald-600", rose: "bg-rose-500 text-white border-rose-600" };
            return (
              <div className={`p-5 rounded-2xl border ${colors[color]} ${highlight ? 'shadow-lg scale-105' : ''}`}>
                <h4 className="text-xs opacity-80 mb-1">{title}</h4>
                <div className="text-xl sm:text-2xl font-black">{formatCurrency(value)}</div>
              </div>
            );
          };

          const SettingsTab = () => {
            const handleAddList = (key, val) => { if(!val) return; setSettings({...settings, [key]: [...settings[key], val]}); };
            const handleRemoveList = (key, idx) => { const newList = [...settings[key]]; newList.splice(idx, 1); setSettings({...settings, [key]: newList}); };
            return (
              <div className="space-y-8">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 border-b pb-4"><i className="ph ph-image text-purple-500"></i> هوية الاستوديو</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                      <label className="block font-bold text-sm text-slate-600 mb-2">اسم الاستوديو:</label>
                      <input type="text" value={settings.studioName} onChange={e => setSettings({...settings, studioName: e.target.value})} className="w-full p-3 border-2 border-slate-200 rounded-lg focus:border-purple-500 outline-none" />
                    </div>
                    <div>
                      <label className="block font-bold text-sm text-slate-600 mb-2">الشعار (Logo):</label>
                      <input type="file" accept="image/*" onChange={e => {
                        const file = e.target.files[0];
                        if (file) {
                          const reader = new FileReader();
                          reader.onloadend = () => setSettings({...settings, studioLogo: reader.result});
                          reader.readAsDataURL(file);
                        }
                      }} className="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100" />
                    </div>
                  </div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                   <ServicesSettingsList title="قوالب الخدمات والأسعار" items={settings.services} onAdd={v => handleAddList('services', v)} onRemove={i => handleRemoveList('services', i)} />
                   <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                      <h3 className="font-bold mb-4 border-b pb-2">أقسام المصروفات</h3>
                      <div className="flex gap-2 mb-4">
                        <input type="text" id="newCat" className="flex-1 p-2 border-2 rounded-lg outline-none" placeholder="بند مصروف جديد..." />
                        <button onClick={() => { const v = document.getElementById('newCat').value; handleAddList('expenseCategories', v); document.getElementById('newCat').value=''; }} className="bg-blue-600 text-white px-4 rounded-lg"><i className="ph ph-plus text-xl"></i></button>
                      </div>
                      <div className="flex flex-wrap gap-2">
                        {settings.expenseCategories.map((c, i) => (
                          <span key={i} className="bg-slate-100 text-slate-700 px-3 py-1.5 rounded-full text-sm font-bold flex items-center gap-2">
                            {c} <button onClick={() => handleRemoveList('expenseCategories', i)} className="text-red-400 hover:text-red-600"><i className="ph ph-x text-sm"></i></button>
                          </span>
                        ))}
                      </div>
                   </div>
                </div>
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                  <h2 className="text-xl font-bold mb-4 border-b pb-4"><i className="ph ph-whatsapp-logo text-green-500"></i> قوالب رسائل الواتساب</h2>
                  <div className="space-y-4">
                    {Object.keys(settings.waTemplates).map(key => (
                      <div key={key}>
                        <label className="block text-sm font-bold mb-1 text-slate-600">{key === 'invoice' ? 'شكل الفاتورة الإلكترونية' : key}</label>
                        <textarea rows="3" value={settings.waTemplates[key]} onChange={e => setSettings({...settings, waTemplates: {...settings.waTemplates, [key]: e.target.value}})} className="w-full p-3 border-2 border-slate-200 rounded-xl focus:border-green-500 outline-none text-sm font-mono" />
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          };

          const ServicesSettingsList = ({title, items, onAdd, onRemove}) => {
            const [newName, setNewName] = useState('');
            const [newPrice, setNewPrice] = useState('');
            return (
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 className="font-bold text-slate-800 mb-4 border-b pb-2">{title}</h3>
                <div className="flex gap-2 mb-4">
                  <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} className="flex-1 p-2 border-2 border-slate-200 rounded-lg outline-none" placeholder="الخدمة..."/>
                  <input type="number" value={newPrice} onChange={e=>setNewPrice(e.target.value)} className="w-20 p-2 border-2 border-slate-200 rounded-lg outline-none" placeholder="السعر"/>
                  <button onClick={()=>{if(newName){onAdd({name:newName, price:parseFloat(newPrice)||0});setNewName('');setNewPrice('');}}} className="bg-blue-600 text-white px-4 rounded-lg transition-colors"><i className="ph ph-plus text-xl"></i></button>
                </div>
                <div className="flex flex-wrap gap-2">
                  {items.map((item, idx) => (
                    <span key={idx} className="bg-slate-100 text-slate-700 px-3 py-1.5 rounded-full text-sm font-bold flex items-center gap-2 border border-slate-200">
                      {item.name} <span className="text-xs text-blue-600">({item.price} ج.م)</span>
                      <button onClick={()=>onRemove(idx)} className="text-red-400 hover:text-red-600 bg-white rounded-full px-1.5"><i className="ph ph-x text-sm"></i></button>
                    </span>
                  ))}
                </div>
              </div>
            );
          };

          if (!authReady) return <div className="min-h-screen flex flex-col items-center justify-center"><div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div><p className="font-bold">جاري المزامنة مع السحابة...</p></div>;

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 pb-20">
              {authError && <div className="bg-red-500 text-white text-center py-1 font-bold text-xs">{authError}</div>}
              <Navigation />
              <main className="max-w-7xl mx-auto p-4 md:p-6">
                {activeTab === 'dashboard' && <DashboardTab />}
                {activeTab === 'expenses' && <ExpensesTab />}
                {activeTab === 'reports' && <ReportsTab />}
                {activeTab === 'settings' && <SettingsTab />}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
