            const balance = Math.max(0, earned - totalUsed);
            return { earned, used: totalUsed, balance };

                let addonsText = txn.addons?.length > 0 ? txn.addons.map(a => a.name + (a.notes ? ` (${a.notes})` : '')).join(' + ') : 'لا يوجد';
                return `الباقات: ${pkgs}\nالسيشن: ${txn.sessionType || 'غير محدد'}\nالكاجوال: ${casualText}\nإضافات: ${addonsText}`;
            }
            return txn.requirements || 'لا يوجد تفاصيل';
        };

        const checkAndCleanExpiredPhotos = async (txn, db, storage) => {
            if (!txn || !txn.uploadedPhotos || txn.uploadedPhotos.length === 0) return txn;
            let hasExpired = false;
            const validPhotos = [];
            const now = Date.now();

            for (const photo of txn.uploadedPhotos) {
                if (photo.expiryTimestamp && now > photo.expiryTimestamp) {
                    hasExpired = true;
                    if (photo.path) {
                        try {
                            const storageRef = ref(storage, photo.path);
                            await deleteObject(storageRef);
                        } catch (e) {}
                    }
                } else {
                    validPhotos.push(photo);
                }
            }

            if (hasExpired) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                const targetCol = txn.type === 'wedding' ? 'weddings' : 'transactions';
                const updatedTxn = {...txn, uploadedPhotos: validPhotos};
                try { await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, txn.id), updatedTxn); } catch (err) {}
                return updatedTxn;
            }
            return txn;
        };

        const processImage = (file, maxWidth = 800) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let scaleSize = 1;
                        if (img.width > maxWidth) scaleSize = maxWidth / img.width;
                        canvas.width = img.width * scaleSize;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        };

        const generateWA_Message = (templateKey, txn, settings, isWedding = false, allRecords = []) => {
            let msg = settings.waTemplates[templateKey] || "";
            const clientName = isWedding ? `${txn.groomName || ''} و ${txn.brideName || ''}`.trim() : txn.clientName;
            
            let reqs = '';
            if (isWedding) {
                const pkgs = txn.packages?.length > 0 ? txn.packages.map(p=>p.name).join(' + ') : (txn.package ? txn.package.name : '');
                if (pkgs) reqs += `الباقات: ${pkgs}\n`;
                if (txn.weddingDate) reqs += `موعد الزفاف: ${formatDateOnly(txn.weddingDate)}\n`;
                if (txn.location) reqs += `مكان التصوير: ${txn.location}\n`;
                if (txn.makeupArtist) reqs += `الميك أب: ${txn.makeupArtist}\n`;
                if (txn.leaveTime) reqs += `وقت الخروج: ${txn.leaveTime}\n`;
                if (txn.sessionType) reqs += `نوع السيشن: ${txn.sessionType}\n`;
                if (txn.casualShootDate) reqs += `تصوير الكاجوال: ${formatDateOnly(txn.casualShootDate)}\n`;
                if (txn.groomAddress) reqs += `عنوان العريس: ${txn.groomAddress}\n`;
                if (txn.addons?.length > 0) reqs += `إضافات أخرى: ${txn.addons.map(a => `${a.name}${a.notes ? ' ('+a.notes+')' : ''}`).join(' + ')}\n`;
            } else {
                reqs = txn.requirements || 'خدمات تصوير';
            }

            const paymentNote = txn.electronicPaid > 0 ? '(تم الدفع إلكترونياً)' : '(تم الدفع كاش)';
            const rewards = getCustomerRewards(txn.phone, allRecords);

            msg = msg.replace(/{name}/g, clientName || 'العميل');
            msg = msg.replace(/{receipt}/g, txn.receiptNo || '');
            msg = msg.replace(/{total}/g, txn.total || 0);
            msg = msg.replace(/{paid}/g, txn.paid || 0);
            msg = msg.replace(/{remaining}/g, txn.remaining || 0);
            msg = msg.replace(/{services}/g, reqs);
            msg = msg.replace(/{studio}/g, settings.studioName || 'الاستوديو');
            msg = msg.replace(/{date}/g, formatDateOnly(txn.dateTime));
            msg = msg.replace(/{time}/g, formatTimeOnly(txn.dateTime));
            msg = msg.replace(/{payment_note}/g, paymentNote);
            msg = msg.replace(/{reward_balance}/g, rewards.balance);
            
            const trackUrl = window.location.href.split('?')[0] + `?phone=${encodeURIComponent(txn.phone)}&receipt=${encodeURIComponent(txn.receiptNo)}&type=${isWedding ? 'w' : 't'}`;
            msg = msg.replace(/{track_url}/g, trackUrl);
            return msg;
        };

        const openWhatsApp = (phone, msg) => {
            if(!phone) return;
            let formattedPhone = phone.trim();
            if (formattedPhone.startsWith('0')) formattedPhone = '2' + formattedPhone;
            else if (!formattedPhone.startsWith('2')) formattedPhone = '20' + formattedPhone;
            window.open(`https://wa.me/${formattedPhone}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        const addToCalendar = (txn) => {
            if (!txn.weddingDate) return false;
            let description = `✨ تفاصيل حجز الزفاف ✨\n──────────────────\n`;
            if (txn.groomName || txn.brideName) description += `🤵👰 العروسين: ${txn.groomName || ''} و ${txn.brideName || ''}\n`.trim();
            if (txn.phone) description += `📱 الهاتف: ${txn.phone}\n`;
            if (txn.location) description += `📍 اللوكيشن/القاعة: ${txn.location}\n`;
            if (txn.groomAddress) description += `🏠 عنوان العريس: ${txn.groomAddress}\n\n⏰ المواعيد والترتيبات\n──────────────────\n`;
            if (txn.makeupArtist) description += `💄 الميك أب: ${txn.makeupArtist}\n`;
            if (txn.leaveTime) description += `🚗 وقت الخروج: ${txn.leaveTime}\n`;
            if (txn.sessionType) description += `📸 نوع السيشن: ${txn.sessionType}\n`;
            if (txn.casualShootDate) description += `👕 تصوير الكاجوال: ${txn.casualShootDate}\n`;

            let pkgs = txn.packages?.length > 0 ? txn.packages.map(p => p.name).join(' + ') : (txn.package ? txn.package.name : '');
            let addonsText = txn.addons?.length > 0 ? txn.addons.map(a => a.name).join(' + ') : '';

            if (pkgs || addonsText) {
                description += `\n💼 الباقات والإضافات\n──────────────────\n`;
                if (pkgs) description += `📦 الباقات: ${pkgs}\n`;
                if (addonsText) description += `➕ إضافات: ${addonsText}\n`;
            }
            
            description += `\n💰 الحسابات\n──────────────────\n💵 الإجمالي: ${txn.total} ج.م\n✅ المدفوع: ${txn.paid} ج.م\n🔴 الباقي: ${txn.remaining} ج.م\n`;
            description += `\n🔗 رابط تتبع العميل:\n${window.location.href.split('?')[0]}?phone=${encodeURIComponent(txn.phone)}&receipt=${encodeURIComponent(txn.receiptNo)}&type=w`;

            let startStr = '', endStr = '';
            if (txn.leaveTime) {
                const startDate = new Date(`${txn.weddingDate}T${txn.leaveTime}`);
                const endDate = new Date(startDate.getTime() + 5 * 60 * 60 * 1000); 
                const f = (date) => date.getFullYear() + String(date.getMonth() + 1).padStart(2, '0') + String(date.getDate()).padStart(2, '0') + 'T' + String(date.getHours()).padStart(2, '0') + String(date.getMinutes()).padStart(2, '0') + '00';
                startStr = f(startDate); endStr = f(endDate);
            } else {
                startStr = txn.weddingDate.replace(/-/g, '');
                const nextDay = new Date(txn.weddingDate); nextDay.setDate(nextDay.getDate() + 1);
                endStr = nextDay.getFullYear() + String(nextDay.getMonth() + 1).padStart(2, '0') + String(nextDay.getDate()).padStart(2, '0');
            }

            const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(`حجز زفاف: ${txn.groomName || ''} و ${txn.brideName || ''}`.trim() || 'حجز زفاف جديد')}&dates=${startStr}/${endStr}&details=${encodeURIComponent(description)}&location=${encodeURIComponent(txn.location || '')}`;
            window.open(url, '_blank');
            return true;
        };

        const getTransactionStatuses = (txn) => {
            if (txn.type !== 'wedding') return ORDER_STATUSES;
            return WEDDING_STATUSES.filter(s => {
                if (s.id === 1 && !txn.casualShootDate) return false;
                if (s.id === 2 && !(txn.addons && txn.addons.some(a => a.name.includes('حنة') || a.name.includes('حنه')))) return false;
                return true;
            });
        };

        const calculatePeriodRevenue = (records, targetDateObj, period = 'day') => {
            let total = 0, cash = 0, electronic = 0;
            records.forEach(rec => {
                if (rec.payments?.length > 0) {
                    rec.payments.forEach(p => {
                        const pDate = new Date(p.date);
                        if ((period === 'day' && pDate.toDateString() === targetDateObj.toDateString()) || (period === 'month' && pDate.getMonth() === targetDateObj.getMonth() && pDate.getFullYear() === targetDateObj.getFullYear())) {
                            total += p.amount;
                            if (p.method === 'electronic') electronic += p.amount; else cash += p.amount;
                        }
                    });
                } else {
                    const rDate = new Date(rec.dateTime);
                    if ((period === 'day' && rDate.toDateString() === targetDateObj.toDateString()) || (period === 'month' && rDate.getMonth() === targetDateObj.getMonth() && rDate.getFullYear() === targetDateObj.getFullYear())) {
                        const recTotalPaid = parseFloat(rec.paid) || 0;
                        const recElecPaid = parseFloat(rec.electronicPaid) || 0;
                        total += recTotalPaid; electronic += recElecPaid; cash += (recTotalPaid - recElecPaid);
                    }
                }
            });
            return { total, cash, electronic };
        };

        const requestNotificationPermission = () => { if (Notification.permission !== "granted" && Notification.permission !== "denied") Notification.requestPermission(); };
        const showBrowserNotification = (title, body) => {
            if (Notification.permission === "granted") new Notification(title, { body: body, icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23eab308"%3E%3Cpath d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/%3E%3C/svg%3E' });
        };

        // --- UI Components ---
        
        // بطاقات المنتجات المصغرة بتصميم أنيق وشريط سعر غير مزعج
        const MiniProductCard = ({ prod, onClick }) => {
            const [imgIdx, setImgIdx] = useState(0);
            const images = prod.images?.length > 0 ? prod.images : (prod.img ? [prod.img] : []);
            
            useEffect(() => {
                if (images.length <= 1) return;
                const timer = setInterval(() => {
                    setImgIdx(prev => (prev + 1) % images.length);
                }, 7000);
                return () => clearInterval(timer);
            }, [images.length]);

            return (
                <div onClick={() => onClick(prod)} className="group relative bg-slate-900/80 backdrop-blur-md rounded-2xl sm:rounded-3xl border border-slate-700/50 hover:border-yellow-500/50 transition-all duration-500 overflow-hidden cursor-pointer flex flex-col hover:shadow-[0_8px_30px_rgba(234,179,8,0.15)] hover:-translate-y-1">
                    {/* Image Section */}
                    <div className="relative h-28 sm:h-40 w-full overflow-hidden bg-slate-950">
                        {images.map((img, i) => (
                            <img key={i} src={img} className={`absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110 ${i === imgIdx ? 'opacity-100 z-10' : 'opacity-0 z-0'}`} alt={prod.title} />
                        ))}
                        {/* Gradient Overlay for better contrast */}
                        <div className="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent z-20"></div>
                        
                        {/* Original Price Tag */}
                        {prod.originalPrice && (
                            <div className="absolute top-2 left-2 z-30 bg-rose-500/90 backdrop-blur-md text-white px-2 py-0.5 rounded-lg text-[10px] sm:text-xs font-bold line-through shadow-sm border border-rose-400/30">
                                {prod.originalPrice}
                            </div>
                        )}
                    </div>

                    {/* Content Section */}
                    <div className="p-3 sm:p-4 flex flex-col relative z-20">
                        {/* Floating Price Badge */}
                        <div className="absolute -top-4 sm:-top-5 right-3 sm:right-4 z-30 bg-gradient-to-r from-yellow-400 to-amber-500 text-slate-950 px-3 sm:px-4 py-1 sm:py-1.5 rounded-xl font-black text-xs sm:text-sm shadow-lg border border-yellow-200/50 flex items-center gap-1.5 transition-transform group-hover:scale-105">
                            <i className="ph-fill ph-tag"></i>
                            {prod.price}
                        </div>
                        
                        <h3 className="text-white text-sm sm:text-base font-black leading-tight mt-1 sm:mt-1 mb-1 line-clamp-1 group-hover:text-yellow-400 transition-colors">{prod.title}</h3>
                        <p className="text-slate-400 text-[10px] sm:text-xs font-bold line-clamp-2 w-full leading-relaxed">{prod.desc}</p>
                    </div>
                </div>
            );
        };

        const LoginScreen = ({ validPassword, onLogin }) => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const handleSubmit = (e) => {
                e.preventDefault();
                if (password === validPassword) onLogin(); else setError('كلمة المرور غير صحيحة');
            };
            return (
                <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-100 p-4">
                    <div className="bg-slate-900 p-8 rounded-3xl shadow-2xl border border-slate-800 w-full max-w-sm text-center relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-full h-1 bg-gradient-to-r from-yellow-500 to-yellow-300"></div>
                        <div className="w-20 h-20 bg-yellow-500/20 text-yellow-500 rounded-full flex items-center justify-center mx-auto mb-6 border border-yellow-500/30 shadow-lg shadow-yellow-900/20"><i className="ph-fill ph-lock-key text-4xl"></i></div>
                        <h2 className="text-2xl font-black mb-2 text-white">نظام الإدارة والتتبع</h2>
                        <p className="text-slate-400 text-sm mb-8">الرجاء إدخال كلمة المرور للمتابعة</p>
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <input type="password" value={password} onChange={(e) => { setPassword(e.target.value); setError(''); }} placeholder="كلمة المرور..." className="w-full p-4 border border-slate-700 bg-slate-950 text-white rounded-xl focus:border-yellow-500 outline-none text-center font-black tracking-widest text-xl shadow-inner transition-colors" autoFocus />
                                {error && <p className="text-red-400 text-xs font-bold mt-3 bg-red-950/40 p-2 rounded-lg border border-red-900/50 flex items-center justify-center gap-1"><i className="ph ph-warning-circle text-base"></i> {error}</p>}
                            </div>
                            <button type="submit" className="w-full bg-gradient-to-l from-yellow-600 to-yellow-500 hover:from-yellow-500 hover:to-yellow-400 text-slate-900 font-black py-4 rounded-xl shadow-lg shadow-yellow-900/20 transition-all text-lg flex justify-center items-center gap-2"><i className="ph-bold ph-sign-in text-xl"></i> تسجيل الدخول</button>
                        </form>
                        <div className="mt-6 pt-6 border-t border-slate-800">
                            <p className="text-slate-500 text-xs mb-3">هل أنت عميل تبحث عن طلبك أو عروضنا؟</p>
                            <a href="?client=true" className="w-full bg-slate-800 hover:bg-slate-700 text-blue-400 font-bold py-3 rounded-xl transition-all text-sm flex justify-center items-center gap-2 border border-slate-700"><i className="ph-fill ph-user"></i> دخول بوابة العملاء</a>
                        </div>
                    </div>
                </div>
            );
        };

        const RetargetingModal = ({ allRecords, settings, onClose }) => {
            const [message, setMessage] = useState(`أهلاً بك 🌟\nبمناسبة مرور فترة على زيارتكم لـ ${settings.studioName}، يسعدنا أن نقدم لكم خصم حصري على جلسات التصوير والمطبوعات.\nننتظركم لتوثيق لحظاتكم السعيدة! 📸`);
            
            const uniqueCustomers = useMemo(() => {
                const map = new Map();
                allRecords.forEach(t => {
                    if (!t.phone) return;
                    if (!map.has(t.phone)) {
                        map.set(t.phone, {
                            phone: t.phone,
                            name: t.clientName || t.groomName || 'عميل',
                            visits: 1,
                            lastVisit: t.dateTime
                        });
                    } else {
                        const existing = map.get(t.phone);
                        existing.visits += 1;
                        if (new Date(t.dateTime) > new Date(existing.lastVisit)) existing.lastVisit = t.dateTime;
                    }
                });
                return Array.from(map.values()).sort((a,b) => new Date(b.lastVisit) - new Date(a.lastVisit));
            }, [allRecords]);

            const copyAllNumbers = () => {
                const numbers = uniqueCustomers.map(c => c.phone).join(',');
                navigator.clipboard.writeText(numbers).then(() => {
                    alert("تم نسخ جميع الأرقام بنجاح! يمكنك لصقها في قائمة رسائل جماعية (Broadcast) على واتساب.");
                });
            };

            return (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fadeIn" onClick={onClose}>
                    <div className="bg-slate-900 rounded-3xl max-w-2xl w-full border border-slate-700 shadow-2xl flex flex-col max-h-[90vh] overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-950/50">
                            <h2 className="text-xl font-black text-yellow-400 flex items-center gap-2">
                                <i className="ph-fill ph-megaphone text-2xl"></i> إعادة استهداف العملاء ({uniqueCustomers.length})
                            </h2>
                            <button onClick={onClose} className="text-slate-500 hover:text-red-400 transition-colors"><i className="ph ph-x text-2xl"></i></button>
                        </div>
                        
                        <div className="p-6 flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-6">
                            <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800 shadow-inner">
                                <label className="block text-sm font-bold text-slate-300 mb-2">الرسالة التسويقية الموحدة:</label>
                                <textarea 
                                    rows="4" 
                                    value={message} 
                                    onChange={(e) => setMessage(e.target.value)} 
                                    className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm text-white outline-none focus:border-yellow-500 transition-colors resize-y custom-scrollbar"
                                />
                                <button onClick={copyAllNumbers} className="mt-3 w-full bg-slate-800 hover:bg-slate-700 text-blue-400 border border-slate-700 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors">
                                    <i className="ph-fill ph-copy text-lg"></i> نسخ جميع الأرقام (لرسائل الـ Broadcast)
                                </button>
                            </div>

                            <div>
                                <h3 className="font-bold text-slate-300 mb-3 text-sm border-b border-slate-800 pb-2">أو الإرسال الفردي السريع:</h3>
                                <div className="space-y-2">
                                    {uniqueCustomers.map((cust, idx) => (
                                        <div key={idx} className="flex items-center justify-between bg-slate-950 p-3 rounded-xl border border-slate-800 hover:border-slate-600 transition-colors">
                                            <div className="flex flex-col">
                                                <span className="font-bold text-sm text-slate-200">{cust.name}</span>
                                                <div className="flex items-center gap-2 text-xs text-slate-500 mt-1 font-mono">
                                                    <span>📞 {cust.phone}</span>
                                                    <span>•</span>
                                                    <span className="text-yellow-500">{cust.visits} زيارات</span>
                                                </div>
                                            </div>
                                            <button 
                                                onClick={() => openWhatsApp(cust.phone, message)}
                                                className="bg-green-600 hover:bg-green-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg transition-transform hover:scale-110 shrink-0"
                                                title="إرسال رسالة واتساب"
                                            >
                                                <i className="ph-fill ph-paper-plane-right text-lg"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ClientPortalScreen = ({ db, settings, transactions, weddings, uniqueCustomersCount, studioLikes, onLikeStudio }) => {
            const [phone, setPhone] = useState('');
            const [hasSearched, setHasSearched] = useState(false);
            const [results, setResults] = useState([]);
            const [errorMsg, setErrorMsg] = useState('');
            const [showPhoneInput, setShowPhoneInput] = useState(false);
            const [selectedPromoModal, setSelectedPromoModal] = useState(null);
            const [promoImgIndex, setPromoImgIndex] = useState(0);
            
            const [hasLiked, setHasLiked] = useState(localStorage.getItem('studio_liked') === 'true');
            const [selectedMiniProd, setSelectedMiniProd] = useState(null);
            const [miniProdImgIndex, setMiniProdImgIndex] = useState(0);

            // تسجيل زيارة جديدة لبوابة العملاء
            useEffect(() => {
                const recordVisit = async () => {
                    if (!db) return;
                    try {
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                        await updateDoc(doc(db, `artifacts/${appId}/public/data/settings`, 'main'), {
                            portalVisits: increment(1)
                        });
                    } catch (e) {
                        console.error("Error recording visit", e);
                    }
                };
                recordVisit();
            }, [db]);

            useEffect(() => {
                if(selectedMiniProd) {
                     const imgs = selectedMiniProd.images?.length > 0 ? selectedMiniProd.images : (selectedMiniProd.img ? [selectedMiniProd.img] : []);
                     if(imgs.length > 1) {
                         const t = setInterval(() => setMiniProdImgIndex(prev => (prev + 1) % imgs.length), 7000);
                         return () => clearInterval(t);
                     }
                }
            }, [selectedMiniProd]);

            const handleLike = () => {
                if(hasLiked) return;
                setHasLiked(true);
                localStorage.setItem('studio_liked', 'true');
                onLikeStudio();
            };

            const handleSearch = (e) => {
                e.preventDefault();
                const cleanPhone = phone.trim();
                if (!cleanPhone) { setErrorMsg('يرجى إدخال رقم الهاتف'); return; }
                setErrorMsg('');
                
                const all = [...transactions, ...weddings].filter(t => t.phone === cleanPhone);
                all.sort((a,b) => new Date(b.dateTime) - new Date(a.dateTime));
                
                if (all.length > 0) {
                    const target = all[0];
                    window.location.href = `?phone=${encodeURIComponent(cleanPhone)}&receipt=${encodeURIComponent(target.receiptNo)}&type=${target.type === 'wedding' ? 'w' : 't'}`;
                    return;
                }
                setResults(all); setHasSearched(true);
            };

            const promoColors = {
                yellow: 'from-yellow-900/40 to-slate-900 border-yellow-500/30 text-yellow-400 bg-yellow-500/20',
                pink: 'from-pink-900/40 to-slate-900 border-pink-500/30 text-pink-400 bg-pink-500/20',
                blue: 'from-blue-900/40 to-slate-900 border-blue-500/30 text-blue-400 bg-blue-500/20',
                amber: 'from-amber-900/40 to-slate-900 border-amber-500/30 text-amber-400 bg-amber-500/20'
            };

            const displayMiniProducts = (settings.miniProducts || DEFAULT_MINI_PRODUCTS).slice(0, 4);

            return (
                <div className="min-h-screen bg-slate-950 flex flex-col items-center py-10 px-4 text-slate-100">
                    <div className="w-full max-w-md animate-fadeIn">
                        <div className="bg-gradient-to-br from-slate-900 to-slate-950 p-6 sm:p-8 rounded-3xl border border-slate-800 shadow-2xl mb-8 relative overflow-hidden flex flex-col items-center text-center group">
                            <div className="absolute top-0 w-full h-1.5 bg-gradient-to-r from-yellow-400 via-amber-500 to-yellow-600"></div>
                            
                            {/* Logo */}
                            <div className="w-24 h-24 rounded-full overflow-hidden border-4 border-slate-800 shadow-lg mb-4 bg-slate-900 flex items-center justify-center transform group-hover:scale-105 transition-transform duration-500">
                                {settings.studioLogo ? <img src={settings.studioLogo} className="w-full h-full object-cover" alt="Studio Logo" /> : <i className="ph-fill ph-camera text-5xl text-yellow-500"></i>}
                            </div>
                            
                            <h1 className="text-2xl sm:text-3xl font-black text-white mb-2 tracking-wide">{settings.studioName}</h1>
                            <p className="text-slate-400 text-sm leading-relaxed max-w-sm font-bold mb-6">
                                أهلاً بك في مساحتك الخاصة ✨ نحن هنا لتوثيق أجمل لحظاتك وتحويلها إلى ذكريات لا تُنسى.
                            </p>
                            
                            {/* Statistics Row */}
                            <div className="flex justify-center items-center gap-4 sm:gap-6 w-full border-t border-slate-800/80 pt-5 mt-2 bg-slate-950/30 rounded-2xl p-4 shadow-inner">
                                <div className="flex flex-col items-center">
                                    <span className="text-xl sm:text-2xl font-black text-white mb-1">{uniqueCustomersCount}</span>
                                    <span className="text-[10px] sm:text-xs text-slate-400 font-bold flex items-center gap-1"><i className="ph-fill ph-users"></i> عميل</span>
                                </div>
                                <div className="w-px h-8 bg-slate-800"></div>
                                <div className="flex flex-col items-center">
                                    <span className="text-xl sm:text-2xl font-black text-yellow-400 mb-1">{settings.portalVisits || 1}</span>
                                    <span className="text-[10px] sm:text-xs text-slate-400 font-bold flex items-center gap-1"><i className="ph-fill ph-eye"></i> زيارة</span>
                                </div>
                                <div className="w-px h-8 bg-slate-800"></div>
                                <div className="flex flex-col items-center">
                                    <span className="text-xl sm:text-2xl font-black text-pink-400 mb-1">{studioLikes}</span>
                                    <span className="text-[10px] sm:text-xs text-slate-400 font-bold flex items-center gap-1"><i className="ph-fill ph-heart"></i> إعجاب</span>
                                </div>
                            </div>

                            {/* Action Buttons */}
                            <div className="grid grid-cols-3 gap-2 w-full mt-5">
                                <button onClick={handleLike} className={`flex items-center justify-center gap-1 sm:gap-2 px-2 py-3 rounded-xl border transition-all shadow-md text-[11px] sm:text-base font-bold ${hasLiked ? 'bg-pink-950/50 border-pink-500/50 text-pink-400' : 'bg-slate-900 border-slate-700 text-slate-300 hover:text-pink-400 hover:border-pink-500/50 hover:bg-slate-800'}`}>
                                    <i className={`${hasLiked ? 'ph-fill text-pink-500 scale-110' : 'ph'} ph-heart text-lg sm:text-xl transition-transform ${!hasLiked && 'animate-bounce-slow'}`}></i>
                                    أعجبني
                                </button>
                                
                                <a href="https://www.facebook.com/MrakbyPh" target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-1 sm:gap-2 px-2 py-3 rounded-xl border border-blue-500/30 bg-blue-900/20 text-blue-400 hover:bg-blue-600 hover:text-white transition-all shadow-md text-[11px] sm:text-base font-bold">
                                    <i className="ph-fill ph-facebook-logo text-lg sm:text-xl"></i>
                                    فيسبوك
                                </a>

                                <a href="https://instagram.com/MrakbyPh" target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-1 sm:gap-2 px-2 py-3 rounded-xl border border-pink-500/30 bg-pink-900/20 text-pink-400 hover:bg-gradient-to-tr hover:from-yellow-400 hover:via-pink-500 hover:to-purple-500 hover:text-white hover:border-transparent transition-all shadow-md text-[11px] sm:text-base font-bold">
                                    <i className="ph-fill ph-instagram-logo text-lg sm:text-xl"></i>
                                    إنستجرام
                                </a>
                            </div>
                        </div>

                        {!showPhoneInput && (
                            <div className="w-full mb-8 animate-fadeIn" style={{animationDelay: '0.15s'}}>
                                {/* Miniature Products Grid (4 Cards) */}
                                <div className="grid grid-cols-2 gap-3 sm:gap-4 mb-6">
                                    {displayMiniProducts.map(prod => (
                                        <MiniProductCard key={prod.id} prod={prod} onClick={setSelectedMiniProd} />
                                    ))}
                                </div>

                                {/* Promotions Section */}
                                {settings.promotions?.length > 0 && (
                                    <>
                                        <h3 className="text-lg font-black text-slate-200 mb-4 flex items-center justify-center gap-2">
                                            <i className="ph-fill ph-sparkle text-yellow-400"></i> أحدث عروضنا لك
                                        </h3>
                                        <div className="grid grid-cols-1 gap-4">
                                            {settings.promotions.map(promo => {
                                                const colorSet = promoColors[promo.color || 'yellow'] || promoColors.yellow;
                                                const [bg1, bg2, borderClass, textClass, iconBgClass] = colorSet.split(' ');
                                                return (
                                                    <div key={promo.id} onClick={() => { setSelectedPromoModal(promo); setPromoImgIndex(0); }} className={`bg-gradient-to-l ${bg1} ${bg2} p-4 rounded-2xl border ${borderClass} shadow-md flex flex-col transition-transform hover:scale-[1.02] cursor-pointer relative overflow-hidden pb-4`}>

                                                            <div className="-mx-4 -mt-4 mb-3 h-40 relative border-b border-slate-700/50 shrink-0">

                                                                <div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/20 to-transparent"></div>
                                                            </div>
                                                        )}
                                                        <div className={`flex items-start gap-4 z-10 ${promo.images?.length > 0 ? '-mt-8' : ''}`}>
                                                             <div className={`w-12 h-12 rounded-full ${iconBgClass} ${textClass} flex items-center justify-center shrink-0 shadow-lg border border-white/10 bg-slate-900`}>
                                                                 <i className={`ph-fill ${promo.icon} text-2xl`}></i>
                                                             </div>
                                                             <div className="flex-1 pt-1">

                                                                 <p className="text-xs text-slate-300 mt-1 leading-relaxed line-clamp-2 drop-shadow-md">{promo.shortDesc}</p>
                                                                 {promo.discount && <span className={`inline-block mt-2 text-[10px] font-black px-2 py-1 ${iconBgClass} ${textClass} rounded border border-current/20`}>{promo.discount}</span>}
                                                             </div>
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {!showPhoneInput ? (
                             <button onClick={() => setShowPhoneInput(true)} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-900/20 transition-transform hover:scale-[1.02] text-lg flex items-center justify-center gap-2 border border-blue-500/50 animate-fadeIn" style={{animationDelay: '0.4s'}}>
                                  <i className="ph-fill ph-sign-in text-2xl"></i> الدخول لأرشيفك وطلباتك
                             </button>
                        ) : (
                             <div className="bg-slate-900 p-6 sm:p-8 rounded-3xl border border-slate-800 shadow-2xl animate-fadeIn w-full relative">
                                  <button onClick={() => {setShowPhoneInput(false); setHasSearched(false); setResults([]);}} className="absolute top-4 left-4 text-slate-500 hover:text-white transition-colors"><i className="ph ph-arrow-right text-xl"></i> رجوع</button>
                                  <div className="text-center mb-6 mt-4">
                                      <div className="bg-blue-950/30 p-4 rounded-2xl border border-blue-900/40 shadow-inner inline-block w-full">
                                          <i className="ph-fill ph-shield-check text-blue-400 text-3xl mb-2"></i>
                                          <p className="text-slate-300 text-sm leading-relaxed font-bold">مرحباً بك مجدداً 👋 يرجى إدخال رقم هاتفك للوصول الآمن إلى أرشيف صورك ومتابعة طلباتك الحالية.</p>
                                      </div>
                                  </div>
                                  <form onSubmit={handleSearch} className="flex flex-col gap-4">
                                      {errorMsg && <div className="text-red-400 text-sm bg-red-950/50 p-3 rounded-xl text-center font-bold border border-red-900/50 animate-fadeIn">{errorMsg}</div>}
                                      <div>
                                          <label className="block text-sm font-bold text-slate-400 mb-2">رقم الهاتف المسجل لدينا:</label>
                                          <div className="relative">
                                              <input type="tel" value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="أدخل رقم الهاتف هنا..." className="w-full p-4 pr-12 border border-slate-700 bg-slate-950 text-white rounded-xl focus:border-blue-500 outline-none text-lg font-mono transition-colors shadow-inner" required autoFocus />
                                              <i className="ph-fill ph-phone absolute right-4 top-4 text-slate-500 text-xl"></i>
                                          </div>
                                      </div>
                                      <button type="submit" className="w-full bg-gradient-to-l from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-900/20 transition-transform hover:scale-[1.02] text-lg flex items-center justify-center gap-2 mt-2"><i className="ph-bold ph-magnifying-glass text-xl"></i> بحث ودخول</button>
                                  </form>
                                  {hasSearched && results.length === 0 && (
                                      <div className="mt-6 bg-slate-950 p-5 rounded-2xl border border-red-900/40 text-center animate-fadeIn">
                                          <i className="ph-fill ph-warning-circle text-4xl text-red-500 mb-2"></i>
                                          <p className="text-white font-black text-base">لا يوجد طلب مسجل</p>
                                          <p className="text-xs text-slate-400 mt-2 leading-relaxed">عذراً، لم نتمكن من العثور على أي طلب يطابق رقم الهاتف المدخل. تأكد من إدخال الرقم الصحيح المستخدم أثناء الحجز.</p>
                                      </div>
                                  )}
                             </div>
                        )}

                        {/* Modal for Mini Product Details */}
                        {selectedMiniProd && (() => {
                            const imgs = selectedMiniProd.images?.length > 0 ? selectedMiniProd.images : (selectedMiniProd.img ? [selectedMiniProd.img] : []);
                            return (
                            <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-[100] flex items-center justify-center p-4 animate-fadeIn" onClick={() => setSelectedMiniProd(null)}>
                                <div className="bg-slate-900 rounded-3xl max-w-sm w-full overflow-hidden border border-slate-700 shadow-2xl flex flex-col" onClick={e => e.stopPropagation()}>
                                    <div className="relative h-56 sm:h-64 w-full bg-slate-950">
                                        {imgs.map((img, i) => (
                                            <img key={i} src={img} className={`absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ${i === miniProdImgIndex ? 'opacity-100' : 'opacity-0'}`} alt={selectedMiniProd.title} />
                                        ))}
                                        <button onClick={() => setSelectedMiniProd(null)} className="absolute top-4 left-4 bg-slate-900/60 hover:bg-slate-900 text-white w-8 h-8 flex items-center justify-center rounded-full backdrop-blur-md transition-colors border border-white/20 shadow-lg z-10"><i className="ph ph-x text-lg"></i></button>
                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent opacity-80 pointer-events-none"></div>
                                    </div>
                                    <div className="p-6 flex flex-col items-center text-center -mt-10 relative z-10">
                                        <h2 className="text-2xl font-black text-white mb-2">{selectedMiniProd.title}</h2>
                                        <div className="flex items-center gap-2 mb-4 bg-gradient-to-r from-yellow-600 to-yellow-500 border border-yellow-400 px-5 py-2 rounded-xl shadow-lg">
                                            <span className="text-slate-900 font-black text-lg">{selectedMiniProd.price}</span>
                                            {selectedMiniProd.originalPrice && <span className="text-slate-800 line-through text-xs font-bold bg-white/20 px-2 py-0.5 rounded">{selectedMiniProd.originalPrice}</span>}
                                        </div>
                                        <p className="text-slate-300 text-sm leading-relaxed mb-6 bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-inner w-full">{selectedMiniProd.desc}</p>
                                        
                                        <button onClick={() => openWhatsApp(settings.studioPhone || '01201260040', `مرحباً ${settings.studioName} 👋\nأود الاستفسار/الحجز بخصوص: *${selectedMiniProd.title}*`)} className="w-full bg-gradient-to-r from-green-600 to-emerald-500 hover:from-green-500 hover:to-emerald-400 text-white font-black py-4 rounded-xl shadow-lg transition-transform hover:scale-[1.02] flex items-center justify-center gap-2 text-lg border border-green-500/50">
                                            <i className="ph-fill ph-whatsapp-logo text-2xl"></i> طلب عبر واتساب
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )})()}
                        
                        {selectedPromoModal && (
                            <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-[100] flex items-center justify-center p-4 animate-fadeIn" onClick={() => setSelectedPromoModal(null)}>
                                <div className="bg-slate-900 rounded-3xl max-w-lg w-full overflow-hidden border border-slate-700 shadow-2xl flex flex-col max-h-[90vh]" onClick={e => e.stopPropagation()}>
                                    <div className="relative">
                                        {selectedPromoModal.images?.length > 0 ? (
                                            <div className="w-full h-56 sm:h-72 relative group bg-slate-950">
                                                <img 
                                                    src={selectedPromoModal.images[promoImgIndex]} 
                                                    className="w-full h-full object-contain sm:object-cover transition-all" 
                                                    alt={`صورة ${promoImgIndex + 1}`} 
                                                />
                                                {selectedPromoModal.images.length > 1 && (
                                                    <>
                                                        <button onClick={(e) => { e.stopPropagation(); setPromoImgIndex(prev => prev === 0 ? selectedPromoModal.images.length - 1 : prev - 1) }} className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/60 text-white rounded-full w-8 h-8 flex items-center justify-center hover:bg-black/90 backdrop-blur-sm transition-all opacity-0 group-hover:opacity-100 border border-white/20 shadow-lg"><i className="ph-bold ph-caret-right text-lg"></i></button>
                                                        <button onClick={(e) => { e.stopPropagation(); setPromoImgIndex(prev => prev === selectedPromoModal.images.length - 1 ? 0 : prev + 1) }} className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/60 text-white rounded-full w-8 h-8 flex items-center justify-center hover:bg-black/90 backdrop-blur-sm transition-all opacity-0 group-hover:opacity-100 border border-white/20 shadow-lg"><i className="ph-bold ph-caret-left text-lg"></i></button>
                                                        <div className="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5 bg-black/40 px-2.5 py-1.5 rounded-full backdrop-blur-md">
                                                            {selectedPromoModal.images.map((_, i) => (
                                                                <button key={i} onClick={(e) => { e.stopPropagation(); setPromoImgIndex(i); }} className={`h-2 rounded-full transition-all ${i === promoImgIndex ? 'bg-yellow-400 w-4' : 'bg-white/60 hover:bg-white w-2'}`}></button>
                                                            ))}
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        ) : (
                                            <div className={`w-full h-32 bg-gradient-to-r ${promoColors[selectedPromoModal.color || 'yellow'].split(' ').slice(0,2).join(' ')} flex items-center justify-center`}><i className={`ph-fill ${selectedPromoModal.icon} text-6xl opacity-50`}></i></div>
                                        )}
                                        <button onClick={() => setSelectedPromoModal(null)} className="absolute top-4 left-4 bg-slate-900/60 hover:bg-slate-900 text-white w-8 h-8 flex items-center justify-center rounded-full backdrop-blur-md transition-colors border border-white/20 shadow-lg z-10"><i className="ph ph-x text-lg"></i></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto custom-scrollbar flex-1 flex flex-col">
                                        <div className="flex justify-between items-start mb-4">
                                            <h2 className="text-xl sm:text-2xl font-black text-white flex items-center gap-2 leading-tight"><i className={`ph-fill ${selectedPromoModal.icon} text-yellow-500 shrink-0`}></i> {selectedPromoModal.title}</h2>
                                            {selectedPromoModal.discount && <span className="bg-yellow-500/20 text-yellow-400 border border-yellow-500/50 px-3 py-1 rounded-lg font-black text-sm whitespace-nowrap shrink-0">{selectedPromoModal.discount}</span>}
                                        </div>
                                        <p className="text-slate-300 font-bold mb-4">{selectedPromoModal.shortDesc}</p>
                                        {selectedPromoModal.fullDesc && <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 mb-6 shadow-inner"><p className="text-slate-400 text-sm leading-relaxed whitespace-pre-wrap">{selectedPromoModal.fullDesc}</p></div>}
                                        <button onClick={() => openWhatsApp(settings.studioPhone || '01201260040', `مرحباً ${settings.studioName} 👋\nأود الاستفسار/الحجز بخصوص العرض: *${selectedPromoModal.title}*`)} className="w-full bg-gradient-to-r from-green-600 to-emerald-500 hover:from-green-500 hover:to-emerald-400 text-white font-black py-4 rounded-xl shadow-lg transition-transform hover:scale-[1.02] flex items-center justify-center gap-2 text-lg border border-green-500/50 mt-auto"><i className="ph-fill ph-whatsapp-logo text-2xl"></i> احجز العرض الآن</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const Navigation = ({ settings, activeTab, setActiveTab, onLogout, feedbacks, unreadCount, onViewFeedback }) => {
            const [showNotif, setShowNotif] = useState(false);
            const navItems = [
              { id: 'dashboard', icon: <i className="ph ph-squares-four text-xl"></i>, label: 'الرئيسية' },
              { id: 'weddings', icon: <i className="ph ph-heart text-xl"></i>, label: 'حجوزات الزفاف 💍' },
              { id: 'expenses', icon: <i className="ph ph-printer text-xl"></i>, label: 'المصروفات والمخزون' },
              { id: 'reports', icon: <i className="ph ph-calendar-blank text-xl"></i>, label: 'التقارير' },
              { id: 'settings', icon: <i className="ph ph-gear text-xl"></i>, label: 'الإعدادات' },
            ];

            return (
              <nav className="bg-slate-950/80 backdrop-blur-xl border-b border-slate-800 text-white sticky top-0 z-50 shadow-2xl">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-20">
                    <div className="flex items-center gap-3">
                      <div className="w-12 h-12 flex items-center justify-center bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-xl shadow-lg shadow-yellow-500/20 transform transition hover:scale-105 overflow-hidden shrink-0">
                        {settings.studioLogo ? <img src={settings.studioLogo} className="w-full h-full object-cover" /> : <i className="ph ph-camera text-slate-900 text-3xl"></i>}
                      </div>
                      <div className="flex flex-col">
                        <h1 className="text-xl sm:text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-l from-yellow-300 to-yellow-500" style={{ fontWeight: 900 }}>{settings.studioName}</h1>
                        <span className="text-[10px] sm:text-xs text-slate-400 font-medium">نظام الإدارة الذكي</span>
                      </div>
                    </div>
                    <div className="flex items-center gap-2 sm:gap-4">
                        <div className="relative">
                            <button onClick={() => setShowNotif(!showNotif)} className="relative p-2 text-slate-300 hover:text-yellow-400 transition-colors bg-slate-900 rounded-full border border-slate-800">
                                <i className="ph-fill ph-bell text-xl"></i>
                                {unreadCount > 0 && <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold animate-pulse shadow-lg">{unreadCount}</span>}
                            </button>
                            {showNotif && (
                                <div className="absolute left-0 lg:left-auto lg:right-0 mt-3 w-80 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl z-50 p-2 flex flex-col max-h-[400px]">
                                    <div className="flex justify-between items-center mb-2 px-2 pb-2 border-b border-slate-700">
                                        <span className="font-bold text-slate-200">التقييمات والآراء ({feedbacks.length})</span>
                                        <button onClick={() => setShowNotif(false)} className="text-slate-400 hover:text-white"><i className="ph ph-x"></i></button>
                                    </div>
                                    <div className="overflow-y-auto custom-scrollbar flex flex-col gap-2 pr-1">
                                        {feedbacks.length === 0 ? <p className="text-center text-slate-500 text-sm py-4">لا توجد تقييمات بعد.</p> : feedbacks.map(fb => (
                                                <div key={fb.id} onClick={() => { onViewFeedback(fb); setShowNotif(false); }} className={`p-3 rounded-lg border cursor-pointer transition-colors ${!fb.adminReadFeedback ? 'bg-slate-700/50 border-yellow-500/50' : 'bg-slate-900 border-slate-700 hover:border-slate-500'}`}>
                                                    <div className="flex justify-between items-start mb-1">
                                                        <span className="font-bold text-sm text-slate-200">{fb.type === 'wedding' ? (fb.groomName + ' و ' + fb.brideName) : fb.clientName}</span>
                                                        <div className="flex gap-0.5 text-yellow-500 text-xs" dir="ltr">{[...Array(5)].map((_, i) => <i key={i} className={`${i < fb.clientRating ? 'ph-fill' : 'ph'} ph-star`}></i>)}</div>
                                                    </div>
                                                    {fb.clientFeedback && <p className="text-xs text-slate-400 line-clamp-2">{fb.clientFeedback}</p>}
                                                </div>
                                            ))}
                                    </div>
                                </div>
                            )}
