            // If not filtering, show today's by default
            if (!isFiltering) {
                displayTxns = transactions.filter(t => new Date(t.dateTime).toDateString() === new Date().toDateString());
            }

            // Calculate total collected for the *displayed* transactions
            const currentTotalCollected = displayTxns.reduce((sum, txn) => sum + (parseFloat(txn.paid) || 0), 0);

            return (
              <div className="space-y-6">
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 flex flex-col md:flex-row gap-4 items-center justify-between">
                  <button onClick={() => { setIsEditing(false); setFormData({ clientName: '', phone: '', photoNo: [''], requirements: '', total: '', paid: '', paymentMethod: 'cash', soldProducts: [], photosLink: '' }); setShowAddModal(true); }} className="w-full md:w-auto bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-blue-900/50">
                    <i className="ph ph-plus-circle text-2xl"></i> إضافة عملية جديدة
                  </button>
                  <div className="relative w-full md:w-1/2 flex gap-2">
                    <div className="relative flex-1">
                      <i className="ph ph-magnifying-glass absolute right-4 top-4 text-slate-500 text-xl"></i>
                      <input type="text" placeholder="ابحث بالاسم، رقم الهاتف، رقم الإيصال..." className="w-full p-3 pr-10 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-sm transition-colors" value={query} onChange={(e) => setQuery(e.target.value)} />
                    </div>
                    <input type="date" title="تصفية بيوم محدد" className="p-3 border border-slate-700 bg-slate-950 text-slate-300 rounded-xl focus:border-blue-500 outline-none text-sm transition-colors cursor-pointer" value={filterDate} onChange={(e) => setFilterDate(e.target.value)} />
                    {filterDate && (
                        <button onClick={() => setFilterDate('')} className="bg-slate-800 hover:bg-red-900/50 text-slate-400 hover:text-red-400 p-3 rounded-xl transition-colors" title="إلغاء الفلتر">
                            <i className="ph ph-x"></i>
                        </button>
                    )}
                  </div>
                </div>

                {isFiltering ? null : <TopCustomers allRecords={allRecords} />}
                  
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                  <h2 className="text-xl font-bold mb-4 flex items-center justify-between text-slate-100 border-b border-slate-800 pb-4">
                    <div className="flex items-center gap-2">
                        <i className="ph ph-files text-blue-400 text-2xl"></i> {isFiltering ? 'نتائج البحث والفلتر' : 'عمليات اليوم'}
                    </div>
                    <div className="flex flex-wrap items-center gap-2 justify-end">
                        <span className="bg-green-500/10 text-green-400 border border-green-500/30 px-3 sm:px-4 py-1.5 rounded-xl text-xs sm:text-sm font-black flex items-center gap-1.5 shadow-sm">
                            <i className="ph-fill ph-money text-base sm:text-lg"></i> المحصل: {formatCurrency(currentTotalCollected)}
                        </span>
                        <span className="bg-blue-500/10 text-blue-400 border border-blue-500/30 px-3 sm:px-4 py-1.5 rounded-xl text-xs sm:text-sm font-black flex items-center gap-1.5 shadow-sm">
                            <i className="ph-fill ph-chart-bar text-base sm:text-lg"></i> {displayTxns.length} عملية
                        </span>
                    </div>
                  </h2>
                  <div className="space-y-4">
                    {displayTxns.length === 0 ? <p className="text-center p-10 text-slate-500">لا توجد نتائج هنا.</p> : displayTxns.map(txn => <TransactionCard key={txn.id} txn={txn} onDelete={handleDelete} onEdit={handleEdit} onPayRemaining={setPayModal} onViewReceipt={setReceiptImageModal} sendInvoice={() => openWhatsApp(txn.phone, generateWA_Message('invoice', txn, settings))} updateStatus={updateTxnStatus} onViewDetails={setTxnDetailsModal} settings={settings} allRecords={allRecords} />)}
                  </div>
                </div>

                {showAddModal && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-900 p-6 rounded-3xl shadow-2xl border border-slate-800 w-full max-w-4xl relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                      <button onClick={() => { setShowAddModal(false); setLoyaltyAlert(''); }} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400"><i className="ph ph-x text-xl"></i></button>
                      <h2 className="text-xl font-black mb-6 text-slate-100 border-b border-slate-800 pb-3">{isEditing ? 'تعديل العملية' : 'إضافة عملية جديدة'}</h2>
                      <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="bg-blue-900/30 p-3 rounded-xl flex justify-between items-center text-sm font-bold text-blue-300 border border-blue-800/50">
                          <span>رقم الإيصال:</span><span className="text-lg">#{isEditing ? formData.receiptNo : settings.nextReceiptNo}</span>
                        </div>
                        {loyaltyAlert && (
                            <div className="bg-yellow-950/40 border border-yellow-500/50 text-yellow-400 p-3 rounded-xl text-sm font-bold shadow-inner">
                                {loyaltyAlert}
                            </div>
                        )}
                        
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                            <input type="text" placeholder="اسم العميل" required className="w-full p-3 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-blue-500 outline-none text-sm" value={formData.clientName} onChange={e => setFormData({...formData, clientName: e.target.value})} />
                            <input type="tel" placeholder="رقم الهاتف" required className="w-full p-3 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-blue-500 outline-none text-sm" value={formData.phone} onChange={e => handlePhoneChange(e.target.value)} />
                        </div>

                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 mb-4">
                            <label className="text-sm font-bold text-slate-400 mb-3 block"><i className="ph ph-images text-blue-400 text-lg align-middle"></i> أرقام الصور (اختياري):</label>
                            <div className="flex flex-wrap gap-2 items-center">
                                {formData.photoNo.map((pNo, idx) => (
                                <div key={idx} className="flex items-center bg-slate-900 border border-slate-700 rounded-xl overflow-hidden focus-within:border-blue-500 transition-colors shadow-inner">
                                    <input type="text" placeholder={idx === 0 ? "رقم..." : "إضافي"} className="w-20 sm:w-24 p-2 bg-transparent text-white text-center outline-none text-sm font-bold" value={pNo} onChange={e => {
                                        const newArr = [...formData.photoNo];
                                        newArr[idx] = e.target.value;
                                        setFormData({...formData, photoNo: newArr});
                                    }} />
                                    {formData.photoNo.length > 1 && (
                                        <button type="button" onClick={() => {
                                            const newArr = formData.photoNo.filter((_, i) => i !== idx);
                                            setFormData({...formData, photoNo: newArr});
                                        }} className="bg-red-950/40 hover:bg-red-900/80 text-red-400 px-3 py-2 transition-colors border-r border-slate-700" title="حذف هذا الرقم"><i className="ph ph-x font-bold text-sm"></i></button>
                                    )}
                                </div>
                                ))}
                                <button type="button" onClick={() => setFormData({...formData, photoNo: [...formData.photoNo, '']})} className="bg-blue-900/30 hover:bg-blue-800/50 text-blue-400 px-3 py-2 rounded-xl border border-blue-500/30 transition-colors text-sm font-bold flex items-center gap-1">
                                    <i className="ph ph-plus"></i> إضافة رقم
                                </button>
                            </div>
                        </div>

                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                          <div className="flex justify-between items-center mb-3">
                              <label className="text-sm font-bold text-slate-400"><i className="ph ph-camera text-blue-400 text-lg align-middle"></i> الخدمات السريعة:</label>
                          </div>
                          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 mb-5">
                            {settings.services.map((srv, idx) => {
                              const srvObj = typeof srv === 'string' ? {name: srv, price: 0, desc: ''} : srv;
                              return <QuickServiceCard key={`srv-${idx}`} srvObj={srvObj} onAdd={handleAddService} colorTheme="blue" />;
                            })}
                          </div>

                          <div className="flex justify-between items-center mb-3 border-t border-slate-800 pt-4">
                              <label className="text-sm font-bold text-slate-400"><i className="ph ph-package text-purple-400 text-lg align-middle"></i> البضاعة والمنتجات:</label>
                          </div>
                          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 mb-4">
                            {settings.products && settings.products.map((prod, idx) => {
                              const prodObj = typeof prod === 'string' ? {name: prod, price: 0, desc: ''} : prod;
                              return <QuickServiceCard key={`prod-${idx}`} srvObj={prodObj} onAdd={handleAddService} colorTheme="purple" />;
                            })}
                          </div>

                          <textarea placeholder="المطلوب بالتفصيل..." rows="2" className="w-full p-3 mt-2 border border-slate-700 bg-slate-900 text-white placeholder-slate-500 rounded-xl focus:border-blue-500 outline-none text-sm custom-scrollbar" value={formData.requirements} onChange={e => setFormData({...formData, requirements: e.target.value})} />
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                          <input type="number" placeholder="الإجمالي" className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-blue-500 text-sm font-bold" value={formData.total} onChange={e => setFormData({...formData, total: e.target.value})} />
                          <input type="number" placeholder="المدفوع الان" className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-green-500 text-sm font-bold" value={formData.paid} onChange={e => setFormData({...formData, paid: e.target.value})} />
                          {!isEditing && (
                              <select className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-indigo-500 col-span-2 md:col-span-1 text-sm font-bold" value={formData.paymentMethod} onChange={e => setFormData({...formData, paymentMethod: e.target.value})}>
                                 <option value="cash">دفع نقدي</option>
                                 <option value="electronic">دفع إلكتروني (محافظ)</option>
                              </select>
                          )}
                        </div>
                        <div className={`p-3 rounded-xl text-center font-black text-lg border ${(parseFloat(formData.total)||0 - parseFloat(formData.paid)||0) > 0 ? 'bg-red-950/40 text-red-400 border-red-900/50' : 'bg-green-950/40 text-green-400 border-green-900/50'}`}>
                          الباقي: {formatCurrency((parseFloat(formData.total) || 0) - (parseFloat(formData.paid) || 0))}
                        </div>
                        <button type="submit" className="w-full bg-blue-600 text-white hover:bg-blue-500 font-black py-3 rounded-xl shadow-lg text-sm"><i className="ph ph-floppy-disk text-lg ml-2 align-middle"></i>حفظ</button>
                      </form>
                    </div>
                  </div>
                )}
                
                <PaymentModal payModal={payModal} setPayModal={setPayModal} db={db} />
                <TxnDetailsModal txnDetailsModal={txnDetailsModal} setTxnDetailsModal={setTxnDetailsModal} setReceiptImageModal={setReceiptImageModal} db={db} allRecords={allRecords} />
              </div>
            );
        };

        const WeddingsTab = ({ settings, setSettings, weddings, inventory, db, allRecords }) => {
            const [showAddModal, setShowAddModal] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [query, setQuery] = useState('');
            const [filterDate, setFilterDate] = useState('');
            const [payModal, setPayModal] = useState(null);
            const [receiptImageModal, setReceiptImageModal] = useState(null);
            const [txnDetailsModal, setTxnDetailsModal] = useState(null);
            const [loyaltyAlert, setLoyaltyAlert] = useState('');
            
            const [formData, setFormData] = useState({
                groomName: '', brideName: '', phone: '', groomAddress: '',
                weddingDate: '', location: '', makeupArtist: '', leaveTime: '',
                sessionType: '', casualShootDate: '',
                packages: [], addons: [],
                total: '', paid: '', paymentMethod: 'cash', photosLink: ''
            });

            const [newAddon, setNewAddon] = useState({ name: '', notes: '', date: '', price: '' });

            const handleAddAddon = () => {
                if(!newAddon.name) return;
                const price = parseFloat(newAddon.price) || 0;
                setFormData(prev => ({
                    ...prev,
                    addons: [...prev.addons, { ...newAddon, price }],
                    total: (parseFloat(prev.total) || 0) + price
                }));
                setNewAddon({ name: '', notes: '', date: '', price: '' });
            };

            const handleRemoveAddon = (index) => {
                const addon = formData.addons[index];
                const newAddons = [...formData.addons];
                newAddons.splice(index, 1);
                setFormData(prev => ({
                    ...prev,
                    addons: newAddons,
                    total: Math.max(0, (parseFloat(prev.total) || 0) - addon.price)
                }));
            };

            const handleSelectPackage = (pkg) => {
                setFormData(prev => {
                    const exists = prev.packages.find(p => p.name === pkg.name);
                    let newPkgs, priceDiff;
                    if (exists) {
                        newPkgs = prev.packages.filter(p => p.name !== pkg.name);
                        priceDiff = -exists.price;
                    } else {
                        newPkgs = [...prev.packages, { ...pkg }];
                        priceDiff = pkg.price;
                    }
                    return {
                        ...prev,
                        packages: newPkgs,
                        total: Math.max(0, (parseFloat(prev.total) || 0) + priceDiff)
                    };
                });
            };

            const handleUpdatePackagePrice = (pkgName, newPrice) => {
                 setFormData(prev => {
                     let diff = 0;
                     const newPkgs = prev.packages.map(p => {
                         if (p.name === pkgName) {
                             diff = newPrice - p.price;
                             return { ...p, price: newPrice };
                         }
                         return p;
                     });
                     return {
                         ...prev,
                         packages: newPkgs,
                         total: Math.max(0, (parseFloat(prev.total) || 0) + diff)
                     };
                 });
            };

            const handleEdit = (txn) => {
                setFormData({
                    id: txn.id,
                    receiptNo: txn.receiptNo,
                    dateTime: txn.dateTime,
                    month: txn.month,
                    year: txn.year,
                    status: txn.status,
                    groomName: txn.groomName || '',
                    brideName: txn.brideName || '',
                    phone: txn.phone || '',
                    groomAddress: txn.groomAddress || '',
                    weddingDate: txn.weddingDate || '',
                    location: txn.location || '',
                    makeupArtist: txn.makeupArtist || '',
                    leaveTime: txn.leaveTime || '',
                    sessionType: txn.sessionType || '',
                    casualShootDate: txn.casualShootDate || '',
                    packages: txn.packages || (txn.package ? [txn.package] : []),
                    addons: txn.addons || [],
                    total: txn.total || '',
                    paid: txn.paid || '',
                    electronicPaid: txn.electronicPaid || 0,
                    paymentMethod: txn.electronicPaid > 0 ? 'electronic' : 'cash',
                    photosLink: txn.photosLink || ''
                });
                setIsEditing(true);
                setShowAddModal(true);
            };

            const handleSubmit = async (e) => {
              e.preventDefault();
              const total = parseFloat(formData.total) || 0;
              const paid = parseFloat(formData.paid) || 0;

              // Ensure Unique Receipt No
              let finalReceiptNo = isEditing ? formData.receiptNo : (settings.nextReceiptNo || 1000);
              if (!isEditing && allRecords) {
                  let isDuplicate = true;
                  while(isDuplicate) {
                      const exists = allRecords.some(t => t.receiptNo === finalReceiptNo);
                      if (exists) {
                          finalReceiptNo++;
                      } else {
                          isDuplicate = false;
                      }
                  }
              }

              const newWedding = {
                id: isEditing ? formData.id : Date.now().toString(),
                receiptNo: finalReceiptNo,
                type: 'wedding',
                dateTime: isEditing ? formData.dateTime : new Date().toISOString(),
                groomName: formData.groomName,
                brideName: formData.brideName,
                phone: formData.phone,
                groomAddress: formData.groomAddress,
                weddingDate: formData.weddingDate,
                location: formData.location,
                makeupArtist: formData.makeupArtist,
                leaveTime: formData.leaveTime,
                sessionType: formData.sessionType,
                casualShootDate: formData.casualShootDate,
                packages: formData.packages,
                addons: formData.addons,
                total: total,
                paid: paid,
                electronicPaid: isEditing ? formData.electronicPaid : (formData.paymentMethod === 'electronic' ? paid : 0),
                remaining: total - paid,
                status: isEditing ? formData.status : 0,
                month: isEditing ? formData.month : new Date().getMonth() + 1,
                year: isEditing ? formData.year : new Date().getFullYear(),
                photosLink: formData.photosLink || ''
              };
              
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
              await setDoc(doc(db, `artifacts/${appId}/public/data/weddings`, newWedding.id), newWedding);
              
              if(!isEditing) setSettings({...settings, nextReceiptNo: finalReceiptNo + 1});
              setFormData({ groomName:'', brideName:'', phone:'', groomAddress:'', weddingDate:'', location:'', makeupArtist:'', leaveTime:'', sessionType:'', casualShootDate:'', packages:[], addons:[], total:'', paid:'', paymentMethod:'cash', photosLink:'' });
              setIsEditing(false);
              setShowAddModal(false);
            };

            const handleDelete = async (id) => {
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
              await deleteDoc(doc(db, `artifacts/${appId}/public/data/weddings`, id));
            };

            const updateTxnStatus = async (txnId, newStatus) => {
                const txnToUpdate = weddings.find(t => t.id === txnId);
                if(txnToUpdate) {
                    const updated = {...txnToUpdate, status: newStatus};
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                    await setDoc(doc(db, `artifacts/${appId}/public/data/weddings`, updated.id), updated);
                }
            };

            const handlePhoneChange = (val) => {
                setFormData(prev => ({...prev, phone: val}));
                if (val.length >= 10 && allRecords) {
                    const pastTxn = allRecords.find(t => t.phone === val);
                    if (pastTxn) {
                        setFormData(prev => ({
                            ...prev,
                            groomName: prev.groomName || pastTxn.groomName || pastTxn.clientName || '',
                            brideName: prev.brideName || pastTxn.brideName || '',
                            groomAddress: prev.groomAddress || pastTxn.groomAddress || ''
                        }));
                        const visits = allRecords.filter(t => t.phone === val).length;
                        setLoyaltyAlert(`🌟 عميل دائم: هذه هي الزيارة رقم ${visits + 1}! (يمكنك تقديم خصم كهدية ولاء)`);
                    } else { setLoyaltyAlert(''); }
                } else { setLoyaltyAlert(''); }
            };

            // Filtering logic
            let filteredWeds = weddings;
            const isFiltering = query !== '' || filterDate !== '';
            
            if (query) {
                filteredWeds = filteredWeds.filter(t => t.groomName?.includes(query) || t.brideName?.includes(query) || t.phone?.includes(query) || t.receiptNo.toString().includes(query));
            }
            if (filterDate) {
                filteredWeds = filteredWeds.filter(t => t.dateTime && t.dateTime.startsWith(filterDate));
            }
            
            if (!isFiltering) {
                filteredWeds = weddings.filter(t => new Date(t.dateTime).toDateString() === new Date().toDateString());
            }

            const currentTotalCollected = filteredWeds.reduce((sum, txn) => sum + (parseFloat(txn.paid) || 0), 0);

            return (
              <div className="space-y-6">
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 flex flex-col md:flex-row gap-4 items-center justify-between">
                  <button onClick={() => { setIsEditing(false); setFormData({ groomName:'', brideName:'', phone:'', groomAddress:'', weddingDate:'', location:'', makeupArtist:'', leaveTime:'', sessionType:'', casualShootDate:'', packages:[], addons:[], total:'', paid:'', paymentMethod:'cash', photosLink:'' }); setShowAddModal(true); }} className="w-full md:w-auto bg-pink-600 hover:bg-pink-500 text-white font-bold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-pink-900/50">
                    <i className="ph ph-heart text-2xl"></i> حجز زفاف جديد
                  </button>
                  <div className="relative w-full md:w-1/2 flex gap-2">
                    <div className="relative flex-1">
                      <i className="ph ph-magnifying-glass absolute right-4 top-4 text-slate-500 text-xl"></i>
                      <input type="text" placeholder="ابحث باسم العريس، العروسة، رقم الهاتف..." className="w-full p-3 pr-10 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none text-sm transition-colors" value={query} onChange={(e) => setQuery(e.target.value)} />
                    </div>
                    <input type="date" title="تصفية بيوم محدد" className="p-3 border border-slate-700 bg-slate-950 text-slate-300 rounded-xl focus:border-pink-500 outline-none text-sm transition-colors cursor-pointer" value={filterDate} onChange={(e) => setFilterDate(e.target.value)} />
                    {filterDate && (
                        <button onClick={() => setFilterDate('')} className="bg-slate-800 hover:bg-red-900/50 text-slate-400 hover:text-red-400 p-3 rounded-xl transition-colors" title="إلغاء الفلتر">
                            <i className="ph ph-x"></i>
                        </button>
                    )}
                  </div>
                </div>

                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                  <h2 className="text-xl font-bold mb-4 flex items-center justify-between text-slate-100 border-b border-slate-800 pb-4">
                    <div className="flex items-center gap-2">
                        <i className="ph ph-calendar-heart text-pink-400 text-2xl"></i> {isFiltering ? 'نتائج البحث والفلتر' : 'حجوزات الزفاف اليوم'}
                    </div>
                    <div className="flex flex-wrap items-center gap-2 justify-end">
                        <span className="bg-green-500/10 text-green-400 border border-green-500/30 px-3 sm:px-4 py-1.5 rounded-xl text-xs sm:text-sm font-black flex items-center gap-1.5 shadow-sm">
                            <i className="ph-fill ph-money text-base sm:text-lg"></i> المحصل: {formatCurrency(currentTotalCollected)}
                        </span>
                        <span className="bg-pink-500/10 text-pink-400 border border-pink-500/30 px-4 py-1.5 rounded-xl text-sm font-black flex items-center gap-2 shadow-sm">
                            <i className="ph-fill ph-chart-bar text-lg"></i> {filteredWeds.length} حجز
                        </span>
                    </div>
                  </h2>
                  <div className="space-y-4">
                    {filteredWeds.length === 0 ? <p className="text-center p-10 text-slate-500">لا توجد نتائج هنا.</p> : filteredWeds.map(txn => <TransactionCard key={txn.id} txn={txn} onDelete={handleDelete} onEdit={handleEdit} onPayRemaining={setPayModal} onViewReceipt={setReceiptImageModal} sendInvoice={() => openWhatsApp(txn.phone, generateWA_Message('invoice', txn, settings, true))} updateStatus={updateTxnStatus} onViewDetails={setTxnDetailsModal} settings={settings} allRecords={allRecords} />)}
                  </div>
                </div>

                {showAddModal && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-900 p-6 rounded-3xl shadow-2xl border border-slate-800 w-full max-w-5xl relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                      <button onClick={() => { setShowAddModal(false); setLoyaltyAlert(''); }} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-pink-400"><i className="ph ph-x text-xl"></i></button>
                      <h2 className="text-xl font-black mb-6 text-slate-100 border-b border-slate-800 pb-3 flex items-center gap-2"><i className="ph ph-heart text-pink-500"></i> {isEditing ? 'تعديل حجز الزفاف' : 'تفاصيل حجز زفاف جديد'}</h2>
                      <form onSubmit={handleSubmit} className="space-y-5">
                        
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <div className="flex justify-between items-center border-b border-slate-800 pb-2 mb-3">
                               <h4 className="text-sm font-bold text-pink-400">بيانات العرسان الأساسية</h4>
                               {loyaltyAlert && <span className="text-yellow-400 text-xs font-bold bg-yellow-950/40 px-3 py-1 rounded-lg border border-yellow-500/50 shadow-inner">{loyaltyAlert}</span>}
                           </div>
                           <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                              <input type="text" placeholder="اسم العريس (اختياري)" className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.groomName} onChange={e => setFormData({...formData, groomName: e.target.value})} />
                              <input type="text" placeholder="اسم العروسة (اختياري)" className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.brideName} onChange={e => setFormData({...formData, brideName: e.target.value})} />
                           </div>

                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">

                              <div>
                                 <label className="text-xs text-slate-500 mb-1 block">مكان التصوير (اللوكيشن / القاعة)</label>

                              <div>
                                 <label className="text-xs text-slate-500 mb-1 block">اسم خبيرة التجميل (الميك أب)</label>
                                 <input type="text" placeholder="الميك أب..." className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.makeupArtist} onChange={e => setFormData({...formData, makeupArtist: e.target.value})} />

                              </div>
                           </div>
                           <div>

                              <input type="date" className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.casualShootDate} onChange={e => setFormData({...formData, casualShootDate: e.target.value})} />
                           </div>
                        </div>

                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <h4 className="text-sm font-bold text-pink-400 mb-3 border-b border-slate-800 pb-2">اختيار الباقات الأساسية (يمكنك اختيار أكثر من باقة)</h4>
                           <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                              {settings.weddingPackages.map((pkg, idx) => {
                                 const isSelected = formData.packages.some(p => p.name === pkg.name);
                                 return (
                                     <div key={idx} onClick={() => handleSelectPackage(pkg)} className={`p-3 rounded-xl border cursor-pointer transition-all ${isSelected ? 'bg-pink-900/30 border-pink-500' : 'bg-slate-900 border-slate-700 hover:border-pink-500/50'}`}>
                                        <div className="font-bold text-sm text-slate-200 mb-1">{pkg.name}</div>
                                        <div className="text-xs text-slate-500 mb-2 h-8 overflow-hidden">{pkg.desc}</div>
                                        <div className="font-black text-pink-400 text-sm">{pkg.price} ج.م</div>
                                     </div>
                                 );
                              })}
                           </div>
                           {formData.packages.length > 0 && (
                               <div className="mt-4 space-y-2">
                                   {formData.packages.map((pkg, i) => (
                                       <div key={i} className="p-3 bg-slate-900 rounded-lg border border-slate-700 flex justify-between items-center">
                                          <span className="text-sm font-bold text-slate-300">الباقة المختارة: {pkg.name}</span>
                                          <div className="flex items-center bg-slate-950 rounded-md border border-slate-700 px-2 py-1">
                                             <span className="text-xs text-slate-500 ml-2">تعديل السعر:</span>
                                             <input type="number" value={pkg.price} onChange={e => handleUpdatePackagePrice(pkg.name, parseFloat(e.target.value) || 0)} className="w-16 bg-transparent text-white text-center outline-none text-sm font-bold" />
                                          </div>
                                       </div>
                                   ))}
                               </div>
                           )}
                        </div>

                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <h4 className="text-sm font-bold text-pink-400 mb-3 border-b border-slate-800 pb-2">صندوق إضافات أخرى (مثال: تصوير حنة)</h4>
                           
                           {settings.addonTemplates && settings.addonTemplates.length > 0 && (
                               <div className="flex flex-wrap gap-2 mb-3">
                                  {settings.addonTemplates.map((template, idx) => (
                                      <button key={`tpl-${idx}`} type="button" onClick={() => setNewAddon({ name: template.name, notes: template.desc || '', date: '', price: template.price || '' })} className="bg-slate-900 border border-pink-500/30 text-pink-300 hover:bg-pink-900/40 hover:border-pink-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-all shadow-sm">
                                          + {template.name} {template.price > 0 && `(${template.price} ج.م)`}

                                  ))}
                               </div>
                           )}

                           <div className="flex flex-col gap-2 mb-3">
                              <div className="flex flex-col sm:flex-row gap-2">
                                  <input type="text" placeholder="اسم الإضافة (حنة، كتب كتاب...)" value={newAddon.name} onChange={e=>setNewAddon({...newAddon, name: e.target.value})} className="flex-1 p-2.5 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" />
                                  <input type="date" value={newAddon.date} onChange={e=>setNewAddon({...newAddon, date: e.target.value})} className="w-full sm:w-36 p-2.5 border border-slate-700 bg-slate-900 text-slate-400 rounded-lg outline-none focus:border-pink-500 text-sm" />
                              </div>
                              <div className="flex flex-col sm:flex-row gap-2">
                                  <input type="text" placeholder="ملاحظات وتفاصيل الإضافة (اختياري)..." value={newAddon.notes} onChange={e=>setNewAddon({...newAddon, notes: e.target.value})} className="flex-1 p-2.5 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" />
                                  <input type="number" placeholder="السعر" value={newAddon.price} onChange={e=>setNewAddon({...newAddon, price: e.target.value})} className="w-full sm:w-28 p-2.5 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" />
                                  <button type="button" onClick={handleAddAddon} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2.5 rounded-lg transition-colors"><i className="ph ph-plus font-bold"></i></button>
                              </div>
                           </div>
                           <div className="space-y-2">
                              {formData.addons.map((addon, idx) => (
                                 <div key={idx} className="flex justify-between items-center bg-slate-900 p-2.5 rounded-lg border border-slate-700">
                                    <div className="flex flex-col gap-1">
                                        <div className="flex items-center gap-3 text-sm">

                                            {addon.date && <span className="text-xs text-slate-500">({formatDateOnly(addon.date)})</span>}

                                        {addon.notes && <span className="text-xs text-slate-400">{addon.notes}</span>}

                                        <span className="font-bold text-pink-400 text-sm">{addon.price} ج.م</span>
                                        <button type="button" onClick={()=>handleRemoveAddon(idx)} className="text-red-400 hover:text-red-300"><i className="ph ph-x"></i></button>
                                    </div>
                                 </div>
                              ))}
                           </div>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                          <input type="number" placeholder="الإجمالي" className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-pink-500 text-sm font-bold" value={formData.total} onChange={e => setFormData({...formData, total: e.target.value})} />
                          <input type="number" placeholder="المدفوع الان" className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-green-500 text-sm font-bold" value={formData.paid} onChange={e => setFormData({...formData, paid: e.target.value})} />
                          {!isEditing && (
                              <select className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-indigo-500 col-span-2 md:col-span-1 text-sm font-bold" value={formData.paymentMethod} onChange={e => setFormData({...formData, paymentMethod: e.target.value})}>
                                 <option value="cash">دفع نقدي</option>
                                 <option value="electronic">دفع إلكتروني (محافظ)</option>
                              </select>
                          )}
                        </div>
                        <div className={`p-3 rounded-xl text-center font-black text-lg border ${(parseFloat(formData.total)||0 - parseFloat(formData.paid)||0) > 0 ? 'bg-red-950/40 text-red-400 border-red-900/50' : 'bg-green-950/40 text-green-400 border-green-900/50'}`}>
                          الباقي: {formatCurrency((parseFloat(formData.total) || 0) - (parseFloat(formData.paid) || 0))}
                        </div>
                        <button type="submit" className="w-full bg-pink-600 text-white hover:bg-pink-500 font-black py-3 rounded-xl shadow-lg text-sm"><i className="ph ph-check-circle text-lg ml-2 align-middle"></i>حفظ بيانات الزفاف</button>
                      </form>
                    </div>
                  </div>
                )}

                <PaymentModal payModal={payModal} setPayModal={setPayModal} db={db} />
                <TxnDetailsModal txnDetailsModal={txnDetailsModal} setTxnDetailsModal={setTxnDetailsModal} setReceiptImageModal={setReceiptImageModal} db={db} allRecords={allRecords} />
              </div>
            );
        };

        const ExpensesTab = ({ settings, expenses, inventory, db }) => {
            const [expData, setExpData] = useState({ amount: '', category: settings.expenseCategories[0], notes: '' });
            
            const handleAddExpense = async (e) => {
              e.preventDefault();
              const newExp = { id: Date.now().toString(), date: new Date().toISOString(), amount: parseFloat(expData.amount), category: expData.category, notes: expData.notes, month: new Date().getMonth() + 1, year: new Date().getFullYear() };
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
              await setDoc(doc(db, `artifacts/${appId}/public/data/expenses`, newExp.id), newExp);
              setExpData({ amount: '', category: settings.expenseCategories[0], notes: '' });
            };

            const todaysExpenses = expenses.filter(e => new Date(e.date).toDateString() === new Date().toDateString());
            
            const inventoryItemsList = useMemo(() => {
               const basicItems = [{name: "ورق طباعة صور"}, {name: "أحبار طابعة"}];
               const prods = (settings.products || []).map(p => typeof p === 'string' ? {name: p} : p);
               return [...basicItems, ...prods];
            }, [settings.products]);

            const updateInventory = async (itemName, change) => {
               const newInv = { ...inventory, [itemName]: Math.max(0, (inventory[itemName] || 0) + change) };
               const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
               await setDoc(doc(db, `artifacts/${appId}/public/data/inventory`, 'main'), newInv);
            };

            return (
              <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
                <div className="xl:col-span-2 space-y-6">
                   <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                     <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-100 border-b border-slate-800 pb-4"><i className="ph ph-money text-red-400 text-2xl"></i> تسجيل مصروفات</h2>
                     <form onSubmit={handleAddExpense} className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                       <div>
                         <label className="block text-sm font-bold text-slate-400 mb-2">المبلغ (ج.م)</label>
                         <input type="number" required placeholder="المبلغ" value={expData.amount} onChange={e => setExpData({...expData, amount: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-red-500 font-bold" />
                       </div>
                       <div>
                         <label className="block text-sm font-bold text-slate-400 mb-2">بند المصروف</label>
                         <select value={expData.category} onChange={e => setExpData({...expData, category: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-red-500">
                           {settings.expenseCategories.map((cat, idx) => <option key={idx} value={cat}>{cat}</option>)}
                         </select>
                       </div>
                       <div>
                         <label className="block text-sm font-bold text-slate-400 mb-2">ملاحظات</label>
                         <input type="text" placeholder="اختياري..." value={expData.notes} onChange={e => setExpData({...expData, notes: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-red-500 placeholder-slate-500" />
                       </div>
                       <button type="submit" className="sm:col-span-3 w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-lg shadow-md transition-all flex items-center justify-center gap-2"><i className="ph ph-plus-circle text-xl"></i> إضافة المصروف</button>
                     </form>
                   </div>
                   <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                      <h2 className="text-xl font-bold mb-4 flex justify-between text-slate-100 border-b border-slate-800 pb-4">
                        <span>مصروفات اليوم</span>
                        <span className="text-red-400 text-sm bg-red-950/40 px-3 py-1 rounded border border-red-900/50">الإجمالي: {formatCurrency(todaysExpenses.reduce((s,e)=>s+e.amount,0))}</span>
                      </h2>
                      <div className="space-y-3">
                        {todaysExpenses.length === 0 ? <p className="text-slate-500 text-center p-6 bg-slate-950 rounded-xl border border-slate-800 border-dashed">لم يتم تسجيل مصروفات اليوم.</p> : todaysExpenses.map(exp => (
                          <div key={exp.id} className="flex justify-between items-center p-4 bg-slate-950 rounded-xl border border-slate-800">
                            <div>
                                <p className="font-bold text-slate-200">{exp.category} <span className="text-red-400 mr-2">{exp.amount} ج.م</span></p>
                                {exp.notes && <p className="text-xs text-slate-500 mt-1">{exp.notes}</p>}
                                <p className="text-xs text-slate-600 mt-2 font-mono">{formatDate(exp.date)}</p>
                            </div>
                            <button onClick={async () => {
                                const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                                await deleteDoc(doc(db, `artifacts/${appId}/public/data/expenses`, exp.id));
                            }} className="text-slate-500 hover:text-red-400 p-2"><i className="ph ph-trash text-xl"></i></button>
                          </div>
                        ))}
                      </div>
                    </div>
                </div>

                <div className="xl:col-span-1">
                   <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 sticky top-24">
                      <h2 className="text-xl font-bold mb-2 flex items-center gap-2 text-slate-100 border-b border-slate-800 pb-4">
                          <i className="ph ph-stack text-purple-400 text-2xl"></i> إدارة وإحصائيات المخزون
                      </h2>
                      <p className="text-xs text-slate-500 mb-5 leading-relaxed bg-slate-950 p-3 rounded-lg border border-slate-800">
                        يتم خصم البضاعة من المخزون <span className="font-bold text-purple-400">تلقائياً</span> بمجرد بيعها من واجهة الإضافة.
                      </p>
                      
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-1 2xl:grid-cols-2 gap-4 max-h-[65vh] overflow-y-auto custom-scrollbar pr-2 pb-2">
                         {inventoryItemsList.map((item, idx) => {
                            const isProduct = item.price !== undefined; 
                            const itemName = item.name;
                            const currentStock = inventory[itemName] !== undefined ? inventory[itemName] : (item.totalQty || 0);
                            const profit = ((item.price || 0) - (item.wholesalePrice || 0)) * currentStock;
                            
                            return (
                            <div key={idx} className="flex flex-col p-4 bg-slate-950 rounded-2xl border border-slate-800 hover:border-purple-500/50 transition-all shadow-md group">
                               <div className="text-center mb-4">
                                   <span className="font-bold text-slate-200 text-sm block truncate" title={itemName}>{itemName}</span>
                               </div>
                               
                               <div className="flex items-center justify-between bg-slate-900 p-1.5 rounded-xl border border-slate-700 shadow-inner mb-4">
                                  <button type="button" onClick={()=>updateInventory(itemName, -1)} className="text-red-400 hover:bg-slate-800 hover:text-red-300 w-8 h-8 rounded-lg flex items-center justify-center transition-colors"><i className="ph ph-minus text-base font-bold"></i></button>
                                  <span className="font-bold text-2xl text-white tracking-wider">{currentStock}</span>
                                  <button type="button" onClick={()=>updateInventory(itemName, 1)} className="text-green-400 hover:bg-slate-800 hover:text-green-300 w-8 h-8 rounded-lg flex items-center justify-center transition-colors"><i className="ph ph-plus text-base font-bold"></i></button>
                               </div>

                               {isProduct && (
                                  <div className="flex flex-col gap-2 text-[11px] sm:text-xs font-bold mt-auto bg-slate-900/50 p-3 rounded-xl border border-slate-800/50">
                                      <div className="flex justify-between items-center">
                                          <span className="text-slate-500">العدد الكلي:</span> <b className="text-blue-400 bg-blue-950/30 px-1.5 py-0.5 rounded">{item.totalQty || 0}</b>
                                      </div>
                                      <div className="flex justify-between items-center">
                                          <span className="text-slate-500">المباع:</span> <b className="text-orange-400 bg-orange-950/30 px-1.5 py-0.5 rounded">{(item.totalQty || 0) - currentStock}</b>
                                      </div>
                                      <div className="flex justify-between items-center">
                                          <span className="text-slate-500">سعر البيع:</span> <b className="text-purple-400">{item.price || 0} ج.م</b>
                                      </div>
                                      <div className="pt-2 mt-1 border-t border-slate-700/50 flex justify-between items-center">
                                          <span className="text-slate-400">أرباح المتبقي:</span>
                                          <b className="text-green-400 bg-green-950/30 px-2 py-1 rounded text-xs">{profit} ج.م</b>
                                      </div>
                                  </div>
                               )}
                            </div>
                         )})}
                      </div>
                   </div>
                </div>
              </div>
            );
        };

        const ReportsTab = ({ settings, transactions, weddings, expenses, setReceiptImageModal }) => {
            const currentMonth = new Date().getMonth() + 1;
            const currentYear = new Date().getFullYear();
            const [filter, setFilter] = useState({ month: currentMonth, year: currentYear });
            const [archiveQuery, setArchiveQuery] = useState('');
            const [electronicDetails, setElectronicDetails] = useState(null);
            
            const filteredTxns = transactions.filter(t => t.month == filter.month && t.year == filter.year);
            const filteredWeds = weddings.filter(t => t.month == filter.month && t.year == filter.year);
            const filteredExp = expenses.filter(e => e.month == filter.month && e.year == filter.year);
            
            const studioStats = useMemo(() => {
              const expected = filteredTxns.reduce((sum, t) => sum + t.total, 0);
              const collected = filteredTxns.reduce((sum, t) => sum + t.paid, 0);
              const electronic = filteredTxns.reduce((sum, t) => sum + (t.electronicPaid || 0), 0);
              return { expected, collected, cash: collected - electronic, electronic, debts: filteredTxns.reduce((sum, t) => sum + t.remaining, 0) };
            }, [filteredTxns]);

            const wedStats = useMemo(() => {
              const expected = filteredWeds.reduce((sum, t) => sum + t.total, 0);
              const collected = filteredWeds.reduce((sum, t) => sum + t.paid, 0);
              const electronic = filteredWeds.reduce((sum, t) => sum + (t.electronicPaid || 0), 0);
              return { expected, collected, cash: collected - electronic, electronic, debts: filteredWeds.reduce((sum, t) => sum + t.remaining, 0) };
            }, [filteredWeds]);

            const expensesTotal = useMemo(() => filteredExp.reduce((sum, e) => sum + e.amount, 0), [filteredExp]);
            const totalCollectedAll = studioStats.collected + wedStats.collected;
            const netProfit = totalCollectedAll - expensesTotal;

            // حسابات الأرشيف (الطلبات المسلمة)
            const completedTxns = filteredTxns.filter(t => t.status === 3);
            const completedWeds = filteredWeds.filter(t => t.status === 6);
            const allCompleted = useMemo(() => {
                return [...completedTxns, ...completedWeds].sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
            }, [completedTxns, completedWeds]);
            
            const closedRevenue = allCompleted.reduce((sum, t) => sum + (parseFloat(t.total) || 0), 0);
            
            const searchedArchive = allCompleted.filter(t => {
                const name = t.type === 'wedding' ? `${t.groomName || ''} ${t.brideName || ''}` : t.clientName;
                return (name || '').includes(archiveQuery) || (t.phone || '').includes(archiveQuery) || (t.receiptNo?.toString() || '').includes(archiveQuery);
            });

            return (
              <div className="space-y-4">
                <div className="bg-slate-900 p-4 sm:p-5 rounded-2xl shadow-sm border border-slate-800 flex flex-wrap gap-3 items-center justify-between">
                  <h2 className="text-lg sm:text-xl font-bold flex items-center gap-2 text-slate-100"><i className="ph ph-calendar-blank text-blue-400 text-xl sm:text-2xl"></i> تقارير شهرية شاملة ومفصلة</h2>
                  <div className="flex gap-2">
                    <select value={filter.month} onChange={e => setFilter({...filter, month: e.target.value})} className="py-1.5 px-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none text-sm font-bold">{Array.from({length: 12}, (_, i) => i + 1).map(m => <option key={m} value={m}>شهر {m}</option>)}</select>
                    <select value={filter.year} onChange={e => setFilter({...filter, year: e.target.value})} className="py-1.5 px-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none text-sm font-bold">{[currentYear-1, currentYear, currentYear+1].map(y => <option key={y} value={y}>{y}</option>)}</select>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                  <StatCard title="التحصيل العام (استوديو + زفاف)" value={totalCollectedAll} color="blue" highlight />
                  <StatCard title="إجمالي المصروفات" value={expensesTotal} color="red" highlight />
                  <StatCard title="صافي الربح الفعلي" value={netProfit} color={netProfit >= 0 ? "emerald" : "rose"} highlight />
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                  <div className="bg-slate-900 p-4 sm:p-5 rounded-2xl shadow-sm border border-slate-800 flex flex-col">
                    <h3 className="text-base sm:text-lg font-bold text-blue-400 mb-3 border-b border-slate-800 pb-2 flex items-center gap-2"><i className="ph ph-camera text-lg"></i> تقرير الاستوديو (تصوير عادي)</h3>
                    <div className="grid grid-cols-2 gap-2 mb-4">
                      <StatCard title="إجمالي الشغل" value={studioStats.expected} color="blue" />
                      <StatCard title="التحصيل الفعلي" value={studioStats.collected} color="green" />
                      <StatCard title="محصل نقدي" value={studioStats.cash} color="green" />
                      <StatCard title="محصل إلكتروني 👆" value={studioStats.electronic} color="indigo" onClick={() => setElectronicDetails({ title: 'الدفع الإلكتروني (استوديو)', data: filteredTxns.filter(t => (t.electronicPaid || 0) > 0) })} />
                    </div>
                    
                    <div className="mt-auto">
                        <h4 className="font-bold text-red-400 text-sm mb-2 flex items-center justify-between bg-red-950/20 p-2.5 rounded-lg border border-red-900/30">
                            <span>ديون الاستوديو المتأخرة</span>
                            <span className="text-sm font-black">{formatCurrency(studioStats.debts)}</span>
                        </h4>
                        <div className="space-y-2 max-h-56 overflow-y-auto custom-scrollbar pr-1">
                          {filteredTxns.filter(t => t.remaining > 0).map(txn => (
                            <div key={txn.id} className="flex flex-col sm:flex-row justify-between items-start sm:items-center p-2.5 bg-slate-950 rounded-xl border border-slate-800 gap-2">
                              <div>
                                  <span className="font-bold text-slate-200 text-sm">{txn.clientName}</span>
                                  <div className="text-[11px] text-slate-500 mt-0.5 font-mono">📞 {txn.phone} | #{txn.receiptNo}</div>
                              </div>
                              <div className="flex items-center gap-1.5 w-full sm:w-auto">
                                <span className="text-red-400 font-bold text-xs ml-auto sm:ml-2">{txn.remaining} ج.م</span>
                                <button onClick={() => openWhatsApp(txn.phone, `مرحباً أ. ${txn.clientName} 🌟\nتذكير بمبلغ متبقي لحسابكم في ${settings.studioName} بقيمة ${txn.remaining} ج.م.\nيمكن التحويل فودافون كاش أو إنستاباي على رقم: 01126810107`)} className="bg-green-600 hover:bg-green-500 text-white p-1.5 rounded-lg text-sm transition-colors" title="إرسال تذكير عبر الواتس"><i className="ph ph-whatsapp-logo text-base"></i></button>
                              </div>
                            </div>
                          ))}
                          {filteredTxns.filter(t => t.remaining > 0).length === 0 && <p className="text-slate-500 text-xs text-center py-3 bg-slate-950 rounded-xl border border-slate-800 border-dashed">لا توجد ديون للاستوديو مسجلة.</p>}
                        </div>
                    </div>
                  </div>

                  <div className="bg-slate-900 p-4 sm:p-5 rounded-2xl shadow-sm border border-slate-800 flex flex-col">
                    <h3 className="text-base sm:text-lg font-bold text-pink-400 mb-3 border-b border-slate-800 pb-2 flex items-center gap-2"><i className="ph ph-heart text-lg"></i> تقرير حجوزات الزفاف</h3>
                    <div className="grid grid-cols-2 gap-2 mb-4">
                      <StatCard title="إجمالي الحجوزات" value={wedStats.expected} color="blue" />
                      <StatCard title="العربون المحصل" value={wedStats.collected} color="green" />
                      <StatCard title="محصل نقدي" value={wedStats.cash} color="green" />
                      <StatCard title="محصل إلكتروني 👆" value={wedStats.electronic} color="indigo" onClick={() => setElectronicDetails({ title: 'الدفع الإلكتروني (زفاف)', data: filteredWeds.filter(t => (t.electronicPaid || 0) > 0) })} />
                    </div>
                    
                    <div className="mt-auto">
                        <h4 className="font-bold text-red-400 text-sm mb-2 flex items-center justify-between bg-red-950/20 p-2.5 rounded-lg border border-red-900/30">
                            <span>بواقي الزفاف المتأخرة</span>
                            <span className="text-sm font-black">{formatCurrency(wedStats.debts)}</span>
                        </h4>
                        <div className="space-y-2 max-h-56 overflow-y-auto custom-scrollbar pr-1">
                          {filteredWeds.filter(t => t.remaining > 0).map(txn => (
                            <div key={txn.id} className="flex flex-col sm:flex-row justify-between items-start sm:items-center p-2.5 bg-slate-950 rounded-xl border border-slate-800 gap-2">
                              <div>
                                  <span className="font-bold text-pink-300 text-sm">{txn.groomName} و {txn.brideName}</span>
                                  <div className="text-[11px] text-slate-500 mt-0.5 font-mono">📞 {txn.phone} | #{txn.receiptNo}</div>
                              </div>
                              <div className="flex items-center gap-1.5 w-full sm:w-auto">
                                <span className="text-red-400 font-bold text-xs ml-auto sm:ml-2">{txn.remaining} ج.م</span>
                                <button onClick={() => openWhatsApp(txn.phone, `مرحباً العريس ${txn.groomName} 🌟\nتذكير بمبلغ متبقي لحجز الزفاف في ${settings.studioName} بقيمة ${txn.remaining} ج.م.\nيمكن التحويل فودافون كاش أو إنستاباي على رقم: 01126810107`)} className="bg-green-600 hover:bg-green-500 text-white p-1.5 rounded-lg text-sm transition-colors" title="إرسال تذكير عبر الواتس"><i className="ph ph-whatsapp-logo text-base"></i></button>
                              </div>
                            </div>
                          ))}
                          {filteredWeds.filter(t => t.remaining > 0).length === 0 && <p className="text-slate-500 text-xs text-center py-3 bg-slate-950 rounded-xl border border-slate-800 border-dashed">لا توجد بواقي زفاف مستحقة.</p>}
                        </div>
                    </div>
                  </div>
                </div>

                {/* قسم أرشيف الإنجازات والعملاء المستلمين */}
                <div className="bg-slate-900 p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-800 flex flex-col mt-4">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-800 pb-4 mb-4 gap-4">
                        <div>
                            <h3 className="text-lg sm:text-xl font-bold text-yellow-400 flex items-center gap-2">
                                <i className="ph-fill ph-archive-box text-2xl"></i> أرشيف العملاء (إعادة الاستهداف والتقييم)
                            </h3>
                            <p className="text-xs text-slate-400 mt-1">قائمة بالعملاء الذين استلموا أعمالهم، لطلب التقييم أو إرسال عروض ترويجية.</p>
                        </div>
                        <div className="bg-yellow-500/10 border border-yellow-500/30 px-4 py-2 rounded-xl text-yellow-400 flex flex-col items-center">
                            <span className="text-[10px] uppercase font-bold tracking-wider">أرباح الصفقات المغلقة</span>
                            <span className="text-lg font-black">{formatCurrency(closedRevenue)}</span>
                        </div>
                    </div>

                    <div className="relative w-full mb-4">
                        <i className="ph ph-magnifying-glass absolute right-4 top-3.5 text-slate-500 text-lg"></i>
                        <input 
                            type="text" 
                            placeholder="ابحث في الأرشيف بالاسم، رقم الهاتف، أو رقم الإيصال..." 
                            className="w-full p-3 pr-11 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none text-sm transition-colors" 
                            value={archiveQuery} 
                            onChange={(e) => setArchiveQuery(e.target.value)} 
                        />
                    </div>

                    <div className="space-y-3 max-h-[400px] overflow-y-auto custom-scrollbar pr-1">
                        {searchedArchive.length === 0 ? (
                            <p className="text-center text-slate-500 py-10 bg-slate-950 rounded-xl border border-slate-800 border-dashed">لا يوجد عملاء استلموا أعمالهم في هذا الشهر.</p>
                        ) : (
                            searchedArchive.map(txn => {
                                const isWed = txn.type === 'wedding';
                                const name = isWed ? `${txn.groomName || ''} و ${txn.brideName || ''}`.trim() : txn.clientName;
                                return (
                                    <div key={txn.id} className="flex flex-col lg:flex-row justify-between items-start lg:items-center p-4 bg-slate-950 rounded-xl border border-slate-800 gap-4 hover:border-yellow-500/30 transition-all">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2 mb-1">
                                                <i className={`text-lg ${isWed ? 'ph-fill ph-heart text-pink-500' : 'ph-fill ph-camera text-blue-500'}`}></i>
                                                <span className="font-bold text-slate-200 text-base">{name || 'بدون اسم'}</span>
                                                <span className="bg-slate-800 text-slate-400 text-[10px] px-2 py-0.5 rounded font-mono">#{txn.receiptNo}</span>
                                            </div>
                                            <div className="text-xs text-slate-500 font-mono mt-1">📞 {txn.phone} | 📅 {formatDateOnly(txn.dateTime)} | 💰 {txn.total} ج.م</div>
                                            
                                            {txn.confirmedReceipts && txn.confirmedReceipts.length > 0 && (
                                                <div className="flex items-center gap-2 mt-3">
                                                    <span className="text-xs text-slate-500"><i className="ph ph-check-circle text-green-500"></i> إيصالات السداد:</span>
                                                    {txn.confirmedReceipts.map((imgUrl, idx) => (
                                                        <img key={idx} src={imgUrl} alt="إيصال" className="w-8 h-8 object-cover rounded border border-slate-700 cursor-pointer hover:opacity-80 transition-all" onClick={() => setReceiptImageModal(imgUrl)} title="تكبير الإيصال" />
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        
                                        <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 w-full lg:w-auto shrink-0">
                                            {/* Rating Section */}
                                            {txn.clientRating > 0 ? (
                                                <div className="bg-yellow-950/30 border border-yellow-900/50 px-3 py-2 rounded-lg flex items-center gap-1 min-w-[120px] justify-center" title={txn.clientFeedback || 'بدون تعليق'}>
                                                    <span className="text-yellow-500 font-black text-sm">{txn.clientRating}</span>
                                                    <i className="ph-fill ph-star text-yellow-500 text-sm"></i>
                                                </div>
                                            ) : (
                                                <button 
                                                    onClick={() => {
                                                        const typeParam = isWed ? 'w' : 't';
                                                        const trackUrl = window.location.href.split('?')[0] + `?phone=${encodeURIComponent(txn.phone)}&receipt=${encodeURIComponent(txn.receiptNo)}&type=${typeParam}`;
                                                        const msg = `أهلاً بك أ. ${name || ''} 🌟\nبما إنك استلمت شغلك من ${settings.studioName}، يهمنا جداً نعرف رأيك وتقييمك للتجربة عبر هذا الرابط:\n${trackUrl}`;
                                                        openWhatsApp(txn.phone, msg);
                                                    }}
                                                    className="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 px-3 py-2 rounded-lg text-xs font-bold transition-all flex items-center justify-center gap-1.5"
                                                >
                                                    <i className="ph ph-star text-base"></i> طلب تقييم
                                                </button>
                                            )}

                                            {/* Re-targeting Section */}
                                            <button 
                                                onClick={() => {
                                                    const msg = `أهلاً أ. ${name || ''}، نتمنى تكون الصور عجبتكم! 🌟\nبمناسبة مرور فترة على تصويركم في ${settings.studioName}، بنقدملك خصم 15% لو حابب تطبع الصور على تابلوه خشب أو تعمل ألبوم ميني لحفظ ذكرياتك. للطلب استفسر مننا هنا! 🎁`;
                                                    openWhatsApp(txn.phone, msg);
                                                }}
                                                className="bg-gradient-to-l from-green-600 to-emerald-500 hover:from-green-500 hover:to-emerald-400 text-white px-3 py-2 rounded-lg text-xs font-bold transition-all shadow-md flex items-center justify-center gap-1.5"
                                            >
                                                <i className="ph-fill ph-whatsapp-logo text-base"></i> عرض إعادة استهداف
                                            </button>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>
                </div>

                {electronicDetails && (
                    <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setElectronicDetails(null)}>
                        <div className="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 w-full max-w-lg relative max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>
                            <button onClick={() => setElectronicDetails(null)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400 transition-colors z-10"><i className="ph ph-x text-2xl"></i></button>
                            
                            <h3 className="text-xl font-black mb-4 border-b border-slate-800 pb-4 text-indigo-400 flex items-center gap-2 shrink-0">
                                <i className="ph-fill ph-wallet text-2xl"></i> {electronicDetails.title}
                            </h3>
                            
                            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-3">
                                {electronicDetails.data.length === 0 ? (
                                    <p className="text-slate-500 text-center py-6 bg-slate-950 rounded-xl border border-slate-800 border-dashed">لا توجد عمليات دفع إلكتروني في هذه الفترة.</p>
                                ) : (
                                    electronicDetails.data.map(txn => {
                                        const isWed = txn.type === 'wedding';
                                        const name = isWed ? `${txn.groomName || ''} و ${txn.brideName || ''}`.trim() : txn.clientName;
                                        return (
                                            <div key={txn.id} className="bg-slate-950 p-4 rounded-xl border border-indigo-500/20 flex flex-col gap-3 hover:border-indigo-500/50 transition-colors">
                                                <div className="flex justify-between items-center">
                                                    <div>
                                                        <div className="font-bold text-slate-200 flex items-center gap-2">
                                                            <i className={`text-lg ${isWed ? 'ph-fill ph-heart text-pink-500' : 'ph-fill ph-camera text-blue-500'}`}></i>
                                                            {name || 'بدون اسم'}
                                                        </div>
                                                        <div className="text-xs text-slate-500 font-mono mt-1">📞 {txn.phone} | #{txn.receiptNo}</div>
                                                        <div className="text-[10px] text-slate-400 mt-1">📅 {formatDateOnly(txn.dateTime)}</div>
                                                    </div>
                                                    <div className="flex items-center gap-3">
                                                        {txn.confirmedReceipts && txn.confirmedReceipts.length > 0 && (
                                                            <div className="flex gap-1.5">
                                                                {txn.confirmedReceipts.map((imgUrl, idx) => (
                                                                    <img key={idx} src={imgUrl} alt="إيصال مؤكد" className="w-10 h-10 object-cover rounded-lg border border-indigo-500/30 cursor-pointer hover:opacity-80 transition-all shadow-sm" onClick={(e) => { e.stopPropagation(); setReceiptImageModal(imgUrl); }} title="اضغط لتكبير صورة الإيصال" />
                                                                ))}
                                                            </div>
                                                        )}
                                                        <div className="text-left bg-indigo-950/40 border border-indigo-900/50 px-3 py-1.5 rounded-lg shrink-0">
                                                            <span className="text-indigo-400 font-black">{txn.electronicPaid} ج.م</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        </div>
                    </div>
                )}
              </div>
            );
        };

        const SettingsTab = ({ settings, setSettings, inventory, updateInventoryExact, saveSettingsToDB }) => {
            const [isSaving, setIsSaving] = useState(false);
            const handleAddList = (key, val) => { if(!val) return; setSettings({...settings, [key]: [...settings[key], val]}); };
            const handleRemoveList = (key, idx) => { const newList = [...settings[key]]; newList.splice(idx, 1); setSettings({...settings, [key]: newList}); };
            
            const handleSaveClick = async () => {
                setIsSaving(true);
                await saveSettingsToDB(settings);
                setTimeout(() => setIsSaving(false), 1000);
            };

            return (
              <div className="space-y-8 pb-20">
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 border-b border-slate-800 pb-4 text-slate-100"><i className="ph ph-image text-purple-400"></i> هوية الاستوديو</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                      <label className="block font-bold text-sm text-slate-400 mb-2">اسم الاستوديو:</label>
                      <input type="text" value={settings.studioName} onChange={e => setSettings({...settings, studioName: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg focus:border-purple-500 outline-none" />
                    </div>
                    <div>
                      <label className="block font-bold text-sm text-slate-400 mb-2">الشعار (Logo):</label>
                      <input type="file" accept="image/*" onChange={e => {
                        const file = e.target.files[0];
                        if (file) {
                          const reader = new FileReader();
                          reader.onloadend = () => setSettings({...settings, studioLogo: reader.result});
                          reader.readAsDataURL(file);
                        }
                      }} className="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-slate-800 file:text-purple-400 hover:file:bg-slate-700 transition-colors" />
                    </div>
                    <div className="md:col-span-2">
                      <label className="block font-bold text-sm text-slate-400 mb-2">كلمة المرور للنظام (الإدارة):</label>
                      <div className="relative max-w-sm">
                          <input type="text" value={settings.adminPassword || ''} onChange={e => setSettings({...settings, adminPassword: e.target.value})} className="w-full p-3 pr-10 border border-slate-700 bg-slate-950 text-white rounded-lg focus:border-purple-500 outline-none font-mono tracking-wider" placeholder="مثال: 1234" />
                          <i className="ph ph-lock-key absolute right-3 top-3.5 text-slate-500 text-lg"></i>
                      </div>
                      <p className="text-xs text-slate-500 mt-2">سيتم طلب كلمة المرور هذه عند فتح لوحة التحكم.</p>
                    </div>
                  </div>
                </div>
                
                <div className="grid grid-cols-1 gap-6">
                   <ServicesSettingsList title="قوالب خدمات التصوير" items={settings.services || []} onAdd={v => handleAddList('services', v)} onRemove={i => handleRemoveList('services', i)} colorTheme="blue" />
                   
                   <ProductsSettingsList 
                       title="قوالب البضاعة والمنتجات" 
                       items={settings.products || []} 
                       inventory={inventory}
                       onAdd={v => handleAddList('products', v)} 
                       onRemove={i => handleRemoveList('products', i)} 
                       updateInventoryExact={updateInventoryExact}
                   />
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                   <ServicesSettingsList title="باقات الزفاف الأساسية" items={settings.weddingPackages || []} onAdd={v => handleAddList('weddingPackages', v)} onRemove={i => handleRemoveList('weddingPackages', i)} colorTheme="pink" />
