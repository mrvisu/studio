                    addons: [...prev.addons, { ...newAddon, price }],
                    total: (parseFloat(prev.total) || 0) + price
                }));
                setNewAddon({ name: '', notes: '', date: '', price: '' });
            };

            const handleRemoveAddon = (index) => {
                const addon = formData.addons[index];
                const newAddons = [...formData.addons];
                newAddons.splice(index, 1);
                setFormData(prev => ({
                    ...prev,
                    addons: newAddons,
                    total: Math.max(0, (parseFloat(prev.total) || 0) - addon.price)
                }));
            };

            const handleSelectPackage = (pkg) => {
                setFormData(prev => {
                    const exists = prev.packages.find(p => p.name === pkg.name);
                    let newPkgs, priceDiff;
                    if (exists) {
                        newPkgs = prev.packages.filter(p => p.name !== pkg.name);
                        priceDiff = -exists.price;
                    } else {
                        newPkgs = [...prev.packages, { ...pkg }];
                        priceDiff = pkg.price;
                    }
                    return {
                        ...prev,
                        packages: newPkgs,
                        total: Math.max(0, (parseFloat(prev.total) || 0) + priceDiff)
                    };
                });
            };

            const handleUpdatePackagePrice = (pkgName, newPrice) => {
                 setFormData(prev => {
                     let diff = 0;
                     const newPkgs = prev.packages.map(p => {
                         if (p.name === pkgName) {
                             diff = newPrice - p.price;
                             return { ...p, price: newPrice };
                         }
                         return p;
                     });
                     return {
                         ...prev,
                         packages: newPkgs,
                         total: Math.max(0, (parseFloat(prev.total) || 0) + diff)
                     };
                 });
            };

            const handleEdit = (txn) => {
                setFormData({
                    id: txn.id,
                    receiptNo: txn.receiptNo,
                    dateTime: txn.dateTime,
                    month: txn.month,
                    year: txn.year,
                    status: txn.status,
                    groomName: txn.groomName || '',
                    brideName: txn.brideName || '',
                    phone: txn.phone || '',
                    groomAddress: txn.groomAddress || '',
                    weddingDate: txn.weddingDate || '',
                    location: txn.location || '',
                    makeupArtist: txn.makeupArtist || '',
                    leaveTime: txn.leaveTime || '',
                    sessionType: txn.sessionType || '',
                    casualShootDate: txn.casualShootDate || '',
                    packages: txn.packages || (txn.package ? [txn.package] : []),
                    addons: txn.addons || [],
                    total: txn.total || '',
                    paid: txn.paid || '',
                    electronicPaid: txn.electronicPaid || 0,
                    paymentMethod: txn.electronicPaid > 0 ? 'electronic' : 'cash'
                });
                setIsEditing(true);
                setShowAddModal(true);
            };

            const handleSubmit = async (e) => {
              e.preventDefault();
              const total = parseFloat(formData.total) || 0;
              const paid = parseFloat(formData.paid) || 0;
              const newWedding = {
                id: isEditing ? formData.id : Date.now().toString(),
                receiptNo: isEditing ? formData.receiptNo : (settings.nextReceiptNo || 1000),
                type: 'wedding',
                dateTime: isEditing ? formData.dateTime : new Date().toISOString(),
                groomName: formData.groomName,
                brideName: formData.brideName,
                phone: formData.phone,
                groomAddress: formData.groomAddress,
                weddingDate: formData.weddingDate,
                location: formData.location,
                makeupArtist: formData.makeupArtist,
                leaveTime: formData.leaveTime,
                sessionType: formData.sessionType,
                casualShootDate: formData.casualShootDate,
                packages: formData.packages,
                addons: formData.addons,
                total: total,
                paid: paid,
                electronicPaid: isEditing ? formData.electronicPaid : (formData.paymentMethod === 'electronic' ? paid : 0),
                remaining: total - paid,
                status: isEditing ? formData.status : 0,
                month: isEditing ? formData.month : new Date().getMonth() + 1,
                year: isEditing ? formData.year : new Date().getFullYear()
              };
              
              const appId = 'studio-marakby';
              await setDoc(doc(db, `artifacts/${appId}/public/data/weddings`, newWedding.id), newWedding);
              
              if(!isEditing) setSettings({...settings, nextReceiptNo: (settings.nextReceiptNo || 1000) + 1});
              setFormData({ groomName:'', brideName:'', phone:'', groomAddress:'', weddingDate:'', location:'', makeupArtist:'', leaveTime:'', sessionType:'', casualShootDate:'', packages:[], addons:[], total:'', paid:'', paymentMethod:'cash' });
              setIsEditing(false);
              setShowAddModal(false);
            };

            const handleDelete = async (id) => {
              if(window.confirm('هل أنت متأكد من حذف هذا الحجز؟')) await deleteDoc(doc(db, `artifacts/studio-marakby/public/data/weddings`, id));
            };

            const updateTxnStatus = async (txnId, newStatus) => {
                const txnToUpdate = weddings.find(t => t.id === txnId);
                if(txnToUpdate) {
                    const updated = {...txnToUpdate, status: newStatus};
                    await setDoc(doc(db, `artifacts/studio-marakby/public/data/weddings`, updated.id), updated);
                }
            };

            const filteredWeds = query ? weddings.filter(t => t.groomName.includes(query) || t.brideName.includes(query) || t.phone.includes(query) || t.receiptNo.toString().includes(query)) : weddings;

            return (
              <div className="space-y-6">
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 flex flex-col md:flex-row gap-4 items-center justify-between">
                  <button onClick={() => { setIsEditing(false); setFormData({ groomName:'', brideName:'', phone:'', groomAddress:'', weddingDate:'', location:'', makeupArtist:'', leaveTime:'', sessionType:'', casualShootDate:'', packages:[], addons:[], total:'', paid:'', paymentMethod:'cash' }); setShowAddModal(true); }} className="w-full md:w-auto bg-pink-600 hover:bg-pink-500 text-white font-bold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-pink-900/50">
                    <i className="ph ph-heart text-2xl"></i> حجز زفاف جديد
                  </button>
                  <div className="relative w-full md:w-1/2">
                    <i className="ph ph-magnifying-glass absolute right-4 top-4 text-slate-500 text-xl"></i>
                    <input type="text" placeholder="ابحث باسم العريس، العروسة، رقم الهاتف..." className="w-full p-3 pr-10 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none text-sm transition-colors" value={query} onChange={(e) => setQuery(e.target.value)} />
                  </div>
                </div>

                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-100 border-b border-slate-800 pb-4">
                    <i className="ph ph-calendar-heart text-pink-400 text-2xl"></i> حجوزات الزفاف ({filteredWeds.length})
                  </h2>
                  <div className="space-y-4">
                    {filteredWeds.length === 0 ? <p className="text-center p-10 text-slate-500">لا توجد حجوزات مسجلة.</p> : filteredWeds.map(txn => <TransactionCard key={txn.id} txn={txn} onDelete={handleDelete} onEdit={handleEdit} onPayRemaining={setPayModal} onViewReceipt={setReceiptImageModal} sendInvoice={() => openWhatsApp(txn.phone, generateWA_Message('invoice', txn, true))} updateStatus={updateTxnStatus} onViewDetails={setTxnDetailsModal} />)}
                  </div>
                </div>

                {showAddModal && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-900 p-6 rounded-3xl shadow-2xl border border-slate-800 w-full max-w-5xl relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                      <button onClick={() => setShowAddModal(false)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-pink-400"><i className="ph ph-x text-xl"></i></button>
                      <h2 className="text-xl font-black mb-6 text-slate-100 border-b border-slate-800 pb-3 flex items-center gap-2"><i className="ph ph-heart text-pink-500"></i> {isEditing ? 'تعديل حجز الزفاف' : 'تفاصيل حجز زفاف جديد'}</h2>
                      <form onSubmit={handleSubmit} className="space-y-5">
                        
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <h4 className="text-sm font-bold text-pink-400 mb-3 border-b border-slate-800 pb-2">بيانات العرسان الأساسية</h4>
                           <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                              <input type="text" placeholder="اسم العريس (اختياري)" className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.groomName} onChange={e => setFormData({...formData, groomName: e.target.value})} />
                              <input type="text" placeholder="اسم العروسة (اختياري)" className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.brideName} onChange={e => setFormData({...formData, brideName: e.target.value})} />
                           </div>
                           <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                              <input type="tel" placeholder="رقم الهاتف (واتساب للتواصل)" className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                              <input type="text" placeholder="عنوان العريس (اختياري)" className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.groomAddress} onChange={e => setFormData({...formData, groomAddress: e.target.value})} />
                           </div>
                        </div>

                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <h4 className="text-sm font-bold text-pink-400 mb-3 border-b border-slate-800 pb-2">تفاصيل ومواعيد الزفاف</h4>
                           <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                              <div>
                                 <label className="text-xs text-slate-500 mb-1 block">موعد الزفاف (اختياري)</label>
                                 <input type="date" className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.weddingDate} onChange={e => setFormData({...formData, weddingDate: e.target.value})} />
                              </div>
                              <div>
                                 <label className="text-xs text-slate-500 mb-1 block">مكان التصوير (اللوكيشن / القاعة)</label>
                                 <input type="text" placeholder="اسم اللوكيشن..." className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} />
                              </div>
                           </div>
                           <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
                              <div>
                                 <label className="text-xs text-slate-500 mb-1 block">اسم خبيرة التجميل (الميك أب)</label>
                                 <input type="text" placeholder="الميك أب..." className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.makeupArtist} onChange={e => setFormData({...formData, makeupArtist: e.target.value})} />
                              </div>
                              <div>
                                 <label className="text-xs text-slate-500 mb-1 block">وقت الخروج المتوقع</label>
                                 <input type="time" className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.leaveTime} onChange={e => setFormData({...formData, leaveTime: e.target.value})} />
                              </div>
                              <div>
                                 <label className="text-xs text-slate-500 mb-1 block">نوع السيشن</label>
                                 <input type="text" placeholder="مثال: فري ستايل، كلاسيك..." className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.sessionType} onChange={e => setFormData({...formData, sessionType: e.target.value})} />
                              </div>
                           </div>
                           <div>
                              <label className="text-xs text-slate-500 mb-1 block">تاريخ تصوير الكاجوال (إن وجد)</label>
                              <input type="date" className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.casualShootDate} onChange={e => setFormData({...formData, casualShootDate: e.target.value})} />
                           </div>
                        </div>

                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <h4 className="text-sm font-bold text-pink-400 mb-3 border-b border-slate-800 pb-2">اختيار الباقات الأساسية (يمكنك اختيار أكثر من باقة)</h4>
                           <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                              {settings.weddingPackages.map((pkg, idx) => {
                                 const isSelected = formData.packages.some(p => p.name === pkg.name);
                                 return (
                                     <div key={idx} onClick={() => handleSelectPackage(pkg)} className={`p-3 rounded-xl border cursor-pointer transition-all ${isSelected ? 'bg-pink-900/30 border-pink-500' : 'bg-slate-900 border-slate-700 hover:border-pink-500/50'}`}>
                                        <div className="font-bold text-sm text-slate-200 mb-1">{pkg.name}</div>
                                        <div className="text-xs text-slate-500 mb-2 h-8 overflow-hidden">{pkg.desc}</div>
                                        <div className="font-black text-pink-400 text-sm">{pkg.price} ج.م</div>
                                     </div>
                                 );
                              })}
                           </div>
                           {formData.packages.length > 0 && (
                               <div className="mt-4 space-y-2">
                                   {formData.packages.map((pkg, i) => (
                                       <div key={i} className="p-3 bg-slate-900 rounded-lg border border-slate-700 flex justify-between items-center">
                                          <span className="text-sm font-bold text-slate-300">الباقة المختارة: {pkg.name}</span>
                                          <div className="flex items-center bg-slate-950 rounded-md border border-slate-700 px-2 py-1">
                                             <span className="text-xs text-slate-500 ml-2">تعديل السعر:</span>
                                             <input type="number" value={pkg.price} onChange={e => handleUpdatePackagePrice(pkg.name, parseFloat(e.target.value) || 0)} className="w-16 bg-transparent text-white text-center outline-none text-sm font-bold" />
                                          </div>
                                       </div>
                                   ))}
                               </div>
                           )}
                        </div>

                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <h4 className="text-sm font-bold text-pink-400 mb-3 border-b border-slate-800 pb-2">صندوق إضافات أخرى (مثال: تصوير حنة)</h4>
                           <div className="flex flex-col gap-2 mb-3">
                              <div className="flex flex-col sm:flex-row gap-2">
                                  <input type="text" placeholder="اسم الإضافة (حنة، كتب كتاب...)" value={newAddon.name} onChange={e=>setNewAddon({...newAddon, name: e.target.value})} className="flex-1 p-2.5 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" />
                                  <input type="date" value={newAddon.date} onChange={e=>setNewAddon({...newAddon, date: e.target.value})} className="w-full sm:w-36 p-2.5 border border-slate-700 bg-slate-900 text-slate-400 rounded-lg outline-none focus:border-pink-500 text-sm" />
                              </div>
                              <div className="flex flex-col sm:flex-row gap-2">
                                  <input type="text" placeholder="ملاحظات وتفاصيل الإضافة (اختياري)..." value={newAddon.notes} onChange={e=>setNewAddon({...newAddon, notes: e.target.value})} className="flex-1 p-2.5 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" />
                                  <input type="number" placeholder="السعر" value={newAddon.price} onChange={e=>setNewAddon({...newAddon, price: e.target.value})} className="w-full sm:w-28 p-2.5 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" />
                                  <button type="button" onClick={handleAddAddon} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2.5 rounded-lg transition-colors"><i className="ph ph-plus font-bold"></i></button>
                              </div>
                           </div>
                           <div className="space-y-2">
                              {formData.addons.map((addon, idx) => (
                                 <div key={idx} className="flex justify-between items-center bg-slate-900 p-2.5 rounded-lg border border-slate-700">
                                    <div className="flex flex-col gap-1">
                                        <div className="flex items-center gap-3 text-sm">
                                            <span className="font-bold text-slate-200">{addon.name}</span>
                                            {addon.date && <span className="text-xs text-slate-500">({formatDateOnly(addon.date)})</span>}
                                        </div>
                                        {addon.notes && <span className="text-xs text-slate-400">{addon.notes}</span>}
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className="font-bold text-pink-400 text-sm">{addon.price} ج.م</span>
                                        <button type="button" onClick={()=>handleRemoveAddon(idx)} className="text-red-400 hover:text-red-300"><i className="ph ph-x"></i></button>
                                    </div>
                                 </div>
                              ))}
                           </div>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                          <input type="number" placeholder="الإجمالي" className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-pink-500 text-sm font-bold" value={formData.total} onChange={e => setFormData({...formData, total: e.target.value})} />
                          <input type="number" placeholder="المدفوع الان" className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-green-500 text-sm font-bold" value={formData.paid} onChange={e => setFormData({...formData, paid: e.target.value})} />
                          {!isEditing && (
                              <select className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-indigo-500 col-span-2 md:col-span-1 text-sm font-bold" value={formData.paymentMethod} onChange={e => setFormData({...formData, paymentMethod: e.target.value})}>
                                 <option value="cash">دفع نقدي</option>
                                 <option value="electronic">دفع إلكتروني (محافظ)</option>
                              </select>
                          )}
                        </div>
                        <div className={`p-3 rounded-xl text-center font-black text-lg border ${(parseFloat(formData.total)||0 - parseFloat(formData.paid)||0) > 0 ? 'bg-red-950/40 text-red-400 border-red-900/50' : 'bg-green-950/40 text-green-400 border-green-900/50'}`}>
                          الباقي: {formatCurrency((parseFloat(formData.total) || 0) - (parseFloat(formData.paid) || 0))}
                        </div>
                        <button type="submit" className="w-full bg-pink-600 text-white hover:bg-pink-500 font-black py-3 rounded-xl shadow-lg text-sm"><i className="ph ph-check-circle text-lg ml-2 align-middle"></i>حفظ بيانات الزفاف</button>
                      </form>
                    </div>
                  </div>
                )}

                {/* Modals for Details and Payment... reused logic */}
                {payModal && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-900 p-5 rounded-2xl shadow-xl border border-slate-800 w-full max-w-sm relative">
                      <button onClick={() => setPayModal(null)} className="absolute top-3 left-3 p-2 text-slate-500 hover:text-red-400"><i className="ph ph-x text-xl"></i></button>
                      <h3 className="text-xl font-black mb-3 border-b border-slate-800 pb-3 text-center text-slate-100">
                          {payModal.paymentType === 'electronic' ? 'سداد إلكتروني (إنستاباي/محافظ)' : 'سداد نقدي'}
                      </h3>
                      <div className="mb-4 bg-slate-950 p-3 rounded-xl text-center border border-slate-800">
                        <p className="text-slate-400 text-sm">العميل: <b className="text-white text-base">{payModal.type === 'wedding' ? payModal.groomName : payModal.clientName}</b></p>
                        <p className="text-red-400 font-bold mt-1 text-sm">الباقي المستحق: {payModal.remaining} ج.م</p>
                      </div>
                      <form onSubmit={async (e) => {
                        e.preventDefault();
                        const amount = parseFloat(e.target.amount.value);
                        const updated = { 
                            ...payModal, 
                            paid: payModal.paid + amount, 
                            electronicPaid: (payModal.electronicPaid || 0) + (payModal.paymentType === 'electronic' ? amount : 0),
                            remaining: payModal.total - (payModal.paid + amount) 
                        };
                        if (updated.pendingReceipt) delete updated.pendingReceipt;
                        delete updated.paymentType;
                        const targetCol = updated.type === 'wedding' ? 'weddings' : 'transactions';
                        await setDoc(doc(db, `artifacts/studio-marakby/public/data/${targetCol}`, updated.id), updated);
                        setPayModal(null);
                      }} className="space-y-3">
                        <input type="number" name="amount" required min="1" max={payModal.remaining} defaultValue={payModal.remaining} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-xl text-xl font-black text-center outline-none focus:border-blue-500 shadow-inner"/>
                        <button type="submit" className={`w-full text-white font-black py-3 rounded-xl shadow-lg transition-all text-base ${payModal.paymentType === 'electronic' ? 'bg-indigo-600 hover:bg-indigo-500 shadow-indigo-900/20' : 'bg-green-600 hover:bg-green-500 shadow-green-900/20'}`}>تأكيد تحصيل المبلغ</button>
                      </form>
                    </div>
                  </div>
                )}
                
                {receiptImageModal && (
                  <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
                    <div className="relative max-w-2xl w-full flex flex-col items-center">
                      <button onClick={() => setReceiptImageModal(null)} className="absolute -top-14 right-0 p-2 text-white hover:text-red-400 bg-slate-800 rounded-full shadow-lg border border-slate-700 transition-colors"><i className="ph ph-x text-2xl"></i></button>
                      <img src={receiptImageModal} alt="إيصال تحويل" className="max-w-full max-h-[85vh] rounded-2xl shadow-2xl border border-slate-700 object-contain bg-slate-900" />
                    </div>
                  </div>
                )}

                {txnDetailsModal && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setTxnDetailsModal(null)}>
                    <div className="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 w-full max-w-lg relative max-h-[90vh] overflow-y-auto custom-scrollbar" onClick={e => e.stopPropagation()}>
                      <button onClick={() => setTxnDetailsModal(null)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400 transition-colors"><i className="ph ph-x text-2xl"></i></button>
                      
                      <h3 className="text-2xl font-black mb-6 border-b border-slate-800 pb-4 text-slate-100 flex items-center gap-2">
                        {txnDetailsModal.type === 'wedding' ? <i className="ph ph-heart text-pink-500"></i> : <i className="ph ph-files text-blue-500"></i>}
                        تفاصيل {txnDetailsModal.type === 'wedding' ? 'حجز زفاف' : 'الإيصال'} #{txnDetailsModal.receiptNo}
                      </h3>

                      <div className="space-y-5">
                        <div className="flex justify-between items-center bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <div>
                              <p className="text-slate-500 text-xs mb-1">الاسم</p>
                              <p className="font-bold text-lg text-slate-100">
                                {txnDetailsModal.type === 'wedding' ? `${txnDetailsModal.groomName} و ${txnDetailsModal.brideName}` : txnDetailsModal.clientName}
                              </p>
                           </div>
                           <div className="text-left">
                              <p className="text-slate-500 text-xs mb-1">رقم الهاتف</p>
                              <p className="font-mono text-slate-300">{txnDetailsModal.phone}</p>
                           </div>
                        </div>

                        {txnDetailsModal.type === 'wedding' && (
                            <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 grid grid-cols-2 gap-4">
                                <div><p className="text-slate-500 text-xs mb-1">موعد الزفاف</p><p className="font-bold text-slate-200">{formatDateOnly(txnDetailsModal.weddingDate)}</p></div>
                                <div><p className="text-slate-500 text-xs mb-1">اللوكيشن</p><p className="font-bold text-slate-200">{txnDetailsModal.location}</p></div>
                                <div><p className="text-slate-500 text-xs mb-1">الميك أب</p><p className="font-bold text-slate-200">{txnDetailsModal.makeupArtist}</p></div>
                                <div><p className="text-slate-500 text-xs mb-1">وقت الخروج</p><p className="font-bold text-slate-200">{txnDetailsModal.leaveTime}</p></div>
                                <div className="col-span-2 border-t border-slate-800 pt-3 mt-1"><p className="text-slate-500 text-xs mb-1">العنوان</p><p className="font-bold text-slate-200">{txnDetailsModal.groomAddress}</p></div>
                            </div>
                        )}

                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <p className="text-slate-500 text-xs mb-2">المطلوب (الخدمات والمنتجات)</p>
                           <p className="text-slate-200 leading-relaxed font-medium whitespace-pre-wrap">
                               {txnDetailsModal.type === 'wedding' 
                                   ? `الباقات: ${txnDetailsModal.packages?.length > 0 ? txnDetailsModal.packages.map(p=>p.name).join(' + ') : (txnDetailsModal.package ? txnDetailsModal.package.name : 'بدون')}\nالسيشن: ${txnDetailsModal.sessionType}\nالكاجوال: ${txnDetailsModal.casualShootDate ? formatDateOnly(txnDetailsModal.casualShootDate) : 'بدون'}\nإضافات: ${txnDetailsModal.addons?.length > 0 ? txnDetailsModal.addons.map(a=>`${a.name}${a.notes ? ' ('+a.notes+')' : ''}`).join(' + ') : 'بدون'}`
                                   : txnDetailsModal.requirements}
                           </p>
                        </div>

                        {txnDetailsModal.photoNo && (
                            <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                               <span className="text-slate-500 text-sm">رقم الصورة:</span>
                               <span className="font-bold text-slate-200">{txnDetailsModal.photoNo}</span>
                            </div>
                        )}

                        <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 grid grid-cols-2 gap-4 relative overflow-hidden">
                           <div className={`absolute top-0 right-0 w-1 h-full ${txnDetailsModal.type === 'wedding' ? 'bg-pink-500' : 'bg-blue-500'}`}></div>
                           <div><p className="text-slate-500 text-xs mb-1">الإجمالي</p><p className="font-bold text-slate-100">{txnDetailsModal.total} ج.م</p></div>
                           <div><p className="text-slate-500 text-xs mb-1">إجمالي المدفوع</p><p className="font-bold text-green-400">{txnDetailsModal.paid} ج.م</p></div>
                           <div><p className="text-slate-500 text-xs mb-1">الدفع النقدي</p><p className="font-bold text-emerald-400">{(txnDetailsModal.paid || 0) - (txnDetailsModal.electronicPaid || 0)} ج.م</p></div>
                           <div><p className="text-slate-500 text-xs mb-1">الدفع الإلكتروني</p><p className="font-bold text-indigo-400">{txnDetailsModal.electronicPaid || 0} ج.م</p></div>
                           <div className="col-span-2 pt-4 mt-2 border-t border-slate-800 flex justify-between items-center">
                              <span className="text-slate-400 text-sm">الباقي المستحق:</span>
                              <span className={`font-black text-xl ${txnDetailsModal.remaining > 0 ? 'text-red-400' : 'text-green-400'}`}>{txnDetailsModal.remaining} ج.م</span>
                           </div>
                        </div>

                        {txnDetailsModal.pendingReceipt && (
                            <div className="bg-indigo-950/20 p-4 rounded-xl border border-indigo-500/30">
                               <p className="text-indigo-300 text-sm font-bold mb-3 flex items-center gap-2">
                                   <i className="ph ph-image text-lg"></i> صورة التحويل الإلكتروني المرفقة
                               </p>
                               <img src={txnDetailsModal.pendingReceipt} alt="Receipt" className="w-full rounded-lg border border-indigo-500/50 cursor-pointer hover:opacity-90 transition-opacity" onClick={() => setReceiptImageModal(txnDetailsModal.pendingReceipt)} />
                            </div>
                        )}
                        
                        <div className="text-xs text-slate-500 text-center mt-4">تاريخ التسجيل: {formatDate(txnDetailsModal.dateTime)}</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          };

          const StatCard = ({title, value, color, highlight}) => {
            const colors = { 
                green: "bg-green-950/30 text-green-400 border-green-900/50", 
                red: "bg-red-950/30 text-red-400 border-red-900/50", 
                blue: "bg-blue-950/30 text-blue-400 border-blue-900/50", 
                indigo: "bg-indigo-950/30 text-indigo-400 border-indigo-900/50",
                emerald: "bg-emerald-600 text-white border-emerald-500", 
                rose: "bg-rose-600 text-white border-rose-500" 
            };
            return (
              <div className={`p-3 sm:p-4 rounded-xl border ${colors[color]} ${highlight ? 'shadow-lg scale-105' : ''}`}>
                <h4 className="text-[11px] sm:text-xs opacity-80 mb-1">{title}</h4>
                <div className="text-base sm:text-lg font-black">{formatCurrency(value)}</div>
              </div>
            );
          };

          const MarketingTab = () => {
            const [promoMessage, setPromoMessage] = useState("أهلاً بك أ. {name} 👋\nكل عام وأنتم بخير! 🎉\nنتمنى لكم أوقاتاً سعيدة مع من تحبون.\n\nشرفتنا في {studio} 📸✨");
            const [searchTerm, setSearchTerm] = useState('');
            const [copyText, setCopyText] = useState('نسخ جميع الأرقام لعمل قائمة بث');
            const [customNumbersInput, setCustomNumbersInput] = useState('');

            const uniqueClients = useMemo(() => {
              const clientsMap = new Map();
              [...transactions, ...weddings].forEach(t => {
                if (t.phone && t.phone.trim() !== '') {
                  if (!clientsMap.has(t.phone)) {
                    clientsMap.set(t.phone, { clientName: t.type === 'wedding' ? t.groomName : t.clientName, phone: t.phone });
                  }
                }
              });
              return Array.from(clientsMap.values());
            }, [transactions, weddings]);

            const customClients = useMemo(() => {
              if (!customNumbersInput.trim()) return [];
              const numbers = customNumbersInput.split(/[,،\n]/).map(n => n.trim()).filter(n => n.length >= 8);
              const uniqueNums = [...new Set(numbers)];
              const existingPhones = new Set(uniqueClients.map(c => c.phone));
              const newUniqueNums = uniqueNums.filter(n => !existingPhones.has(n));
              return newUniqueNums.map(n => ({ clientName: 'عميل (رقم خارجي)', phone: n, isCustom: true }));
            }, [customNumbersInput, uniqueClients]);

            const allClients = [...uniqueClients, ...customClients];
            const filteredClients = allClients.filter(c => c.clientName.includes(searchTerm) || c.phone.includes(searchTerm));

            const handleCopyNumbers = () => {
              const numbersList = allClients.map(c => c.phone).join('\n');
              const el = document.createElement('textarea');
              el.value = numbersList;
              document.body.appendChild(el);
              el.select();
              document.execCommand('copy');
              document.body.removeChild(el);
              setCopyText('تم النسخ بنجاح ✓');
              setTimeout(() => setCopyText('نسخ جميع الأرقام لعمل قائمة بث'), 3000);
            };

            const handleSendPromo = (client) => {
              let msg = promoMessage;
              msg = msg.replace(/{name}/g, client.clientName || 'العميل');
              msg = msg.replace(/{studio}/g, settings.studioName || 'الاستوديو');
              openWhatsApp(client.phone, msg);
            };

            return (
              <div className="space-y-6">
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-100 border-b border-slate-800 pb-4">
                    <i className="ph ph-megaphone text-yellow-500 text-2xl"></i> التسويق والرسائل الجماعية
                  </h2>
                  <div className="space-y-6 mt-6">
                     <div>
                        <label className="block text-sm font-bold mb-3 text-slate-400">
                            محتوى رسالة التهنئة / العرض <br/>
                            <span className="text-xs font-normal opacity-70 mt-1 block">يمكنك كتابة المتغير <code className="bg-slate-800 px-1.5 py-0.5 rounded text-blue-300 font-mono">{'{name}'}</code> لادراج اسم العميل تلقائياً في الرسالة لتبدو شخصية.</span>
                        </label>
                        <textarea rows="4" value={promoMessage} onChange={e => setPromoMessage(e.target.value)} className="w-full p-4 border border-slate-700 bg-slate-950 text-slate-200 rounded-xl focus:border-yellow-500 outline-none text-sm font-mono custom-scrollbar transition-colors" />
                     </div>

                     <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                        <label className="block text-sm font-bold mb-3 text-blue-400">
                            <i className="ph ph-list-plus text-lg ml-1 align-middle"></i> إضافة أرقام خارجية (مفصولة بفاصلة) <br/>
                            <span className="text-xs font-normal text-slate-500 mt-1 block">الصق الأرقام هنا مفصولة بفاصلة (,) أو كل رقم في سطر جديد. سيتم إضافتها فوراً للقائمة بالأسفل.</span>
                        </label>
                        <textarea 
                            rows="2" 
                            value={customNumbersInput} 
                            onChange={e => setCustomNumbersInput(e.target.value)} 
                            className="w-full p-4 border border-slate-700 bg-slate-900 text-slate-200 rounded-xl focus:border-blue-500 outline-none text-sm font-mono custom-scrollbar transition-colors" 
                            placeholder="مثال: 01000000000, 01111111111" 
                        />
                     </div>

                     <div className="flex flex-col sm:flex-row gap-4 items-center bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                        <button onClick={handleCopyNumbers} className="w-full sm:w-auto bg-slate-950 hover:bg-slate-800 text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors border border-slate-600 whitespace-nowrap shadow-sm">
                          <i className={copyText.includes('✓') ? "ph ph-check text-green-400 text-xl" : "ph ph-copy text-xl"}></i> {copyText} ({allClients.length})
                        </button>
                        <p className="text-xs text-slate-400 flex-1 leading-relaxed text-center sm:text-right">
                          <strong className="text-slate-300">طريقة الإرسال الجماعي:</strong> قم بنسخ جميع الأرقام من الزر، ثم اذهب لتطبيق WhatsApp Business في هاتفك وقم بإنشاء "رسالة جماعية جديدة" (Broadcast List) والصق الأرقام لإرسال العرض للجميع بضغطة واحدة!
                        </p>
                     </div>
                  </div>
                </div>

                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                   <div className="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 border-b border-slate-800 pb-4">
                      <h3 className="text-lg font-bold text-slate-100 flex items-center gap-2">
                          <i className="ph ph-users text-blue-400 text-xl"></i> إجمالي الأرقام المستهدفة ({filteredClients.length})
                      </h3>
                      <div className="relative w-full sm:w-64">
                          <i className="ph ph-magnifying-glass absolute right-3 top-2.5 text-slate-500"></i>
                          <input type="text" placeholder="بحث بالاسم أو الرقم..." className="w-full py-2 pr-9 pl-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-yellow-500 text-sm" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                      </div>
                   </div>

                   {filteredClients.length === 0 ? (
                       <div className="text-center py-10 text-slate-500">لا يوجد عملاء أو أرقام مطابقة للبحث.</div>
                   ) : (
                       <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 max-h-[500px] overflow-y-auto custom-scrollbar pr-2 pb-2">
                          {filteredClients.map(client => (
                              <div key={client.phone} className={`p-4 rounded-xl border flex flex-col justify-between gap-4 transition-colors ${client.isCustom ? 'bg-blue-950/20 border-blue-900/30 hover:border-blue-700' : 'bg-slate-950 border-slate-800 hover:border-slate-700'}`}>
                                  <div>
                                      <div className={`font-bold text-sm truncate ${client.isCustom ? 'text-blue-300' : 'text-slate-200'}`} title={client.clientName}>{client.clientName}</div>
                                      <div className="text-xs text-slate-500 mt-1 font-mono">{client.phone}</div>
                                  </div>
                                  <button onClick={() => handleSendPromo(client)} className="w-full bg-green-600 hover:bg-green-500 text-white py-2.5 rounded-lg text-xs font-bold transition-colors flex items-center justify-center gap-2 shadow-sm">
                                      <i className="ph ph-whatsapp-logo text-lg"></i> إرسال التهنئة
                                  </button>
                              </div>
                          ))}
                       </div>
                   )}
                </div>
              </div>
            );
          };

          const SettingsTab = () => {
            const handleAddList = (key, val) => { if(!val) return; setSettings({...settings, [key]: [...settings[key], val]}); };
            const handleRemoveList = (key, idx) => { const newList = [...settings[key]]; newList.splice(idx, 1); setSettings({...settings, [key]: newList}); };
            
            return (
              <div className="space-y-8">
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 border-b border-slate-800 pb-4 text-slate-100"><i className="ph ph-image text-purple-400"></i> هوية الاستوديو</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                      <label className="block font-bold text-sm text-slate-400 mb-2">اسم الاستوديو:</label>
                      <input type="text" value={settings.studioName} onChange={e => setSettings({...settings, studioName: e.target.value})} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-lg focus:border-purple-500 outline-none" />
                    </div>
                    <div>
                      <label className="block font-bold text-sm text-slate-400 mb-2">الشعار (Logo):</label>
                      <input type="file" accept="image/*" onChange={e => {
                        const file = e.target.files[0];
                        if (file) {
                          const reader = new FileReader();
                          reader.onloadend = () => setSettings({...settings, studioLogo: reader.result});
                          reader.readAsDataURL(file);
                        }
                      }} className="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-slate-800 file:text-purple-400 hover:file:bg-slate-700 transition-colors" />
                    </div>
                  </div>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                   <ServicesSettingsList title="قوالب خدمات التصوير" items={settings.services || []} onAdd={v => handleAddList('services', v)} onRemove={i => handleRemoveList('services', i)} colorTheme="blue" />
                   <ServicesSettingsList title="قوالب البضاعة والمنتجات" items={settings.products || []} onAdd={v => handleAddList('products', v)} onRemove={i => handleRemoveList('products', i)} colorTheme="purple" />
                </div>
                
                <div>
                    <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                      <h3 className="font-bold mb-4 border-b border-slate-800 pb-2 text-slate-100">أقسام المصروفات</h3>
                      <div className="flex gap-2 mb-4">
                        <input type="text" id="newCat" className="flex-1 p-2 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-blue-500 placeholder-slate-500" placeholder="بند مصروف جديد..." />
                        <button onClick={() => { const v = document.getElementById('newCat').value; handleAddList('expenseCategories', v); document.getElementById('newCat').value=''; }} className="bg-blue-600 hover:bg-blue-500 text-white px-4 rounded-lg transition-colors"><i className="ph ph-plus text-xl"></i></button>
                      </div>
                      <div className="flex flex-wrap gap-2">
                        {settings.expenseCategories.map((c, i) => (
                          <span key={i} className="bg-slate-800 text-slate-300 px-3 py-1.5 rounded-full text-sm font-bold flex items-center gap-2 border border-slate-700">
                            {c} <button onClick={() => handleRemoveList('expenseCategories', i)} className="text-red-400 hover:text-red-300"><i className="ph ph-x text-sm"></i></button>
                          </span>
                        ))}
                      </div>
                   </div>
                </div>

                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                  <h2 className="text-xl font-bold mb-4 border-b border-slate-800 pb-4 text-slate-100 flex items-center gap-2">
                      <i className="ph ph-whatsapp-logo text-green-400 text-2xl"></i> قوالب رسائل الواتساب
                  </h2>
                  
                  <div className="bg-slate-950/50 p-4 rounded-xl border border-slate-800 mb-6 flex flex-col md:flex-row gap-4 items-center justify-between shadow-inner">
                     <p className="text-sm text-slate-400 leading-relaxed flex-1">
                        <strong className="text-slate-300 block mb-2">المتغيرات المتاحة للنسخ والإضافة التلقائية:</strong>
                        <code className="text-blue-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{name}'}</code>
                        <code className="text-blue-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{receipt}'}</code>
                        <code className="text-blue-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{total}'}</code>
                        <code className="text-blue-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{remaining}'}</code>
                        <code className="text-blue-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{date}'}</code>
                        <code className="text-blue-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{time}'}</code>
                        <code className="text-purple-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{studio}'}</code>
                     </p>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    {Object.keys(settings.waTemplates).map(key => {
                      const getLabel = (k) => {
                        switch(k) {
                          case 'welcome': return '👋 رسالة الترحيب الأولى';
                          case 'invoice': return '🧾 شكل الفاتورة الإلكترونية';
                          case 'reminder': return '⚠️ تذكير بالمبلغ المتبقي';
                          case 'ready': return '🎉 رسالة جاهزية الطلب للاستلام';
                          case 'deposit': return '💸 تأكيد استلام العربون';
                          case 'tracking': return '📍 رسالة تتبع الطلب بالرابط';
                          default: return k;
                        }
                      };

                      return (
                      <div key={key} className="bg-slate-950 p-5 rounded-lg border border-slate-700 hover:border-green-500/50 transition-all group shadow-sm flex flex-col relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-1 h-full bg-slate-800 group-hover:bg-green-500 transition-colors"></div>
                        <label className="block text-sm font-bold mb-3 text-slate-300 group-hover:text-green-400 transition-colors pr-2">
                            {getLabel(key)}
                        </label>
                        <div className="relative flex-1 flex flex-col">
                            <textarea 
                                rows="5" 
                                value={settings.waTemplates[key]} 
                                onChange={e => setSettings({...settings, waTemplates: {...settings.waTemplates, [key]: e.target.value}})} 
                                className="w-full flex-1 p-4 border border-slate-700 bg-slate-900 text-green-50 rounded-md focus:border-green-500 focus:bg-slate-950 focus:ring-1 focus:ring-green-500/30 outline-none text-sm font-mono custom-scrollbar transition-all leading-relaxed shadow-inner resize-y" 
                                placeholder="اكتب قالب الرسالة هنا..."
                            />
                        </div>
                      </div>
                    )})}
                  </div>
                </div>
              </div>
            );
          };

          const ServicesSettingsList = ({title, items, onAdd, onRemove, colorTheme = 'blue'}) => {
            const [newName, setNewName] = useState('');
            const [newPrice, setNewPrice] = useState('');
            const [newDesc, setNewDesc] = useState('');
            
            const handleEditClick = (item, idx) => {
                const obj = typeof item === 'string' ? {name: item, price: 0, desc: ''} : item;
                setNewName(obj.name);
                setNewPrice(obj.price);
                setNewDesc(obj.desc);
                onRemove(idx); 
            };

            const isBlue = colorTheme === 'blue';
            const colorClass = isBlue ? 'focus:border-blue-500' : 'focus:border-purple-500';
            const btnClass = isBlue ? 'bg-blue-600 hover:bg-blue-500' : 'bg-purple-600 hover:bg-purple-500';
            const textClass = isBlue ? 'text-blue-400' : 'text-purple-400';

            return (
              <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                <h3 className="font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">{title}</h3>
                <div className="flex flex-col gap-3 mb-5">
                  <div className="flex gap-2">
                    <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} className={`flex-1 p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none ${colorClass} placeholder-slate-500 text-sm`} placeholder="الاسم..."/>
                    <input type="number" value={newPrice} onChange={e=>setNewPrice(e.target.value)} className={`w-24 p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none ${colorClass} placeholder-slate-500 text-sm`} placeholder="السعر..."/>
                  </div>
                  <div className="flex gap-2">
                    <input type="text" value={newDesc} onChange={e=>setNewDesc(e.target.value)} className={`flex-1 p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none ${colorClass} placeholder-slate-500 text-sm`} placeholder="تفاصيل صغيرة (اختياري)..."/>
                    <button onClick={()=>{if(newName){onAdd({name:newName, price:parseFloat(newPrice)||0, desc:newDesc});setNewName('');setNewPrice('');setNewDesc('');}}} className={`${btnClass} text-white px-5 rounded-lg transition-colors flex items-center justify-center`}><i className="ph ph-plus text-xl"></i></button>
                  </div>
                </div>
                <div className="flex flex-col gap-2 overflow-y-auto max-h-[300px] custom-scrollbar pr-2">
                  {items.map((item, idx) => {
                    const srv = typeof item === 'string' ? {name: item, price: 0, desc: ''} : item;
                    return (
                    <div key={idx} className="bg-slate-800 p-3 rounded-xl flex justify-between items-start border border-slate-700">
                      <div className="flex flex-col">
                        <span className="text-slate-300 text-sm font-bold flex items-center gap-2">
                          {srv.name} {srv.price > 0 && <span className={`text-[10px] bg-slate-950 px-1.5 py-0.5 rounded ${textClass}`}>{srv.price} ج.م</span>}
                        </span>
                        {srv.desc && <span className="text-xs text-slate-500 mt-1">{srv.desc}</span>}
                      </div>
                      <div className="flex items-center">
                          <button onClick={()=>handleEditClick(item, idx)} className="text-blue-400 hover:text-blue-300 bg-transparent rounded-full mr-2"><i className="ph ph-pencil-simple text-base"></i></button>
                          <button onClick={()=>onRemove(idx)} className="text-red-400 hover:text-red-300 bg-transparent rounded-full mr-2"><i className="ph ph-x text-base"></i></button>
                      </div>
                    </div>
                  )})}
                </div>
              </div>
            );
          };

          if (!authReady) return <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-100"><div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div><p className="font-bold">جاري المزامنة مع السحابة...</p></div>;

          return (
            <div className="min-h-screen bg-slate-950 text-slate-100 pb-20">
              {authError && <div className="bg-red-600 text-white text-center py-1 font-bold text-xs">{authError}</div>}
              {isTracking ? null : <Navigation />}
              <main className={`max-w-7xl mx-auto ${isTracking ? '' : 'p-4 md:p-6'}`}>
                {isTracking ? null : (
                    <>
                        {activeTab === 'dashboard' && <DashboardTab />}
                        {activeTab === 'weddings' && <WeddingsTab />}
                        {activeTab === 'expenses' && <ExpensesTab />}
                        {activeTab === 'reports' && <ReportsTab />}
                        {activeTab === 'marketing' && <MarketingTab />}
                        {activeTab === 'settings' && <SettingsTab />}
                    </>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
