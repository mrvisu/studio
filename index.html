<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو المراكبى</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans">
    
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          CalendarDays, Phone, Camera, FileText, DollarSign, Search, 
          Plus, Trash2, MessageCircle, CheckCircle2, Clock, User, 
          CreditCard, X, Settings, Send, Save, Tag, Lock, LogOut,
          ClipboardList, Scissors, Check, PackageCheck
        } from 'https://esm.sh/lucide-react@0.344.0';
        
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // إعدادات فايربيز الخاصة بمشروعك Studio-Marakby-V2
        const firebaseConfig = {
          apiKey: "AIzaSyD5-1qxD1CTlDuANL79_6gstfh_0Ib4E4U",
          authDomain: "studio-marakby-v2.firebaseapp.com",
          projectId: "studio-marakby-v2",
          storageBucket: "studio-marakby-v2.firebasestorage.app",
          messagingSenderId: "765706080189",
          appId: "1:765706080189:web:4bb1d3ba91632d5f13ccd4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "studio-marakby-main"; 

        const MONTHS = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

        const JOB_STAGES = [
            { id: 'received', label: 'تم الاستلام', icon: ClipboardList },
            { id: 'processing', label: 'جاري التجهيز', icon: Scissors },
            { id: 'ready', label: 'جاهز للاستلام', icon: CheckCircle2 },
            { id: 'delivered', label: 'تم التسليم', icon: PackageCheck }
        ];

        const DEFAULT_SETTINGS = {
            autoReceipt: true,
            nextReceipt: 1001,
            adminPassword: "1234",
            services: ["طباعة 10 صور 4x6", "ألبوم عريس", "تصوير سيشن", "صورة شخصية للفيزا", "برواز خشب"],
            templates: {
                welcome: "أهلاً بك يا {clientName} في ستوديو المراكبي 📸✨\n\nتفاصيل الإيصال:\nرقم الإيصال: {receiptNumber}\nالمطلوب: {notes}\nالإجمالي: {totalAmount} ج.م\nالمدفوع: {paidAmount} ج.م\nالباقي: {remainingAmount} ج.م\n\nنسعد بخدمتكم دائماً.",
                deposit: "أهلاً بك يا {clientName}، تم استلام عربون بقيمة {paidAmount} ج.م. الباقي عند الاستلام: {remainingAmount} ج.م.",
                delivery: "أهلاً بك يا {clientName}، الطلب الخاص بك جاهز للاستلام الآن 🎉 باقي الحساب: {remainingAmount} ج.م.",
                reminder: "أهلاً بك يا {clientName}، تذكير ودي بالمبلغ المتبقي: {remainingAmount} ج.م."
            }
        };

        function App() {
            const [entries, setEntries] = useState([]);
            const [settings, setSettings] = useState(DEFAULT_SETTINGS);
            const [user, setUser] = useState(null);
            const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth());
            const [searchQuery, setSearchQuery] = useState('');
            const [currentScreen, setCurrentScreen] = useState('login');
            const [loginMode, setLoginMode] = useState('client');
            const [loginData, setLoginData] = useState({ phone: '', receipt: '', password: '' });
            const [loginError, setLoginError] = useState('');
            const [clientEntry, setClientEntry] = useState(null);
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [formData, setFormData] = useState({ receiptNumber: '', photoNumber: '', clientName: '', clientPhone: '', notes: '', totalAmount: '', paidAmount: '' });
            const [paymentModal, setPaymentModal] = useState({ isOpen: false, entryId: null, clientName: '', maxAmount: 0 });
            const [paymentAmount, setPaymentAmount] = useState('');
            const [whatsappModal, setWhatsappModal] = useState({ isOpen: false, entry: null });
            const [tempSettings, setTempSettings] = useState(settings);
            const [newService, setNewService] = useState('');
            const [settingsTab, setSettingsTab] = useState('general');

            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubEntries = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'entries'), (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setEntries(data);
                    if (clientEntry) {
                        const updated = data.find(e => e.id === clientEntry.id);
                        if (updated) setClientEntry(updated);
                    }
                });
                const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'app_settings', 'main'), (snap) => {
                    if (snap.exists()) {
                        setSettings(snap.data());
                        setTempSettings(snap.data());
                    } else {
                        setDoc(snap.ref, DEFAULT_SETTINGS);
                    }
                });
                return () => { unsubEntries(); unsubSettings(); };
            }, [user, clientEntry?.id]);

            const filteredEntries = useMemo(() => {
                return entries.filter(e => {
                    if (e.month !== selectedMonth) return false;
                    const q = searchQuery.toLowerCase();
                    return !q || e.clientName.toLowerCase().includes(q) || e.clientPhone.includes(q) || (e.receiptNumber && e.receiptNumber.toString().includes(q));
                }).sort((a, b) => b.timestampMs - a.timestampMs);
            }, [entries, selectedMonth, searchQuery]);

            const stats = useMemo(() => {
                return filteredEntries.reduce((acc, curr) => ({
                    total: acc.total + curr.totalAmount,
                    paid: acc.paid + curr.paidAmount,
                    remaining: acc.remaining + curr.remainingAmount
                }), { total: 0, paid: 0, remaining: 0 });
            }, [filteredEntries]);

            const handleAddEntry = async (e) => {
                e.preventDefault();
                const total = parseFloat(formData.totalAmount) || 0;
                const paid = parseFloat(formData.paidAmount) || 0;
                const newEntry = {
                    id: Date.now().toString(36) + Math.random().toString(36).substring(2),
                    month: selectedMonth,
                    receiptNumber: formData.receiptNumber,
                    photoNumber: formData.photoNumber,
                    clientName: formData.clientName,
                    clientPhone: formData.clientPhone,
                    notes: formData.notes,
                    totalAmount: total, paidAmount: paid, remainingAmount: total - paid,
                    status: 'received',
                    timestamp: new Date().toLocaleString('ar-EG'),
                    timestampMs: Date.now()
                };
                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'entries', newEntry.id), newEntry);
                if (settings.autoReceipt) {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'app_settings', 'main'), { nextReceipt: parseInt(formData.receiptNumber) + 1 });
                }
                setIsAddModalOpen(false);
            };

            const handleStatusChange = async (id, newStatus) => {
                await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'entries', id), { status: newStatus });
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (loginData.password === settings.adminPassword) setCurrentScreen('admin');
                else setLoginError('كلمة المرور غير صحيحة');
            };

            const handleClientLogin = (e) => {
                e.preventDefault();
                const entry = entries.find(en => en.clientPhone === loginData.phone && en.receiptNumber == loginData.receipt);
                if (entry) { setClientEntry(entry); setCurrentScreen('client'); }
                else setLoginError('بيانات الإيصال غير صحيحة');
            };

            if (currentScreen === 'login') {
                return (
                    <div className="min-h-screen bg-slate-900 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8">
                        <div className="max-w-md w-full mx-auto bg-white rounded-3xl shadow-xl overflow-hidden p-8">
                            <div className="text-center mb-8">
                                <div className="mx-auto w-16 h-16 bg-amber-500 rounded-2xl flex items-center justify-center mb-4"><Camera className="text-slate-900" size={32} /></div>
                                <h2 className="text-2xl font-bold">ستوديو المراكبى</h2>
                            </div>
                            <div className="flex border-b mb-6">
                                <button onClick={() => setLoginMode('client')} className={`flex-1 pb-2 font-bold ${loginMode === 'client' ? 'border-b-2 border-amber-500 text-amber-600' : 'text-gray-400'}`}>بوابة العميل</button>
                                <button onClick={() => setLoginMode('admin')} className={`flex-1 pb-2 font-bold ${loginMode === 'admin' ? 'border-b-2 border-amber-500 text-amber-600' : 'text-gray-400'}`}>الإدارة</button>
                            </div>
                            {loginError && <div className="bg-red-50 text-red-600 p-2 rounded mb-4 text-center text-sm">{loginError}</div>}
                            <form onSubmit={loginMode === 'client' ? handleClientLogin : handleAdminLogin} className="space-y-4">
                                {loginMode === 'client' ? (
                                    <>
                                        <input required type="tel" placeholder="رقم الهاتف" className="w-full p-3 border rounded-xl" value={loginData.phone} onChange={e => setLoginData({...loginData, phone: e.target.value})} />
                                        <input required type="number" placeholder="رقم الإيصال" className="w-full p-3 border rounded-xl" value={loginData.receipt} onChange={e => setLoginData({...loginData, receipt: e.target.value})} />
                                    </>
                                ) : (
                                    <input required type="password" placeholder="كلمة مرور المدير" className="w-full p-3 border rounded-xl" value={loginData.password} onChange={e => setLoginData({...loginData, password: e.target.value})} />
                                )}
                                <button className="w-full bg-amber-500 text-slate-900 font-bold py-3 rounded-xl hover:bg-amber-400 transition-colors">دخول</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (currentScreen === 'client' && clientEntry) {
                const step = JOB_STAGES.findIndex(s => s.id === clientEntry.status);
                return (
                    <div className="min-h-screen bg-gray-50 pb-10">
                        <header className="bg-slate-900 text-white p-4 flex justify-between items-center shadow-lg">
                            <div className="flex items-center gap-2"><Camera className="text-amber-500" /><span className="font-bold">مرحباً {clientEntry.clientName}</span></div>
                            <button onClick={() => setCurrentScreen('login')} className="bg-slate-800 p-2 rounded-lg"><LogOut size={18} /></button>
                        </header>
                        <main className="max-w-xl mx-auto mt-8 px-4 space-y-6">
                            <div className="bg-white p-6 rounded-3xl shadow-sm">
                                <h3 className="font-bold text-center mb-6">مرحلة تجهيز طلبك</h3>
                                <div className="relative flex justify-between items-center">
                                    <div className="absolute h-1 bg-gray-200 w-full top-5 -z-0"></div>
                                    <div className="absolute h-1 bg-amber-500 transition-all duration-500 top-5 -z-0" style={{ width: `${(step / 3) * 100}%` }}></div>
                                    {JOB_STAGES.map((s, i) => {
                                        const Icon = s.icon;
                                        const active = i <= step;
                                        return (
                                            <div key={s.id} className="flex flex-col items-center z-10">
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center ${active ? 'bg-amber-500 text-white shadow-lg shadow-amber-200' : 'bg-white border-2 text-gray-300'}`}>
                                                    <Icon size={18} />
                                                </div>
                                                <span className={`text-[10px] mt-2 font-bold ${active ? 'text-amber-600' : 'text-gray-400'}`}>{s.label}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-3xl shadow-sm space-y-4">
                                <div className="flex justify-between border-b pb-2"><span className="text-gray-500">رقم الإيصال</span><span className="font-bold">{clientEntry.receiptNumber}</span></div>
                                <div className="bg-amber-50 p-4 rounded-xl font-bold text-sm leading-relaxed">{clientEntry.notes}</div>
                                <div className="grid grid-cols-3 gap-2 text-center">
                                    <div className="p-3 bg-gray-50 rounded-2xl"><span className="text-[10px] block">الإجمالي</span><b>{clientEntry.totalAmount}</b></div>
                                    <div className="p-3 bg-green-50 text-green-700 rounded-2xl"><span className="text-[10px] block">المدفوع</span><b>{clientEntry.paidAmount}</b></div>
                                    <div className="p-3 bg-red-50 text-red-700 rounded-2xl"><span className="text-[10px] block">الباقي</span><b>{clientEntry.remainingAmount}</b></div>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 pb-20">
                    <header className="bg-slate-900 text-white p-4 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2"><div className="bg-amber-500 p-1.5 rounded-lg"><Camera className="text-slate-900" size={20} /></div><h1 className="font-bold">الإدارة</h1></div>
                        <div className="flex gap-2">
                            <button onClick={() => setIsSettingsOpen(true)} className="p-2 bg-slate-800 rounded-lg"><Settings size={20}/></button>
                            <button onClick={() => setCurrentScreen('login')} className="p-2 bg-red-500/20 text-red-400 rounded-lg"><LogOut size={20}/></button>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-4 space-y-4">
                        <div className="flex gap-2">
                            <div className="relative flex-1">
                                <Search className="absolute right-3 top-3 text-gray-400" size={20} />
                                <input className="w-full pr-10 p-3 bg-white rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-amber-500" placeholder="بحث..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                            </div>
                            <button onClick={openAddModal} className="bg-amber-500 text-slate-900 px-4 rounded-2xl font-bold flex items-center gap-2 shadow-lg shadow-amber-200"><Plus size={20}/> <span className="hidden sm:inline">جديد</span></button>
                        </div>

                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                            <div className="bg-slate-800 text-white p-4 rounded-3xl"><span className="text-xs text-slate-400 block">إجمالي الشهر</span><b className="text-xl">{stats.total}</b></div>
                            <div className="bg-white p-4 rounded-3xl border shadow-sm"><span className="text-xs text-gray-400 block">المحصل</span><b className="text-xl text-green-600">{stats.paid}</b></div>
                            <div className="bg-white p-4 rounded-3xl border shadow-sm"><span className="text-xs text-gray-400 block">المديونية</span><b className="text-xl text-red-500">{stats.remaining}</b></div>
                        </div>

                        <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                            {MONTHS.map((m, i) => (
                                <button key={i} onClick={() => setSelectedMonth(i)} className={`px-4 py-2 rounded-full whitespace-nowrap text-sm font-bold transition-colors ${selectedMonth === i ? 'bg-amber-500 text-slate-900' : 'bg-white text-gray-500 border'}`}>{m}</button>
                            ))}
                        </div>

                        <div className="space-y-3">
                            {filteredEntries.map(e => (
                                <div key={e.id} className="bg-white p-4 rounded-3xl border shadow-sm space-y-3">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <h4 className="font-bold flex items-center gap-2"><User size={16} className="text-amber-500"/> {e.clientName}</h4>
                                            <div className="text-xs text-gray-400 mt-1 flex gap-3"><span className="flex items-center gap-1"><Phone size={12}/> {e.clientPhone}</span> <span className="flex items-center gap-1"><FileText size={12}/> {e.receiptNumber}</span></div>
                                        </div>
                                        <select value={e.status} onChange={el => handleStatusChange(e.id, el.target.value)} className="text-[10px] font-bold p-1 bg-gray-50 rounded border-none focus:ring-0">
                                            {JOB_STAGES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                                        </select>
                                    </div>
                                    <div className="bg-gray-50 p-3 rounded-xl text-sm text-slate-700">{e.notes}</div>
                                    <div className="flex justify-between items-center">
                                        <div className="text-sm font-bold flex gap-4">
                                            <span>ج {e.totalAmount}</span>
                                            <span className="text-green-600">تم {e.paidAmount}</span>
                                            <span className="text-red-500">باقي {e.remainingAmount}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setWhatsappModal({isOpen: true, entry: e})} className="p-2 bg-green-50 text-green-600 rounded-full"><MessageCircle size={18}/></button>
                                            <button onClick={async () => window.confirm('حذف؟') && await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'entries', e.id))} className="p-2 bg-red-50 text-red-500 rounded-full"><Trash2 size={18}/></button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {isAddModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-lg rounded-3xl p-6 space-y-4">
                                <h3 className="font-bold border-b pb-2">إضافة عملية جديدة</h3>
                                <form onSubmit={handleAddEntry} className="grid grid-cols-2 gap-3">
                                    <input className="p-3 border rounded-xl col-span-2" placeholder="اسم العميل" value={formData.clientName} onChange={v => setFormData({...formData, clientName: v.target.value})} required />
                                    <input className="p-3 border rounded-xl" placeholder="رقم الهاتف" type="tel" value={formData.clientPhone} onChange={v => setFormData({...formData, clientPhone: v.target.value})} required />
                                    <input className="p-3 border rounded-xl" placeholder="رقم الإيصال" type="number" value={formData.receiptNumber} onChange={v => setFormData({...formData, receiptNumber: v.target.value})} required />
                                    <div className="col-span-2 space-y-2">
                                        <div className="flex gap-1 overflow-x-auto pb-1">
                                            {settings.services.map(s => <button key={s} type="button" onClick={() => setFormData({...formData, notes: formData.notes ? `${formData.notes} + ${s}` : s})} className="text-[10px] bg-amber-50 text-amber-700 px-2 py-1 rounded-lg border border-amber-100 whitespace-nowrap">+{s}</button>)}
                                        </div>
                                        <textarea className="w-full p-3 border rounded-xl" placeholder="المطلوب" value={formData.notes} onChange={v => setFormData({...formData, notes: v.target.value})}></textarea>
                                    </div>
                                    <input className="p-3 border rounded-xl" placeholder="الإجمالي" type="number" value={formData.totalAmount} onChange={v => setFormData({...formData, totalAmount: v.target.value})} required />
                                    <input className="p-3 border rounded-xl" placeholder="المدفوع" type="number" value={formData.paidAmount} onChange={v => setFormData({...formData, paidAmount: v.target.value})} />
                                    <button type="submit" className="col-span-2 bg-amber-500 py-3 rounded-xl font-bold">حفظ الطلب</button>
                                    <button type="button" onClick={() => setIsAddModalOpen(false)} className="col-span-2 text-gray-400 text-sm">إلغاء</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
