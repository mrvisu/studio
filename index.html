            }
            return txn.requirements || 'لا يوجد تفاصيل';
        };

        // --- Auto Deletion Cleanup Logic ---
        const checkAndCleanExpiredPhotos = async (txn, db, storage) => {
            if (!txn || !txn.uploadedPhotos || txn.uploadedPhotos.length === 0) return txn;
            let hasExpired = false;
            const validPhotos = [];
            const now = Date.now();

            for (const photo of txn.uploadedPhotos) {
                // Check if photo has expiry and is expired
                if (photo.expiryTimestamp && now > photo.expiryTimestamp) {
                    hasExpired = true;
                    if (photo.path) {
                        try {
                            const storageRef = ref(storage, photo.path);
                            await deleteObject(storageRef);
                        } catch (e) {
                            console.warn("Failed to delete expired image from Storage", e);
                        }
                    }
                } else {
                    validPhotos.push(photo);
                }
            }

            if (hasExpired) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                const targetCol = txn.type === 'wedding' ? 'weddings' : 'transactions';
                const updatedTxn = {...txn, uploadedPhotos: validPhotos};
                try {

            if (txn.casualShootDate) description += `👕 تصوير الكاجوال: ${txn.casualShootDate}\n`;

            let pkgs = '';
            if (txn.packages && txn.packages.length > 0) pkgs = txn.packages.map(p => p.name).join(' + ');
            else if (txn.package) pkgs = txn.package.name;
            
            let addonsText = '';
            if (txn.addons && txn.addons.length > 0) addonsText = txn.addons.map(a => a.name).join(' + ');

            if (pkgs || addonsText) {
                description += `\n💼 الباقات والإضافات\n`;
                description += `──────────────────\n`;
                if (pkgs) description += `📦 الباقات: ${pkgs}\n`;
                if (addonsText) description += `➕ إضافات: ${addonsText}\n`;
            }
            
            description += `\n💰 الحسابات\n`;
            description += `──────────────────\n`;
            description += `💵 الإجمالي: ${txn.total} ج.م\n`;
            description += `✅ المدفوع: ${txn.paid} ج.م\n`;
            description += `🔴 الباقي: ${txn.remaining} ج.م\n`;
            
            const trackUrl = window.location.href.split('?')[0] + `?phone=${encodeURIComponent(txn.phone)}&receipt=${encodeURIComponent(txn.receiptNo)}&type=w`;
            description += `\n🔗 رابط تتبع العميل:\n${trackUrl}`;

            const title = `حجز زفاف: ${txn.groomName || ''} و ${txn.brideName || ''}`.trim() || 'حجز زفاف جديد';

            let startStr = '';
            let endStr = '';

            const datePart = txn.weddingDate.replace(/-/g, '');

            if (txn.leaveTime) {
                const startDate = new Date(`${txn.weddingDate}T${txn.leaveTime}`);
                const endDate = new Date(startDate.getTime() + 5 * 60 * 60 * 1000); 
                
                const formatGoogleDate = (date) => {
                    return date.getFullYear() +
                        String(date.getMonth() + 1).padStart(2, '0') +
                        String(date.getDate()).padStart(2, '0') + 'T' +
                        String(date.getHours()).padStart(2, '0') +
                        String(date.getMinutes()).padStart(2, '0') + '00';
                };
                startStr = formatGoogleDate(startDate);
                endStr = formatGoogleDate(endDate);
            } else {
                startStr = datePart;
                const nextDay = new Date(txn.weddingDate);
                nextDay.setDate(nextDay.getDate() + 1);
                endStr = nextDay.getFullYear() + String(nextDay.getMonth() + 1).padStart(2, '0') + String(nextDay.getDate()).padStart(2, '0');
            }

            const encodedTitle = encodeURIComponent(title);
            const encodedDetails = encodeURIComponent(description);
            const encodedLocation = encodeURIComponent(txn.location || '');
            const dates = `${startStr}/${endStr}`;

            const googleCalendarUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodedTitle}&dates=${dates}&details=${encodedDetails}&location=${encodedLocation}`;

            window.open(googleCalendarUrl, '_blank');
            return true;
        };

        const getTransactionStatuses = (txn) => {
            if (txn.type !== 'wedding') return ORDER_STATUSES;
            return WEDDING_STATUSES.filter(s => {
                if (s.id === 1 && !txn.casualShootDate) return false;
                if (s.id === 2 && !(txn.addons && txn.addons.some(a => a.name.includes('حنة') || a.name.includes('حنه')))) return false;
                return true;
            });
        };


        // --- Extracted UI Components ---

        const LoginScreen = ({ validPassword, onLogin }) => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (password === validPassword) {
                    onLogin();
                } else {
                    setError('كلمة المرور غير صحيحة');
                }
            };

            return (
                <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-100 p-4">
                    <div className="bg-slate-900 p-8 rounded-3xl shadow-2xl border border-slate-800 w-full max-w-sm text-center relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-full h-1 bg-gradient-to-r from-yellow-500 to-yellow-300"></div>
                        <div className="w-20 h-20 bg-yellow-500/20 text-yellow-500 rounded-full flex items-center justify-center mx-auto mb-6 border border-yellow-500/30 shadow-lg shadow-yellow-900/20">
                            <i className="ph-fill ph-lock-key text-4xl"></i>
                        </div>
                        <h2 className="text-2xl font-black mb-2 text-white">نظام الإدارة والتتبع</h2>
                        <p className="text-slate-400 text-sm mb-8">الرجاء إدخال كلمة المرور للمتابعة</p>
                        
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <input 
                                    type="password" 
                                    value={password}
                                    onChange={(e) => { setPassword(e.target.value); setError(''); }}
                                    placeholder="كلمة المرور..." 
                                    className="w-full p-4 border border-slate-700 bg-slate-950 text-white rounded-xl focus:border-yellow-500 outline-none text-center font-black tracking-widest text-xl shadow-inner transition-colors"
                                    autoFocus
                                />
                                {error && <p className="text-red-400 text-xs font-bold mt-3 bg-red-950/40 p-2 rounded-lg border border-red-900/50 flex items-center justify-center gap-1"><i className="ph ph-warning-circle text-base"></i> {error}</p>}
                            </div>
                            <button type="submit" className="w-full bg-gradient-to-l from-yellow-600 to-yellow-500 hover:from-yellow-500 hover:to-yellow-400 text-slate-900 font-black py-4 rounded-xl shadow-lg shadow-yellow-900/20 transition-all text-lg flex justify-center items-center gap-2">
                                <i className="ph-bold ph-sign-in text-xl"></i> تسجيل الدخول
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const Navigation = ({ settings, activeTab, setActiveTab, onLogout }) => {
            const navItems = [
              { id: 'dashboard', icon: <i className="ph ph-squares-four text-xl"></i>, label: 'الرئيسية' },
              { id: 'weddings', icon: <i className="ph ph-heart text-xl"></i>, label: 'حجوزات الزفاف 💍' },
              { id: 'expenses', icon: <i className="ph ph-printer text-xl"></i>, label: 'المصروفات والمخزون' },
              { id: 'reports', icon: <i className="ph ph-calendar-blank text-xl"></i>, label: 'التقارير' },
              { id: 'settings', icon: <i className="ph ph-gear text-xl"></i>, label: 'الإعدادات' },
            ];
            return (
              <nav className="bg-slate-950/80 backdrop-blur-xl border-b border-slate-800 text-white sticky top-0 z-50 shadow-2xl">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-20">
                    <div className="flex items-center gap-3">
                      <div className="w-12 h-12 flex items-center justify-center bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-xl shadow-lg shadow-yellow-500/20 transform transition hover:scale-105 overflow-hidden shrink-0">
                        {settings.studioLogo ? <img src={settings.studioLogo} className="w-full h-full object-cover" /> : <i className="ph ph-camera text-slate-900 text-3xl"></i>}
                      </div>
                      <div className="flex flex-col">
                        <h1 className="text-xl sm:text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-l from-yellow-300 to-yellow-500" style={{ fontWeight: 900 }}>{settings.studioName}</h1>
                        <span className="text-[10px] sm:text-xs text-slate-400 font-medium">نظام الإدارة الذكي</span>
                      </div>
                    </div>
                    <div className="hidden lg:flex items-center space-x-1 space-x-reverse bg-slate-900 p-1.5 rounded-2xl border border-slate-800">
                      {navItems.map(btn => (
                        <button key={btn.id} onClick={() => setActiveTab(btn.id)} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold transition-all ${activeTab === btn.id ? 'bg-yellow-500 text-slate-900 shadow-md' : 'text-slate-300 hover:text-white hover:bg-slate-800'}`}>
                          {btn.icon}{btn.label}

                      <div className="w-px h-6 bg-slate-700 mx-2"></div>
                      <button onClick={onLogout} className="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-bold transition-all text-red-400 hover:text-white hover:bg-red-900/50" title="تسجيل الخروج وإقفال النظام">
                          <i className="ph ph-sign-out text-lg"></i> خروج
                      </button>
                    </div>
                  </div>
                  
                  <div className="lg:hidden pb-4 overflow-x-auto hide-scrollbar">
                    <div className="flex items-center gap-2 min-w-max">
                      {navItems.map(btn => (
                        <button key={btn.id} onClick={() => setActiveTab(btn.id)} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold transition-all ${activeTab === btn.id ? 'bg-yellow-500 text-slate-900 shadow-md' : 'bg-slate-900 border border-slate-800 text-slate-300 hover:text-white'}`}>

                    </div>
                  </div>
                </div>

        };

        const StatCard = ({title, value, color, highlight, onClick}) => {

                <h4 className="text-[11px] sm:text-xs opacity-80 mb-1">{title}</h4>
                <div className="text-base sm:text-lg font-black">{formatCurrency(value)}</div>
              </div>

        const QuickServiceCard = ({ srvObj, onAdd, colorTheme = 'blue' }) => {
            const [qty, setQty] = useState(1);
            const [customPrice, setCustomPrice] = useState(srvObj.price || 0);

            useEffect(() => { setCustomPrice(srvObj.price || 0); }, [srvObj.price]);
            
            const themeColors = {
                blue: { text: 'text-blue-400', hoverText: 'group-hover:text-blue-300', btn: 'bg-blue-600 hover:bg-blue-500' },
                purple: { text: 'text-purple-400', hoverText: 'group-hover:text-purple-300', btn: 'bg-purple-600 hover:bg-purple-500' }
            };
            const currentTheme = themeColors[colorTheme] || themeColors.blue;

            return (
              <div className="bg-slate-900 p-2.5 rounded-xl border border-slate-800 transition-all shadow-sm flex flex-col gap-1.5 group hover:border-slate-700">
                <div className="flex flex-col xl:flex-row justify-between items-start gap-1.5">
                  <span className={`${currentTheme.text} text-[11px] sm:text-xs font-bold ${currentTheme.hoverText} flex-1 leading-snug line-clamp-2`}>{srvObj.name}</span>
                  <div className="flex items-center bg-slate-950 rounded-md border border-slate-700 px-1 py-0.5 focus-within:border-slate-500 transition-colors shrink-0">
                     <input type="number" value={customPrice} onChange={e => setCustomPrice(parseFloat(e.target.value) || 0)} className="w-10 sm:w-12 bg-transparent text-white text-center outline-none text-[10px] sm:text-xs font-bold" />
                     <span className="text-[8px] sm:text-[9px] text-slate-500 mr-0.5">ج.م</span>
                  </div>
                </div>
                {srvObj.desc && <span className="text-[9px] sm:text-[10px] text-slate-500 leading-relaxed truncate" title={srvObj.desc}>{srvObj.desc}</span>}
                <div className="flex items-center gap-1.5 mt-auto pt-1.5 border-t border-slate-800/50">
                  <div className="flex items-center bg-slate-950 rounded-lg border border-slate-700 overflow-hidden shrink-0">
                    <button type="button" onClick={(e) => { e.preventDefault(); setQty(Math.max(1, qty - 1)); }} className="px-1.5 py-0.5 text-slate-400 hover:text-white hover:bg-slate-800 transition-colors font-black text-xs">-</button>
                    <input type="number" min="1" value={qty} onChange={e => setQty(parseInt(e.target.value) || 1)} className="w-5 bg-transparent text-white text-center outline-none text-[11px] font-bold" />
                    <button type="button" onClick={(e) => { e.preventDefault(); setQty(qty + 1); }} className="px-1.5 py-0.5 text-slate-400 hover:text-white hover:bg-slate-800 transition-colors font-black text-xs">+</button>
                  </div>
                  <button type="button" onClick={(e) => { e.preventDefault(); onAdd({...srvObj, price: customPrice}, qty); setQty(1); setCustomPrice(srvObj.price||0); }} className={`flex-1 text-white text-[10px] sm:text-xs font-bold py-1 rounded-lg transition-colors flex justify-center items-center gap-1 ${currentTheme.btn}`}>
                    <i className="ph ph-plus-circle text-xs"></i> <span className="hidden sm:inline">إضافة</span>
                  </button>
                </div>

        const ServicesSettingsList = ({title, items, onAdd, onRemove, colorTheme = 'blue'}) => {
            const [newName, setNewName] = useState('');
            const [newPrice, setNewPrice] = useState('');
            const [newDesc, setNewDesc] = useState('');
            
            const handleEditClick = (item, idx) => {
                const obj = typeof item === 'string' ? {name: item, price: 0, desc: ''} : item;
                setNewName(obj.name);
                setNewPrice(obj.price);
                setNewDesc(obj.desc);
                onRemove(idx); 
            };

            const isBlue = colorTheme === 'blue';
            const isPink = colorTheme === 'pink';
            const colorClass = isBlue ? 'focus:border-blue-500' : isPink ? 'focus:border-pink-500' : 'focus:border-purple-500';
            const btnClass = isBlue ? 'bg-blue-600 hover:bg-blue-500' : isPink ? 'bg-pink-600 hover:bg-pink-500' : 'bg-purple-600 hover:bg-purple-500';
            const textClass = isBlue ? 'text-blue-400' : isPink ? 'text-pink-400' : 'text-purple-400';

            return (
              <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                <h3 className="font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">{title}</h3>
                <div className="flex flex-col gap-3 mb-5">
                  <div className="flex gap-2">
                    <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} className={`flex-1 p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none ${colorClass} placeholder-slate-500 text-sm`} placeholder="الاسم..."/>
                    <input type="number" value={newPrice} onChange={e=>setNewPrice(e.target.value)} className={`w-24 p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none ${colorClass} placeholder-slate-500 text-sm`} placeholder="السعر..."/>
                  </div>
                  <div className="flex gap-2">
                    <input type="text" value={newDesc} onChange={e=>setNewDesc(e.target.value)} className={`flex-1 p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none ${colorClass} placeholder-slate-500 text-sm`} placeholder="تفاصيل صغيرة (اختياري)..."/>
                    <button onClick={()=>{if(newName){onAdd({name:newName, price:parseFloat(newPrice)||0, desc:newDesc});setNewName('');setNewPrice('');setNewDesc('');}}} className={`${btnClass} text-white px-5 rounded-lg transition-colors flex items-center justify-center`}><i className="ph ph-plus text-xl"></i></button>
                  </div>
                </div>
                <div className="flex flex-col gap-2 overflow-y-auto max-h-[300px] custom-scrollbar pr-2">
                  {items.map((item, idx) => {
                    const srv = typeof item === 'string' ? {name: item, price: 0, desc: ''} : item;
                    return (
                    <div key={idx} className="bg-slate-800 p-3 rounded-xl flex justify-between items-start border border-slate-700">
                      <div className="flex flex-col">
                        <span className="text-slate-300 text-sm font-bold flex items-center gap-2">
                          {srv.name} {srv.price > 0 && <span className={`text-[10px] bg-slate-950 px-1.5 py-0.5 rounded ${textClass}`}>{srv.price} ج.م</span>}
                        </span>
                        {srv.desc && <span className="text-xs text-slate-500 mt-1">{srv.desc}</span>}
                      </div>
                      <div className="flex items-center">
                          <button onClick={()=>handleEditClick(item, idx)} className="text-blue-400 hover:text-blue-300 bg-transparent rounded-full mr-2"><i className="ph ph-pencil-simple text-base"></i></button>
                          <button onClick={()=>onRemove(idx)} className="text-red-400 hover:text-red-300 bg-transparent rounded-full mr-2"><i className="ph ph-x text-base"></i></button>
                      </div>
                    </div>
                  )})}
                </div>
              </div>
            );
        };

        const ProductsSettingsList = ({title, items, inventory, onAdd, onRemove, updateInventoryExact}) => {
            const [newName, setNewName] = useState('');
            const [newPrice, setNewPrice] = useState('');
            const [newWholesale, setNewWholesale] = useState('');
            const [newTotalQty, setNewTotalQty] = useState('');
            const [newDesc, setNewDesc] = useState('');

            const handleEditClick = (item, idx) => {
                const obj = typeof item === 'string' ? {name: item, price: 0, wholesalePrice: 0, totalQty: 0, desc: ''} : item;
                setNewName(obj.name);
                setNewPrice(obj.price);
                setNewWholesale(obj.wholesalePrice || '');
                setNewTotalQty(obj.totalQty || '');
                setNewDesc(obj.desc);
                onRemove(idx);
            };

            const handleSave = () => {
                if(newName){
                    const tQty = parseInt(newTotalQty) || 0;
                    onAdd({
                        name: newName,
                        price: parseFloat(newPrice) || 0,
                        wholesalePrice: parseFloat(newWholesale) || 0,
                        totalQty: tQty,
                        desc: newDesc
                    });
                    
                    if (inventory[newName] === undefined) {
                        updateInventoryExact(newName, tQty);
                    }
                    
                    setNewName(''); setNewPrice(''); setNewWholesale(''); setNewTotalQty(''); setNewDesc('');
                }
            };

            return (
              <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                <h3 className="font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">{title}</h3>
                <div className="flex flex-col gap-3 mb-5">
                  <div className="grid grid-cols-1 sm:grid-cols-4 gap-2">
                    <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} className="sm:col-span-1 p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-purple-500 placeholder-slate-500 text-sm" placeholder="اسم المنتج..."/>
                    <input type="number" value={newPrice} onChange={e=>setNewPrice(e.target.value)} className="p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-purple-500 placeholder-slate-500 text-sm" placeholder="سعر البيع..."/>
                    <input type="number" value={newWholesale} onChange={e=>setNewWholesale(e.target.value)} className="p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-purple-500 placeholder-slate-500 text-sm" placeholder="سعر الجملة..."/>
                    <input type="number" value={newTotalQty} onChange={e=>setNewTotalQty(e.target.value)} className="p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-purple-500 placeholder-slate-500 text-sm" placeholder="العدد الكلي..."/>
                  </div>
                  <div className="flex gap-2">
                    <input type="text" value={newDesc} onChange={e=>setNewDesc(e.target.value)} className="flex-1 p-3 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-purple-500 placeholder-slate-500 text-sm" placeholder="تفاصيل وملاحظات (اختياري)..."/>
                    <button onClick={handleSave} className="bg-purple-600 hover:bg-purple-500 text-white px-5 rounded-lg transition-colors flex items-center justify-center"><i className="ph ph-plus text-xl"></i></button>
                  </div>
                </div>
                
                <div className="flex flex-col gap-3 overflow-y-auto max-h-[400px] custom-scrollbar pr-2">
                  {items.map((item, idx) => {
                    const prod = typeof item === 'string' ? {name: item, price: 0, wholesalePrice: 0, totalQty: 0, desc: ''} : item;
                    
                    return (
                    <div key={idx} className="bg-slate-800 p-4 rounded-xl flex flex-col gap-3 border border-slate-700 relative group hover:border-purple-500/50 transition-colors">
                      <div className="flex justify-between items-start">
                        <div className="flex flex-col">
                          <span className="text-slate-200 text-base font-black flex items-center gap-2">
                             <i className="ph ph-package text-purple-400"></i> {prod.name}
                          </span>
                          {prod.desc && <span className="text-xs text-slate-400 mt-1">{prod.desc}</span>}
                        </div>
                        <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onClick={()=>handleEditClick(item, idx)} className="text-blue-400 hover:bg-slate-700 p-1.5 rounded-lg transition-colors"><i className="ph ph-pencil-simple text-base"></i></button>
                            <button onClick={()=>onRemove(idx)} className="text-red-400 hover:bg-slate-700 p-1.5 rounded-lg transition-colors"><i className="ph ph-trash text-base"></i></button>
                        </div>
                      </div>
                      
                      <div className="flex flex-wrap gap-2 text-xs font-bold">
                          <span className="bg-slate-900 border border-slate-700 px-2.5 py-1.5 rounded-lg text-slate-300 flex items-center gap-1">سعر البيع: <b className="text-purple-400">{prod.price} ج.م</b></span>
                          <span className="bg-slate-900 border border-slate-700 px-2.5 py-1.5 rounded-lg text-slate-300 flex items-center gap-1">سعر الجملة: <b className="text-orange-400">{prod.wholesalePrice || 0} ج.م</b></span>
                          <span className="bg-slate-900 border border-slate-700 px-2.5 py-1.5 rounded-lg text-slate-300 flex items-center gap-1">العدد الكلي: <b className="text-blue-400">{prod.totalQty || 0}</b></span>
                      </div>
                    </div>
                  )})}
                  
                  {items.length === 0 && <p className="text-center text-slate-500 py-4 text-sm">لا توجد منتجات مضافة بعد.</p>}
                </div>
              </div>
            );
        };

        const PaymentModal = ({ payModal, setPayModal, db }) => {
            if (!payModal) return null;

            const handleSubmit = async (e) => {
              e.preventDefault();
              const amount = parseFloat(e.target.amount.value);
              const updated = { 
                  ...payModal, 
                  paid: payModal.paid + amount, 
                  electronicPaid: (payModal.electronicPaid || 0) + (payModal.paymentType === 'electronic' ? amount : 0),
                  remaining: payModal.total - (payModal.paid + amount) 
              };
              
              if (updated.pendingReceipt && payModal.paymentType === 'electronic') {
                  updated.confirmedReceipts = [...(updated.confirmedReceipts || []), updated.pendingReceipt];
              }
              if (updated.pendingReceipt) delete updated.pendingReceipt;
              
              delete updated.paymentType;
              const targetCol = updated.type === 'wedding' ? 'weddings' : 'transactions';
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
              await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, updated.id), updated);
              setPayModal(null);
            };

            const displayName = payModal.type === 'wedding' ? `${payModal.groomName || ''} و ${payModal.brideName || ''}`.trim() || 'بدون اسم' : payModal.clientName;

            return (
              <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div className="bg-slate-900 p-5 rounded-2xl shadow-xl border border-slate-800 w-full max-w-sm relative">
                  <button onClick={() => setPayModal(null)} className="absolute top-3 left-3 p-2 text-slate-500 hover:text-red-400"><i className="ph ph-x text-xl"></i></button>
                  <h3 className="text-xl font-black mb-3 border-b border-slate-800 pb-3 text-center text-slate-100">
                      {payModal.paymentType === 'electronic' ? 'سداد إلكتروني (إنستاباي/محافظ)' : 'سداد نقدي'}
                  </h3>
                  <div className="mb-4 bg-slate-950 p-3 rounded-xl text-center border border-slate-800">
                    <p className="text-slate-400 text-sm">العميل: <b className="text-white text-base">{displayName}</b></p>
                    <p className="text-red-400 font-bold mt-1 text-sm">الباقي المستحق: {payModal.remaining} ج.م</p>
                  </div>
                  <form onSubmit={handleSubmit} className="space-y-3">
                    <input type="number" name="amount" required min="1" max={payModal.remaining} defaultValue={payModal.remaining} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-xl text-xl font-black text-center outline-none focus:border-blue-500 shadow-inner"/>
                    <button type="submit" className={`w-full text-white font-black py-3 rounded-xl shadow-lg transition-all text-base ${payModal.paymentType === 'electronic' ? 'bg-indigo-600 hover:bg-indigo-500 shadow-indigo-900/20' : 'bg-green-600 hover:bg-green-500 shadow-green-900/20'}`}>تأكيد تحصيل المبلغ</button>
                  </form>
                </div>
              </div>
            );
        };

        const ReceiptModal = ({ imageUrl, onClose }) => {
            if (!imageUrl) return null;
            return (
                <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center z-[60] p-4 flex-col gap-4" onClick={onClose}>
                    <button onClick={onClose} className="absolute top-4 left-4 text-slate-300 hover:text-red-400 bg-slate-800 p-2 rounded-full transition-colors z-10"><i className="ph ph-x text-xl"></i></button>
                    <img src={imageUrl} alt="Fullscreen Image" className="max-w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border border-slate-700" onClick={e => e.stopPropagation()} />
                    <a href={imageUrl} download="studio_photo.jpg" target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-full font-bold flex items-center gap-2 shadow-lg transition-all">
                        <i className="ph ph-download-simple text-xl"></i> تحميل الصورة
                    </a>
                </div>
            );
        };

        const TxnDetailsModal = ({ txnDetailsModal, setTxnDetailsModal, setReceiptImageModal, db, allRecords }) => {
            const [isUploadingPhotos, setIsUploadingPhotos] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);

            useEffect(() => {
                if(txnDetailsModal) {
                    // Check and clean expired photos immediately when modal opens
                    const runCleanup = async () => {
                        const updatedTxn = await checkAndCleanExpiredPhotos(txnDetailsModal, db, getStorage());
                        if(updatedTxn.uploadedPhotos?.length !== txnDetailsModal.uploadedPhotos?.length) {
                             setTxnDetailsModal(updatedTxn);
                        }
                    };
                    runCleanup();
                }
            }, [txnDetailsModal?.id]); // Only run when opening a new modal

            if (!txnDetailsModal) return null;
            
            const isWedding = txnDetailsModal.type === 'wedding';
            const displayName = isWedding ? `${txnDetailsModal.groomName || ''} و ${txnDetailsModal.brideName || ''}`.trim() : txnDetailsModal.clientName;
            const reqsText = getReqsText(txnDetailsModal);
            
            const customerHistory = allRecords ? allRecords.filter(t => t.phone === txnDetailsModal.phone && t.id !== txnDetailsModal.id).sort((a,b) => new Date(b.dateTime) - new Date(a.dateTime)) : [];

            // رفع الصورة مباشرة إلى Firebase Storage بجودتها الأصلية
            const handlePhotoUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                setIsUploadingPhotos(true);
                
                try {
                    let newUploaded = [...(txnDetailsModal.uploadedPhotos || [])];
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                    const storageObj = getStorage();

                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        // تحديد مسار الصورة في Storage
                        const storagePath = `artifacts/${appId}/public/data/photos/${txnDetailsModal.id}_${Date.now()}_${file.name}`;
                        const storageRef = ref(storageObj, storagePath);

                        // بدء الرفع
                        const uploadTask = uploadBytesResumable(storageRef, file);
                        
                        await new Promise((resolve, reject) => {
                            uploadTask.on('state_changed', 
                                (snapshot) => {
                                    // حساب نسبة التقدم الكلية
                                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                                    const overallProgress = Math.round(((i) / files.length) * 100 + (progress / files.length));
                                    setUploadProgress(overallProgress);
                                }, 
                                (error) => { reject(error); }, 
                                async () => {
                                    // اكتمل الرفع، الحصول على الرابط المباشر
                                    const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                                    
                                    // إضافة تاريخ الصلاحية (5 أيام من الآن)
                                    const expiryTime = Date.now() + (5 * 24 * 60 * 60 * 1000); 

                                    newUploaded.push({
                                        name: file.name,
                                        url: downloadURL,
                                        path: storagePath,
                                        expiryTimestamp: expiryTime
                                    });
                                    resolve();
                                }
                            );
                        });
                    }

                    const updated = {...txnDetailsModal, uploadedPhotos: newUploaded};
                    const targetCol = updated.type === 'wedding' ? 'weddings' : 'transactions';
                    await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, updated.id), updated);
                    setTxnDetailsModal(updated);
                } catch (error) {
                    console.error("Upload error:", error);
                    alert("حدث خطأ أثناء معالجة وحفظ الصور. " + (error.message || ""));
                }
                setIsUploadingPhotos(false);
                setUploadProgress(0);
                e.target.value = null; 
            };

            const handleDeletePhoto = async (index) => {
                if(!confirm("هل أنت متأكد من حذف هذه الصورة؟")) return;
                const photoToDelete = txnDetailsModal.uploadedPhotos[index];
                const newUploaded = [...txnDetailsModal.uploadedPhotos];
                newUploaded.splice(index, 1);
                
                try {
                    // حذف من Storage أولاً إذا كان لها مسار
                    if (photoToDelete.path) {
                        const storageObj = getStorage();
                        const storageRef = ref(storageObj, photoToDelete.path);
                        await deleteObject(storageRef).catch(err => console.warn("قد تكون الصورة محذوفة مسبقاً:", err));
                    }

                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                    const updated = {...txnDetailsModal, uploadedPhotos: newUploaded};
                    const targetCol = updated.type === 'wedding' ? 'weddings' : 'transactions';
                    await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, updated.id), updated);
                    setTxnDetailsModal(updated);
                } catch (error) {
                    console.error("Delete error:", error);
                    alert("حدث خطأ أثناء الحذف.");
                }
            };

            return (
              <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setTxnDetailsModal(null)}>
                <div className="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 w-full max-w-lg relative max-h-[90vh] overflow-y-auto custom-scrollbar" onClick={e => e.stopPropagation()}>
                  <button onClick={() => setTxnDetailsModal(null)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400 transition-colors"><i className="ph ph-x text-2xl"></i></button>
                  
                  <h3 className="text-2xl font-black mb-6 border-b border-slate-800 pb-4 text-slate-100 flex items-center gap-2">
                    {isWedding ? <i className="ph ph-heart text-pink-500"></i> : <i className="ph ph-files text-blue-500"></i>}
                    تفاصيل {isWedding ? 'حجز زفاف' : 'الإيصال'} #{txnDetailsModal.receiptNo}
                  </h3>

                  <div className="space-y-5">
                    <div className="flex justify-between items-center bg-slate-950 p-4 rounded-xl border border-slate-800">
                       <div>
                          <p className="text-slate-500 text-xs mb-1">الاسم</p>
                          <p className="font-bold text-lg text-slate-100">{displayName}</p>
                       </div>
                       <div className="text-left">
                          <p className="text-slate-500 text-xs mb-1">رقم الهاتف</p>
                          <p className="font-mono text-slate-300">{txnDetailsModal.phone}</p>
                       </div>
                    </div>

                    {isWedding && (
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 grid grid-cols-2 gap-4">
                            <div><p className="text-slate-500 text-xs mb-1">موعد الزفاف</p><p className="font-bold text-slate-200">{formatDateOnly(txnDetailsModal.weddingDate)}</p></div>
                            <div><p className="text-slate-500 text-xs mb-1">اللوكيشن</p><p className="font-bold text-slate-200">{txnDetailsModal.location}</p></div>
                            <div><p className="text-slate-500 text-xs mb-1">الميك أب</p><p className="font-bold text-slate-200">{txnDetailsModal.makeupArtist}</p></div>
                            <div><p className="text-slate-500 text-xs mb-1">وقت الخروج</p><p className="font-bold text-slate-200">{txnDetailsModal.leaveTime}</p></div>
                            <div className="col-span-2 border-t border-slate-800 pt-3 mt-1"><p className="text-slate-500 text-xs mb-1">العنوان</p><p className="font-bold text-slate-200">{txnDetailsModal.groomAddress}</p></div>
                        </div>
                    )}

                    <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                       <p className="text-slate-500 text-xs mb-2">المطلوب (الخدمات والمنتجات)</p>
                       <p className="text-slate-200 leading-relaxed font-medium whitespace-pre-wrap">{reqsText}</p>
                    </div>

                    {/* قسم أرقام الصور المتعددة */}
                    {txnDetailsModal.photoNo && (Array.isArray(txnDetailsModal.photoNo) ? txnDetailsModal.photoNo.some(n=>n) : true) && (
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                           <span className="text-slate-500 text-sm">أرقام الصور:</span>
                           <span className="font-bold text-slate-200" dir="ltr">
                               {Array.isArray(txnDetailsModal.photoNo) ? txnDetailsModal.photoNo.filter(Boolean).join(' , ') : txnDetailsModal.photoNo}
                           </span>
                        </div>
                    )}

                    {/* قسم إضافة رابط تحميل الصور للعميل */}
                    <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 mt-4">
                       <p className="text-slate-500 text-sm font-bold mb-3 flex items-center gap-2">
                           <i className="ph ph-link text-blue-500 text-lg"></i> رابط خارجي لتحميل الصور (لإرساله للعميل)
                       </p>
                       <div className="flex gap-2">
                          <input type="url" placeholder="ضع رابط جوجل درايف أو الموقع هنا..." className="flex-1 p-2.5 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none text-sm focus:border-blue-500" defaultValue={txnDetailsModal.photosLink || ''} id="photosLinkInput" />
                          <button onClick={async () => {
                              const link = document.getElementById('photosLinkInput').value.trim();
                              const updated = {...txnDetailsModal, photosLink: link};
                              const targetCol = updated.type === 'wedding' ? 'weddings' : 'transactions';
                              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                              await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, updated.id), updated);
                              setTxnDetailsModal(updated);
                              alert("تم حفظ رابط الصور بنجاح!");
                          }} className="bg-blue-600 hover:bg-blue-500 text-white px-4 rounded-lg text-sm font-bold transition-colors">حفظ</button>
                       </div>
                       {txnDetailsModal.photosLink && (
                           <p className="text-xs text-green-400 mt-2 flex items-center gap-1"><i className="ph-fill ph-check-circle"></i> تم إرفاق الرابط. العميل سيتمكن من تحميل صوره عبر رابط التتبع.</p>
                       )}
                    </div>

                    {/* قسم الرفع السحابي (جودة عالية) */}
                    <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 mt-4">
                       <p className="text-slate-500 text-sm font-bold flex items-center gap-2 mb-1">
                           <i className="ph ph-cloud-arrow-up text-green-500 text-lg"></i> رفع صور للعميل (جودة أصلية)
                       </p>
                       <div className="flex bg-yellow-950/30 border border-yellow-900/50 p-2 rounded-lg items-center gap-2 mb-3">
                            <i className="ph-fill ph-warning-circle text-yellow-500"></i>
                            <p className="text-[10px] text-yellow-400 leading-tight">سيتم حفظ الصور على السحابة، و<b>ستُحذف تلقائياً بعد 5 أيام</b> من تاريخ الرفع لتوفير مساحة التخزين.</p>
                       </div>
                       
                       <div className="flex flex-col gap-3">
                          <input type="file" multiple accept="image/*" onChange={handlePhotoUpload} disabled={isUploadingPhotos} className="block w-full text-sm text-slate-400 file:ml-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-green-900/30 file:text-green-400 hover:file:bg-green-900/50 transition-colors border border-slate-700 rounded-xl cursor-pointer" />
                          {isUploadingPhotos && (
                              <div className="w-full bg-slate-800 rounded-full h-2 mt-1 overflow-hidden">
                                  <div className="bg-green-500 h-2 rounded-full transition-all duration-300" style={{ width: `${uploadProgress}%` }}></div>
                              </div>
                          )}
                       </div>
                       
                       {txnDetailsModal.uploadedPhotos && txnDetailsModal.uploadedPhotos.length > 0 && (
                           <div className="mt-4 pt-4 border-t border-slate-800">
                               <p className="text-xs text-slate-400 mb-3 font-bold flex justify-between items-center">
                                   <span>الصور المرفوعة ({txnDetailsModal.uploadedPhotos.length}):</span>
                               </p>
                               <div className="flex flex-wrap gap-3">
                                   {txnDetailsModal.uploadedPhotos.map((photo, idx) => {
                                       const daysRemaining = photo.expiryTimestamp ? Math.max(0, Math.ceil((photo.expiryTimestamp - Date.now()) / (1000 * 60 * 60 * 24))) : 5;
                                       return (
                                       <div key={idx} className="relative group w-16 h-16">
                                           <img src={photo.url} className="w-full h-full object-cover rounded-lg border border-slate-700 cursor-pointer shadow-sm hover:border-green-500 transition-colors" onClick={() => setReceiptImageModal(photo.url)} title="عرض الصورة" />
                                           <div className="absolute bottom-0 left-0 right-0 bg-slate-950/80 text-[8px] text-center font-mono py-0.5 rounded-b-lg">متبقي {daysRemaining} يوم</div>
                                           <button onClick={() => handleDeletePhoto(idx)} className="absolute -top-2 -right-2 bg-red-600 hover:bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 shadow-lg transition-all scale-90 hover:scale-100"><i className="ph ph-x text-xs"></i></button>
                                       </div>
                                       );
                                   })}
                               </div>
                           </div>
                       )}
                    </div>

                    <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 grid grid-cols-2 gap-4 relative overflow-hidden">
                       <div className={`absolute top-0 right-0 w-1 h-full ${isWedding ? 'bg-pink-500' : 'bg-blue-500'}`}></div>
                       <div><p className="text-slate-500 text-xs mb-1">الإجمالي</p><p className="font-bold text-slate-100">{txnDetailsModal.total} ج.م</p></div>
                       <div><p className="text-slate-500 text-xs mb-1">إجمالي المدفوع</p><p className="font-bold text-green-400">{txnDetailsModal.paid} ج.م</p></div>
                       <div><p className="text-slate-500 text-xs mb-1">الدفع النقدي</p><p className="font-bold text-emerald-400">{(txnDetailsModal.paid || 0) - (txnDetailsModal.electronicPaid || 0)} ج.م</p></div>
                       <div><p className="text-slate-500 text-xs mb-1">الدفع الإلكتروني</p><p className="font-bold text-indigo-400">{txnDetailsModal.electronicPaid || 0} ج.م</p></div>
                       <div className="col-span-2 pt-4 mt-2 border-t border-slate-800 flex justify-between items-center">
                          <span className="text-slate-400 text-sm">الباقي المستحق:</span>
                          <span className={`font-black text-xl ${txnDetailsModal.remaining > 0 ? 'text-red-400' : 'text-green-400'}`}>{txnDetailsModal.remaining} ج.م</span>
                       </div>
                    </div>

                    {(txnDetailsModal.clientRating > 0 || txnDetailsModal.clientFeedback) && (
                        <div className="bg-yellow-950/20 p-4 rounded-xl border border-yellow-500/30 mt-4">
                           <p className="text-yellow-400 text-sm font-bold mb-3 flex items-center gap-2">
                               <i className="ph-fill ph-star text-lg"></i> تقييم ورأي العميل
                           </p>
                           {txnDetailsModal.clientRating > 0 && (
                               <div className="flex gap-1 mb-2 text-yellow-500 text-xl" dir="ltr">
                                   {[...Array(5)].map((_, i) => (
                                       <i key={i} className={`${i < txnDetailsModal.clientRating ? 'ph-fill' : 'ph'} ph-star`}></i>
                                   ))}
                               </div>
                           )}
                           {txnDetailsModal.clientFeedback && (
                               <p className="text-slate-300 text-sm leading-relaxed bg-slate-950 p-3 rounded-lg border border-slate-800">"{txnDetailsModal.clientFeedback}"</p>
                           )}
                        </div>
                    )}

                    {txnDetailsModal.pendingReceipt && (
                        <div className="bg-indigo-950/20 p-4 rounded-xl border border-indigo-500/30 mt-4">
                           <p className="text-indigo-300 text-sm font-bold mb-3 flex items-center gap-2">
                               <i className="ph ph-image text-lg"></i> صورة التحويل الإلكتروني المرفقة للمراجعة
                           </p>
                           <img src={txnDetailsModal.pendingReceipt} alt="Receipt" className="w-full rounded-lg border border-indigo-500/50 cursor-pointer hover:opacity-90 transition-opacity" onClick={() => setReceiptImageModal(txnDetailsModal.pendingReceipt)} />
                        </div>
                    )}

                    {txnDetailsModal.confirmedReceipts && txnDetailsModal.confirmedReceipts.length > 0 && (
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 mt-4">
                           <p className="text-slate-500 text-sm font-bold mb-3 flex items-center gap-2">
                               <i className="ph ph-check-circle text-green-500 text-lg"></i> صور التحويلات المؤكدة
                           </p>
                           <div className="flex flex-wrap gap-3">
                               {txnDetailsModal.confirmedReceipts.map((imgUrl, idx) => (
                                   <img key={idx} src={imgUrl} alt="Confirmed Receipt" className="w-24 h-24 object-cover rounded-lg border border-slate-700 cursor-pointer hover:opacity-90 transition-opacity shadow-sm" onClick={() => setReceiptImageModal(imgUrl)} />
                               ))}
                           </div>
                        </div>
                    )}

                    {customerHistory.length > 0 && (
                        <div className="bg-slate-900 p-4 rounded-xl border border-slate-700 mt-4 shadow-inner">
                           <p className="text-yellow-400 text-sm font-bold mb-3 flex items-center gap-2">
                               <i className="ph-fill ph-clock-counter-clockwise text-lg"></i> سجل زيارات العميل السابقة ({customerHistory.length})
                           </p>
                           <div className="space-y-2 max-h-40 overflow-y-auto custom-scrollbar pr-1">
                               {customerHistory.map(hist => (
                                   <div key={hist.id} 
                                        className="bg-slate-950 p-3 rounded-lg border border-slate-800 flex justify-between items-center text-xs cursor-pointer hover:border-blue-500/50 hover:bg-slate-900 transition-all"
                                        onClick={() => setTxnDetailsModal(hist)}
                                        title="اضغط لفتح تفاصيل الإيصال">
                                       <div>
                                           <span className={`font-bold ml-2 ${hist.type === 'wedding' ? 'text-pink-400' : 'text-blue-400'}`}>
                                               {hist.type === 'wedding' ? 'حجز زفاف' : 'جلسة تصوير'}
                                           </span>
                                           <span className="text-slate-500 font-mono">{formatDateOnly(hist.dateTime)}</span>
                                       </div>
                                       <div className="text-left font-bold text-slate-300 flex items-center gap-2">
                                           <span>{hist.total} ج.م</span>
                                           <i className="ph ph-caret-left text-slate-500"></i>
                                       </div>
                                   </div>
                               ))}
                           </div>
                        </div>
                    )}
                    
                    <div className="text-xs text-slate-500 text-center mt-4">تاريخ التسجيل: {formatDate(txnDetailsModal.dateTime)}</div>
                  </div>
                </div>
              </div>
            );
        };

        const TransactionCard = ({ txn, onDelete, onEdit, onPayRemaining, onViewReceipt, sendInvoice, updateStatus, onViewDetails, settings, allRecords }) => {
            const [showWaMenu, setShowWaMenu] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState(false);
            const [actionError, setActionError] = useState('');
            
            const currentStatus = txn.status || 0;
            const cashPaid = (txn.paid || 0) - (txn.electronicPaid || 0);
            const isWedding = txn.type === 'wedding';
            const displayName = isWedding ? `${txn.groomName || ''} و ${txn.brideName || ''}`.trim() : txn.clientName;
            
            const statusesToUse = getTransactionStatuses(txn);
            const visitCount = allRecords ? allRecords.filter(t => t.phone === txn.phone).length : 1;
            const isRepeat = visitCount > 1;

            const handleAddToCalendar = (e) => {
                e.stopPropagation();
                const success = addToCalendar(txn);
                if (!success) {
                    setActionError('يجب تحديد موعد الزفاف أولاً لإضافته للتقويم.');
                    setTimeout(() => setActionError(''), 4000);
                }
            };

            return (
              <div className="bg-slate-900 p-5 rounded-2xl shadow-sm border border-slate-800 flex flex-col md:flex-row gap-6 justify-between hover:border-slate-700 transition-all cursor-pointer group" onClick={() => onViewDetails && onViewDetails(txn)} title="اضغط لعرض التفاصيل">
                <div className="flex-1 flex flex-col justify-between">
                  <div className="space-y-3">
                      <div className="flex justify-between items-start">
                        <h3 className={`text-lg font-bold flex items-center gap-2 transition-colors ${isWedding ? 'text-pink-100 group-hover:text-pink-400' : 'text-slate-100 group-hover:text-blue-400'}`}>
                           {isWedding ? <i className="ph ph-heart text-pink-500 text-2xl group-hover:text-pink-400"></i> : <i className="ph ph-user-circle text-slate-500 text-2xl group-hover:text-blue-500"></i>}
                           {displayName || 'عميل بدون اسم'}
                        </h3>
                        <div className="flex items-center gap-2">
                           {(txn.photosLink || (txn.uploadedPhotos && txn.uploadedPhotos.length > 0)) && (
                               <span className="text-green-400 flex items-center gap-1 text-[10px] sm:text-xs font-bold bg-green-950/30 px-2 py-1 rounded border border-green-900/50" title="مرفق صور للتحميل">
                                   <i className="ph-fill ph-link text-sm"></i> يوجد صور
                               </span>
                           )}
                           {isRepeat && (
                               <span className="text-yellow-400 flex items-center gap-1 text-[10px] sm:text-xs font-bold bg-yellow-950/30 px-2 py-1 rounded border border-yellow-900/50" title="عميل دائم">
                                   <i className="ph-fill ph-star text-sm"></i> عميل مميز ({visitCount})
                               </span>
                           )}
                           {txn.clientRating > 0 && (
                               <span className="text-yellow-400 flex items-center gap-1 text-[10px] sm:text-xs font-bold bg-yellow-950/30 px-2 py-1 rounded border border-yellow-900/50" title="تقييم العميل">
                                   <i className="ph-fill ph-star text-sm"></i> {txn.clientRating}/5
                               </span>
                           )}
                           {txn.viewedByClient ? (
                               <span className="text-blue-400 flex items-center gap-1 text-[10px] sm:text-xs font-bold bg-blue-950/30 px-2 py-1 rounded border border-blue-900/50" title={`تمت المشاهدة في: ${formatDate(txn.viewTime)}`}>
                                   <i className="ph ph-checks text-sm sm:text-base"></i> تمت المشاهدة
                               </span>
                           ) : (
                               <span className="text-slate-500 flex items-center gap-1 text-[10px] sm:text-xs bg-slate-800/50 px-2 py-1 rounded border border-slate-700" title="لم يتم فتح الرابط بعد">
                                   <i className="ph ph-check text-sm sm:text-base"></i> لم يُشاهد
                               </span>
                           )}
                           <span className="bg-slate-800 text-slate-400 text-xs px-2 py-1 rounded border border-slate-700 font-mono">#{txn.receiptNo}</span>
                        </div>
                      </div>
                      <div className="text-sm text-slate-400 flex flex-wrap gap-x-4">
                        {txn.phone && <span>📞 {txn.phone}</span>}
                        <span>⏱️ {formatDate(txn.dateTime)}</span>
                        {isWedding && txn.weddingDate && <span className="text-pink-400">💍 {formatDateOnly(txn.weddingDate)}</span>}
                      </div>
                      
                      <div className="flex flex-col gap-3 pt-2 text-sm">
                        <div className="flex flex-wrap gap-2 items-center bg-slate-950 p-3 rounded-xl border border-slate-800/50 mt-1">
                          <span className="text-slate-300">الإجمالي: <b className="text-white">{txn.total}</b></span>
                          <div className="hidden sm:block w-px h-4 bg-slate-700 mx-1"></div>
                          <span className="text-green-400">المدفوع: <b className="text-green-300">{txn.paid}</b></span>
                          {(cashPaid > 0 || txn.electronicPaid > 0) && <div className="hidden sm:block w-px h-4 bg-slate-700 mx-1"></div>}
                          {cashPaid > 0 && <span className="text-emerald-400 text-xs bg-emerald-950/30 px-2 py-1 rounded border border-emerald-900/50 flex items-center gap-1"><i className="ph ph-money text-base"></i> نقدي: {cashPaid}</span>}
                          {txn.electronicPaid > 0 && <span className="text-indigo-400 text-xs bg-indigo-950/30 px-2 py-1 rounded border border-indigo-900/50 flex items-center gap-1"><i className="ph ph-wallet text-base"></i> إلكتروني: {txn.electronicPaid}</span>}
                          <div className="hidden sm:block w-px h-4 bg-slate-700 mx-1"></div>
                          <span className={txn.remaining > 0 ? "text-red-400" : "text-green-400"}>الباقي: <b>{txn.remaining}</b></span>
                        </div>
                      </div>

                      {txn.pendingReceipt && (
                          <div className="mt-3 p-3 bg-indigo-950/20 border border-indigo-500/30 rounded-xl flex items-center gap-4" onClick={(e) => e.stopPropagation()}>
                              <img 
                                  src={txn.pendingReceipt} 
                                  alt="إيصال تحويل مرفق" 
                                  className="w-14 h-14 object-cover rounded-lg cursor-pointer border border-indigo-500/50 hover:scale-105 transition-transform shadow-md"
                                  onClick={(e) => { e.stopPropagation(); onViewReceipt(txn.pendingReceipt); }}
                                  title="اضغط للتكبير"
                              />
                              <div>
                                  <h4 className="text-sm font-bold text-indigo-300 flex items-center gap-1"><i className="ph ph-warning-circle text-lg"></i> إيصال قيد المراجعة</h4>
                                  <p className="text-xs text-indigo-200/70 mt-1">العميل قام برفع إيصال، راجع الصورة ثم اضغط (سداد إلكتروني) لتأكيد التحصيل وإضافته.</p>
                              </div>
                          </div>
                      )}
                  </div>

                  <div className="mt-5 pt-4 border-t border-slate-800" onClick={e => e.stopPropagation()}>
                    <div className="flex flex-wrap gap-2">
                        {statusesToUse.map(s => (
                            <button
                                key={s.id}
                                onClick={() => updateStatus(txn.id, s.id)}
                                className={`flex-1 min-w-[70px] py-2 px-1 rounded-xl text-[10px] sm:text-xs font-bold transition-all flex flex-col items-center gap-1 border ${currentStatus === s.id ? s.activeClass : s.inactiveClass}`}
                            >
                                <i className={`ph ${s.icon} text-lg`}></i>
                                <span className="text-center leading-tight">{s.label}</span>
                            </button>
                        ))}
                    </div>
                  </div>
                </div>

                <div className="flex flex-col gap-2 min-w-[160px] justify-start border-t md:border-t-0 md:border-r border-slate-800 pt-4 md:pt-0 md:pr-6" onClick={e => e.stopPropagation()}>
                  {actionError && <div className="text-red-400 bg-red-950/40 border border-red-900/50 p-2 rounded-xl text-[10px] font-bold text-center mb-1">{actionError}</div>}

                  {isWedding && (
                    <button onClick={handleAddToCalendar} className="w-full bg-pink-600 hover:bg-pink-500 text-white px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all shadow-sm mb-2">
                      <i className="ph ph-calendar-plus text-xl"></i> إضافة للتقويم
                    </button>
                  )}

                  <button onClick={(e) => { e.stopPropagation(); sendInvoice(); }} className="w-full bg-blue-600 hover:bg-blue-500 text-white px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all shadow-sm">
                    <i className="ph ph-receipt text-xl"></i> إرسال الفاتورة
                  </button>
                  
                  <div className="relative w-full">
                    <button onClick={(e) => { e.stopPropagation(); setShowWaMenu(!showWaMenu); }} className="w-full bg-green-600 hover:bg-green-500 text-white px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all">
                      <i className="ph ph-whatsapp-logo text-xl"></i> رسائل واتساب
                    </button>
                    {showWaMenu && (
                      <div className="absolute right-0 mt-2 w-48 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl z-10 p-1 flex flex-col overflow-hidden">
                        <button onClick={(e) => { e.stopPropagation(); openWhatsApp(txn.phone, generateWA_Message('tracking', txn, settings, isWedding)); setShowWaMenu(false);}} className="text-right px-3 py-2.5 text-sm text-blue-300 hover:bg-slate-700 font-bold border-b border-slate-700">📍 رابط التتبع للعميل</button>
                        {(txn.photosLink || (txn.uploadedPhotos && txn.uploadedPhotos.length > 0)) && (
                            <button onClick={(e) => { e.stopPropagation(); openWhatsApp(txn.phone, `أهلاً ${displayName} 👋\nصورك جاهزة للتحميل بجودة عالية! يمكنك تحميلها وحفظها من هذا الرابط:\n${window.location.href.split('?')[0]}?phone=${encodeURIComponent(txn.phone)}&receipt=${encodeURIComponent(txn.receiptNo)}&type=${isWedding ? 'w' : 't'}`); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-green-400 hover:bg-slate-700 font-bold border-b border-slate-700 flex items-center gap-2"><i className="ph ph-download-simple"></i> إرسال رابط الصور</button>
                        )}
                        {isRepeat && (
                            <button onClick={(e) => { e.stopPropagation(); openWhatsApp(txn.phone, generateWA_Message('vipDiscount', txn, settings, isWedding)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-pink-400 hover:bg-slate-700 font-bold">🎁 إرسال هدية خصم (VIP)</button>
                        )}
                        {isRepeat ? (
                            <button onClick={(e) => { e.stopPropagation(); openWhatsApp(txn.phone, generateWA_Message('welcomeBack', txn, settings, isWedding)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-yellow-400 hover:bg-slate-700 font-bold">🌟 ترحيب بالعودة</button>
                        ) : (
                            <button onClick={(e) => { e.stopPropagation(); openWhatsApp(txn.phone, generateWA_Message('welcome', txn, settings, isWedding)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-slate-200 hover:bg-slate-700">👋 رسالة ترحيب</button>
                        )}
                        <button onClick={(e) => { e.stopPropagation(); openWhatsApp(txn.phone, generateWA_Message('ready', txn, settings, isWedding)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-slate-200 hover:bg-slate-700">🎉 الشغل خلص</button>
                        <button onClick={(e) => { e.stopPropagation(); openWhatsApp(txn.phone, generateWA_Message('reminder', txn, settings, isWedding)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-slate-200 hover:bg-slate-700">⚠️ تذكير بالباقي</button>
                      </div>
                    )}
                  </div>

                  {txn.remaining > 0 && (
                      <div className="flex gap-2 w-full mt-2">
                        <button onClick={(e) => { e.stopPropagation(); onPayRemaining({...txn, paymentType: 'cash'}); }} className="flex-1 bg-yellow-500 hover:bg-yellow-400 text-slate-900 px-2 py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1 transition-all shadow-sm"><i className="ph ph-money text-lg"></i> نقدي</button>
                        <button onClick={(e) => { e.stopPropagation(); onPayRemaining({...txn, paymentType: 'electronic'}); }} className="flex-1 bg-indigo-500 hover:bg-indigo-400 text-white px-2 py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1 transition-all shadow-sm"><i className="ph ph-wallet text-lg"></i> إلكتروني</button>
                      </div>
                  )}

                  {onEdit && (
                    <button onClick={(e) => { e.stopPropagation(); onEdit(txn); }} className="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all mt-2">
                        <i className="ph ph-pencil-simple text-xl"></i> تعديل البيانات
                    </button>
                  )}
                  
                  {confirmDelete ? (
                      <div className="flex flex-col gap-2 mt-auto pt-2">
                         <span className="text-xs text-red-400 text-center font-bold">تأكيد الحذف نهائياً؟</span>
                         <div className="flex gap-2">
                            <button onClick={(e) => { e.stopPropagation(); onDelete(txn.id); }} className="flex-1 bg-red-600 hover:bg-red-500 text-white px-2 py-2 rounded-xl text-xs font-bold transition-all">نعم</button>
                            <button onClick={(e) => { e.stopPropagation(); setConfirmDelete(false); }} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white px-2 py-2 rounded-xl text-xs font-bold transition-all">إلغاء</button>
                         </div>
                      </div>
                  ) : (
                      <button onClick={(e) => { e.stopPropagation(); setConfirmDelete(true); }} className="bg-red-950/40 hover:bg-red-900/60 text-red-400 border border-red-900/30 px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all mt-auto"><i className="ph ph-trash text-xl"></i> حذف الإيصال</button>
                  )}
                </div>
              </div>
            );
        };

        const TopCustomers = ({ allRecords }) => {
            const currentMonth = new Date().getMonth() + 1;
            const currentYear = new Date().getFullYear();

            const topCustomers = useMemo(() => {
                if (!allRecords) return [];
                const thisMonthRecords = allRecords.filter(t => t.month === currentMonth && t.year === currentYear);
                const counts = {};
                thisMonthRecords.forEach(t => {
                    if (!t.phone) return;
                    if (!counts[t.phone]) {
                        counts[t.phone] = {
                            phone: t.phone,
                            name: t.clientName || t.groomName || 'بدون اسم',
                            visits: 0,
                            totalSpent: 0
                        };
                    }
                    counts[t.phone].visits += 1;
                    counts[t.phone].totalSpent += (parseFloat(t.total) || 0);
                });
                
                return Object.values(counts)
                    .filter(c => c.visits > 1) 
                    .sort((a, b) => b.visits - a.visits || b.totalSpent - a.totalSpent)
                    .slice(0, 5);
            }, [allRecords, currentMonth, currentYear]);

            if (topCustomers.length === 0) return null;

            return (
                <div className="bg-gradient-to-br from-yellow-900/20 to-slate-900 p-6 rounded-2xl shadow-sm border border-yellow-500/30 mb-6">
                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-yellow-400">
                        <i className="ph-fill ph-crown text-2xl"></i> نجوم الشهر (أكثر العملاء زيارة)
                    </h2>
                    <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                        {topCustomers.map((cust, idx) => (
                            <div key={idx} className="bg-slate-950 p-4 rounded-xl border border-yellow-500/20 flex flex-col items-center text-center shadow-inner relative overflow-hidden group hover:border-yellow-500/50 transition-colors">
                                {idx === 0 && <div className="absolute top-0 right-0 bg-yellow-500 text-slate-900 text-[10px] font-black px-2 py-0.5 rounded-bl-lg z-10">المركز 1</div>}
                                <div className="w-10 h-10 bg-yellow-500/10 text-yellow-500 rounded-full flex items-center justify-center mb-2">
                                    <i className="ph-fill ph-star text-xl"></i>
                                </div>
                                <span className="font-bold text-slate-200 text-sm truncate w-full">{cust.name}</span>
                                <span className="text-yellow-400 font-black text-xs mt-1">{cust.visits} زيارات</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const DashboardTab = ({ settings, setSettings, transactions, inventory, db, allRecords }) => {
            const [showAddModal, setShowAddModal] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [formData, setFormData] = useState({ clientName: '', phone: '', photoNo: [''], requirements: '', total: '', paid: '', paymentMethod: 'cash', soldProducts: [], photosLink: '' });
            const [loyaltyAlert, setLoyaltyAlert] = useState('');
            const [query, setQuery] = useState('');
            const [filterDate, setFilterDate] = useState('');
            const [payModal, setPayModal] = useState(null);
            const [receiptImageModal, setReceiptImageModal] = useState(null);
            const [txnDetailsModal, setTxnDetailsModal] = useState(null);

            const handleAddService = (srv, qty) => {
              const validQty = parseInt(qty) || 1;
              const addedText = validQty > 1 ? `${validQty} × ${srv.name}` : srv.name;
              const addedPrice = (parseFloat(srv.price) || 0) * validQty;
              setFormData(prev => {
                 const newProductsList = [...(prev.soldProducts || [])];
                 newProductsList.push({ name: srv.name, qty: validQty });
                 const newReqs = prev.requirements ? `${prev.requirements}\n📌 ${addedText}` : `📌 ${addedText}`;
                 return { ...prev, requirements: newReqs, total: (parseFloat(prev.total) || 0) + addedPrice, soldProducts: newProductsList };
              });
            };

            const handleEdit = (txn) => {
                setFormData({
                    id: txn.id,
                    receiptNo: txn.receiptNo,
                    dateTime: txn.dateTime,
                    month: txn.month,
                    year: txn.year,
                    status: txn.status,
                    clientName: txn.clientName || '',
                    phone: txn.phone || '',
                    photoNo: Array.isArray(txn.photoNo) ? txn.photoNo : (txn.photoNo ? txn.photoNo.split(',').map(s=>s.trim()) : ['']),
                    requirements: txn.requirements || '',
                    total: txn.total || '',
                    paid: txn.paid || '',
                    electronicPaid: txn.electronicPaid || 0,
                    paymentMethod: txn.electronicPaid > 0 ? 'electronic' : 'cash',
                    soldProducts: txn.soldProducts || [],
                    photosLink: txn.photosLink || ''
                });
                setIsEditing(true);
                setShowAddModal(true);
            };

            const handleSubmit = async (e) => {
              e.preventDefault();
              const total = parseFloat(formData.total) || 0;
              const paid = parseFloat(formData.paid) || 0;
              
              // Ensure Unique Receipt No
              let finalReceiptNo = isEditing ? formData.receiptNo : (settings.nextReceiptNo || 1000);
              if (!isEditing && allRecords) {
                  let isDuplicate = true;
                  while(isDuplicate) {
                      const exists = allRecords.some(t => t.receiptNo === finalReceiptNo);
                      if (exists) {
                          finalReceiptNo++;
                      } else {
                          isDuplicate = false;
                      }
                  }
              }

              const newTxn = {
                id: isEditing ? formData.id : Date.now().toString(),
                receiptNo: finalReceiptNo,
                dateTime: isEditing ? formData.dateTime : new Date().toISOString(),
                clientName: formData.clientName,
                phone: formData.phone,
                photoNo: formData.photoNo.filter(n => n.trim() !== ''),
                requirements: formData.requirements,
                total: total,
                paid: paid,
                electronicPaid: isEditing ? formData.electronicPaid : (formData.paymentMethod === 'electronic' ? paid : 0),
                remaining: total - paid,
                status: isEditing ? formData.status : 0,
                month: isEditing ? formData.month : new Date().getMonth() + 1,
                year: isEditing ? formData.year : new Date().getFullYear(),
                photosLink: formData.photosLink || ''
              };
              
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
              await setDoc(doc(db, `artifacts/${appId}/public/data/transactions`, newTxn.id), newTxn);

              if (!isEditing && formData.soldProducts && formData.soldProducts.length > 0) {
                 const newInv = { ...inventory };
                 let invChanged = false;
                 formData.soldProducts.forEach(item => {
                    const isProduct = settings.products.some(p => (typeof p === 'string' ? p : p.name) === item.name);
                    if (isProduct) {
                       newInv[item.name] = Math.max(0, (newInv[item.name] || 0) - item.qty);
                       invChanged = true;
                    }
                 });
                 if (invChanged) {
                    await setDoc(doc(db, `artifacts/${appId}/public/data/inventory`, 'main'), newInv);
                 }
              }
              
              if(!isEditing) setSettings({...settings, nextReceiptNo: finalReceiptNo + 1});
              setFormData({ clientName: '', phone: '', photoNo: [''], requirements: '', total: '', paid: '', paymentMethod: 'cash', soldProducts: [], photosLink: '' });
              setIsEditing(false);
              setShowAddModal(false);
            };

            const handleDelete = async (id) => {
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
              await deleteDoc(doc(db, `artifacts/${appId}/public/data/transactions`, id));
            };

            const updateTxnStatus = async (txnId, newStatus) => {
                const txnToUpdate = transactions.find(t => t.id === txnId);
                if(txnToUpdate) {
                    const updated = {...txnToUpdate, status: newStatus};
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                    await setDoc(doc(db, `artifacts/${appId}/public/data/transactions`, updated.id), updated);
                }
            };
            
            const handlePhoneChange = (val) => {
                setFormData(prev => ({...prev, phone: val}));
                if (val.length >= 10 && allRecords) {
                    const pastTxn = allRecords.find(t => t.phone === val);
                    if (pastTxn) {
                        setFormData(prev => ({
                            ...prev,
                            clientName: prev.clientName || pastTxn.clientName || pastTxn.groomName || ''
                        }));
                        const visits = allRecords.filter(t => t.phone === val).length;
                        setLoyaltyAlert(`🌟 عميل دائم: هذه هي الزيارة رقم ${visits + 1}! (يمكنك تقديم خصم كهدية ولاء)`);
                    } else { setLoyaltyAlert(''); }
                } else { setLoyaltyAlert(''); }
            };

            // Filtering logic
            let displayTxns = transactions;
            const isFiltering = query !== '' || filterDate !== '';
            
            if (query) {
                displayTxns = displayTxns.filter(t => t.clientName.includes(query) || t.phone.includes(query) || t.receiptNo.toString().includes(query));
            }
            if (filterDate) {
                displayTxns = displayTxns.filter(t => t.dateTime && t.dateTime.startsWith(filterDate));
            }
