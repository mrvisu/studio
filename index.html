<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو المراكبى - الإدارة والتتبع</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23eab308'%3E%3Cpath d='M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z'/%3E%3C/svg%3E">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap');
        
        * {
            font-family: 'Cairo', sans-serif !important;
        }
        body {
            font-weight: 400;
            background-color: #020617;
            color: #f1f5f9;
            margin: 0;
            padding: 0;
            color-scheme: dark;
        }
        
        main .font-bold { font-weight: 500 !important; }
        main .font-black { font-weight: 600 !important; }
        main b, main strong { font-weight: 500 !important; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #020617 inset !important;
            -webkit-text-fill-color: white !important;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const { useState, useEffect, useMemo } = React;

        // --- Data Definitions ---
        const ORDER_STATUSES = [
          { id: 0, label: 'تم التسجيل', icon: 'ph-clipboard-text', activeClass: 'bg-blue-900/40 text-blue-400 border-blue-500/50 shadow-lg shadow-blue-900/20', inactiveClass: 'bg-slate-900 text-slate-500 border-slate-800 hover:bg-slate-800', clientIconCompleted: 'bg-blue-500 text-white shadow-lg shadow-blue-500/40 border-blue-900', clientCardCurrent: 'bg-blue-900/20 border-blue-500/50 shadow-lg shadow-blue-900/20', clientTextCurrent: 'text-blue-400' },
          { id: 1, label: 'جاري العمل', icon: 'ph-paint-brush-broad', activeClass: 'bg-orange-900/40 text-orange-400 border-orange-500/50 shadow-lg shadow-orange-900/20', inactiveClass: 'bg-slate-900 text-slate-500 border-slate-800 hover:bg-slate-800', clientIconCompleted: 'bg-orange-500 text-white shadow-lg shadow-orange-500/40 border-orange-900', clientCardCurrent: 'bg-orange-900/20 border-orange-500/50 shadow-lg shadow-orange-900/20', clientTextCurrent: 'text-orange-400' },
          { id: 2, label: 'جاهز للاستلام', icon: 'ph-check-circle', activeClass: 'bg-green-900/40 text-green-400 border-green-500/50 shadow-lg shadow-green-900/20', inactiveClass: 'bg-slate-900 text-slate-500 border-slate-800 hover:bg-slate-800', clientIconCompleted: 'bg-green-500 text-white shadow-lg shadow-green-500/40 border-green-900', clientCardCurrent: 'bg-green-900/20 border-green-500/50 shadow-lg shadow-green-900/20', clientTextCurrent: 'text-green-400' },
          { id: 3, label: 'تم التسليم', icon: 'ph-package', activeClass: 'bg-purple-900/40 text-purple-400 border-purple-500/50 shadow-lg shadow-purple-900/20', inactiveClass: 'bg-slate-900 text-slate-500 border-slate-800 hover:bg-slate-800', clientIconCompleted: 'bg-purple-500 text-white shadow-lg shadow-purple-500/40 border-purple-900', clientCardCurrent: 'bg-purple-900/20 border-purple-500/50 shadow-lg shadow-purple-900/20', clientTextCurrent: 'text-purple-400' }
        ];

        const DEFAULT_SERVICES = [
          { name: "صورة شخصية", price: 70, desc: "مقاس 4x6 استلام بعد يوم من تاريخ التصوير" },
          { name: "صورة شخصية فورى", price: 90, desc: "استلام فورى بعد 10 دقائق" },
          { name: "صورة شخصية كارت", price: 70, desc: "مقاس الكارت 15x20 تسليم بعد يومين" },
          { name: "صور فون مقاس 10x15", price: 10, desc: "طباعه من الموبايل السعر لعدد اكتر من 10 صور" },
          { name: "صورة شخصيه", price: 45, desc: "تسليم موبايل فقط" }
        ];

        const DEFAULT_PRODUCTS = [
          { name: "طابلوه خشب مقاس 20x30", price: 130, desc: "" },
          { name: "طابلوه خشب مقاس 30x40", price: 180, desc: "" },
          { name: "طابلوه خشب مقاس 40x50", price: 280, desc: "" },
          { name: "طابلوه خشب مقاس 50x70", price: 400, desc: "" },
          { name: "برواز مقاس A4", price: 100, desc: "برواز جاهز" },
          { name: "ألبوم صور 100 صورة", price: 150, desc: "ألبوم جيوب" }
        ];

        const DEFAULT_WEDDING_PACKAGES = [
          { name: "باقة فضية", price: 4000, desc: "فوتوسيشن قاعة + البوم ديجيتال" },
          { name: "باقة ذهبية", price: 7000, desc: "تغطية كاملة + فيديو + ألبوم ديجيتال كبير + تابلوه" },
          { name: "باقة ماسية", price: 12000, desc: "كاميرتين + فيديو درون + 2 ألبوم + 2 تابلوه خشب" }
        ];

        const DEFAULT_EXPENSE_CATEGORIES = [
          "أحبار وطباعة", "ورق صور", "صيانة كاميرات/معدات", "إيجار الاستوديو", "كهرباء ومرافق", "رواتب مساعدين", "نثريات"
        ];

        const DEFAULT_WA_TEMPLATES = {
          welcome: "أهلاً بك أ. {name} في {studio} 📸. نورتنا وشرفتنا! تم تسجيل طلبك بنجاح. \nتفاصيل الطلب: {services}\nالإجمالي: {total} ج.م\nالمدفوع: {paid} ج.م\nالباقي: {remaining} ج.م",
          invoice: "أهلاً بك أ. {name} 👋\nنورتنا وشرفتنا في {studio} 📸✨\n\n🧾 فاتورة إلكترونية\n----------------------------------\n🧾 رقم الإيصال: {receipt}\n📅 التاريخ: {date}\n⏰ الوقت: {time}\n----------------------------------\n🛠️ المطلوب:\n{services}\n----------------------------------\n💰 إجمالي الحساب: {total} ج.م\n✅ المدفوع: {paid} ج.م\n🔴 الباقي: {remaining} ج.م\n----------------------------------\n📍 لمتابعة حالة طلبك خطوة بخطوة، تفضل بزيارة الرابط التالي:\n{track_url}\n\nشكراً لثقتكم بنا!",
          reminder: "مرحباً أ. {name} 🌟. نود تذكيركم بأن هناك مبلغ متبقي لحسابكم في {studio} بقيمة {remaining} ج.م. \nرقم الإيصال: {receipt}.",
          ready: "أهلاً أ. {name} 🎉. الطلب الخاص بك جاهز للاستلام في {studio}! \nباقي الحساب: {remaining} ج.م. نورتنا وشرفتنا!",
          deposit: "تم استلام عربون بقيمة {paid} ج.م من أ. {name} في {studio} 💸. \nإجمالي الطلب: {total} ج.م \nالمتبقي: {remaining} ج.م. شكراً لك!",
          tracking: "مرحباً أ. {name} 👋\nيمكنك الآن متابعة مراحل تجهيز طلبك (إيصال #{receipt}) لحظة بلحظة عبر الرابط التالي:\n{track_url}\n\n💡 متاح سداد باقي الحساب إلكترونياً (إنستاباي/محافظ).\nشرفتنا في {studio} 📸✨"
        };

        const firebaseConfig = {
          apiKey: "AIzaSyCI0L2fO4_bdltYF7Hddjcxa6seSDbrMwc",
          authDomain: "st.elmrakby@gmail.com",
          projectId: "studio-noot",
          storageBucket: "studio-noot.firebasestorage.app",
          messagingSenderId: "376391287753",
          appId: "1:376391287753:web:58219ac850bde7e2a79e18"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [user, setUser] = useState(null);
          const [authReady, setAuthReady] = useState(false);
          const [authError, setAuthError] = useState(null);
          const [dataLoaded, setDataLoaded] = useState(false);
          const [showNotFound, setShowNotFound] = useState(false);
          const [transferReceipt, setTransferReceipt] = useState(null);
          const [isUploading, setIsUploading] = useState(false);
          
          const [transactions, setTransactions] = useState([]);
          const [weddings, setWeddings] = useState([]);
          const [expenses, setExpenses] = useState([]);
          const [inventory, setInventory] = useState({});
          const [settings, setSettings] = useState({
            nextReceiptNo: 1000,
            services: DEFAULT_SERVICES,
            products: DEFAULT_PRODUCTS,
            weddingPackages: DEFAULT_WEDDING_PACKAGES,
            expenseCategories: DEFAULT_EXPENSE_CATEGORIES,
            waTemplates: DEFAULT_WA_TEMPLATES,
            studioName: "ستوديو المراكبى",
            studioLogo: ""
          });

          const urlParams = new URLSearchParams(window.location.search);
          const trackPhone = urlParams.get('phone');
          const trackReceipt = urlParams.get('receipt');
          const trackType = urlParams.get('type') || 't'; // 't' for normal, 'w' for wedding
          const isTracking = trackPhone && trackReceipt;

          useEffect(() => {
            const initAuth = async () => {
              try { await signInAnonymously(auth); } 
              catch (error) { setAuthError("تنبيه: يوجد مشكلة في الاتصال بقاعدة البيانات."); setAuthReady(true); }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); setAuthReady(true); });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const appId = 'studio-marakby';
            const basePath = `artifacts/${appId}/public/data`;

            const fetchSettings = async () => {
              const docSnap = await getDoc(doc(db, basePath, 'settings', 'main'));
              if (docSnap.exists()) {
                let data = docSnap.data();
                if (data.services) data.services = data.services.map(s => typeof s === 'string' ? { name: s, price: 0, desc: '' } : { name: s.name, price: s.price || 0, desc: s.desc || '' });
                if (!data.products) data.products = DEFAULT_PRODUCTS;
                else data.products = data.products.map(p => typeof p === 'string' ? { name: p, price: 0, desc: '' } : { name: p.name, price: p.price || 0, desc: p.desc || '' });
                if (!data.weddingPackages) data.weddingPackages = DEFAULT_WEDDING_PACKAGES;
                
                if(!data.waTemplates) data.waTemplates = DEFAULT_WA_TEMPLATES;
                setSettings(data);
              }
            };
            fetchSettings();

            const unsubInv = onSnapshot(doc(db, basePath, 'inventory', 'main'), (docSnap) => {
              if (docSnap.exists()) setInventory(docSnap.data());
            }, (err) => console.error(err));

            const unsubTxns = onSnapshot(collection(db, basePath, 'transactions'), (snapshot) => {
              const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
              data.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
              setTransactions(data);
              if(trackType !== 'w') setDataLoaded(true);
            });

            const unsubWeds = onSnapshot(collection(db, basePath, 'weddings'), (snapshot) => {
              const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
              data.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
              setWeddings(data);
              if(trackType === 'w') setDataLoaded(true);
            });

            if(!isTracking) {
                const unsubExps = onSnapshot(collection(db, basePath, 'expenses'), (snapshot) => {
                  const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                  data.sort((a, b) => new Date(b.date) - new Date(a.date));
                  setExpenses(data);
                });
                return () => { unsubTxns(); unsubWeds(); unsubExps(); unsubInv(); };
            }

            return () => { unsubTxns(); unsubWeds(); unsubInv(); };
          }, [user, isTracking, trackType]);

          useEffect(() => {
            if (!user || isTracking) return; 
            const timer = setTimeout(() => {
              const appId = 'studio-marakby';
              setDoc(doc(db, `artifacts/${appId}/public/data/settings`, 'main'), settings);
            }, 1500);
            return () => clearTimeout(timer);
          }, [settings, user, isTracking]);

          useEffect(() => {
              if (isTracking && dataLoaded) {
                  const targetArr = trackType === 'w' ? weddings : transactions;
                  const exists = targetArr.some(t => t.phone === trackPhone && t.receiptNo.toString() === trackReceipt);
                  if (!exists) {
                      const timer = setTimeout(() => setShowNotFound(true), 2500);
                      return () => clearTimeout(timer);
                  } else {
                      setShowNotFound(false);
                  }
              }
          }, [isTracking, dataLoaded, transactions, weddings, trackPhone, trackReceipt, trackType]);

          const updateInventory = async (itemName, change) => {
            const newInv = { ...inventory, [itemName]: Math.max(0, (inventory[itemName] || 0) + change) };
            setInventory(newInv);
            if (user) {
               const appId = 'studio-marakby';
               await setDoc(doc(db, `artifacts/${appId}/public/data/inventory`, 'main'), newInv);
            }
          };

          const formatCurrency = (num) => Number(num || 0).toLocaleString('ar-EG') + ' ج.م';
          const formatDate = (dateStr) => {
             if(!dateStr) return '';
             return new Date(dateStr).toLocaleString('ar-EG', { dateStyle: 'short', timeStyle: 'short' });
          };
          const formatDateOnly = (dateStr) => new Date(dateStr).toLocaleDateString('ar-EG');
          const formatTimeOnly = (dateStr) => {
             if(!dateStr) return '';
             const d = new Date(dateStr);
             if(isNaN(d.getTime())) return dateStr; // Fallback for standard time string input
             return d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
          };
          
          const generateWA_Message = (templateKey, txn, isWedding = false) => {
            let msg = settings.waTemplates[templateKey] || "";
            const clientName = isWedding ? `${txn.groomName} و ${txn.brideName}` : txn.clientName;
            const reqs = isWedding 
                ? `باقة: ${txn.package?.name || ''}\nموعد الزفاف: ${formatDateOnly(txn.weddingDate)}\nالقاعة: ${txn.location}\nالإضافات: ${txn.addons.map(a=>a.name).join(' + ')}` 
                : txn.requirements;

            msg = msg.replace(/{name}/g, clientName || 'العميل');
            msg = msg.replace(/{receipt}/g, txn.receiptNo || '');
            msg = msg.replace(/{total}/g, txn.total || 0);
            msg = msg.replace(/{paid}/g, txn.paid || 0);
            msg = msg.replace(/{remaining}/g, txn.remaining || 0);
            msg = msg.replace(/{services}/g, reqs || 'خدمات تصوير');
            msg = msg.replace(/{studio}/g, settings.studioName || 'الاستوديو');
            msg = msg.replace(/{date}/g, formatDateOnly(txn.dateTime));
            msg = msg.replace(/{time}/g, formatTimeOnly(txn.dateTime));
            
            const typeParam = isWedding ? 'w' : 't';
            const trackUrl = window.location.href.split('?')[0] + `?phone=${encodeURIComponent(txn.phone)}&receipt=${encodeURIComponent(txn.receiptNo)}&type=${typeParam}`;
            msg = msg.replace(/{track_url}/g, trackUrl);
            return msg;
          };

          const openWhatsApp = (phone, msg) => {
            let formattedPhone = phone.trim();
            if (formattedPhone.startsWith('0')) formattedPhone = '2' + formattedPhone;
            else if (!formattedPhone.startsWith('2')) formattedPhone = '20' + formattedPhone;
            const url = `https://wa.me/${formattedPhone}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
          };

          // --- Client Tracking View ---
          if (isTracking && authReady) {
              const targetArr = trackType === 'w' ? weddings : transactions;
              const txn = targetArr.find(t => t.phone === trackPhone && t.receiptNo.toString() === trackReceipt);

              if (!dataLoaded || (!txn && !showNotFound)) {
                  return (
                      <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-100 p-6 text-center">
                          <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                          <h2 className="text-xl font-bold mb-2 text-white">جاري البحث عن الطلب...</h2>
                          <p className="text-slate-400 text-sm">لحظات ونعرض لك التفاصيل</p>
                      </div>
                  );
              }
              
              if (!txn && showNotFound) return (
                  <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-400 p-6 text-center">
                      <i className="ph ph-magnifying-glass text-6xl mb-4 text-slate-600"></i>
                      <h2 className="text-2xl font-bold mb-2 text-white">الطلب غير موجود</h2>
                      <p>عذراً، لم نتمكن من العثور على طلب يطابق رقم الهاتف والإيصال المدخلين.</p>
                      <p className="mt-2 text-sm opacity-70">رقم الهاتف: {trackPhone} | رقم الإيصال: {trackReceipt}</p>
                  </div>
              );
              
              const currentStatus = txn.status || 0;
              const isWedding = trackType === 'w';
              const displayName = isWedding ? `${txn.groomName} و ${txn.brideName}` : txn.clientName;
              const displayReqs = isWedding ? `باقة: ${txn.package?.name || ''} \nاللوكيشن: ${txn.location}` : txn.requirements;

              return (
                  <div className="min-h-screen bg-slate-950 text-slate-100 p-4 md:p-6 flex flex-col items-center">
                      <div className="flex flex-col items-center gap-3 mb-8 mt-6">
                          {settings.studioLogo ? <img src={settings.studioLogo} className="w-24 h-24 rounded-2xl object-cover shadow-lg shadow-blue-900/20 border border-slate-800" /> : <i className="ph ph-camera text-6xl text-blue-500"></i>}
                          <h1 className="text-2xl font-black">{settings.studioName}</h1>
                          <p className="text-slate-400 text-sm">{isWedding ? 'تتبع حجز الزفاف الخاص بك 💍' : 'تتبع حالة الطلب الخاص بك'}</p>
                      </div>

                      <div className="bg-slate-900 w-full max-w-md p-6 rounded-3xl shadow-xl border border-slate-800 mb-8 relative overflow-hidden">
                          <div className={`absolute top-0 right-0 w-2 h-full ${isWedding ? 'bg-pink-500' : 'bg-blue-500'}`}></div>
                          <div className="flex justify-between items-center mb-4 pb-4 border-b border-slate-800">
                              <span className="text-slate-400 text-sm">إيصال رقم</span>
                              <span className="text-2xl font-black font-mono text-white">#{txn.receiptNo}</span>
                          </div>
                          <h3 className={`text-xl font-bold mb-2 flex items-center gap-2 ${isWedding ? 'text-pink-400' : 'text-blue-400'}`}>
                             {isWedding ? <i className="ph ph-heart"></i> : <i className="ph ph-user"></i>} {displayName}
                          </h3>
                          <p className="text-sm text-slate-400 mb-5 leading-relaxed whitespace-pre-wrap">{displayReqs}</p>
                          
                          {isWedding && (
                              <div className="bg-slate-950 p-3 rounded-xl mb-4 border border-slate-800 flex items-center justify-between text-sm">
                                  <span className="text-slate-400">موعد الزفاف:</span>
                                  <span className="font-bold text-pink-300">{formatDateOnly(txn.weddingDate)}</span>
                              </div>
                          )}

                          <div className="flex justify-between bg-slate-950 p-4 rounded-2xl border border-slate-800 text-sm">
                               <div className="flex flex-col items-center gap-1">
                                   <span className="text-slate-500 text-xs">المدفوع</span>
                                   <span className="text-green-400 font-bold">{txn.paid} ج.م</span>
                               </div>
                               <div className="w-px bg-slate-800"></div>
                               <div className="flex flex-col items-center gap-1">
                                   <span className="text-slate-500 text-xs">الباقي الدفع</span>
                                   <span className="text-red-400 font-bold">{txn.remaining} ج.م</span>
                               </div>
                          </div>
                      </div>

                      {txn.remaining > 0 && (
                          <div className="w-full max-w-md bg-gradient-to-br from-indigo-950 to-slate-900 p-6 rounded-3xl shadow-xl border border-indigo-500/30 mb-8 text-center relative overflow-hidden">
                              <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                              <div className="flex justify-center mb-4">
                                  <div className="bg-indigo-500/20 p-4 rounded-full text-indigo-400 shadow-lg shadow-indigo-900/20">
                                      <i className="ph ph-wallet text-3xl"></i>
                                  </div>
                              </div>
                              <h3 className="text-lg font-bold text-white mb-2">سداد إلكتروني متاح 💳</h3>
                              <p className="text-sm text-indigo-200/80 leading-relaxed mb-4">
                                  لراحتك، يمكنك الآن سداد باقي المبلغ المستحق (<b className="text-white">{txn.remaining} ج.م</b>) بكل سهولة عبر 
                                  <span className="text-white font-bold mx-1">إنستاباي (InstaPay)</span> أو <span className="text-white font-bold mx-1">المحافظ الإلكترونية</span>.
                              </p>
                              
                              <div className="bg-slate-950/80 py-3 px-4 rounded-2xl border border-indigo-500/20 flex flex-col items-center gap-1 shadow-inner mb-4">
                                  <span className="text-xs text-indigo-300">رقم التحويل (فودافون كاش / إنستاباي):</span>
                                  <div className="flex items-center gap-3 mt-1">
                                      <span className="text-2xl font-black font-mono text-white tracking-widest">01201260040</span>
                                      <button onClick={(e) => {
                                          const el = document.createElement('textarea');
                                          el.value = '01201260040';
                                          document.body.appendChild(el);
                                          el.select();
                                          document.execCommand('copy');
                                          document.body.removeChild(el);
                                          const originalHTML = e.currentTarget.innerHTML;
                                          e.currentTarget.innerHTML = '<i class="ph ph-check text-lg"></i>';
                                          setTimeout(() => e.currentTarget.innerHTML = originalHTML, 2000);
                                      }} className="text-indigo-400 hover:text-indigo-300 bg-indigo-900/30 p-2 rounded-lg transition-colors" title="نسخ الرقم"><i className="ph ph-copy text-lg"></i></button>
                                  </div>
                              </div>

                              <div className="mb-5 text-right bg-indigo-900/20 p-4 rounded-xl border border-indigo-500/30">
                                  <label className="block text-sm font-bold text-indigo-300 mb-3"><i className="ph ph-upload-simple text-lg align-middle ml-1"></i> إرفاق صورة التحويل أولاً لتأكيد السداد:</label>
                                  <input type="file" accept="image/*" onChange={(e) => {
                                          const file = e.target.files[0];
                                          if (!file) return;
                                          const reader = new FileReader();
                                          reader.readAsDataURL(file);
                                          reader.onload = (event) => {
                                              const img = new Image();
                                              img.src = event.target.result;
                                              img.onload = () => {
                                                  const canvas = document.createElement('canvas');
                                                  const MAX_WIDTH = 800;
                                                  let scaleSize = 1;
                                                  if (img.width > MAX_WIDTH) scaleSize = MAX_WIDTH / img.width;
                                                  canvas.width = img.width * scaleSize;
                                                  canvas.height = img.height * scaleSize;
                                                  const ctx = canvas.getContext('2d');
                                                  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                                  setTransferReceipt(canvas.toDataURL('image/jpeg', 0.6));
                                              };
                                          };
                                      }} className="block w-full text-sm text-slate-400 file:ml-3 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 transition-colors bg-slate-950 rounded-xl"
                                  />
                                  {transferReceipt && <p className="text-green-400 text-xs mt-3 font-bold flex items-center gap-1"><i className="ph ph-check-circle text-base"></i> تم إرفاق الصورة بنجاح وجاهز للتأكيد</p>}
                              </div>

                              <button onClick={async () => {
                                  if (!transferReceipt) { alert('عذراً، برجاء إرفاق صورة التحويل أولاً لتأكيد السداد.'); return; }
                                  setIsUploading(true);
                                  try {
                                      const appId = 'studio-marakby';
                                      const updated = { ...txn, pendingReceipt: transferReceipt };
                                      const targetCol = isWedding ? 'weddings' : 'transactions';
                                      await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, txn.id), updated);
                                      const confirmMsg = `مرحباً، قمت بتحويل مبلغ ${txn.remaining} ج.م لسداد باقي حساب إيصال رقم #${txn.receiptNo} باسم ${displayName}.\n✅ وقمت برفع صورة التحويل في رابط التتبع لتأكيد الدفع.`;
                                      openWhatsApp('01201260040', confirmMsg);
                                  } catch (err) { alert('حدث خطأ أثناء الحفظ، يرجى المحاولة مرة أخرى.'); }
                                  setIsUploading(false);
                              }} disabled={isUploading} className={`w-full font-bold py-3.5 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 ${isUploading || !transferReceipt ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-green-600 hover:bg-green-500 text-white shadow-green-900/20'}`}>
                                  {isUploading ? <div className="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <><i className="ph ph-whatsapp-logo text-2xl"></i> تأكيد التحويل عبر واتساب</>}
                              </button>
                          </div>
                      )}

                      {/* Timeline */}
                      <div className="w-full max-w-md bg-slate-900 p-6 sm:p-8 rounded-3xl shadow-xl border border-slate-800 mb-8">
                          <h3 className="font-bold text-lg mb-8 flex items-center gap-2 border-b border-slate-800 pb-4"><i className="ph ph-clock-counter-clockwise text-blue-500"></i> مراحل تجهيز الطلب:</h3>
                          <div className="relative pl-4 space-y-8 pr-4">
                              <div className="absolute right-[31px] top-6 bottom-6 w-[2px] bg-slate-800"></div>
                              {ORDER_STATUSES.map((s, index) => {
                                  const isCompleted = currentStatus >= s.id;
                                  const isCurrent = currentStatus === s.id;
                                  return (
                                      <div key={s.id} className="relative flex items-start gap-5">
                                          <div className={`relative z-10 flex items-center justify-center w-12 h-12 rounded-full shrink-0 border-4 transition-colors ${isCompleted ? s.clientIconCompleted : 'border-slate-900 bg-slate-800 text-slate-600'}`}>
                                              <i className={`ph ${s.icon} text-xl`}></i>
                                          </div>
                                          <div className={`flex-1 p-4 rounded-2xl border transition-all mt-[-4px] ${isCurrent ? s.clientCardCurrent : isCompleted ? 'bg-slate-800/30 border-slate-800/50' : 'bg-slate-950/50 border-slate-800/30'}`}>
                                              <h4 className={`font-bold text-sm sm:text-base ${isCurrent ? s.clientTextCurrent : isCompleted ? 'text-slate-200' : 'text-slate-600'}`}>{s.label}</h4>
                                              {isCurrent && <p className={`text-xs mt-2 opacity-80 leading-relaxed ${s.clientTextCurrent}`}>هذه هي المرحلة الحالية لطلبك. سنقوم بتحديثها فور انتقالنا للمرحلة التالية.</p>}
                                              {(isCompleted && !isCurrent) && <p className="text-xs mt-1 text-slate-500"><i className="ph ph-check"></i> تمت بنجاح</p>}
                                          </div>
                                      </div>
                                  );
                              })}
                          </div>
                      </div>
                  </div>
              );
          }

          // --- Admin Components ---
          const Navigation = () => {
            const navItems = [
              { id: 'dashboard', icon: <i className="ph ph-squares-four text-xl"></i>, label: 'الرئيسية' },
              { id: 'weddings', icon: <i className="ph ph-heart text-xl"></i>, label: 'حجوزات الزفاف 💍' },
              { id: 'expenses', icon: <i className="ph ph-printer text-xl"></i>, label: 'المصروفات والمخزون' },
              { id: 'reports', icon: <i className="ph ph-calendar-blank text-xl"></i>, label: 'التقارير' },
              { id: 'marketing', icon: <i className="ph ph-megaphone text-xl"></i>, label: 'التسويق 📣' },
              { id: 'settings', icon: <i className="ph ph-gear text-xl"></i>, label: 'الإعدادات' },
            ];
            return (
              <nav className="bg-slate-950/80 backdrop-blur-xl border-b border-slate-800 text-white sticky top-0 z-50 shadow-2xl">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-20">
                    <div className="flex items-center gap-3">
                      <div className="w-12 h-12 flex items-center justify-center bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-xl shadow-lg shadow-yellow-500/20 transform transition hover:scale-105 overflow-hidden shrink-0">
                        {settings.studioLogo ? <img src={settings.studioLogo} className="w-full h-full object-cover" /> : <i className="ph ph-camera text-slate-900 text-3xl"></i>}
                      </div>
                      <div className="flex flex-col">
                        <h1 className="text-xl sm:text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-l from-yellow-300 to-yellow-500" style={{ fontWeight: 900 }}>{settings.studioName}</h1>
                        <span className="text-[10px] sm:text-xs text-slate-400 font-medium">نظام الإدارة الذكي</span>
                      </div>
                    </div>
                    <div className="hidden lg:flex items-center space-x-1 space-x-reverse bg-slate-900 p-1.5 rounded-2xl border border-slate-800">
                      {navItems.map(btn => (
                        <button key={btn.id} onClick={() => setActiveTab(btn.id)} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold transition-all ${activeTab === btn.id ? 'bg-yellow-500 text-slate-900 shadow-md' : 'text-slate-300 hover:text-white hover:bg-slate-800'}`}>
                          {btn.icon}{btn.label}
                        </button>
                      ))}
                    </div>
                  </div>
                  
                  <div className="lg:hidden pb-4 overflow-x-auto hide-scrollbar">
                    <div className="flex items-center gap-2 min-w-max">
                      {navItems.map(btn => (
                        <button key={btn.id} onClick={() => setActiveTab(btn.id)} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold transition-all ${activeTab === btn.id ? 'bg-yellow-500 text-slate-900 shadow-md' : 'bg-slate-900 border border-slate-800 text-slate-300 hover:text-white'}`}>
                          {btn.icon}{btn.label}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </nav>
            );
          };

          const QuickServiceCard = ({ srvObj, onAdd, colorTheme = 'blue' }) => {
            const [qty, setQty] = useState(1);
            const [customPrice, setCustomPrice] = useState(srvObj.price || 0);

            useEffect(() => { setCustomPrice(srvObj.price || 0); }, [srvObj.price]);
            
            const themeColors = {
                blue: { text: 'text-blue-400', hoverText: 'group-hover:text-blue-300', btn: 'bg-blue-600 hover:bg-blue-500' },
                purple: { text: 'text-purple-400', hoverText: 'group-hover:text-purple-300', btn: 'bg-purple-600 hover:bg-purple-500' }
            };
            const currentTheme = themeColors[colorTheme] || themeColors.blue;

            return (
              <div className="bg-slate-900 p-3 rounded-xl border border-slate-800 transition-all shadow-sm flex flex-col gap-2 group hover:border-slate-700">
                <div className="flex justify-between items-start gap-2">
                  <span className={`${currentTheme.text} text-sm font-bold ${currentTheme.hoverText} flex-1 leading-snug`}>{srvObj.name}</span>
                  <div className="flex items-center bg-slate-950 rounded-md border border-slate-700 px-2 py-1 focus-within:border-slate-500 transition-colors w-24 shrink-0">
                     <input type="number" value={customPrice} onChange={e => setCustomPrice(parseFloat(e.target.value) || 0)} className="w-full bg-transparent text-white text-center outline-none text-xs font-bold" />
                     <span className="text-[10px] text-slate-500 mr-1">ج.م</span>
                  </div>
                </div>
                {srvObj.desc && <span className="text-xs text-slate-500 leading-relaxed">{srvObj.desc}</span>}
                <div className="flex items-center gap-2 mt-auto pt-2 border-t border-slate-800/50">
                  <div className="flex items-center bg-slate-950 rounded-lg border border-slate-700 overflow-hidden">
                    <button type="button" onClick={(e) => { e.preventDefault(); setQty(Math.max(1, qty - 1)); }} className="px-2.5 py-1 text-slate-400 hover:text-white hover:bg-slate-800 transition-colors font-black">-</button>
                    <input type="number" min="1" value={qty} onChange={e => setQty(parseInt(e.target.value) || 1)} className="w-8 bg-transparent text-white text-center outline-none text-sm font-bold" />
                    <button type="button" onClick={(e) => { e.preventDefault(); setQty(qty + 1); }} className="px-2.5 py-1 text-slate-400 hover:text-white hover:bg-slate-800 transition-colors font-black">+</button>
                  </div>
                  <button type="button" onClick={(e) => { e.preventDefault(); onAdd({...srvObj, price: customPrice}, qty); setQty(1); setCustomPrice(srvObj.price||0); }} className={`flex-1 text-white text-xs font-bold py-1.5 rounded-lg transition-colors flex justify-center items-center gap-1 ${currentTheme.btn}`}>
                    <i className="ph ph-plus-circle text-sm"></i> إضافة
                  </button>
                </div>
              </div>
            );
          };

          // --- Dashboard Tab (Main) ---
          const DashboardTab = () => {
            const [showAddModal, setShowAddModal] = useState(false);
            const [formData, setFormData] = useState({ clientName: '', phone: '', photoNo: '', requirements: '', total: '', paid: '', paymentMethod: 'cash', soldProducts: [] });
            const [query, setQuery] = useState('');
            const [payModal, setPayModal] = useState(null);
            const [receiptImageModal, setReceiptImageModal] = useState(null);
            const [txnDetailsModal, setTxnDetailsModal] = useState(null);

            const handleAddService = (srv, qty) => {
              const validQty = parseInt(qty) || 1;
              const addedText = validQty > 1 ? `${validQty} × ${srv.name}` : srv.name;
              const addedPrice = (parseFloat(srv.price) || 0) * validQty;
              setFormData(prev => {
                 const newProductsList = [...(prev.soldProducts || [])];
                 newProductsList.push({ name: srv.name, qty: validQty });
                 return { ...prev, requirements: prev.requirements ? `${prev.requirements} + ${addedText}` : addedText, total: (parseFloat(prev.total) || 0) + addedPrice, soldProducts: newProductsList };
              });
            };

            const handleSubmit = async (e) => {
              e.preventDefault();
              const total = parseFloat(formData.total) || 0;
              const paid = parseFloat(formData.paid) || 0;
              const newTxn = {
                id: Date.now().toString(),
                receiptNo: settings.nextReceiptNo || 1000,
                dateTime: new Date().toISOString(),
                clientName: formData.clientName,
                phone: formData.phone,
                photoNo: formData.photoNo,
                requirements: formData.requirements,
                total: total,
                paid: paid,
                electronicPaid: formData.paymentMethod === 'electronic' ? paid : 0,
                remaining: total - paid,
                status: 0,
                month: new Date().getMonth() + 1,
                year: new Date().getFullYear()
              };
              
              const appId = 'studio-marakby';
              await setDoc(doc(db, `artifacts/${appId}/public/data/transactions`, newTxn.id), newTxn);

              if (formData.soldProducts && formData.soldProducts.length > 0) {
                 const newInv = { ...inventory };
                 let invChanged = false;
                 formData.soldProducts.forEach(item => {
                    const isProduct = settings.products.some(p => (typeof p === 'string' ? p : p.name) === item.name);
                    if (isProduct) {
                       newInv[item.name] = Math.max(0, (newInv[item.name] || 0) - item.qty);
                       invChanged = true;
                    }
                 });
                 if (invChanged) {
                    setInventory(newInv);
                    await setDoc(doc(db, `artifacts/${appId}/public/data/inventory`, 'main'), newInv);
                 }
              }
              setSettings({...settings, nextReceiptNo: (settings.nextReceiptNo || 1000) + 1});
              setFormData({ clientName: '', phone: '', photoNo: '', requirements: '', total: '', paid: '', paymentMethod: 'cash', soldProducts: [] });
              setShowAddModal(false);
            };

            const handleDelete = async (id) => {
              if(window.confirm('هل أنت متأكد من حذف هذا الإيصال؟')) await deleteDoc(doc(db, `artifacts/studio-marakby/public/data/transactions`, id));
            };

            const updateTxnStatus = async (txnId, newStatus) => {
                const txnToUpdate = transactions.find(t => t.id === txnId);
                if(txnToUpdate) {
                    const updated = {...txnToUpdate, status: newStatus};
                    await setDoc(doc(db, `artifacts/studio-marakby/public/data/transactions`, updated.id), updated);
                }
            };

            const filteredTxns = query ? transactions.filter(t => t.clientName.includes(query) || t.phone.includes(query) || t.receiptNo.toString().includes(query)) : [];
            const todaysTxns = transactions.filter(t => new Date(t.dateTime).toDateString() === new Date().toDateString());

            return (
              <div className="space-y-6">
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 flex flex-col md:flex-row gap-4 items-center justify-between">
                  <button onClick={() => setShowAddModal(true)} className="w-full md:w-auto bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-blue-900/50">
                    <i className="ph ph-plus-circle text-2xl"></i> إضافة عملية جديدة
                  </button>
                  <div className="relative w-full md:w-1/2">
                    <i className="ph ph-magnifying-glass absolute right-4 top-4 text-slate-500 text-xl"></i>
                    <input type="text" placeholder="ابحث بالاسم، رقم الهاتف، رقم الإيصال..." className="w-full p-3 pr-10 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-sm transition-colors" value={query} onChange={(e) => setQuery(e.target.value)} />
                  </div>
                </div>

                {query && (
                  <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 space-y-4">
                    <h3 className="text-lg font-bold text-slate-300 border-b border-slate-800 pb-2">نتائج البحث ({filteredTxns.length})</h3>
                    {filteredTxns.map(txn => <TransactionCard key={txn.id} txn={txn} onDelete={handleDelete} onPayRemaining={setPayModal} onViewReceipt={setReceiptImageModal} sendInvoice={() => openWhatsApp(txn.phone, generateWA_Message('invoice', txn))} updateStatus={updateTxnStatus} onViewDetails={setTxnDetailsModal} />)}
                  </div>
                )}

                {!query && (
                  <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-100 border-b border-slate-800 pb-4">
                      <i className="ph ph-files text-blue-400 text-2xl"></i> عمليات اليوم ({todaysTxns.length})
                    </h2>
                    <div className="space-y-4">
                      {todaysTxns.length === 0 ? <p className="text-center p-10 text-slate-500">لا توجد عمليات مسجلة اليوم.</p> : todaysTxns.map(txn => <TransactionCard key={txn.id} txn={txn} onDelete={handleDelete} onPayRemaining={setPayModal} onViewReceipt={setReceiptImageModal} sendInvoice={() => openWhatsApp(txn.phone, generateWA_Message('invoice', txn))} updateStatus={updateTxnStatus} onViewDetails={setTxnDetailsModal} />)}
                    </div>
                  </div>
                )}

                {showAddModal && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-900 p-6 rounded-3xl shadow-2xl border border-slate-800 w-full max-w-2xl relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                      <button onClick={() => setShowAddModal(false)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400"><i className="ph ph-x text-xl"></i></button>
                      <h2 className="text-xl font-black mb-6 text-slate-100 border-b border-slate-800 pb-3">إضافة عملية جديدة</h2>
                      <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="bg-blue-900/30 p-3 rounded-xl flex justify-between items-center text-sm font-bold text-blue-300 border border-blue-800/50">
                          <span>رقم الإيصال التلقائي:</span><span className="text-lg">#{settings.nextReceiptNo}</span>
                        </div>
                        <input type="text" placeholder="اسم العميل" required className="w-full p-3 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-blue-500 outline-none text-sm" value={formData.clientName} onChange={e => setFormData({...formData, clientName: e.target.value})} />
                        <div className="flex gap-3">
                          <input type="tel" placeholder="رقم الهاتف" required className="w-full p-3 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-blue-500 outline-none text-sm" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                          <input type="text" placeholder="رقم الصورة" className="w-1/2 p-3 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-blue-500 outline-none text-sm" value={formData.photoNo} onChange={e => setFormData({...formData, photoNo: e.target.value})} />
                        </div>
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                          <div className="flex justify-between items-center mb-3">
                              <label className="text-sm font-bold text-slate-400"><i className="ph ph-camera text-blue-400 text-lg align-middle"></i> الخدمات السريعة:</label>
                          </div>
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-5">
                            {settings.services.map((srv, idx) => {
                              const srvObj = typeof srv === 'string' ? {name: srv, price: 0, desc: ''} : srv;
                              return <QuickServiceCard key={`srv-${idx}`} srvObj={srvObj} onAdd={handleAddService} colorTheme="blue" />;
                            })}
                          </div>

                          <div className="flex justify-between items-center mb-3 border-t border-slate-800 pt-4">
                              <label className="text-sm font-bold text-slate-400"><i className="ph ph-package text-purple-400 text-lg align-middle"></i> البضاعة والمنتجات:</label>
                          </div>
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                            {settings.products && settings.products.map((prod, idx) => {
                              const prodObj = typeof prod === 'string' ? {name: prod, price: 0, desc: ''} : prod;
                              return <QuickServiceCard key={`prod-${idx}`} srvObj={prodObj} onAdd={handleAddService} colorTheme="purple" />;
                            })}
                          </div>

                          <textarea placeholder="المطلوب بالتفصيل..." required rows="2" className="w-full p-3 mt-2 border border-slate-700 bg-slate-900 text-white placeholder-slate-500 rounded-xl focus:border-blue-500 outline-none text-sm custom-scrollbar" value={formData.requirements} onChange={e => setFormData({...formData, requirements: e.target.value})} />
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                          <input type="number" placeholder="الإجمالي" required className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-blue-500 text-sm font-bold" value={formData.total} onChange={e => setFormData({...formData, total: e.target.value})} />
                          <input type="number" placeholder="المدفوع الان" required className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-green-500 text-sm font-bold" value={formData.paid} onChange={e => setFormData({...formData, paid: e.target.value})} />
                          <select className="p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-indigo-500 col-span-2 md:col-span-1 text-sm font-bold" value={formData.paymentMethod} onChange={e => setFormData({...formData, paymentMethod: e.target.value})}>
                             <option value="cash">دفع نقدي</option>
                             <option value="electronic">دفع إلكتروني (محافظ)</option>
                          </select>
                        </div>
                        <div className={`p-3 rounded-xl text-center font-black text-lg border ${(formData.total - formData.paid) > 0 ? 'bg-red-950/40 text-red-400 border-red-900/50' : 'bg-green-950/40 text-green-400 border-green-900/50'}`}>
                          الباقي: {formatCurrency((formData.total || 0) - (formData.paid || 0))}
                        </div>
                        <button type="submit" className="w-full bg-blue-600 text-white hover:bg-blue-500 font-black py-3 rounded-xl shadow-lg text-sm"><i className="ph ph-floppy-disk text-lg ml-2 align-middle"></i>حفظ الإيصال</button>
                      </form>
                    </div>
                  </div>
                )}
                
                {payModal && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 w-full max-w-md relative">
                      <button onClick={() => setPayModal(null)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400"><i className="ph ph-x text-2xl"></i></button>
                      <h3 className="text-2xl font-black mb-4 border-b border-slate-800 pb-4 text-center text-slate-100">
                          {payModal.paymentType === 'electronic' ? 'سداد إلكتروني (إنستاباي/محافظ)' : 'سداد نقدي'}
                      </h3>
                      <div className="mb-6 bg-slate-950 p-4 rounded-xl text-center border border-slate-800">
                        <p className="text-slate-300">العميل: <b className="text-white text-lg">{payModal.clientName}</b></p>
                        <p className="text-red-400 font-bold mt-2">الباقي المستحق: {payModal.remaining} ج.م</p>
                      </div>
                      <form onSubmit={async (e) => {
                        e.preventDefault();
                        const amount = parseFloat(e.target.amount.value);
                        const updated = { 
                            ...payModal, 
                            paid: payModal.paid + amount, 
                            electronicPaid: (payModal.electronicPaid || 0) + (payModal.paymentType === 'electronic' ? amount : 0),
                            remaining: payModal.total - (payModal.paid + amount) 
                        };
                        if (updated.pendingReceipt) delete updated.pendingReceipt;
                        delete updated.paymentType;
                        const targetCol = updated.type === 'wedding' ? 'weddings' : 'transactions';
                        await setDoc(doc(db, `artifacts/studio-marakby/public/data/${targetCol}`, updated.id), updated);
                        setPayModal(null);
                      }} className="space-y-4">
                        <input type="number" name="amount" required min="1" max={payModal.remaining} defaultValue={payModal.remaining} className="w-full p-4 border border-slate-700 bg-slate-950 text-white rounded-xl text-2xl font-black text-center outline-none focus:border-blue-500 shadow-inner"/>
                        <button type="submit" className={`w-full text-white font-black py-4 rounded-xl shadow-lg transition-all text-lg ${payModal.paymentType === 'electronic' ? 'bg-indigo-600 hover:bg-indigo-500 shadow-indigo-900/20' : 'bg-green-600 hover:bg-green-500 shadow-green-900/20'}`}>تأكيد تحصيل المبلغ</button>
                      </form>
                    </div>
                  </div>
                )}
                
                {receiptImageModal && (
                  <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
                    <div className="relative max-w-2xl w-full flex flex-col items-center">
                      <button onClick={() => setReceiptImageModal(null)} className="absolute -top-14 right-0 p-2 text-white hover:text-red-400 bg-slate-800 rounded-full shadow-lg border border-slate-700 transition-colors"><i className="ph ph-x text-2xl"></i></button>
                      <img src={receiptImageModal} alt="إيصال تحويل" className="max-w-full max-h-[85vh] rounded-2xl shadow-2xl border border-slate-700 object-contain bg-slate-900" />
                    </div>
                  </div>
                )}

                {txnDetailsModal && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setTxnDetailsModal(null)}>
                    <div className="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 w-full max-w-lg relative max-h-[90vh] overflow-y-auto custom-scrollbar" onClick={e => e.stopPropagation()}>
                      <button onClick={() => setTxnDetailsModal(null)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400 transition-colors"><i className="ph ph-x text-2xl"></i></button>
                      
                      <h3 className="text-2xl font-black mb-6 border-b border-slate-800 pb-4 text-slate-100 flex items-center gap-2">
                        {txnDetailsModal.type === 'wedding' ? <i className="ph ph-heart text-pink-500"></i> : <i className="ph ph-files text-blue-500"></i>}
                        تفاصيل {txnDetailsModal.type === 'wedding' ? 'حجز زفاف' : 'الإيصال'} #{txnDetailsModal.receiptNo}
                      </h3>

                      <div className="space-y-5">
                        <div className="flex justify-between items-center bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <div>
                              <p className="text-slate-500 text-xs mb-1">الاسم</p>
                              <p className="font-bold text-lg text-slate-100">
                                {txnDetailsModal.type === 'wedding' ? `${txnDetailsModal.groomName} و ${txnDetailsModal.brideName}` : txnDetailsModal.clientName}
                              </p>
                           </div>
                           <div className="text-left">
                              <p className="text-slate-500 text-xs mb-1">رقم الهاتف</p>
                              <p className="font-mono text-slate-300">{txnDetailsModal.phone}</p>
                           </div>
                        </div>

                        {txnDetailsModal.type === 'wedding' && (
                            <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 grid grid-cols-2 gap-4">
                                <div><p className="text-slate-500 text-xs mb-1">موعد الزفاف</p><p className="font-bold text-slate-200">{formatDateOnly(txnDetailsModal.weddingDate)}</p></div>
                                <div><p className="text-slate-500 text-xs mb-1">اللوكيشن</p><p className="font-bold text-slate-200">{txnDetailsModal.location}</p></div>
                                <div><p className="text-slate-500 text-xs mb-1">الميك أب</p><p className="font-bold text-slate-200">{txnDetailsModal.makeupArtist}</p></div>
                                <div><p className="text-slate-500 text-xs mb-1">وقت الخروج</p><p className="font-bold text-slate-200">{txnDetailsModal.leaveTime}</p></div>
                                <div className="col-span-2 border-t border-slate-800 pt-3 mt-1"><p className="text-slate-500 text-xs mb-1">العنوان</p><p className="font-bold text-slate-200">{txnDetailsModal.groomAddress}</p></div>
                            </div>
                        )}

                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <p className="text-slate-500 text-xs mb-2">المطلوب (الخدمات والمنتجات)</p>
                           <p className="text-slate-200 leading-relaxed font-medium whitespace-pre-wrap">
                               {txnDetailsModal.type === 'wedding' 
                                   ? `الباقة: ${txnDetailsModal.package?.name}\nالسيشن: ${txnDetailsModal.sessionType}\nالكاجوال: ${txnDetailsModal.casualShootDate || 'بدون'}\nإضافات: ${txnDetailsModal.addons?.map(a=>a.name).join(' + ') || 'بدون'}`
                                   : txnDetailsModal.requirements}
                           </p>
                        </div>

                        {txnDetailsModal.photoNo && (
                            <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                               <span className="text-slate-500 text-sm">رقم الصورة:</span>
                               <span className="font-bold text-slate-200">{txnDetailsModal.photoNo}</span>
                            </div>
                        )}

                        <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 grid grid-cols-2 gap-4 relative overflow-hidden">
                           <div className={`absolute top-0 right-0 w-1 h-full ${txnDetailsModal.type === 'wedding' ? 'bg-pink-500' : 'bg-blue-500'}`}></div>
                           <div><p className="text-slate-500 text-xs mb-1">الإجمالي</p><p className="font-bold text-slate-100">{txnDetailsModal.total} ج.م</p></div>
                           <div><p className="text-slate-500 text-xs mb-1">إجمالي المدفوع</p><p className="font-bold text-green-400">{txnDetailsModal.paid} ج.م</p></div>
                           <div><p className="text-slate-500 text-xs mb-1">الدفع النقدي</p><p className="font-bold text-emerald-400">{(txnDetailsModal.paid || 0) - (txnDetailsModal.electronicPaid || 0)} ج.م</p></div>
                           <div><p className="text-slate-500 text-xs mb-1">الدفع الإلكتروني</p><p className="font-bold text-indigo-400">{txnDetailsModal.electronicPaid || 0} ج.م</p></div>
                           <div className="col-span-2 pt-4 mt-2 border-t border-slate-800 flex justify-between items-center">
                              <span className="text-slate-400 text-sm">الباقي المستحق:</span>
                              <span className={`font-black text-xl ${txnDetailsModal.remaining > 0 ? 'text-red-400' : 'text-green-400'}`}>{txnDetailsModal.remaining} ج.م</span>
                           </div>
                        </div>

                        {txnDetailsModal.pendingReceipt && (
                            <div className="bg-indigo-950/20 p-4 rounded-xl border border-indigo-500/30">
                               <p className="text-indigo-300 text-sm font-bold mb-3 flex items-center gap-2"><i className="ph ph-image text-lg"></i> صورة التحويل الإلكتروني المرفقة</p>
                               <img src={txnDetailsModal.pendingReceipt} alt="Receipt" className="w-full rounded-lg border border-indigo-500/50 cursor-pointer hover:opacity-90 transition-opacity" onClick={() => setReceiptImageModal(txnDetailsModal.pendingReceipt)} />
                            </div>
                        )}
                        
                        <div className="text-xs text-slate-500 text-center mt-4">تاريخ التسجيل: {formatDate(txnDetailsModal.dateTime)}</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          };

          // --- Weddings Tab (New) ---
          const WeddingsTab = () => {
            const [showAddModal, setShowAddModal] = useState(false);
            const [query, setQuery] = useState('');
            const [payModal, setPayModal] = useState(null);
            const [receiptImageModal, setReceiptImageModal] = useState(null);
            const [txnDetailsModal, setTxnDetailsModal] = useState(null);
            
            const [formData, setFormData] = useState({
                groomName: '', brideName: '', phone: '', groomAddress: '',
                weddingDate: '', location: '', makeupArtist: '', leaveTime: '',
                sessionType: '', casualShootDate: '',
                package: null, addons: [],
                total: '', paid: '', paymentMethod: 'cash'
            });

            const [newAddon, setNewAddon] = useState({ name: '', price: '', date: '' });

            const handleAddAddon = () => {
                if(!newAddon.name) return;
                const price = parseFloat(newAddon.price) || 0;
                setFormData(prev => ({
                    ...prev,
                    addons: [...prev.addons, { ...newAddon, price }],
                    total: (parseFloat(prev.total) || 0) + price
                }));
                setNewAddon({ name: '', price: '', date: '' });
            };

            const handleRemoveAddon = (index) => {
                const addon = formData.addons[index];
                const newAddons = [...formData.addons];
                newAddons.splice(index, 1);
                setFormData(prev => ({
                    ...prev,
                    addons: newAddons,
                    total: Math.max(0, (parseFloat(prev.total) || 0) - addon.price)
                }));
            };

            const handleSelectPackage = (pkg) => {
                const oldPkgPrice = formData.package ? formData.package.price : 0;
                setFormData(prev => ({
                    ...prev,
                    package: pkg,
                    total: (parseFloat(prev.total) || 0) - oldPkgPrice + pkg.price
                }));
            };

            const handleSubmit = async (e) => {
              e.preventDefault();
              const total = parseFloat(formData.total) || 0;
              const paid = parseFloat(formData.paid) || 0;
              const newWedding = {
                id: Date.now().toString(),
                receiptNo: settings.nextReceiptNo || 1000,
                type: 'wedding',
                dateTime: new Date().toISOString(),
                groomName: formData.groomName,
                brideName: formData.brideName,
                phone: formData.phone,
                groomAddress: formData.groomAddress,
                weddingDate: formData.weddingDate,
                location: formData.location,
                makeupArtist: formData.makeupArtist,
                leaveTime: formData.leaveTime,
                sessionType: formData.sessionType,
                casualShootDate: formData.casualShootDate,
                package: formData.package,
                addons: formData.addons,
                total: total,
                paid: paid,
                electronicPaid: formData.paymentMethod === 'electronic' ? paid : 0,
                remaining: total - paid,
                status: 0,
                month: new Date().getMonth() + 1,
                year: new Date().getFullYear()
              };
              
              const appId = 'studio-marakby';
              await setDoc(doc(db, `artifacts/${appId}/public/data/weddings`, newWedding.id), newWedding);
              setSettings({...settings, nextReceiptNo: (settings.nextReceiptNo || 1000) + 1});
              setFormData({ groomName:'', brideName:'', phone:'', groomAddress:'', weddingDate:'', location:'', makeupArtist:'', leaveTime:'', sessionType:'', casualShootDate:'', package:null, addons:[], total:'', paid:'', paymentMethod:'cash' });
              setShowAddModal(false);
            };

            const handleDelete = async (id) => {
              if(window.confirm('هل أنت متأكد من حذف هذا الحجز؟')) await deleteDoc(doc(db, `artifacts/studio-marakby/public/data/weddings`, id));
            };

            const updateTxnStatus = async (txnId, newStatus) => {
                const txnToUpdate = weddings.find(t => t.id === txnId);
                if(txnToUpdate) {
                    const updated = {...txnToUpdate, status: newStatus};
                    await setDoc(doc(db, `artifacts/studio-marakby/public/data/weddings`, updated.id), updated);
                }
            };

            const filteredWeds = query ? weddings.filter(t => t.groomName.includes(query) || t.brideName.includes(query) || t.phone.includes(query) || t.receiptNo.toString().includes(query)) : weddings;

            return (
              <div className="space-y-6">
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 flex flex-col md:flex-row gap-4 items-center justify-between">
                  <button onClick={() => setShowAddModal(true)} className="w-full md:w-auto bg-pink-600 hover:bg-pink-500 text-white font-bold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-pink-900/50">
                    <i className="ph ph-heart text-2xl"></i> حجز زفاف جديد
                  </button>
                  <div className="relative w-full md:w-1/2">
                    <i className="ph ph-magnifying-glass absolute right-4 top-4 text-slate-500 text-xl"></i>
                    <input type="text" placeholder="ابحث باسم العريس، العروسة، رقم الهاتف..." className="w-full p-3 pr-10 border border-slate-700 bg-slate-950 text-white placeholder-slate-500 rounded-xl focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none text-sm transition-colors" value={query} onChange={(e) => setQuery(e.target.value)} />
                  </div>
                </div>

                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-100 border-b border-slate-800 pb-4">
                    <i className="ph ph-calendar-heart text-pink-400 text-2xl"></i> حجوزات الزفاف ({filteredWeds.length})
                  </h2>
                  <div className="space-y-4">
                    {filteredWeds.length === 0 ? <p className="text-center p-10 text-slate-500">لا توجد حجوزات مسجلة.</p> : filteredWeds.map(txn => <TransactionCard key={txn.id} txn={txn} onDelete={handleDelete} onPayRemaining={setPayModal} onViewReceipt={setReceiptImageModal} sendInvoice={() => openWhatsApp(txn.phone, generateWA_Message('invoice', txn, true))} updateStatus={updateTxnStatus} onViewDetails={setTxnDetailsModal} />)}
                  </div>
                </div>

                {showAddModal && (
                  <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-900 p-6 rounded-3xl shadow-2xl border border-slate-800 w-full max-w-3xl relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                      <button onClick={() => setShowAddModal(false)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-pink-400"><i className="ph ph-x text-xl"></i></button>
                      <h2 className="text-2xl font-black mb-6 text-slate-100 border-b border-slate-800 pb-3 flex items-center gap-2"><i className="ph ph-heart text-pink-500"></i> تفاصيل حجز زفاف جديد</h2>
                      <form onSubmit={handleSubmit} className="space-y-5">
                        
                        {/* Section 1: Names */}
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <h4 className="text-sm font-bold text-pink-400 mb-3 border-b border-slate-800 pb-2">بيانات العرسان الأساسية</h4>
                           <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                              <input type="text" placeholder="اسم العريس" required className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.groomName} onChange={e => setFormData({...formData, groomName: e.target.value})} />
                              <input type="text" placeholder="اسم العروسة" required className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.brideName} onChange={e => setFormData({...formData, brideName: e.target.value})} />
                           </div>
                           <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                              <input type="tel" placeholder="رقم الهاتف (واتساب للتواصل)" required className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                              <input type="text" placeholder="عنوان العريس" required className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.groomAddress} onChange={e => setFormData({...formData, groomAddress: e.target.value})} />
                           </div>
                        </div>

                        {/* Section 2: Details */}
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <h4 className="text-sm font-bold text-pink-400 mb-3 border-b border-slate-800 pb-2">تفاصيل ومواعيد الزفاف</h4>
                           <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                              <div>
                                 <label className="text-xs text-slate-500 mb-1 block">موعد الزفاف (تقويم)</label>
                                 <input type="date" required className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.weddingDate} onChange={e => setFormData({...formData, weddingDate: e.target.value})} />
                              </div>
                              <div>
                                 <label className="text-xs text-slate-500 mb-1 block">مكان التصوير (اللوكيشن / القاعة)</label>
                                 <input type="text" required placeholder="اسم اللوكيشن..." className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} />
                              </div>
                           </div>
                           <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
                              <div>
                                 <label className="text-xs text-slate-500 mb-1 block">اسم خبيرة التجميل (الميك أب)</label>
                                 <input type="text" placeholder="الميك أب..." className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.makeupArtist} onChange={e => setFormData({...formData, makeupArtist: e.target.value})} />
                              </div>
                              <div>
                                 <label className="text-xs text-slate-500 mb-1 block">وقت الخروج المتوقع</label>
                                 <input type="time" className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.leaveTime} onChange={e => setFormData({...formData, leaveTime: e.target.value})} />
                              </div>
                              <div>
                                 <label className="text-xs text-slate-500 mb-1 block">نوع السيشن</label>
                                 <input type="text" placeholder="مثال: فري ستايل، كلاسيك..." className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.sessionType} onChange={e => setFormData({...formData, sessionType: e.target.value})} />
                              </div>
                           </div>
                           <div>
                              <label className="text-xs text-slate-500 mb-1 block">تاريخ تصوير الكاجوال (إن وجد)</label>
                              <input type="date" className="w-full p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" value={formData.casualShootDate} onChange={e => setFormData({...formData, casualShootDate: e.target.value})} />
                           </div>
                        </div>

                        {/* Section 3: Packages */}
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <h4 className="text-sm font-bold text-pink-400 mb-3 border-b border-slate-800 pb-2">اختيار الباقة الأساسية</h4>
                           <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                              {settings.weddingPackages.map((pkg, idx) => (
                                 <div key={idx} onClick={() => handleSelectPackage(pkg)} className={`p-3 rounded-xl border cursor-pointer transition-all ${formData.package?.name === pkg.name ? 'bg-pink-900/30 border-pink-500' : 'bg-slate-900 border-slate-700 hover:border-pink-500/50'}`}>
                                    <div className="font-bold text-sm text-slate-200 mb-1">{pkg.name}</div>
                                    <div className="text-xs text-slate-500 mb-2 h-8 overflow-hidden">{pkg.desc}</div>
                                    <div className="font-black text-pink-400 text-sm">{pkg.price} ج.م</div>
                                 </div>
                              ))}
                           </div>
                           {formData.package && (
                               <div className="mt-3 p-3 bg-slate-900 rounded-lg border border-slate-700 flex justify-between items-center">
                                  <span className="text-sm font-bold text-slate-300">الباقة المختارة: {formData.package.name}</span>
                                  <div className="flex items-center bg-slate-950 rounded-md border border-slate-700 px-2 py-1">
                                     <span className="text-xs text-slate-500 ml-2">تعديل السعر:</span>
                                     <input type="number" value={formData.package.price} onChange={e => handleSelectPackage({...formData.package, price: parseFloat(e.target.value) || 0})} className="w-16 bg-transparent text-white text-center outline-none text-sm font-bold" />
                                  </div>
                               </div>
                           )}
                        </div>

                        {/* Section 4: Addons */}
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                           <h4 className="text-sm font-bold text-pink-400 mb-3 border-b border-slate-800 pb-2">صندوق إضافات أخرى (مثال: تصوير حنة)</h4>
                           <div className="flex flex-col sm:flex-row gap-2 mb-3">
                              <input type="text" placeholder="اسم الإضافة (حنة، كتب كتاب...)" value={newAddon.name} onChange={e=>setNewAddon({...newAddon, name: e.target.value})} className="flex-1 p-2.5 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" />
                              <input type="date" value={newAddon.date} onChange={e=>setNewAddon({...newAddon, date: e.target.value})} className="w-full sm:w-36 p-2.5 border border-slate-700 bg-slate-900 text-slate-400 rounded-lg outline-none focus:border-pink-500 text-sm" />
                              <input type="number" placeholder="السعر" value={newAddon.price} onChange={e=>setNewAddon({...newAddon, price: e.target.value})} className="w-full sm:w-24 p-2.5 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-pink-500 text-sm" />
                              <button type="button" onClick={handleAddAddon} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2.5 rounded-lg transition-colors"><i className="ph ph-plus font-bold"></i></button>
                           </div>
                           <div className="space-y-2">
                              {formData.addons.map((addon, idx) => (
