                   <ServicesSettingsList title="قوالب إضافات الزفاف (حنة، كتب كتاب...)" items={settings.addonTemplates || []} onAdd={v => handleAddList('addonTemplates', v)} onRemove={i => handleRemoveList('addonTemplates', i)} colorTheme="pink" />
                </div>
                
                <div>
                    <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                      <h3 className="font-bold mb-4 border-b border-slate-800 pb-2 text-slate-100">أقسام المصروفات</h3>
                      <div className="flex gap-2 mb-4">
                        <input type="text" id="newCat" className="flex-1 p-2 border border-slate-700 bg-slate-950 text-white rounded-lg outline-none focus:border-blue-500 placeholder-slate-500" placeholder="بند مصروف جديد..." />
                        <button onClick={() => { const v = document.getElementById('newCat').value; handleAddList('expenseCategories', v); document.getElementById('newCat').value=''; }} className="bg-blue-600 hover:bg-blue-500 text-white px-4 rounded-lg transition-colors"><i className="ph ph-plus text-xl"></i></button>
                      </div>
                      <div className="flex flex-wrap gap-2">
                        {settings.expenseCategories.map((c, i) => (
                          <span key={i} className="bg-slate-800 text-slate-300 px-3 py-1.5 rounded-full text-sm font-bold flex items-center gap-2 border border-slate-700">
                            {c} <button onClick={() => handleRemoveList('expenseCategories', i)} className="text-red-400 hover:text-red-300"><i className="ph ph-x text-sm"></i></button>
                          </span>
                        ))}
                      </div>
                   </div>
                </div>

                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800">
                  <h2 className="text-xl font-bold mb-4 border-b border-slate-800 pb-4 text-slate-100 flex items-center gap-2">
                      <i className="ph ph-whatsapp-logo text-green-400 text-2xl"></i> قوالب رسائل الواتساب
                  </h2>
                  
                  <div className="bg-slate-950/50 p-4 rounded-xl border border-slate-800 mb-6 flex flex-col md:flex-row gap-4 items-center justify-between shadow-inner">
                     <p className="text-sm text-slate-400 leading-relaxed flex-1">
                        <strong className="text-slate-300 block mb-2">المتغيرات المتاحة للنسخ والإضافة التلقائية:</strong>
                        <code className="text-blue-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{name}'}</code>
                        <code className="text-blue-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{receipt}'}</code>
                        <code className="text-blue-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{total}'}</code>
                        <code className="text-blue-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{remaining}'}</code>
                        <code className="text-blue-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{date}'}</code>
                        <code className="text-blue-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{time}'}</code>
                        <code className="text-purple-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{studio}'}</code>
                        <code className="text-green-400 font-bold mx-1 bg-slate-900 px-2 py-1 rounded border border-slate-700 mt-2 inline-block shadow-sm">{'{track_url}'}</code>
                     </p>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    {Object.keys(settings.waTemplates).map(key => {
                      const getLabel = (k) => {
                        switch(k) {
                          case 'welcome': return '👋 رسالة الترحيب الأولى';
                          case 'welcomeBack': return '🌟 رسالة ترحيب بالعودة (للعملاء الدائمين)';
                          case 'vipDiscount': return '🎁 رسالة خصم للعملاء المميزين (VIP)';
                          case 'invoice': return '🧾 شكل الفاتورة الإلكترونية';
                          case 'reminder': return '⚠️ تذكير بالمبلغ المتبقي';
                          case 'ready': return '🎉 رسالة جاهزية الطلب للاستلام';
                          case 'deposit': return '💸 تأكيد استلام العربون';
                          case 'tracking': return '📍 رسالة تتبع الطلب بالرابط';
                          default: return k;
                        }
                      };

                      return (
                      <div key={key} className="bg-slate-950 p-5 rounded-lg border border-slate-700 hover:border-green-500/50 transition-all group shadow-sm flex flex-col relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-1 h-full bg-slate-800 group-hover:bg-green-500 transition-colors"></div>
                        <label className="block text-sm font-bold mb-3 text-slate-300 group-hover:text-green-400 transition-colors pr-2">
                            {getLabel(key)}
                        </label>
                        <div className="relative flex-1 flex flex-col">
                            <textarea 
                                rows="5" 
                                value={settings.waTemplates[key]} 
                                onChange={e => setSettings({...settings, waTemplates: {...settings.waTemplates, [key]: e.target.value}})} 
                                className="w-full flex-1 p-4 border border-slate-700 bg-slate-900 text-green-50 rounded-md focus:border-green-500 focus:bg-slate-950 focus:ring-1 focus:ring-green-500/30 outline-none text-sm font-mono custom-scrollbar transition-all leading-relaxed shadow-inner resize-y" 
                                placeholder="اكتب قالب الرسالة هنا..."
                            />
                        </div>
                      </div>
                    )})}
                  </div>
                </div>

                <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 w-[90%] max-w-2xl bg-slate-800/90 backdrop-blur-xl p-4 rounded-2xl shadow-2xl border border-slate-600 flex justify-between items-center z-50">
                    <div className="hidden sm:block">
                       <h3 className="font-bold text-white text-sm">تأكيد التعديلات</h3>
                       <p className="text-xs text-slate-400 mt-1">يجب حفظ الإعدادات لتطبيقها في النظام</p>
                    </div>
                    <button onClick={handleSaveClick} disabled={isSaving} className={`w-full sm:w-auto px-8 py-3 rounded-xl font-black flex items-center justify-center gap-2 transition-all shadow-lg ${isSaving ? 'bg-green-600 text-white shadow-green-900/20' : 'bg-blue-600 hover:bg-blue-500 text-white shadow-blue-900/20'}`}>
                        {isSaving ? <i className="ph ph-check-circle text-xl"></i> : <i className="ph ph-floppy-disk text-xl"></i>}
                        {isSaving ? 'تم الحفظ بنجاح' : 'حفظ الإعدادات الآن'}
                    </button>
                </div>

              </div>
            );
          };

        // --- Main App Component ---

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [user, setUser] = useState(null);
          const [authReady, setAuthReady] = useState(false);
          const [authError, setAuthError] = useState(null);
          const [dataLoaded, setDataLoaded] = useState(false);
          const [showNotFound, setShowNotFound] = useState(false);
          const [transferReceipt, setTransferReceipt] = useState(null);
          const [isUploading, setIsUploading] = useState(false);
          const [clientViewError, setClientViewError] = useState('');
          const [feedbackText, setFeedbackText] = useState('');
          const [rating, setRating] = useState(0);
          const [hoveredStar, setHoveredStar] = useState(0);
          const [isSubmittingFeedback, setIsSubmittingFeedback] = useState(false);
          const [feedbackSubmitted, setFeedbackSubmitted] = useState(false);
          
          const [isAuthenticatedAdmin, setIsAuthenticatedAdmin] = useState(false);
          const [receiptImageModal, setReceiptImageModal] = useState(null);

          const [transactions, setTransactions] = useState([]);
          const [weddings, setWeddings] = useState([]);
          const [expenses, setExpenses] = useState([]);
          const [inventory, setInventory] = useState({});
          const [settings, setSettings] = useState({
            nextReceiptNo: 1000,
            adminPassword: '1234',
            services: DEFAULT_SERVICES,
            products: DEFAULT_PRODUCTS,
            weddingPackages: DEFAULT_WEDDING_PACKAGES,
            addonTemplates: DEFAULT_ADDON_TEMPLATES,
            expenseCategories: DEFAULT_EXPENSE_CATEGORIES,
            waTemplates: DEFAULT_WA_TEMPLATES,
            studioName: "ستوديو المراكبى",
            studioLogo: ""
          });

          const urlParams = new URLSearchParams(window.location.search);
          const trackPhone = urlParams.get('phone');
          const trackReceipt = urlParams.get('receipt');
          const trackType = urlParams.get('type') || 't'; 
          const isTracking = trackPhone && trackReceipt;

          useEffect(() => {
              const savedAuth = localStorage.getItem('studioAdminAuth');
              if (savedAuth === 'true') {
                  setIsAuthenticatedAdmin(true);
              }
          }, []);

          const handleLogout = () => {
              setIsAuthenticatedAdmin(false);
              localStorage.removeItem('studioAdminAuth');
              window.location.reload();
          };

          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (error) {
                 console.error("Auth error:", error);
                 setAuthError("تنبيه: يوجد مشكلة في الاتصال بقاعدة البيانات.");
                 setAuthReady(true);
              }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); setAuthReady(true); });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
            const basePath = `artifacts/${appId}/public/data`;

            const fetchSettings = async () => {
              const docSnap = await getDoc(doc(db, basePath, 'settings', 'main'));
              if (docSnap.exists()) {
                let data = docSnap.data();
                if (data.services) data.services = data.services.map(s => typeof s === 'string' ? { name: s, price: 0, desc: '' } : { name: s.name, price: s.price || 0, desc: s.desc || '' });
                
                if (!data.products) data.products = DEFAULT_PRODUCTS;
                else data.products = data.products.map(p => typeof p === 'string' ? { name: p, price: 0, wholesalePrice: 0, totalQty: 0, desc: '' } : { name: p.name, price: p.price || 0, wholesalePrice: p.wholesalePrice || 0, totalQty: p.totalQty || 0, desc: p.desc || '' });
                
                if (!data.weddingPackages) data.weddingPackages = DEFAULT_WEDDING_PACKAGES;
                if (!data.addonTemplates) data.addonTemplates = DEFAULT_ADDON_TEMPLATES;
                
                if (!data.expenseCategories || data.expenseCategories.length < 5) data.expenseCategories = DEFAULT_EXPENSE_CATEGORIES;

                if (!data.waTemplates) {
                    data.waTemplates = DEFAULT_WA_TEMPLATES;
                } else {
                    // Update fallback dynamically if database versions differ
                    data.waTemplates = { ...DEFAULT_WA_TEMPLATES, ...data.waTemplates };
                }
                
                if (data.waTemplates.invoice && !data.waTemplates.invoice.includes('{track_url}')) {
                    data.waTemplates.invoice = DEFAULT_WA_TEMPLATES.invoice;
                }

                if (!data.adminPassword) data.adminPassword = '1234';

                setSettings(data);
              }
            };
            fetchSettings();

            const unsubInv = onSnapshot(doc(db, basePath, 'inventory', 'main'), (docSnap) => {
              if (docSnap.exists()) setInventory(docSnap.data());
            }, (err) => console.error(err));

            const unsubTxns = onSnapshot(collection(db, basePath, 'transactions'), (snapshot) => {
              const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
              data.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
              setTransactions(data);
              if(trackType !== 'w') setDataLoaded(true);
            });

            const unsubWeds = onSnapshot(collection(db, basePath, 'weddings'), (snapshot) => {
              const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
              data.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
              setWeddings(data);
              if(trackType === 'w') setDataLoaded(true);
            });

            if(!isTracking) {
                const unsubExps = onSnapshot(collection(db, basePath, 'expenses'), (snapshot) => {
                  const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                  data.sort((a, b) => new Date(b.date) - new Date(a.date));
                  setExpenses(data);
                });
                return () => { unsubTxns(); unsubWeds(); unsubExps(); unsubInv(); };
            }

            return () => { unsubTxns(); unsubWeds(); unsubInv(); };
          }, [user, isTracking, trackType]);
          
          const allRecords = useMemo(() => [...transactions, ...weddings], [transactions, weddings]);

          const saveSettingsToDB = async (newSettings) => {
              if (!user || isTracking) return;
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
              await setDoc(doc(db, `artifacts/${appId}/public/data/settings`, 'main'), newSettings);
          };

          const updateInventoryExact = async (itemName, newValue) => {
              const newInv = { ...inventory, [itemName]: Math.max(0, newValue) };
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
              await setDoc(doc(db, `artifacts/${appId}/public/data/inventory`, 'main'), newInv);
          };

          useEffect(() => {
              if (isTracking && dataLoaded) {
                  const targetArr = trackType === 'w' ? weddings : transactions;
                  const currentTxn = targetArr.find(t => t.phone === trackPhone && t.receiptNo.toString() === trackReceipt);
                  
                  if (!currentTxn) {
                      const timer = setTimeout(() => setShowNotFound(true), 2500);
                      return () => clearTimeout(timer);
                  } else {
                      setShowNotFound(false);
                      
                      // Auto-cleanup logic for expired photos on client side tracking
                      const runClientCleanup = async () => {
                           const updatedTxn = await checkAndCleanExpiredPhotos(currentTxn, db, getStorage());
                           // Handle read status logic if not read yet
                           if (!updatedTxn.viewedByClient) {
                               const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                               const targetCol = trackType === 'w' ? 'weddings' : 'transactions';
                               const finalTxn = { ...updatedTxn, viewedByClient: true, viewTime: new Date().toISOString() };
                               setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, finalTxn.id), finalTxn).catch(err => console.error(err));
                           }
                      };
                      runClientCleanup();
                  }
              }
          }, [isTracking, dataLoaded, transactions, weddings, trackPhone, trackReceipt, trackType]);

          if (isTracking && authReady) {
              const targetArr = trackType === 'w' ? weddings : transactions;
              const txn = targetArr.find(t => t.phone === trackPhone && t.receiptNo.toString() === trackReceipt);

              if (!dataLoaded || (!txn && !showNotFound)) {
                  return (
                      <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-100 p-6 text-center">
                          <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                          <h2 className="text-xl font-bold mb-2 text-white">جاري البحث عن الطلب...</h2>
                          <p className="text-slate-400 text-sm">لحظات ونعرض لك التفاصيل</p>
                      </div>
                  );
              }
              
              if (!txn && showNotFound) {
                  return (
                      <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-400 p-6 text-center">
                          <i className="ph ph-magnifying-glass text-6xl mb-4 text-slate-600"></i>
                          <h2 className="text-2xl font-bold mb-2 text-white">الطلب غير موجود</h2>
                          <p>عذراً، لم نتمكن من العثور على طلب يطابق رقم الهاتف والإيصال المدخلين.</p>
                          <p className="mt-2 text-sm opacity-70">رقم الهاتف: {trackPhone} | رقم الإيصال: {trackReceipt}</p>
                      </div>
                  );
              }
              
              const currentStatus = txn.status || 0;
              const isWedding = trackType === 'w';
              const displayName = isWedding ? `${txn.groomName || ''} و ${txn.brideName || ''}`.trim() : txn.clientName;
              const displayReqs = getReqsText(txn);
              
              const statusesToUse = getTransactionStatuses(txn);

              return (
                  <div className="min-h-screen bg-slate-950 text-slate-100 p-4 md:p-6 flex flex-col items-center">
                      <div className="flex flex-col items-center gap-4 mb-8 mt-8">
                          <div className="relative">
                              <div className={`absolute inset-0 blur-2xl opacity-30 rounded-full ${isWedding ? 'bg-pink-500' : 'bg-blue-500'}`}></div>
                              {settings.studioLogo ? (
                                  <img src={settings.studioLogo} className={`relative z-10 w-24 h-24 rounded-full object-cover shadow-2xl border-2 ${isWedding ? 'border-pink-900/50' : 'border-blue-900/50'}`} alt="Studio Logo" />
                              ) : (
                                  <div className={`relative z-10 w-24 h-24 bg-slate-900 rounded-full flex items-center justify-center border shadow-2xl ${isWedding ? 'border-pink-900/50 shadow-pink-900/20' : 'border-blue-900/50 shadow-blue-900/20'}`}>
                                      <i className={`ph-fill ph-camera text-5xl ${isWedding ? 'text-pink-400' : 'text-blue-400'}`}></i>
                                  </div>
                              )}
                          </div>
                          <div className={`bg-slate-900/80 backdrop-blur-md px-6 py-2.5 rounded-full border shadow-sm mt-2 ${isWedding ? 'border-pink-500/20' : 'border-blue-500/20'}`}>
                              <h1 className={`text-base md:text-lg font-bold tracking-wide ${isWedding ? 'text-pink-100' : 'text-blue-100'}`}>
                                  {isWedding ? 'تتبع حجز الزفاف الخاص بك 💍' : 'تتبع حالة الطلب الخاص بك 📸'}
                              </h1>
                          </div>
                      </div>

                      {txn.photosLink && (
                          <a href={txn.photosLink} target="_blank" rel="noopener noreferrer" className="w-full max-w-md bg-gradient-to-r from-green-600 to-emerald-500 hover:from-green-500 hover:to-emerald-400 text-white p-5 rounded-3xl shadow-xl shadow-green-900/20 mb-8 flex items-center justify-center gap-3 font-bold text-lg hover:scale-[1.02] transition-all border border-green-400/30 group">
                             <div className="bg-white/20 p-2 rounded-full group-hover:animate-bounce">
                                 <i className="ph-bold ph-download-simple text-2xl"></i>
                             </div>
                             <span>تحميل الصور (رابط خارجي)</span>
                          </a>
                      )}

                      {isWedding && (
                          <div className="w-full max-w-md bg-gradient-to-br from-pink-950/40 to-slate-900 p-6 rounded-3xl border border-pink-500/20 mb-8 text-center shadow-lg">
                              <div className="w-16 h-16 bg-pink-500/20 text-pink-400 rounded-full flex items-center justify-center mx-auto mb-4 border border-pink-500/30">
                                  <i className="ph-fill ph-heart text-3xl"></i>
                              </div>
                              <h2 className="text-xl font-bold text-pink-300 mb-2">شكراً لاختياركم {settings.studioName}</h2>
                              <p className="text-sm text-pink-200/80 leading-relaxed font-medium">
                                  يسعدنا ونتشرف بأن نكون جزءاً من أجمل لحظات حياتكم. نسعى دائماً لتوثيق ذكرياتكم بأفضل جودة وحب لتدوم للأبد. ألف مبروك للعروسين! 🎉💍
                              </p>
                          </div>
                      )}

                      {!isWedding && (
                          <div className="w-full max-w-md bg-gradient-to-br from-blue-950/40 to-slate-900 p-6 rounded-3xl border border-blue-500/20 mb-8 text-center shadow-lg">
                              <div className="w-16 h-16 bg-blue-500/20 text-blue-400 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-500/30">
                                  <i className="ph-fill ph-camera text-3xl"></i>
                              </div>
                              <h2 className="text-xl font-bold text-blue-300 mb-2">شكراً لاختياركم {settings.studioName}</h2>
                              <p className="text-sm text-blue-200/80 leading-relaxed font-medium">
                                  نسعد دائماً بزيارتكم وثقتكم بنا لتوثيق ذكرياتكم الجميلة. نعمل بكل حب واحترافية لتقديم أفضل جودة تليق بكم. 🌟📸
                              </p>
                          </div>
                      )}

                      {txn.uploadedPhotos && txn.uploadedPhotos.length > 0 && (
                          <div className="w-full max-w-md bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 mb-8 relative overflow-hidden">
                              <div className="absolute top-0 right-0 w-2 h-full bg-green-500"></div>
                              <h3 className="font-bold text-lg mb-2 flex items-center gap-2 text-slate-100">
                                  <i className="ph-fill ph-images text-green-400 text-2xl"></i> صورك الخاصة المرفوعة
                              </h3>
                              <p className="text-[11px] text-slate-400 mb-4 leading-relaxed border-b border-slate-800 pb-3">تنويه: الصور محفوظة بجودتها الأصلية لتنزيلها، <b className="text-red-400">وسيتم حذفها نهائياً خلال 5 أيام</b> من تاريخ الرفع، يرجى حفظها لديكم.</p>
                              
                              <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
                                  {txn.uploadedPhotos.map((photo, idx) => {
                                      const daysRemaining = photo.expiryTimestamp ? Math.max(0, Math.ceil((photo.expiryTimestamp - Date.now()) / (1000 * 60 * 60 * 24))) : 5;
                                      return(
                                      <div key={idx} onClick={() => setReceiptImageModal(photo.url)} className="relative group block rounded-xl overflow-hidden border border-slate-700 aspect-square shadow-sm cursor-pointer">
                                          <img src={photo.url} className="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110" />
                                          <div className="absolute inset-0 bg-slate-950/60 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-1">
                                              <i className="ph-bold ph-download-simple text-white text-xl"></i>
                                          </div>
                                          <div className="absolute bottom-0 left-0 right-0 bg-slate-950/90 text-[8px] text-center text-slate-300 font-mono py-1 rounded-b-lg">
                                              باقي {daysRemaining} أيام
                                          </div>
                                      </div>
                                  )})}
                              </div>
                          </div>
                      )}

                      <div className="bg-slate-900 w-full max-w-md p-6 rounded-3xl shadow-xl border border-slate-800 mb-8 relative overflow-hidden">
                          <div className={`absolute top-0 right-0 w-2 h-full ${isWedding ? 'bg-pink-500' : 'bg-blue-500'}`}></div>
                          <div className="flex justify-between items-center mb-4 pb-4 border-b border-slate-800">
                              <span className="text-slate-400 text-sm">إيصال رقم</span>
                              <span className="text-2xl font-black font-mono text-white">#{txn.receiptNo}</span>
                          </div>
                          <h3 className={`text-xl font-bold mb-2 flex items-center gap-2 ${isWedding ? 'text-pink-400' : 'text-blue-400'}`}>
                             {isWedding ? <i className="ph ph-heart"></i> : <i className="ph ph-user"></i>} {displayName}
                          </h3>
                          <p className="text-sm text-slate-400 mb-5 leading-relaxed whitespace-pre-wrap">{displayReqs}</p>
                          
                          {isWedding && txn.weddingDate && (
                              <div className="bg-slate-950 p-3 rounded-xl mb-4 border border-slate-800 flex items-center justify-between text-sm">
                                  <span className="text-slate-400">موعد الزفاف:</span>
                                  <span className="font-bold text-pink-300">{formatDateOnly(txn.weddingDate)}</span>
                              </div>
                          )}

                          {txn.photoNo && (Array.isArray(txn.photoNo) ? txn.photoNo.some(n=>n) : true) && (
                              <div className="bg-slate-950 p-3 rounded-xl mb-4 border border-slate-800 flex items-center justify-between text-sm">
                                  <span className="text-slate-400">أرقام الصور:</span>
                                  <span className="font-bold text-white" dir="ltr">{Array.isArray(txn.photoNo) ? txn.photoNo.filter(Boolean).join(' , ') : txn.photoNo}</span>
                              </div>
                          )}

                          <div className="flex justify-between bg-slate-950 p-4 rounded-2xl border border-slate-800 text-sm">
                               <div className="flex flex-col items-center gap-1">
                                   <span className="text-slate-500 text-xs">المدفوع</span>
                                   <span className="text-green-400 font-bold">{txn.paid} ج.م</span>
                               </div>
                               <div className="w-px bg-slate-800"></div>
                               <div className="flex flex-col items-center gap-1">
                                   <span className="text-slate-500 text-xs">الباقي الدفع</span>
                                   <span className="text-red-400 font-bold">{txn.remaining} ج.م</span>
                               </div>
                          </div>
                      </div>

                      {txn.remaining > 0 && (
                          <div className="w-full max-w-md bg-gradient-to-br from-indigo-950 to-slate-900 p-6 rounded-3xl shadow-xl border border-indigo-500/30 mb-8 text-center relative overflow-hidden">
                              <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                              <div className="flex justify-center mb-4">
                                  <div className="bg-indigo-500/20 p-4 rounded-full text-indigo-400 shadow-lg shadow-indigo-900/20">
                                      <i className="ph ph-wallet text-3xl"></i>
                                  </div>
                              </div>
                              <h3 className="text-lg font-bold text-white mb-2">سداد إلكتروني متاح 💳</h3>
                              <p className="text-sm text-indigo-200/80 leading-relaxed mb-4">
                                  لراحتك، يمكنك الآن سداد باقي المبلغ المستحق (<b className="text-white">{txn.remaining} ج.م</b>) بكل سهولة عبر 
                                  <span className="text-white font-bold mx-1">إنستاباي (InstaPay)</span> أو <span className="text-white font-bold mx-1">المحافظ الإلكترونية</span>.
                              </p>
                              
                              <div className="bg-slate-950/80 py-3 px-4 rounded-2xl border border-indigo-500/20 flex flex-col items-center gap-1 shadow-inner mb-4">
                                  <span className="text-xs text-indigo-300">رقم التحويل (فودافون كاش / إنستاباي):</span>
                                  <div className="flex items-center gap-3 mt-1">
                                      <span className="text-2xl font-black font-mono text-white tracking-widest">01126810107</span>
                                      <button onClick={(e) => {
                                          const el = document.createElement('textarea');
                                          el.value = '01126810107';
                                          document.body.appendChild(el);
                                          el.select();
                                          document.execCommand('copy');
                                          document.body.removeChild(el);
                                          const originalHTML = e.currentTarget.innerHTML;
                                          e.currentTarget.innerHTML = '<i class="ph ph-check text-lg"></i>';
                                          setTimeout(() => e.currentTarget.innerHTML = originalHTML, 2000);
                                      }} className="text-indigo-400 hover:text-indigo-300 bg-indigo-900/30 p-2 rounded-lg transition-colors" title="نسخ الرقم"><i className="ph ph-copy text-lg"></i></button>
                                  </div>
                              </div>

                              <div className="mb-5 text-right bg-indigo-900/20 p-4 rounded-xl border border-indigo-500/30">
                                  <label className="block text-sm font-bold text-indigo-300 mb-3"><i className="ph ph-upload-simple text-lg align-middle ml-1"></i> إرفاق صورة التحويل أولاً لتأكيد السداد:</label>
                                  <input type="file" accept="image/*" onChange={(e) => {
                                          const file = e.target.files[0];
                                          if (!file) return;
                                          const reader = new FileReader();
                                          reader.readAsDataURL(file);
                                          reader.onload = (event) => {
                                              const img = new Image();
                                              img.src = event.target.result;
                                              img.onload = () => {
                                                  const canvas = document.createElement('canvas');
                                                  const MAX_WIDTH = 800;
                                                  let scaleSize = 1;
                                                  if (img.width > MAX_WIDTH) scaleSize = MAX_WIDTH / img.width;
                                                  canvas.width = img.width * scaleSize;
                                                  canvas.height = img.height * scaleSize;
                                                  const ctx = canvas.getContext('2d');
                                                  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                                  setTransferReceipt(canvas.toDataURL('image/jpeg', 0.6));
                                                  setClientViewError('');
                                              };
                                          };
                                      }} className="block w-full text-sm text-slate-400 file:ml-3 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 transition-colors bg-slate-950 rounded-xl"
                                  />
                                  {clientViewError && <p className="text-red-400 text-xs mt-2 font-bold flex items-center gap-1"><i className="ph ph-warning text-base"></i> {clientViewError}</p>}
                                  {transferReceipt && <p className="text-green-400 text-xs mt-3 font-bold flex items-center gap-1"><i className="ph ph-check-circle text-base"></i> تم إرفاق الصورة بنجاح وجاهز للتأكيد</p>}
                              </div>

                              <button onClick={async () => {
                                  if (!transferReceipt) { setClientViewError('عذراً، برجاء إرفاق صورة التحويل أولاً لتأكيد السداد.'); return; }
                                  setIsUploading(true);
                                  try {
                                      const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                                      const updated = { ...txn, pendingReceipt: transferReceipt };
                                      const targetCol = isWedding ? 'weddings' : 'transactions';
                                      await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, txn.id), updated);
                                      const confirmMsg = `مرحباً، قمت بتحويل مبلغ ${txn.remaining} ج.م لسداد باقي حساب إيصال رقم #${txn.receiptNo} باسم ${displayName}.\n✅ وقمت برفع صورة التحويل في رابط التتبع لتأكيد الدفع.`;
                                      openWhatsApp('01201260040', confirmMsg);
                                  } catch (err) { setClientViewError('حدث خطأ أثناء الحفظ، يرجى المحاولة مرة أخرى.'); }
                                  setIsUploading(false);
                              }} disabled={isUploading} className={`w-full font-bold py-3.5 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 ${isUploading || !transferReceipt ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-green-600 hover:bg-green-500 text-white shadow-green-900/20'}`}>
                                  {isUploading ? <div className="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <><i className="ph ph-whatsapp-logo text-2xl"></i> تأكيد التحويل عبر واتساب</>}
                              </button>
                          </div>
                      )}

                      {/* Timeline */}
                      <div className="w-full max-w-md bg-slate-900 p-6 sm:p-8 rounded-3xl shadow-xl border border-slate-800 mb-8">
                          <h3 className="font-bold text-lg mb-8 flex items-center gap-2 border-b border-slate-800 pb-4"><i className="ph ph-clock-counter-clockwise text-blue-500"></i> مراحل تجهيز الطلب:</h3>
                          <div className="relative pl-4 space-y-8 pr-4">
                              <div className="absolute right-[31px] top-6 bottom-6 w-[2px] bg-slate-800"></div>
                              {statusesToUse.map((s, index) => {
                                  const isCompleted = currentStatus >= s.id;
                                  const isCurrent = currentStatus === s.id;
                                  return (
                                      <div key={s.id} className="relative flex items-start gap-5">
                                          <div className={`relative z-10 flex items-center justify-center w-12 h-12 rounded-full shrink-0 border-4 transition-colors ${isCompleted ? s.clientIconCompleted : 'border-slate-900 bg-slate-800 text-slate-600'}`}>
                                              <i className={`ph ${s.icon} text-xl`}></i>
                                          </div>
                                          <div className={`flex-1 p-4 rounded-2xl border transition-all mt-[-4px] ${isCurrent ? s.clientCardCurrent : isCompleted ? 'bg-slate-800/30 border-slate-800/50' : 'bg-slate-950/50 border-slate-800/30'}`}>
                                              <h4 className={`font-bold text-sm sm:text-base ${isCurrent ? s.clientTextCurrent : isCompleted ? 'text-slate-200' : 'text-slate-600'}`}>{s.label}</h4>
                                              {isCurrent && <p className={`text-xs mt-2 opacity-80 leading-relaxed ${s.clientTextCurrent}`}>هذه هي المرحلة الحالية لطلبك. سنقوم بتحديثها فور انتقالنا للمرحلة التالية.</p>}
                                              {(isCompleted && !isCurrent) && <p className="text-xs mt-1 text-slate-500"><i className="ph ph-check"></i> تمت بنجاح</p>}
                                          </div>
                                      </div>
                                  );
                              })}
                          </div>
                      </div>

                      {/* Feedback Box */}
                      <div className="w-full max-w-md bg-gradient-to-br from-slate-900 to-slate-950 p-6 rounded-3xl shadow-xl border border-slate-800 mb-8 relative overflow-hidden">
                          <div className="absolute top-0 right-0 w-1 h-full bg-yellow-500"></div>
                          <h3 className="font-bold text-lg mb-3 flex items-center gap-2 text-slate-100">
                              <i className="ph-fill ph-star text-yellow-500 text-2xl"></i> رأيك يهمنا
                          </h3>
                          <p className="text-xs text-slate-400 mb-4 leading-relaxed">
                              نسعى دائماً لتقديم الأفضل لكم. كيف كانت تجربتكم معنا؟ يسعدنا سماع رأيكم أو أي ملاحظات لتطوير خدماتنا.
                          </p>
                          
                          {feedbackSubmitted ? (
                              <div className="bg-green-950/40 border border-green-500/30 p-4 rounded-xl text-center">
                                  <i className="ph-fill ph-check-circle text-4xl text-green-500 mb-2"></i>
                                  <p className="text-green-400 font-bold">شكراً لك! تم حفظ وإرسال تقييمك بنجاح للإدارة.</p>
                              </div>
                          ) : (
                              <>
                                  <div className="flex justify-center gap-3 mb-5" dir="ltr">
                                      {[1, 2, 3, 4, 5].map(star => (
                                          <i
                                              key={star}
                                              className={`ph-fill ph-star text-4xl cursor-pointer transition-transform hover:scale-110 ${
                                                  star <= (hoveredStar || rating) ? 'text-yellow-500 drop-shadow-[0_0_8px_rgba(234,179,8,0.5)]' : 'text-slate-700'
                                              }`}
                                              onMouseEnter={() => setHoveredStar(star)}
                                              onMouseLeave={() => setHoveredStar(0)}
                                              onClick={() => setRating(star)}
                                          ></i>
                                      ))}
                                  </div>
                                  <textarea 
                                      value={feedbackText}
                                      onChange={(e) => setFeedbackText(e.target.value)}
                                      placeholder="اكتب رسالتك وتفاصيل تقييمك هنا (اختياري)..." 
                                      className="w-full p-4 rounded-xl bg-slate-950/50 border border-slate-700 text-sm text-white mb-4 outline-none focus:border-yellow-500 focus:bg-slate-900 transition-colors custom-scrollbar resize-none shadow-inner"
                                      rows="4"
                                  ></textarea>
                                  <button 
                                      onClick={async () => {
                                          if(rating === 0 && !feedbackText.trim()) return;
                                          setIsSubmittingFeedback(true);
                                          try {
                                              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                                              const targetCol = isWedding ? 'weddings' : 'transactions';
                                              const updatedTxn = { ...txn, clientRating: rating, clientFeedback: feedbackText };
                                              await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, txn.id), updatedTxn);
                                              
                                              setFeedbackSubmitted(true);
                                          } catch(err) {
                                              console.error("Error saving feedback:", err);
                                          }
                                          setIsSubmittingFeedback(false);
                                      }}
                                      disabled={isSubmittingFeedback || (rating === 0 && !feedbackText.trim())}
                                      className={`w-full text-white font-bold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2 text-sm border shadow-md group ${
                                          (rating === 0 && !feedbackText.trim()) || isSubmittingFeedback
                                              ? 'bg-slate-800 border-slate-700 text-slate-500 cursor-not-allowed'
                                              : 'bg-slate-800 hover:bg-slate-700 border-slate-700 hover:border-yellow-500/50'
                                      }`}
                                  >
                                      {isSubmittingFeedback ? (
                                          <div className="w-5 h-5 border-2 border-slate-400 border-t-transparent rounded-full animate-spin"></div>
                                      ) : (
                                          <><i className="ph-fill ph-paper-plane-right text-lg text-yellow-500 group-hover:scale-110 transition-transform"></i> حفظ التقييم وإرساله للإدارة</>
                                      )}
                                  </button>
                              </>
                          )}
                      </div>
                      
                      <ReceiptModal imageUrl={receiptImageModal} onClose={() => setReceiptImageModal(null)} />
                  </div>
              );
          }

          if (!authReady) {
              return (
                  <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-100">
                      <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                      <p className="font-bold">جاري المزامنة مع السحابة...</p>
                  </div>
              );
          }

          if (!isTracking && !isAuthenticatedAdmin) {
              return <LoginScreen validPassword={settings.adminPassword || '1234'} onLogin={() => { setIsAuthenticatedAdmin(true); localStorage.setItem('studioAdminAuth', 'true'); }} />;
          }

          return (
            <div className="min-h-screen bg-slate-950 text-slate-100 pb-20">
              {authError && <div className="bg-red-600 text-white text-center py-1 font-bold text-xs">{authError}</div>}
              {isTracking ? null : <Navigation activeTab={activeTab} setActiveTab={setActiveTab} settings={settings} onLogout={handleLogout} />}
              <main className={`max-w-7xl mx-auto ${isTracking ? '' : 'p-4 md:p-6'}`}>
                {isTracking ? null : (
                    <>
                        {activeTab === 'dashboard' && <DashboardTab settings={settings} setSettings={setSettings} transactions={transactions} inventory={inventory} db={db} allRecords={allRecords} />}
                        {activeTab === 'weddings' && <WeddingsTab settings={settings} setSettings={setSettings} weddings={weddings} inventory={inventory} db={db} allRecords={allRecords} />}
                        {activeTab === 'expenses' && <ExpensesTab settings={settings} expenses={expenses} inventory={inventory} db={db} />}
                        {activeTab === 'reports' && <ReportsTab settings={settings} transactions={transactions} weddings={weddings} expenses={expenses} setReceiptImageModal={setReceiptImageModal} />}
                        {activeTab === 'settings' && <SettingsTab settings={settings} setSettings={setSettings} inventory={inventory} updateInventoryExact={updateInventoryExact} saveSettingsToDB={saveSettingsToDB} />}
                    </>
                )}
              </main>
              
              <ReceiptModal imageUrl={receiptImageModal} onClose={() => setReceiptImageModal(null)} />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
