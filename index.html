                  <textarea value={newFullDesc} onChange={e=>setNewFullDesc(e.target.value)} className="p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-yellow-500 placeholder-slate-500 text-sm resize-none" rows="2" placeholder="وصف تفصيلي..."></textarea>
                  
                  <div className="bg-slate-900 p-3 rounded-lg border border-slate-700">
                      <div className="flex justify-between items-center mb-2"><label className="text-sm font-bold text-slate-400">صور العرض (حتى 3 صور)</label><span className="text-xs text-slate-500">{newImages.length}/3 صور</span></div>
                      <div className="flex gap-2 items-center flex-wrap">
                          {newImages.map((img, i) => (
                              <div key={i} className="relative w-16 h-16 rounded-lg border border-slate-600 overflow-hidden group"><img src={img} className="w-full h-full object-cover" /><button onClick={() => handleRemoveNewImage(i)} className="absolute inset-0 bg-red-900/70 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><i className="ph ph-trash"></i></button></div>
                          ))}
                          {newImages.length < 3 && (
                              <label className="w-16 h-16 flex items-center justify-center rounded-lg border border-dashed border-slate-600 hover:border-yellow-500 hover:text-yellow-500 text-slate-500 cursor-pointer transition-colors bg-slate-950">
                                  {isUploadingPromoImg ? <i className="ph ph-spinner animate-spin text-xl"></i> : <i className="ph ph-plus text-xl"></i>}
                                  <input type="file" accept="image/*" multiple className="hidden" onChange={handleImageUpload} disabled={isUploadingPromoImg} />
                              </label>
                          )}
                      </div>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                     <input type="text" value={newDiscount} onChange={e=>setNewDiscount(e.target.value)} className="p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-yellow-500 placeholder-slate-500 text-sm" placeholder="قيمة الخصم..."/>
                     <select value={newIcon} onChange={e=>setNewIcon(e.target.value)} className="p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-yellow-500 text-sm font-mono"><option value="ph-gift">🎁 هدية</option><option value="ph-image">🖼️ تابلوه</option><option value="ph-book-open">📖 ألبوم</option><option value="ph-camera">📸 كاميرا</option><option value="ph-star">⭐ نجمة</option></select>
                     <select value={newColor} onChange={e=>setNewColor(e.target.value)} className="p-3 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none focus:border-yellow-500 text-sm"><option value="yellow">أصفر</option><option value="pink">وردي</option><option value="blue">أزرق</option><option value="amber">برتقالي</option></select>
                  </div>
                  <button onClick={handleSave} className="w-full bg-yellow-600 hover:bg-yellow-500 text-slate-900 font-black py-3 rounded-lg transition-colors flex items-center justify-center gap-2 mt-2"><i className="ph-bold ph-plus"></i> إضافة قالب العرض</button>
                </div>
                <div className="flex flex-col gap-3 overflow-y-auto max-h-[400px] custom-scrollbar pr-2">
                  {items.map((item, idx) => {
                    const colorStyles = { yellow: 'border-yellow-500/30 bg-yellow-950/20 text-yellow-400', pink: 'border-pink-500/30 bg-pink-950/20 text-pink-400', blue: 'border-blue-500/30 bg-blue-950/20 text-blue-400', amber: 'border-amber-500/30 bg-amber-950/20 text-amber-400' };
                    const curColor = colorStyles[item.color || 'yellow'];
                    return (
                    <div key={idx} className={`p-4 rounded-xl flex flex-col gap-2 border relative group hover:opacity-90 transition-opacity ${curColor}`}>
                      {item.images?.length > 0 && <div className="flex gap-1 mb-2 h-16">{item.images.map((img, i) => <img key={i} src={img} className="w-16 h-16 object-cover rounded border border-slate-700" alt={`صورة`} />)}</div>}
                      <div className="flex justify-between items-start">
                        <div className="flex items-center gap-2 font-black text-base"><i className={`ph-fill ${item.icon || 'ph-gift'} text-xl`}></i> {item.title}</div>
                        <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity"><button onClick={()=>handleEditClick(item, idx)} className="text-white bg-slate-800 hover:bg-slate-700 p-1.5 rounded-lg transition-colors"><i className="ph ph-pencil-simple text-base"></i></button><button onClick={()=>onRemove(idx)} className="text-red-400 bg-slate-800 hover:bg-slate-700 p-1.5 rounded-lg transition-colors"><i className="ph ph-trash text-base"></i></button></div>
                      </div>
                      <p className="text-sm font-bold opacity-90">{item.shortDesc}</p>
                      {item.fullDesc && <p className="text-xs opacity-70 mt-1 line-clamp-2">{item.fullDesc}</p>}
                      {item.discount && <span className="mt-2 self-start bg-slate-900 text-white px-2 py-1 rounded text-xs font-bold shadow-sm">{item.discount}</span>}
                    </div>
                  )})}
                  {items.length === 0 && <p className="text-center text-slate-500 py-4 text-sm">لا توجد عروض مضافة بعد.</p>}
                </div>
              </div>
            );
        };

        const PromoSelector = ({ settings, selectedPromos, onChange }) => {
            const togglePromo = (id) => { onChange(selectedPromos.includes(id) ? selectedPromos.filter(pid => pid !== id) : [...selectedPromos, id]); };
            if (!settings.promotions || settings.promotions.length === 0) return null;
            return (
                <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 mb-4">
                    <label className="text-sm font-bold text-yellow-400 mb-3 block"><i className="ph-fill ph-gift text-yellow-400 text-lg align-middle"></i> العروض المخصصة لهذا العميل (اختياري):</label>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        {settings.promotions.map(promo => {
                            const isSelected = selectedPromos.includes(promo.id);
                            return (
                                <div key={promo.id} onClick={() => togglePromo(promo.id)} className={`flex items-start gap-3 p-3 rounded-xl border cursor-pointer transition-all ${isSelected ? 'bg-yellow-950/30 border-yellow-500 shadow-inner' : 'bg-slate-900 border-slate-700 hover:border-yellow-500/50'}`}>
                                    <div className={`mt-0.5 w-5 h-5 rounded flex items-center justify-center border shrink-0 ${isSelected ? 'bg-yellow-500 border-yellow-500 text-slate-900' : 'bg-slate-800 border-slate-600 text-transparent'}`}><i className="ph-bold ph-check text-xs"></i></div>
                                    <div className="flex flex-col flex-1"><span className={`font-bold text-sm ${isSelected ? 'text-yellow-400' : 'text-slate-300'}`}>{promo.title}</span><span className="text-xs text-slate-500 mt-0.5">{promo.shortDesc}</span></div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const PaymentModal = ({ payModal, setPayModal, db }) => {
            if (!payModal) return null;
            const handleSubmit = async (e) => {
              e.preventDefault();
              const amount = parseFloat(e.target.amount.value);
              const pDate = e.target.paymentDate.value ? new Date(e.target.paymentDate.value).toISOString() : new Date().toISOString();
              const newPayment = { amount, method: payModal.paymentType, date: pDate };
              const updated = { ...payModal, paid: payModal.paid + amount, electronicPaid: (payModal.electronicPaid || 0) + (payModal.paymentType === 'electronic' ? amount : 0), remaining: payModal.total - (payModal.paid + amount), payments: [...(payModal.payments || []), newPayment] };
              if (updated.pendingReceipt && payModal.paymentType === 'electronic') { updated.confirmedReceipts = [...(updated.confirmedReceipts || []), updated.pendingReceipt]; }
              if (updated.pendingReceipt) delete updated.pendingReceipt;
              delete updated.paymentType;
              const targetCol = updated.type === 'wedding' ? 'weddings' : 'transactions';
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
              await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, updated.id), updated);
              setPayModal(null);
            };
            const displayName = payModal.type === 'wedding' ? `${payModal.groomName || ''} و ${payModal.brideName || ''}`.trim() || 'بدون اسم' : payModal.clientName;
            return (
              <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
                <div className="bg-slate-900 p-5 rounded-2xl shadow-xl border border-slate-800 w-full max-w-sm relative">
                  <button onClick={() => setPayModal(null)} className="absolute top-3 left-3 p-2 text-slate-500 hover:text-red-400"><i className="ph ph-x text-xl"></i></button>
                  <h3 className="text-xl font-black mb-3 border-b border-slate-800 pb-3 text-center text-slate-100">{payModal.paymentType === 'electronic' ? 'سداد إلكتروني (محافظ)' : 'سداد نقدي'}</h3>
                  <div className="mb-4 bg-slate-950 p-3 rounded-xl text-center border border-slate-800"><p className="text-slate-400 text-sm">العميل: <b className="text-white text-base">{displayName}</b></p><p className="text-red-400 font-bold mt-1 text-sm">الباقي المستحق: {payModal.remaining} ج.م</p></div>
                  <form onSubmit={handleSubmit} className="space-y-3">
                    <div>
                        <label className="text-slate-400 text-xs font-bold block mb-1">تاريخ السداد</label>
                        <input type="date" name="paymentDate" defaultValue={new Date().toISOString().split('T')[0]} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-xl outline-none focus:border-blue-500 shadow-inner"/>
                    </div>
                    <div>
                        <label className="text-slate-400 text-xs font-bold block mb-1">المبلغ المدفوع (ج.م)</label>
                        <input type="number" name="amount" required min="1" max={payModal.remaining} defaultValue={payModal.remaining} className="w-full p-3 border border-slate-700 bg-slate-950 text-white rounded-xl text-xl font-black text-center outline-none focus:border-blue-500 shadow-inner"/>
                    </div>
                    <button type="submit" className={`w-full text-white font-black py-3 mt-2 rounded-xl shadow-lg transition-all text-base ${payModal.paymentType === 'electronic' ? 'bg-indigo-600 hover:bg-indigo-500' : 'bg-green-600 hover:bg-green-500'}`}>تأكيد تحصيل المبلغ</button>
                  </form>
                </div>
              </div>
            );
        };

        const ReceiptModal = ({ imageUrl, onClose }) => {
            if (!imageUrl) return null;
            return (
                <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center z-[70] p-4 flex-col gap-4" onClick={onClose}>
                    <button onClick={onClose} className="absolute top-4 left-4 text-slate-300 hover:text-red-400 bg-slate-800 p-2 rounded-full transition-colors z-10"><i className="ph ph-x text-xl"></i></button>
                    <img src={imageUrl} alt="Fullscreen Image" className="max-w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border border-slate-700" onClick={e => e.stopPropagation()} />
                    <a href={imageUrl} download="studio_photo.jpg" target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-full font-bold flex items-center gap-2 shadow-lg transition-all"><i className="ph ph-download-simple text-xl"></i> تحميل الصورة</a>
                </div>
            );
        };

        const TxnDetailsModal = ({ txnDetailsModal, setTxnDetailsModal, setReceiptImageModal, db, allRecords }) => {
            useEffect(() => {
                if(txnDetailsModal) {
                    const runCleanup = async () => {
                        const updatedTxn = await checkAndCleanExpiredPhotos(txnDetailsModal, db, getStorage());
                        if(updatedTxn.uploadedPhotos?.length !== txnDetailsModal.uploadedPhotos?.length) { setTxnDetailsModal(updatedTxn); }
                    }; runCleanup();
                }
            }, [txnDetailsModal?.id]);

            if (!txnDetailsModal) return null;
            const isWedding = txnDetailsModal.type === 'wedding';
            const displayName = isWedding ? `${txnDetailsModal.groomName || ''} و ${txnDetailsModal.brideName || ''}`.trim() : txnDetailsModal.clientName;
            const reqsText = getReqsText(txnDetailsModal);
            const customerHistory = allRecords ? allRecords.filter(t => t.phone === txnDetailsModal.phone && t.id !== txnDetailsModal.id).sort((a,b) => new Date(b.dateTime) - new Date(a.dateTime)) : [];
            const rewards = getCustomerRewards(txnDetailsModal.phone, allRecords);

            return (
              <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-[80] p-4" onClick={() => setTxnDetailsModal(null)}>
                <div className="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 w-full max-w-lg relative max-h-[90vh] overflow-y-auto custom-scrollbar" onClick={e => e.stopPropagation()}>
                  <button onClick={() => setTxnDetailsModal(null)} className="absolute top-4 left-4 p-2 text-slate-500 hover:text-red-400 transition-colors"><i className="ph ph-x text-2xl"></i></button>
                  <h3 className="text-2xl font-black mb-6 border-b border-slate-800 pb-4 text-slate-100 flex items-center gap-2">{isWedding ? <i className="ph ph-heart text-pink-500"></i> : <i className="ph ph-files text-blue-500"></i>} تفاصيل {isWedding ? 'حجز زفاف' : 'الإيصال'} #{txnDetailsModal.receiptNo}</h3>
                  <div className="space-y-5">
                    <div className="flex justify-between items-center bg-slate-950 p-4 rounded-xl border border-slate-800">
                       <div><p className="text-slate-500 text-xs mb-1">الاسم</p><p className="font-bold text-lg text-slate-100">{displayName}</p></div>
                       <div className="text-left"><p className="text-slate-500 text-xs mb-1">رقم الهاتف</p><p className="font-mono text-slate-300">{txnDetailsModal.phone}</p></div>
                    </div>
                    {isWedding && (
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 grid grid-cols-2 gap-4">
                            <div><p className="text-slate-500 text-xs mb-1">موعد الزفاف</p><p className="font-bold text-slate-200">{formatDateOnly(txnDetailsModal.weddingDate)}</p></div>
                            <div><p className="text-slate-500 text-xs mb-1">اللوكيشن</p><p className="font-bold text-slate-200">{txnDetailsModal.location}</p></div>
                            <div><p className="text-slate-500 text-xs mb-1">الميك أب</p><p className="font-bold text-slate-200">{txnDetailsModal.makeupArtist}</p></div>
                            <div><p className="text-slate-500 text-xs mb-1">وقت الخروج</p><p className="font-bold text-slate-200">{txnDetailsModal.leaveTime}</p></div>
                            <div className="col-span-2 border-t border-slate-800 pt-3 mt-1"><p className="text-slate-500 text-xs mb-1">العنوان</p><p className="font-bold text-slate-200">{txnDetailsModal.groomAddress}</p></div>
                        </div>
                    )}
                    
                    {txnDetailsModal.boundDeviceId && (
                         <div className="bg-orange-950/30 border border-orange-900/50 p-4 rounded-xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                             <div>
                                 <p className="text-orange-400 text-sm font-bold flex items-center gap-1"><i className="ph-fill ph-lock-key"></i> حماية الرابط فعّالة</p>
                                 <p className="text-xs text-orange-300 mt-1 leading-relaxed">الرابط مغلق على جهاز العميل الحالي. اضغط فك الحماية إذا أراد العميل الدخول من جهاز آخر.</p>
                             </div>
                             <button onClick={async () => {
                                 const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                                 const targetCol = txnDetailsModal.type === 'wedding' ? 'weddings' : 'transactions';
                                 await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, txnDetailsModal.id), { boundDeviceId: null }, { merge: true });
                                 setTxnDetailsModal({...txnDetailsModal, boundDeviceId: null});
                                 alert("تم فك الحماية بنجاح. يمكن للعميل الآن فتح الرابط من جهاز جديد.");
                             }} className="bg-orange-600 hover:bg-orange-500 text-white px-4 py-2 rounded-lg text-xs font-bold transition-colors shadow-md w-full sm:w-auto">
                                 فك الحماية (Reset)
                             </button>
                         </div>
                    )}

                    <div className="bg-slate-950 p-4 rounded-xl border border-slate-800"><p className="text-slate-500 text-xs mb-2">المطلوب (الخدمات والمنتجات)</p><p className="text-slate-200 leading-relaxed font-medium whitespace-pre-wrap">{reqsText}</p></div>
                    
                    {txnDetailsModal.photoNo && (Array.isArray(txnDetailsModal.photoNo) ? txnDetailsModal.photoNo.some(p => typeof p === 'object' ? p.number : p) : true) && (
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 mt-4">
                            <span className="text-slate-500 text-sm mb-3 block"><i className="ph ph-images text-blue-500 text-lg align-middle"></i> أرقام الصور المختارة:</span>
                            <div className="flex flex-wrap gap-2">
                                {Array.isArray(txnDetailsModal.photoNo) ? txnDetailsModal.photoNo.filter(p => typeof p === 'object' ? p.number : p).map((p, i) => {
                                    return (
                                        <div key={i} className={`flex items-center gap-2 px-3 py-2 rounded-xl border shadow-inner ${p.needsName ? 'bg-red-950/20 border-red-900/40' : 'bg-slate-900 border-slate-700'}`}>
                                            <span className="font-black text-blue-400 bg-blue-950/30 px-2 py-1 rounded border border-blue-900/30" dir="ltr">{p.number}</span>
                                            {p.needsName && <span className="text-xs text-red-400 font-bold bg-red-950/50 px-2 py-1 rounded flex items-center gap-1"><i className="ph-fill ph-text-t"></i> يكتب اسم</span>}
                                            {p.note && <span className="text-xs text-slate-300"><i className="ph ph-text-aa text-slate-500 mr-1"></i> {p.note}</span>}
                                        </div>
                                    )
                                }) : <span className="font-bold text-slate-200" dir="ltr">{txnDetailsModal.photoNo}</span>}
                            </div>
                        </div>
                    )}

                    <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 mt-4">
                       <p className="text-slate-500 text-sm font-bold mb-3 flex items-center gap-2"><i className="ph ph-link text-blue-500 text-lg"></i> رابط خارجي لتحميل الصور (لإرساله للعميل)</p>
                       <div className="flex gap-2">
                          <input type="url" placeholder="ضع رابط جوجل درايف أو الموقع هنا..." className="flex-1 p-2.5 border border-slate-700 bg-slate-900 text-white rounded-lg outline-none text-sm focus:border-blue-500" defaultValue={txnDetailsModal.photosLink || ''} id="photosLinkInput" />
                          <button onClick={async () => {
                              const link = document.getElementById('photosLinkInput').value.trim();
                              const updated = {...txnDetailsModal, photosLink: link};
                              const targetCol = updated.type === 'wedding' ? 'weddings' : 'transactions';
                              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                              await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, updated.id), updated);
                              setTxnDetailsModal(updated);
                              alert("تم حفظ رابط الصور بنجاح!");
                          }} className="bg-blue-600 hover:bg-blue-500 text-white px-4 rounded-lg text-sm font-bold transition-colors">حفظ</button>
                       </div>
                       {txnDetailsModal.photosLink && <p className="text-xs text-green-400 mt-2 flex items-center gap-1"><i className="ph-fill ph-check-circle"></i> تم إرفاق الرابط. العميل سيتمكن من تحميل صوره عبر رابط التتبع.</p>}
                    </div>

                    <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 grid grid-cols-2 gap-4 relative overflow-hidden mt-4">
                       <div className={`absolute top-0 right-0 w-1 h-full ${isWedding ? 'bg-pink-500' : 'bg-blue-500'}`}></div>
                       <div><p className="text-slate-500 text-xs mb-1">الإجمالي</p><p className="font-bold text-slate-100">{txnDetailsModal.total} ج.م</p></div>
                       <div><p className="text-slate-500 text-xs mb-1">إجمالي المدفوع</p><p className="font-bold text-green-400">{txnDetailsModal.paid} ج.م</p></div>
                       
                       <div className="col-span-2 grid grid-cols-2 gap-4 bg-slate-900 p-3 rounded-lg border border-slate-700">
                           <div>
                               <p className="text-slate-500 text-xs mb-1 flex items-center gap-1"><i className="ph ph-money"></i> الدفع النقدي</p>
                               <p className="font-bold text-emerald-400">{(txnDetailsModal.paid || 0) - (txnDetailsModal.electronicPaid || 0)} ج.م</p>
                           </div>
                           <div>
                               <p className="text-slate-500 text-xs mb-1 flex items-center gap-1"><i className="ph ph-wallet"></i> الدفع الإلكتروني</p>
                               <p className="font-bold text-indigo-400">{txnDetailsModal.electronicPaid || 0} ج.م</p>
                           </div>
                       </div>
                       
                       {txnDetailsModal.rewardDiscount > 0 && (
                           <div className="col-span-2 bg-yellow-950/30 p-2 rounded-lg border border-yellow-500/30 text-center">
                               <p className="text-yellow-400 text-sm font-bold">تم استخدام خصم نقاط مكافآت: {txnDetailsModal.rewardDiscount} ج.م</p>
                           </div>
                       )}

                       <div className="col-span-2 pt-4 mt-2 border-t border-slate-800 flex justify-between items-center">
                          <span className="text-slate-400 text-sm">الباقي المستحق:</span>
                          <span className={`font-black text-xl ${txnDetailsModal.remaining > 0 ? 'text-red-400' : 'text-green-400'}`}>{txnDetailsModal.remaining} ج.م</span>
                       </div>
                    </div>
                    
                    {/* رصيد مكافآت العميل */}
                    <div className="bg-yellow-950/20 p-4 rounded-xl border border-yellow-500/30 mt-4 flex items-center justify-between">
                        <div>
                            <p className="text-yellow-400 text-sm font-bold flex items-center gap-2"><i className="ph-fill ph-gift text-lg"></i> رصيد مكافآت العميل المتاح</p>
                            <p className="text-xs text-yellow-200/70 mt-1">يتم حسابه تلقائياً من مدفوعاته السابقة</p>
                        </div>
                        <span className="text-xl font-black text-yellow-400">{rewards.balance} ج.م</span>
                    </div>

                    {(txnDetailsModal.clientRating > 0 || txnDetailsModal.clientFeedback) && (
                        <div className="bg-yellow-950/20 p-4 rounded-xl border border-yellow-500/30 mt-4">
                           <p className="text-yellow-400 text-sm font-bold mb-3 flex items-center gap-2"><i className="ph-fill ph-star text-lg"></i> تقييم ورأي العميل</p>
                           {txnDetailsModal.clientRating > 0 && <div className="flex gap-1 mb-2 text-yellow-500 text-xl" dir="ltr">{[...Array(5)].map((_, i) => <i key={i} className={`${i < txnDetailsModal.clientRating ? 'ph-fill' : 'ph'} ph-star`}></i>)}</div>}
                           {txnDetailsModal.clientFeedback && <p className="text-slate-300 text-sm leading-relaxed bg-slate-950 p-3 rounded-lg border border-slate-800">"{txnDetailsModal.clientFeedback}"</p>}
                        </div>
                    )}

                    {txnDetailsModal.pendingReceipt && (
                        <div className="bg-indigo-950/20 p-4 rounded-xl border border-indigo-500/30 mt-4 cursor-pointer hover:bg-indigo-900/40 transition-colors shadow-sm" onClick={() => setReceiptImageModal(txnDetailsModal.pendingReceipt)}>
                           <p className="text-indigo-300 text-sm font-bold mb-3 flex items-center gap-2"><i className="ph ph-image text-lg"></i> صورة التحويل الإلكتروني المرفقة للمراجعة</p>
                           <img src={txnDetailsModal.pendingReceipt} alt="Receipt" className="w-full max-h-64 object-contain rounded-lg border border-indigo-500/50" />
                        </div>
                    )}

                    {txnDetailsModal.confirmedReceipts?.length > 0 && (
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 mt-4">
                           <p className="text-slate-500 text-sm font-bold mb-3 flex items-center gap-2"><i className="ph ph-check-circle text-green-500 text-lg"></i> صور التحويلات المؤكدة</p>
                           <div className="flex flex-wrap gap-3">
                               {txnDetailsModal.confirmedReceipts.map((imgUrl, idx) => <img key={idx} src={imgUrl} alt="Confirmed Receipt" className="w-24 h-24 object-cover rounded-lg border border-slate-700 cursor-pointer hover:opacity-90 transition-opacity shadow-sm" onClick={() => setReceiptImageModal(imgUrl)} />)}
                           </div>
                        </div>
                    )}

                    {customerHistory.length > 0 && (
                        <div className="bg-slate-900 p-4 rounded-xl border border-slate-700 mt-4 shadow-inner">
                           <p className="text-yellow-400 text-sm font-bold mb-3 flex items-center gap-2"><i className="ph-fill ph-clock-counter-clockwise text-lg"></i> سجل زيارات العميل السابقة ({customerHistory.length})</p>
                           <div className="space-y-2 max-h-40 overflow-y-auto custom-scrollbar pr-1">
                               {customerHistory.map(hist => (
                                   <div key={hist.id} className="bg-slate-950 p-3 rounded-lg border border-slate-800 flex justify-between items-center text-xs cursor-pointer hover:border-blue-500/50 hover:bg-slate-900 transition-all" onClick={() => setTxnDetailsModal(hist)} title="اضغط لفتح تفاصيل الإيصال">
                                       <div><span className={`font-bold ml-2 ${hist.type === 'wedding' ? 'text-pink-400' : 'text-blue-400'}`}>{hist.type === 'wedding' ? 'حجز زفاف' : 'جلسة تصوير'}</span><span className="text-slate-500 font-mono">{formatDateOnly(hist.dateTime)}</span></div>
                                       <div className="text-left font-bold text-slate-300 flex items-center gap-2"><span>{hist.total} ج.م</span><i className="ph ph-caret-left text-slate-500"></i></div>
                                   </div>
                               ))}
                           </div>
                        </div>
                    )}
                    <div className="text-xs text-slate-500 text-center mt-4">تاريخ التسجيل: {formatDate(txnDetailsModal.dateTime)}</div>
                  </div>
                </div>
              </div>
            );
        };

        const TransactionCard = ({ txn, onDelete, onEdit, onPayRemaining, onViewReceipt, sendInvoice, updateStatus, onViewDetails, settings, allRecords }) => {
            const [showWaMenu, setShowWaMenu] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState(false);
            const [actionError, setActionError] = useState('');
            
            const currentStatus = txn.status || 0;
            const cashPaid = (txn.paid || 0) - (txn.electronicPaid || 0);
            const isWedding = txn.type === 'wedding';
            const displayName = isWedding ? `${txn.groomName || ''} و ${txn.brideName || ''}`.trim() : txn.clientName;
            
            const statusesToUse = getTransactionStatuses(txn);
            const visitCount = allRecords ? allRecords.filter(t => t.phone === txn.phone).length : 1;
            const isRepeat = visitCount > 1;

            const isCreatedToday = new Date(txn.dateTime).toDateString() === new Date().toDateString();
            const hasPaymentToday = txn.payments?.some(p => new Date(p.date).toDateString() === new Date().toDateString());
            const isPastPayment = !isCreatedToday && hasPaymentToday;

            const hasPhotoNeedingName = txn.writeNameOnPhoto || (Array.isArray(txn.photoNo) && txn.photoNo.some(p => typeof p === 'object' && p.needsName));

            const handleAddToCalendar = (e) => {
                e.stopPropagation();
                if (!addToCalendar(txn)) { setActionError('يجب تحديد موعد الزفاف أولاً لإضافته للتقويم.'); setTimeout(() => setActionError(''), 4000); }
            };

            return (
              <div className="bg-slate-900 p-5 rounded-2xl shadow-sm border border-slate-800 flex flex-col md:flex-row gap-6 justify-between hover:border-slate-700 transition-all cursor-pointer group" onClick={() => onViewDetails && onViewDetails(txn)} title="اضغط لعرض التفاصيل">
                <div className="flex-1 flex flex-col justify-between">
                  <div className="space-y-3">
                      <div className="flex justify-between items-start">
                        <h3 className={`text-lg font-bold flex items-center gap-2 transition-colors ${isWedding ? 'text-pink-100 group-hover:text-pink-400' : 'text-slate-100 group-hover:text-blue-400'}`}>
                            {isWedding ? <i className="ph ph-heart text-pink-500 text-2xl group-hover:text-pink-400"></i> : <i className="ph ph-user-circle text-slate-500 text-2xl group-hover:text-blue-500"></i>}
                            {displayName || 'عميل بدون اسم'}
                        </h3>
                        <div className="flex flex-wrap justify-end items-center gap-2 max-w-[50%]">
                           {txn.photosLink && <span className="text-green-400 flex items-center gap-1 text-[10px] sm:text-xs font-bold bg-green-950/30 px-2 py-1 rounded border border-green-900/50"><i className="ph-fill ph-link text-sm"></i> يوجد رابط</span>}
                           {txn.selectedPromos?.length > 0 && <span className="text-yellow-400 flex items-center gap-1 text-[10px] sm:text-xs font-bold bg-yellow-950/30 px-2 py-1 rounded border border-yellow-900/50"><i className="ph-fill ph-gift text-sm"></i> محدد له عرض</span>}
                           {isRepeat && <span className="text-yellow-400 flex items-center gap-1 text-[10px] sm:text-xs font-bold bg-yellow-950/30 px-2 py-1 rounded border border-yellow-900/50"><i className="ph-fill ph-star text-sm"></i> عميل مميز ({visitCount})</span>}
                           {txn.clientRating > 0 && <span className="text-yellow-400 flex items-center gap-1 text-[10px] sm:text-xs font-bold bg-yellow-950/30 px-2 py-1 rounded border border-yellow-900/50"><i className="ph-fill ph-star text-sm"></i> {txn.clientRating}/5</span>}
                           {txn.viewedByClient ? <span className="text-blue-400 flex items-center gap-1 text-[10px] sm:text-xs font-bold bg-blue-950/30 px-2 py-1 rounded border border-blue-900/50" title={`تمت المشاهدة في: ${formatDate(txn.viewTime)}`}><i className="ph ph-checks text-sm sm:text-base"></i> تمت المشاهدة</span> : <span className="text-slate-500 flex items-center gap-1 text-[10px] sm:text-xs bg-slate-800/50 px-2 py-1 rounded border border-slate-700" title="لم يتم فتح الرابط بعد"><i className="ph ph-check text-sm sm:text-base"></i> لم يُشاهد</span>}
                           {isPastPayment && <span className="text-purple-400 flex items-center gap-1 text-[10px] sm:text-xs font-bold bg-purple-950/30 px-2 py-1 rounded border border-purple-900/50"><i className="ph-fill ph-clock-counter-clockwise text-sm"></i> سداد من يوم سابق</span>}
                           {hasPhotoNeedingName ? (
                               <span className="text-red-400 flex items-center gap-1 text-[10px] sm:text-xs font-bold bg-red-950/30 px-2 py-1 rounded border border-red-900/50 animate-pulse"><i className="ph-fill ph-warning-circle text-sm"></i> تنبيه: كتابة اسم</span>
                           ) : (
                               txn.photoNo && (Array.isArray(txn.photoNo) ? txn.photoNo.some(p => typeof p === 'object' ? p.number : p) : true) ? (
                                   <span className="text-slate-400 flex items-center gap-1 text-[10px] sm:text-xs bg-slate-800/50 px-2 py-1 rounded border border-slate-700"><i className="ph ph-images text-sm sm:text-base"></i> صور: {Array.isArray(txn.photoNo) ? txn.photoNo.map(p => typeof p === 'object' ? p.number : p).filter(Boolean).join(', ') : txn.photoNo}</span>
                               ) : null
                           )}
                           <span className="bg-slate-800 text-slate-400 text-xs px-2 py-1 rounded border border-slate-700 font-mono">#{txn.receiptNo}</span>
                        </div>
                      </div>
                      <div className="text-sm text-slate-400 flex flex-wrap gap-x-4">
                        {txn.phone && <span>📞 {txn.phone}</span>}
                        <span>⏱️ {formatDate(txn.dateTime)}</span>
                        {isWedding && txn.weddingDate && <span className="text-pink-400">💍 {formatDateOnly(txn.weddingDate)}</span>}
                      </div>
                      
                      <div className="flex flex-col gap-3 pt-2 text-sm">
                        <div className="flex flex-wrap gap-2 items-center bg-slate-950 p-3 rounded-xl border border-slate-800/50 mt-1">
                          <span className="text-slate-300">الإجمالي: <b className="text-white">{txn.total}</b></span>
                          <div className="hidden sm:block w-px h-4 bg-slate-700 mx-1"></div>
                          <span className="text-green-400">المدفوع: <b className="text-green-300">{txn.paid}</b></span>
                          {(cashPaid > 0 || txn.electronicPaid > 0) && <div className="hidden sm:block w-px h-4 bg-slate-700 mx-1"></div>}
                          {cashPaid > 0 && <span className="text-emerald-400 text-xs bg-emerald-950/30 px-2 py-1 rounded border border-emerald-900/50 flex items-center gap-1"><i className="ph ph-money text-base"></i> نقدي: {cashPaid}</span>}
                          {txn.electronicPaid > 0 && <span className="text-indigo-400 text-xs bg-indigo-950/30 px-2 py-1 rounded border border-indigo-900/50 flex items-center gap-1"><i className="ph ph-wallet text-base"></i> إلكتروني: {txn.electronicPaid}</span>}
                          <div className="hidden sm:block w-px h-4 bg-slate-700 mx-1"></div>
                          <span className={txn.remaining > 0 ? "text-red-400" : "text-green-400"}>الباقي: <b>{txn.remaining}</b></span>
                        </div>
                      </div>

                      {txn.pendingReceipt && (
                          <div className="mt-3 p-3 bg-indigo-950/20 border border-indigo-500/30 rounded-xl flex items-center gap-4 cursor-pointer hover:bg-indigo-900/40 transition-colors shadow-sm" onClick={(e) => { e.stopPropagation(); onViewReceipt(txn.pendingReceipt); }}>
                              <img src={txn.pendingReceipt} alt="إيصال تحويل مرفق" className="w-14 h-14 object-cover rounded-lg border border-indigo-500/50 shadow-md" title="اضغط للتكبير" />
                              <div>
                                  <h4 className="text-sm font-bold text-indigo-300 flex items-center gap-1"><i className="ph ph-warning-circle text-lg"></i> إيصال قيد المراجعة</h4>
                                  <p className="text-xs text-indigo-200/70 mt-1">العميل قام برفع إيصال، راجع الصورة ثم اضغط (سداد إلكتروني) لتأكيد التحصيل وإضافته.</p>
                              </div>
                          </div>
                      )}
                  </div>

                  <div className="mt-5 pt-4 border-t border-slate-800" onClick={e => e.stopPropagation()}>
                    <div className="flex flex-wrap gap-2">
                        {statusesToUse.map(s => (
                            <button key={s.id} onClick={() => updateStatus(txn.id, s.id)} className={`flex-1 min-w-[70px] py-2 px-1 rounded-xl text-[10px] sm:text-xs font-bold transition-all flex flex-col items-center gap-1 border ${currentStatus === s.id ? s.activeClass : s.inactiveClass}`}>
                                <i className={`ph ${s.icon} text-lg`}></i>
                                <span className="text-center leading-tight">{s.label}</span>
                            </button>
                        ))}
                    </div>
                  </div>
                </div>

                <div className="flex flex-col gap-2 min-w-[160px] justify-start border-t md:border-t-0 md:border-r border-slate-800 pt-4 md:pt-0 md:pr-6" onClick={e => e.stopPropagation()}>
                  {actionError && <div className="text-red-400 bg-red-950/40 border border-red-900/50 p-2 rounded-xl text-[10px] font-bold text-center mb-1">{actionError}</div>}

                  {isWedding && <button onClick={handleAddToCalendar} className="w-full bg-pink-600 hover:bg-pink-500 text-white px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all shadow-sm mb-2"><i className="ph ph-calendar-plus text-xl"></i> إضافة للتقويم</button>}

                  <button onClick={(e) => { e.stopPropagation(); sendInvoice(); }} className="w-full bg-blue-600 hover:bg-blue-500 text-white px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all shadow-sm"><i className="ph ph-receipt text-xl"></i> إرسال الفاتورة</button>
                  
                  <div className="relative w-full">
                    <button onClick={(e) => { e.stopPropagation(); setShowWaMenu(!showWaMenu); }} className="w-full bg-green-600 hover:bg-green-500 text-white px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all"><i className="ph ph-whatsapp-logo text-xl"></i> رسائل واتساب</button>
                    {showWaMenu && (
                      <div className="absolute right-0 mt-2 w-48 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl z-10 p-1 flex flex-col overflow-hidden">
                        <button onClick={(e) => { e.stopPropagation(); openWhatsApp(txn.phone, generateWA_Message('tracking', txn, settings, isWedding, allRecords)); setShowWaMenu(false);}} className="text-right px-3 py-2.5 text-sm text-blue-300 hover:bg-slate-700 font-bold border-b border-slate-700">📍 رابط التتبع للعميل</button>
                        {txn.photosLink && <button onClick={(e) => { e.stopPropagation(); openWhatsApp(txn.phone, `أهلاً ${displayName} 👋\nصورك جاهزة للتحميل بجودة عالية! يمكنك تحميلها وحفظها من هذا الرابط:\n${window.location.href.split('?')[0]}?phone=${encodeURIComponent(txn.phone)}&receipt=${encodeURIComponent(txn.receiptNo)}&type=${isWedding ? 'w' : 't'}`); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-green-400 hover:bg-slate-700 font-bold border-b border-slate-700 flex items-center gap-2"><i className="ph ph-download-simple"></i> إرسال رابط الصور</button>}
                        {isRepeat && <button onClick={(e) => { e.stopPropagation(); openWhatsApp(txn.phone, generateWA_Message('vipDiscount', txn, settings, isWedding, allRecords)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-pink-400 hover:bg-slate-700 font-bold">🎁 إرسال هدية خصم (VIP)</button>}
                        {isRepeat ? <button onClick={(e) => { e.stopPropagation(); openWhatsApp(txn.phone, generateWA_Message('welcomeBack', txn, settings, isWedding, allRecords)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-yellow-400 hover:bg-slate-700 font-bold">🌟 ترحيب بالعودة</button> : <button onClick={(e) => { e.stopPropagation(); openWhatsApp(txn.phone, generateWA_Message('welcome', txn, settings, isWedding, allRecords)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-slate-200 hover:bg-slate-700">👋 رسالة ترحيب</button>}
                        <button onClick={(e) => { e.stopPropagation(); openWhatsApp(txn.phone, generateWA_Message('ready', txn, settings, isWedding, allRecords)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-slate-200 hover:bg-slate-700">🎉 الشغل خلص</button>
                        <button onClick={(e) => { e.stopPropagation(); openWhatsApp(txn.phone, generateWA_Message('reminder', txn, settings, isWedding, allRecords)); setShowWaMenu(false);}} className="text-right px-3 py-2 text-sm text-slate-200 hover:bg-slate-700">⚠️ تذكير بالباقي</button>
                      </div>
                    )}
                  </div>

                  {txn.remaining > 0 && (
                      <div className="flex gap-2 w-full mt-2">
                        <button onClick={(e) => { e.stopPropagation(); onPayRemaining({...txn, paymentType: 'cash'}); }} className="flex-1 bg-yellow-500 hover:bg-yellow-400 text-slate-900 px-2 py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1 transition-all shadow-sm"><i className="ph ph-money text-lg"></i> نقدي</button>
                        <button onClick={(e) => { e.stopPropagation(); onPayRemaining({...txn, paymentType: 'electronic'}); }} className="flex-1 bg-indigo-500 hover:bg-indigo-400 text-white px-2 py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1 transition-all shadow-sm"><i className="ph ph-wallet text-lg"></i> إلكتروني</button>
                      </div>
                  )}

                  {onEdit && <button onClick={(e) => { e.stopPropagation(); onEdit(txn); }} className="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all mt-2"><i className="ph ph-pencil-simple text-xl"></i> تعديل البيانات</button>}
                  
                  {confirmDelete ? (
                      <div className="flex flex-col gap-2 mt-auto pt-2">
                         <span className="text-xs text-red-400 text-center font-bold">تأكيد الحذف نهائياً؟</span>
                         <div className="flex gap-2">
                            <button onClick={(e) => { e.stopPropagation(); onDelete(txn.id); }} className="flex-1 bg-red-600 hover:bg-red-500 text-white px-2 py-2 rounded-xl text-xs font-bold transition-all">نعم</button>
                            <button onClick={(e) => { e.stopPropagation(); setConfirmDelete(false); }} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white px-2 py-2 rounded-xl text-xs font-bold transition-all">إلغاء</button>
                         </div>
                      </div>
                  ) : <button onClick={(e) => { e.stopPropagation(); setConfirmDelete(true); }} className="bg-red-950/40 hover:bg-red-900/60 text-red-400 border border-red-900/30 px-3 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all mt-auto"><i className="ph ph-trash text-xl"></i> حذف الإيصال</button>}
                </div>
              </div>
            );
        };

        const TopCustomers = ({ allRecords, onCustomerClick }) => {
            const currentMonth = new Date().getMonth() + 1;
            const currentYear = new Date().getFullYear();

            const topCustomers = useMemo(() => {
                if (!allRecords) return [];
                const thisMonthRecords = allRecords.filter(t => t.month === currentMonth && t.year === currentYear);
                const counts = {};
                thisMonthRecords.forEach(t => {
                    if (!t.phone) return;
                    if (!counts[t.phone]) { counts[t.phone] = { phone: t.phone, name: t.clientName || t.groomName || 'بدون اسم', visits: 0, totalSpent: 0 }; }
                    counts[t.phone].visits += 1;
                    counts[t.phone].totalSpent += (parseFloat(t.total) || 0);
                });
                
                return Object.values(counts).filter(c => c.visits > 1).sort((a, b) => b.visits - a.visits || b.totalSpent - a.totalSpent).slice(0, 5);
            }, [allRecords, currentMonth, currentYear]);

            if (topCustomers.length === 0) return null;

            return (
                <div className="bg-gradient-to-br from-yellow-900/20 to-slate-900 p-6 rounded-2xl shadow-sm border border-yellow-500/30 mb-6">
                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-yellow-400"><i className="ph-fill ph-crown text-2xl"></i> نجوم الشهر (أكثر العملاء زيارة)</h2>
                    <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                        {topCustomers.map((cust, idx) => (
                            <div key={idx} onClick={() => onCustomerClick && onCustomerClick(cust.phone)} className="cursor-pointer bg-slate-950 p-4 rounded-xl border border-yellow-500/20 flex flex-col items-center text-center shadow-inner relative overflow-hidden group hover:border-yellow-500 hover:bg-slate-900 transition-colors">
                                {idx === 0 && <div className="absolute top-0 right-0 bg-yellow-500 text-slate-900 text-[10px] font-black px-2 py-0.5 rounded-bl-lg z-10">المركز 1</div>}
                                <div className="w-10 h-10 bg-yellow-500/10 text-yellow-500 rounded-full flex items-center justify-center mb-2 group-hover:scale-110 transition-transform"><i className="ph-fill ph-star text-xl"></i></div>
                                <span className="font-bold text-slate-200 text-sm truncate w-full">{cust.name}</span>
                                <span className="text-yellow-400 font-black text-xs mt-1">{cust.visits} زيارات</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const WeddingCalendar = ({ weddings, onDayClick }) => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();
            const daysInMonth = getDaysInMonth(currentDate.getFullYear(), currentDate.getMonth());
            const firstDay = getFirstDayOfMonth(currentDate.getFullYear(), currentDate.getMonth());
            const weekDays = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

            const renderDays = () => {
                let days = [];
                for (let i = 0; i < firstDay; i++) days.push(<div key={`empty-${i}`} className="p-2 opacity-10"></div>);
                for (let d = 1; d <= daysInMonth; d++) {
                    const checkDateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const dayEvents = weddings.filter(w => w.weddingDate === checkDateStr || w.casualShootDate === checkDateStr);
                    const hasWedding = dayEvents.some(w => w.weddingDate === checkDateStr);
                    const hasCasual = dayEvents.some(w => w.casualShootDate === checkDateStr);
                    const isToday = checkDateStr === new Date().toISOString().split('T')[0];

                    days.push(
                        <div key={d} onClick={() => onDayClick(checkDateStr)} className={`p-1 sm:p-2 border border-slate-800 rounded-lg flex flex-col items-center justify-start h-12 sm:h-16 relative transition-colors cursor-pointer hover:bg-slate-800 ${isToday ? 'bg-slate-800/80 border-slate-600' : 'bg-slate-950'}`}>
                            <span className={`text-xs sm:text-sm font-bold ${isToday ? 'text-white' : 'text-slate-400'}`}>{d}</span>
                            <div className="flex gap-1 mt-1">
                                {hasWedding && <div className="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-pink-500 shadow-[0_0_5px_#ec4899]"></div>}
                                {hasCasual && <div className="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-teal-500 shadow-[0_0_5px_#14b8a6]"></div>}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="w-full">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-base sm:text-lg font-bold flex items-center gap-2 text-slate-100"><i className="ph-fill ph-calendar text-xl sm:text-2xl text-indigo-400"></i> جدول المواعيد</h2>

            const [expData, setExpData] = useState({ amount: '', category: settings.expenseCategories[0], notes: '', type: 'studio' });
            const [showMonthModal, setShowMonthModal] = useState(false);
            
            const handleAddExpense = async (e) => {
              e.preventDefault();
              const newExp = { id: Date.now().toString(), date: new Date().toISOString(), amount: parseFloat(expData.amount), category: expData.category, notes: expData.notes, month: new Date().getMonth() + 1, year: new Date().getFullYear(), type: expData.type };
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
              await setDoc(doc(db, `artifacts/${appId}/public/data/expenses`, newExp.id), newExp);
              setExpData({ amount: '', category: settings.expenseCategories[0], notes: '', type: 'studio' });
            };

            const todaysExpenses = expenses.filter(e => new Date(e.date).toDateString() === new Date().toDateString());
            const today = new Date();
            const todayTotalExp = todaysExpenses.reduce((sum, e) => sum + e.amount, 0);
            const thisMonthExpenses = expenses.filter(e => new Date(e.date).getMonth() === today.getMonth() && new Date(e.date).getFullYear() === today.getFullYear());
            const monthTotalExp = thisMonthExpenses.reduce((sum, e) => sum + e.amount, 0);
            
            const inventoryItemsList = useMemo(() => {
               const basicItems = [{name: "ورق طباعة صور"}, {name: "أحبار طابعة"}];

               const newInv = { ...inventory, [itemName]: Math.max(0, (inventory[itemName] || 0) + change) };

               await setDoc(doc(db, `artifacts/${appId}/public/data/inventory`, 'main'), newInv);

            return (
