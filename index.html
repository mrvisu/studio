        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [user, setUser] = useState(null);
          const [authReady, setAuthReady] = useState(false);
          const [authError, setAuthError] = useState(null);
          const [txnsLoaded, setTxnsLoaded] = useState(false);
          const [wedsLoaded, setWedsLoaded] = useState(false);
          const [transferReceipt, setTransferReceipt] = useState(null);
          const [isUploading, setIsUploading] = useState(false);
          const [isUploadingProfilePic, setIsUploadingProfilePic] = useState(false);
          const [clientViewError, setClientViewError] = useState('');
          const [feedbackText, setFeedbackText] = useState('');
          const [rating, setRating] = useState(0);
          const [hoveredStar, setHoveredStar] = useState(0);
          const [isSubmittingFeedback, setIsSubmittingFeedback] = useState(false);
          const [feedbackSubmitted, setFeedbackSubmitted] = useState(false);
          const [isAuthenticatedAdmin, setIsAuthenticatedAdmin] = useState(false);
          
          const [receiptImageModal, setReceiptImageModal] = useState(null);
          const [txnDetailsModal, setTxnDetailsModal] = useState(null);
          
          // Promotional details state
          const [showPromoDetails, setShowPromoDetails] = useState(false);
          const [showStages, setShowStages] = useState(false);
          const [showClientPaymentPopup, setShowClientPaymentPopup] = useState(false);
          const [hasAutoShownPayment, setHasAutoShownPayment] = useState(false);

          const [transactions, setTransactions] = useState([]);
          const [weddings, setWeddings] = useState([]);
          const [expenses, setExpenses] = useState([]);
          const [inventory, setInventory] = useState({});
          const [settings, setSettings] = useState({
            nextReceiptNo: 1000, adminPassword: '1234', studioPhone: '01201260040', enableNotifications: false, services: DEFAULT_SERVICES, products: DEFAULT_PRODUCTS, weddingPackages: DEFAULT_WEDDING_PACKAGES, addonTemplates: DEFAULT_ADDON_TEMPLATES, expenseCategories: DEFAULT_EXPENSE_CATEGORIES, waTemplates: DEFAULT_WA_TEMPLATES, studioName: "Mrakby Studio", studioLogo: "", promotions: DEFAULT_PROMOTIONS, studioLikes: 0, miniProducts: DEFAULT_MINI_PRODUCTS
          });

          const urlParams = new URLSearchParams(window.location.search);
          const trackPhone = urlParams.get('phone');
          const trackReceipt = urlParams.get('receipt');
          const trackType = urlParams.get('type') || 't'; 
          const isClientPortal = urlParams.get('client') === 'true';
          const isTracking = trackPhone && trackReceipt;

          // Desktop notifications logic
          const [previousFeedbackCount, setPreviousFeedbackCount] = useState(0);

          useEffect(() => {
              const savedAuth = localStorage.getItem('studioAdminAuth');
              if (savedAuth === 'true') setIsAuthenticatedAdmin(true);
          }, []);

          const handleLogout = () => {
              setIsAuthenticatedAdmin(false);
              localStorage.removeItem('studioAdminAuth');
              window.location.reload();
          };

          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
              } catch (error) {
                 setAuthError("تنبيه: يوجد مشكلة في الاتصال بقاعدة البيانات.");
                 setAuthReady(true);
              }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); setAuthReady(true); });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
            const basePath = `artifacts/${appId}/public/data`;

            const fetchSettings = async () => {
              try {
                  const docSnap = await getDoc(doc(db, basePath, 'settings', 'main'));
                  if (docSnap.exists()) {
                    let data = docSnap.data();
                    if (data.services) data.services = data.services.map(s => typeof s === 'string' ? { name: s, price: 0, desc: '' } : { name: s.name, price: s.price || 0, desc: s.desc || '' });
                    if (!data.products) data.products = DEFAULT_PRODUCTS;
                    else data.products = data.products.map(p => typeof p === 'string' ? { name: p, price: 0, wholesalePrice: 0, totalQty: 0, desc: '' } : { name: p.name, price: p.price || 0, wholesalePrice: p.wholesalePrice || 0, totalQty: p.totalQty || 0, desc: p.desc || '' });
                    if (!data.weddingPackages) data.weddingPackages = DEFAULT_WEDDING_PACKAGES;
                    if (!data.addonTemplates) data.addonTemplates = DEFAULT_ADDON_TEMPLATES;
                    if (!data.expenseCategories || data.expenseCategories.length < 5) data.expenseCategories = DEFAULT_EXPENSE_CATEGORIES;
                    if (!data.promotions) data.promotions = DEFAULT_PROMOTIONS;
                    if (!data.waTemplates) data.waTemplates = DEFAULT_WA_TEMPLATES;
                    else data.waTemplates = { ...DEFAULT_WA_TEMPLATES, ...data.waTemplates };
                    if (data.waTemplates.invoice && !data.waTemplates.invoice.includes('{track_url}')) data.waTemplates.invoice = DEFAULT_WA_TEMPLATES.invoice;
                    if (!data.adminPassword) data.adminPassword = '1234';
                    if (!data.studioPhone) data.studioPhone = '01201260040';
                    if (!data.studioLikes) data.studioLikes = 0;
                    if (!data.miniProducts) data.miniProducts = DEFAULT_MINI_PRODUCTS;
                    setSettings(data);
                  }
              } catch(e) { console.error("Error fetching settings", e); }
            };
            fetchSettings();

            // Real-time listener for likes and settings
            const unsubSettings = onSnapshot(doc(db, basePath, 'settings', 'main'), (docSnap) => {
                if (docSnap.exists()) {
                    const currentData = docSnap.data();
                    setSettings(prev => ({...prev, studioLikes: currentData.studioLikes || 0}));
                }
            });

            const unsubInv = onSnapshot(doc(db, basePath, 'inventory', 'main'), (docSnap) => {
              if (docSnap.exists()) setInventory(docSnap.data());
            }, (err) => console.error("Inventory error", err));

            const unsubTxns = onSnapshot(collection(db, basePath, 'transactions'), (snapshot) => {
              const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
              data.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
              setTransactions(data);
              setTxnsLoaded(true);
            }, (err) => {
              console.error("Transactions error", err);
              setTxnsLoaded(true);
            });

            const unsubWeds = onSnapshot(collection(db, basePath, 'weddings'), (snapshot) => {
              const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
              data.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
              setWeddings(data);
              setWedsLoaded(true);
            }, (err) => {
              console.error("Weddings error", err);
              setWedsLoaded(true);
            });

            if(!isTracking && !isClientPortal) {
                const unsubExps = onSnapshot(collection(db, basePath, 'expenses'), (snapshot) => {
                  const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                  data.sort((a, b) => new Date(b.date) - new Date(a.date));
                  setExpenses(data);
                }, (err) => console.error("Expenses error", err));
                return () => { unsubTxns(); unsubWeds(); unsubExps(); unsubInv(); unsubSettings(); };
            }

            return () => { unsubTxns(); unsubWeds(); unsubInv(); unsubSettings(); };
          }, [user, isTracking, isClientPortal]);
          
          const allRecords = useMemo(() => [...transactions, ...weddings], [transactions, weddings]);
          const uniqueCustomersCount = useMemo(() => new Set(allRecords.map(t => t.phone).filter(Boolean)).size, [allRecords]);

          const handleLikeStudio = async () => {
              if (!user) return;
              try {
                  const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                  await updateDoc(doc(db, `artifacts/${appId}/public/data/settings`, 'main'), {
                      studioLikes: increment(1)
                  });
              } catch (e) {
                  console.error("Error liking studio", e);
              }
          };

          const feedbacks = useMemo(() => {
              return allRecords.filter(r => r.clientRating > 0 || r.clientFeedback).sort((a,b) => new Date(b.dateTime) - new Date(a.dateTime));
          }, [allRecords]);
          const unreadFeedbackCount = feedbacks.filter(r => !r.adminReadFeedback).length;

          useEffect(() => {
              if (settings.enableNotifications && unreadFeedbackCount > previousFeedbackCount) {
                  showBrowserNotification("تقييم جديد", "قام أحد العملاء بترك تقييم لخدمات الاستوديو.");
              }
              setPreviousFeedbackCount(unreadFeedbackCount);
          }, [unreadFeedbackCount, settings.enableNotifications]);

          const handleViewFeedback = (txn) => {
              setTxnDetailsModal(txn);
              if (!txn.adminReadFeedback) {
                  const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                  const targetCol = txn.type === 'wedding' ? 'weddings' : 'transactions';
                  const updated = { ...txn, adminReadFeedback: true };
                  setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, txn.id), updated).catch(console.error);
              }
          };

          const saveSettingsToDB = async (newSettings) => {
              if (!user || isTracking || isClientPortal) return;
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
              await setDoc(doc(db, `artifacts/${appId}/public/data/settings`, 'main'), newSettings);
          };

          const updateInventoryExact = async (itemName, newValue) => {
              const newInv = { ...inventory, [itemName]: Math.max(0, newValue) };
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
              await setDoc(doc(db, `artifacts/${appId}/public/data/inventory`, 'main'), newInv);
          };

          const isTargetLoaded = trackType === 'w' ? wedsLoaded : txnsLoaded;

          useEffect(() => {
              if (isTracking && isTargetLoaded) {
                  const targetArr = trackType === 'w' ? weddings : transactions;
                  const currentTxn = targetArr.find(t => (t.phone||'').trim() === trackPhone.trim() && t.receiptNo && t.receiptNo.toString() === trackReceipt.trim());
                  
                  if (currentTxn) {
                      // إظهار نافذة الدفع تلقائياً مرة واحدة إذا كان هناك باقي
                      if (currentTxn.remaining > 0 && !hasAutoShownPayment) {
                          setShowClientPaymentPopup(true);
                          setHasAutoShownPayment(true);
                      }

                      // نظام حماية الجهاز: ربط رابط التتبع بمتصفح العميل لأول مرة فقط
                      const currentDeviceId = localStorage.getItem('studio_client_device_id') || Math.random().toString(36).substring(2, 15);
                      
                      if (!currentTxn.boundDeviceId) {
                          // لم يتم ربط الجهاز من قبل، نربطه الآن
                          localStorage.setItem('studio_client_device_id', currentDeviceId);
                          const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                          const targetCol = trackType === 'w' ? 'weddings' : 'transactions';
                          setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, currentTxn.id), { boundDeviceId: currentDeviceId }, { merge: true }).catch(console.error);
                      } else if (currentTxn.boundDeviceId !== currentDeviceId) {
                          // الجهاز الحالي لا يطابق الجهاز المرتبط
                          setClientViewError('access_denied');
                          return;
                      }

                      if (!currentTxn.viewedByClient) {
                          const runClientCleanup = async () => {
                               const updatedTxn = await checkAndCleanExpiredPhotos(currentTxn, db, storage);
                               if (!updatedTxn.viewedByClient) {
                                   const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                                   const targetCol = trackType === 'w' ? 'weddings' : 'transactions';
                                   const finalTxn = { ...updatedTxn, viewedByClient: true, viewTime: new Date().toISOString() };
                                   setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, finalTxn.id), finalTxn).catch(err => console.error(err));
                               }
                          };
                          runClientCleanup();
                      }
                  }
              }
          }, [isTracking, isTargetLoaded, transactions, weddings, trackPhone, trackReceipt, trackType]);

          if (!authReady) {
              return (
                  <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-100">
                      <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                      <p className="font-bold">جاري المزامنة مع السحابة...</p>
                  </div>
              );
          }

          if (clientViewError === 'access_denied') {
              return (
                  <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-100 p-6 text-center">
                      <div className="w-20 h-20 bg-red-500/20 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 border border-red-500/30 shadow-lg shadow-red-900/20">
                          <i className="ph-fill ph-lock-key text-4xl"></i>
                      </div>
                      <h2 className="text-2xl font-black mb-2 text-white">تم تقييد الوصول للرابط</h2>
                      <p className="text-slate-400 text-sm mb-6 max-w-sm">
                          حفاظاً على خصوصيتك وسرية بياناتك، لا يمكن فتح هذا الرابط إلا من خلال المتصفح والجهاز الذي تم فتح الرابط منه لأول مرة.
                      </p>
                      <p className="text-xs text-yellow-400 bg-yellow-950/30 border border-yellow-500/30 px-4 py-2 rounded-lg">
                          إذا كنت صاحب الطلب وتحتاج للوصول من جهاز جديد، يرجى التواصل مع الاستوديو لفك الحماية عن الرابط.
                      </p>
                  </div>
              );
          }

          if (isClientPortal && !isTracking) {
              return <ClientPortalScreen db={db} settings={settings} transactions={transactions} weddings={weddings} uniqueCustomersCount={uniqueCustomersCount} studioLikes={settings.studioLikes || 0} onLikeStudio={handleLikeStudio} />;
          }

          if (isTracking) {
              const targetArr = trackType === 'w' ? weddings : transactions;
              const txn = targetArr.find(t => (t.phone||'').trim() === trackPhone.trim() && t.receiptNo && t.receiptNo.toString() === trackReceipt.trim());

              if (!isTargetLoaded) {
                  return (
                      <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-100 p-6 text-center">
                          <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                          <h2 className="text-xl font-bold mb-2 text-white">جاري البحث عن الطلب...</h2>
                          <p className="text-slate-400 text-sm">لحظات ونعرض لك التفاصيل</p>
                      </div>
                  );
              }
              
              if (!txn) {
                  return (
                      <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-400 p-6 text-center">
                          <i className="ph ph-magnifying-glass text-6xl mb-4 text-slate-600"></i>
                          <h2 className="text-2xl font-bold mb-2 text-white">الطلب غير موجود</h2>
                          <p>عذراً، لم نتمكن من العثور على طلب يطابق رقم الهاتف والإيصال المدخلين.</p>
                          <p className="mt-2 text-sm opacity-70">رقم الهاتف: {trackPhone} | رقم الإيصال: {trackReceipt}</p>
                      </div>
                  );
              }
              
              const currentStatus = txn.status || 0;
              const isWedding = trackType === 'w';
              const displayName = isWedding ? `${txn.groomName || ''} و ${txn.brideName || ''}`.trim() : txn.clientName;
              const displayReqs = getReqsText(txn);
              const statusesToUse = getTransactionStatuses(txn);
              const isDelivered = currentStatus === statusesToUse[statusesToUse.length - 1].id;

              const clientArchiveRecords = [...transactions, ...weddings]
                  .filter(t => t.phone === trackPhone)
                  .sort((a,b) => new Date(b.dateTime) - new Date(a.dateTime));
              
              const existingProfilePic = clientArchiveRecords.find(t => t.clientProfilePic)?.clientProfilePic || null;
              
              const clientPromotions = (!txn.selectedPromos || !settings.promotions) ? [] : settings.promotions.filter(p => txn.selectedPromos.includes(p.id));

              // حساب رصيد المكافآت مع التقريب لأقرب 5
              const rewardsInfo = getCustomerRewards(txn.phone, allRecords);
              const availableRewards = rewardsInfo.balance;

              const handleProfilePicUpload = async (e) => {
                  const file = e.target.files[0];
                  if (!file) return;
                  setIsUploadingProfilePic(true);
                  try {
                      const reader = new FileReader();
                      reader.readAsDataURL(file);
                      reader.onload = (event) => {
                          const img = new Image();
                          img.src = event.target.result;
                          img.onload = async () => {
                              const canvas = document.createElement('canvas');
                              const MAX_WIDTH = 250; 
                              let scaleSize = 1;
                              if (img.width > MAX_WIDTH) scaleSize = MAX_WIDTH / img.width;
                              canvas.width = img.width * scaleSize;
                              canvas.height = img.height * scaleSize;
                              const ctx = canvas.getContext('2d');
                              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                              const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                              
                              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                              const targetCol = isWedding ? 'weddings' : 'transactions';
                              await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, txn.id), { ...txn, clientProfilePic: dataUrl }, { merge: true });
                              setIsUploadingProfilePic(false);
                          };
                      };
                  } catch (err) {
                      console.error("Error uploading profile pic", err);
                      setIsUploadingProfilePic(false);
                  }
              };

              return (
                  <div className="min-h-screen bg-slate-950 text-slate-100 p-4 md:p-6 flex flex-col items-center">
                      
                      <div className="w-full max-w-md flex justify-end mb-2">
                          <a href="?client=true" className="text-slate-400 hover:text-white bg-slate-900 border border-slate-800 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-colors">
                              <i className="ph ph-arrow-right"></i> رجوع لبوابة العملاء
                          </a>
                      </div>

                      {/* 1. البطاقة المدمجة (الصورة الشخصية + الترحيب) */}
                      <div className={`w-full max-w-md bg-gradient-to-br ${isWedding ? 'from-pink-950/50' : 'from-blue-950/50'} to-slate-900 p-6 md:p-8 rounded-3xl border ${isWedding ? 'border-pink-500/30 shadow-pink-900/20' : 'border-blue-500/30 shadow-blue-900/20'} mb-6 shadow-2xl relative overflow-hidden mt-2`}>
                          <div className={`absolute top-0 right-0 w-full h-2 bg-gradient-to-l ${isWedding ? 'from-pink-400 to-rose-500' : 'from-blue-400 to-indigo-500'}`}></div>
                          <div className="flex flex-col sm:flex-row items-center text-center sm:text-right gap-5 relative z-10">
                              <div className="relative group shrink-0">
                                  <div className={`w-24 h-24 sm:w-20 sm:h-20 rounded-full overflow-hidden border-4 ${isWedding ? 'border-pink-500/40' : 'border-blue-500/40'} shadow-lg bg-slate-800 flex items-center justify-center`}>
                                      {existingProfilePic ? (
                                          <img src={existingProfilePic} alt="Profile" className="w-full h-full object-cover" />
                                      ) : (
                                          <i className="ph-fill ph-user text-4xl text-slate-500"></i>
                                      )}
                                  </div>
                                  <label className="absolute -bottom-1 -left-1 w-8 h-8 bg-yellow-500 text-slate-900 rounded-full flex items-center justify-center cursor-pointer shadow-lg hover:bg-yellow-400 hover:scale-110 transition-all border-2 border-slate-900" title="إضافة/تغيير صورتك الشخصية">
                                      {isUploadingProfilePic ? <i className="ph ph-spinner animate-spin"></i> : <i className="ph-fill ph-camera-plus text-sm"></i>}
                                      <input type="file" accept="image/*" className="hidden" onChange={handleProfilePicUpload} disabled={isUploadingProfilePic} />
                                  </label>
                              </div>
                              <div>
                                  <h1 className={`text-xl md:text-2xl font-black mb-1.5 tracking-wide ${isWedding ? 'text-pink-100' : 'text-blue-100'}`}>تتبع حالة الطلب الخاص بك 📸</h1>
                                  <p className="text-sm font-bold text-slate-300">شكراً لاختياركم <span className="text-yellow-400">{settings.studioName}</span> ✨</p>
                              </div>
                          </div>
                      </div>

                      {/* 2. بطاقة رصيد المكافآت وطباعة الصور من الموبايل */}
                      <div className="w-full max-w-md bg-gradient-to-r from-purple-900/40 to-slate-900 p-5 rounded-2xl mb-6 border border-purple-500/30 shadow-lg shadow-purple-900/20 relative overflow-hidden flex flex-col gap-3">
                          <div className="absolute top-0 right-0 p-2 opacity-10 pointer-events-none">
                              <i className="ph-fill ph-star text-6xl"></i>
                          </div>
                          
                          <div className="flex justify-between items-center relative z-10">
                              <div>
                                  <h3 className="text-lg font-black text-purple-300 flex items-center gap-2">
                                      <i className="ph-fill ph-gift text-2xl text-purple-400"></i>
                                      رصيد مكافآتك
                                  </h3>
                                  <p className="text-xs text-slate-400 mt-1 font-bold">يمكنك استخدامه كخصم أو لطباعة الصور.</p>
                              </div>
                              <div className="bg-purple-500/20 px-4 py-2 rounded-xl border border-purple-500/50 shadow-inner text-center">
                                  <span className="block text-2xl font-black text-white">{availableRewards}</span>
                                  <span className="block text-[10px] text-purple-300 font-bold -mt-1">ج.م</span>
                              </div>
                          </div>

                          {availableRewards > 0 && (
                              <div className="mt-2 bg-slate-950/50 p-4 rounded-xl border border-purple-500/20 relative z-10">
                                  <p className="text-sm text-slate-200 font-bold leading-relaxed mb-3">
                                      <i className="ph-fill ph-sparkle text-yellow-400 mr-1"></i>
                                      تقدر تستخدم رصيد مكافآتك وتطبع صور من موبايلك <span className="text-yellow-400">مجاناً!</span> أو تخصمه من أي حجز قادم.
                                  </p>
                                  <button 
                                      onClick={() => {
                                          const msg = `مرحباً ${settings.studioName} 👋\nلدي رصيد مكافآت بقيمة ${availableRewards} ج.م (إيصال #${txn.receiptNo}) وأريد استخدامه لطباعة صور من الموبايل.`;
                                          openWhatsApp(settings.studioPhone || '01201260040', msg);
                                      }}
                                      className="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-2.5 rounded-lg flex items-center justify-center gap-2 transition-transform hover:scale-[1.02] shadow-md border border-purple-400/50"
                                  >
                                      <i className="ph-fill ph-whatsapp-logo text-xl"></i> اطلب طباعة صورك الآن
                                  </button>
                              </div>
                          )}
                      </div>

                      {/* 6. Details Card */}
                      <div className="bg-slate-900 w-full max-w-md p-6 rounded-3xl shadow-xl border border-slate-800 mb-8 relative overflow-hidden">
                          <div className={`absolute top-0 right-0 w-2 h-full ${isWedding ? 'bg-pink-500' : 'bg-blue-500'}`}></div>
                          
                          <div className="flex justify-between items-center mb-5 pb-4 border-b border-slate-800">
                              <div className="flex items-center gap-3">
                                  <div className={`w-12 h-12 rounded-full flex items-center justify-center bg-slate-800 border-2 ${isWedding ? 'border-pink-500/30 text-pink-400' : 'border-blue-500/30 text-blue-400'} shadow-inner`}>
                                      {isWedding ? <i className="ph-fill ph-users text-2xl"></i> : <i className="ph-fill ph-user text-2xl"></i>}
                                  </div>
                                  <div className="flex flex-col">
                                      <span className="text-slate-400 text-[10px] mb-0.5">اسم العميل</span>
                                      <span className="text-base sm:text-lg font-black text-white">{displayName}</span>
                                  </div>
                              </div>
                              <div className="text-left flex flex-col items-end">
                                  <span className="text-slate-400 text-[10px] mb-0.5">رقم الإيصال</span>
                                  <span className={`text-lg sm:text-xl font-black font-mono ${isWedding ? 'text-pink-400' : 'text-blue-400'}`}>#{txn.receiptNo}</span>
                              </div>
                          </div>

                          {isWedding && txn.weddingDate && (
                              <div className="bg-slate-950 p-3 rounded-xl mb-4 border border-slate-800 flex items-center justify-between text-sm">
                                  <span className="text-slate-400">موعد الزفاف:</span>
                                  <span className="font-bold text-pink-300">{formatDateOnly(txn.weddingDate)}</span>
                              </div>
                          )}

                          {txn.photoNo && (Array.isArray(txn.photoNo) ? txn.photoNo.some(p => typeof p === 'object' ? p.number : p) : true) && (
                              <div className="bg-slate-950/80 p-4 rounded-xl mb-4 border border-blue-500/30 flex flex-col gap-3 shadow-inner">
                                  <span className="text-slate-300 font-bold flex items-center gap-1.5"><i className="ph-fill ph-images text-blue-400 text-xl"></i> أرقام الصور المحددة لك:</span>
                                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                      {Array.isArray(txn.photoNo) ? txn.photoNo.filter(p => typeof p === 'object' ? p.number : p).map((p, i) => {
                                         const num = typeof p === 'object' ? p.number : p;
                                         const note = typeof p === 'object' ? p.note : '';
                                         return (
                                             <div key={i} className="bg-slate-900 border border-slate-700 rounded-lg p-2.5 flex flex-col gap-1 shadow-sm">
                                                 <span className="font-black text-blue-400 flex items-center gap-1"><i className="ph ph-hash text-slate-500"></i> {num}</span>
                                                 {note && <span className="text-xs text-slate-400 border-t border-slate-800 pt-1.5 mt-0.5"><i className="ph ph-text-aa text-slate-500 ml-1"></i>{note}</span>}
                                             </div>
                                         )
                                      }) : <span className="font-black text-blue-300 bg-blue-950/50 px-3 py-1.5 rounded-lg border border-blue-900/50 text-center" dir="ltr">{txn.photoNo}</span>}
                                  </div>
                              </div>
                          )}

                          {displayReqs && displayReqs !== 'لا يوجد تفاصيل' && (
                              <div className="bg-slate-950/80 p-4 rounded-xl border border-slate-800 flex flex-col gap-2 text-sm shadow-inner mb-2">
                                  <span className="text-slate-300 font-bold flex items-center gap-1.5">
                                      <i className={`ph-fill ph-list-dashes text-lg ${isWedding ? 'text-pink-400' : 'text-blue-400'}`}></i>
                                      الخدمات والتفاصيل المطلوبة:
                                  </span>
                                  <p className="text-slate-400 font-medium whitespace-pre-wrap leading-relaxed">{displayReqs}</p>
                              </div>
                          )}

                          <div className="mt-5">
                              <div className="bg-gradient-to-l from-slate-800 to-slate-900 p-4 rounded-2xl border border-slate-700 mb-3 flex justify-between items-center shadow-inner">
                                  <span className="text-slate-300 font-bold flex items-center gap-2">
                                      <i className="ph-fill ph-coins text-yellow-500 text-2xl"></i> إجمالي الحساب
                                  </span>
                                  <span className="text-2xl sm:text-3xl font-black text-yellow-400">{txn.total} <span className="text-sm font-bold">ج.م</span></span>
                              </div>

                              <div className="grid grid-cols-2 gap-3">
                                   <div className="bg-green-950/20 p-3 sm:p-4 rounded-xl border border-green-900/30 flex flex-col items-center justify-center gap-1 shadow-sm">
                                       <span className="text-slate-400 text-xs font-bold">المدفوع</span>
                                       <span className="text-green-400 font-black text-lg sm:text-xl">{txn.paid} <span className="text-[10px]">ج.م</span></span>
                                   </div>
                                   <div className={`p-3 sm:p-4 rounded-xl border flex flex-col items-center justify-center gap-1 shadow-sm ${txn.remaining > 0 ? 'bg-red-950/20 border-red-900/30' : 'bg-slate-950/50 border-slate-800'}`}>
                                       <span className="text-slate-400 text-xs font-bold">الباقي الدفع</span>
                                       <span className={`${txn.remaining > 0 ? 'text-red-400' : 'text-slate-300'} font-black text-lg sm:text-xl`}>{txn.remaining} <span className="text-[10px]">ج.م</span></span>
                                   </div>
                              </div>
                          </div>
                      </div>

                      {/* بطاقة الدفع المصغرة */}
                      {txn.remaining > 0 && (
                          <div 
                              onClick={() => setShowClientPaymentPopup(true)}
                              className="w-full max-w-md bg-gradient-to-r from-red-900/40 to-slate-900 p-4 rounded-2xl border border-red-500/30 shadow-lg shadow-red-900/20 mb-8 cursor-pointer hover:scale-[1.02] transition-transform flex justify-between items-center group relative overflow-hidden"
                          >
                              <div className="absolute left-0 top-0 w-1 h-full bg-red-500"></div>
                              <div className="flex items-center gap-3">
                                  <div className="w-10 h-10 bg-red-500/20 text-red-400 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
                                      <i className="ph-fill ph-warning-circle text-2xl"></i>
                                  </div>
                                  <div>
                                      <h4 className="font-bold text-red-300 text-sm">مبلغ مستحق للدفع</h4>
                                      <p className="text-xs text-slate-400 mt-0.5">اضغط هنا لسداد الباقي إلكترونياً</p>
                                  </div>
                              </div>
                              <div className="text-left flex items-center gap-2">
                                  <span className="block text-xl font-black text-red-400">{txn.remaining} <span className="text-xs">ج.م</span></span>
                                  <i className="ph-bold ph-caret-left text-slate-500"></i>
                              </div>
                          </div>
                      )}

                      {/* 3. البطاقة الإعلانية (Promotional Card) */}
                      {clientPromotions.length > 0 && (
                          <div 
                              onClick={() => setShowPromoDetails(!showPromoDetails)}
                              className={`w-full max-w-md bg-gradient-to-l from-yellow-600 to-amber-500 p-5 rounded-2xl mb-8 shadow-lg shadow-yellow-900/20 text-slate-900 flex flex-col gap-4 relative overflow-hidden group cursor-pointer hover:scale-[1.02] transition-transform border border-yellow-400`}
                          >
                              <div className="absolute -right-2 -top-4 text-yellow-100/30">
                                  <i className="ph-fill ph-ticket text-6xl transform rotate-12"></i>
                              </div>
                              
                              <div className="flex items-center gap-4 relative z-10">
                                  <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center shrink-0 backdrop-blur-sm border border-white/30 shadow-inner">
                                      <i className="ph-fill ph-percent text-2xl text-white animate-bounce-slow"></i>
                                  </div>
                                  <div className="flex-1">
                                      <h3 className="font-black text-lg text-white mb-1">عرض خاص مقدم لك! 🎁</h3>
                                      <p className="text-[11px] sm:text-xs font-bold text-yellow-50 leading-tight">اضغط هنا لمعرفة التفاصيل والخصم المتاح لك.</p>
                                  </div>
                                  <i className={`ph-bold ph-caret-${showPromoDetails ? 'up' : 'down'} text-white text-xl transition-transform`}></i>
                              </div>
                              
                              {/* Details section that expands */}
                              <div className={`relative z-10 overflow-hidden transition-all duration-300 ease-in-out ${showPromoDetails ? 'max-h-[600px] opacity-100 mt-2' : 'max-h-0 opacity-0'}`}>
                                  <div className="bg-white/20 backdrop-blur-md p-4 rounded-xl border border-white/30 shadow-inner flex flex-col gap-3">
                                      {clientPromotions.map((promo, idx) => (
                                          <div key={idx} className="bg-white/90 p-3 rounded-lg border border-yellow-200/50 flex flex-col gap-2">
                                              <div className="flex justify-between items-start">
                                                  <div className="flex items-center gap-2 font-black text-amber-900">
                                                      <i className={`ph-fill ${promo.icon || 'ph-gift'} text-xl`}></i> {promo.title}
                                                  </div>
                                                  {promo.discount && <span className="bg-amber-100 text-amber-800 px-2 py-0.5 rounded text-[10px] font-black border border-amber-300">{promo.discount}</span>}
                                              </div>
                                              <p className="text-xs text-amber-800 font-bold">{promo.shortDesc}</p>
                                              {promo.fullDesc && <p className="text-[10px] text-amber-700 leading-relaxed">{promo.fullDesc}</p>}
                                          </div>
                                      ))}

                                      {/* زر واتساب للحجز والاستفسار */}
                                      <button 
                                          onClick={(e) => {
                                              e.stopPropagation();
                                              const msg = `مرحباً ${settings.studioName} 👋\nلقد رأيت العروض المخصصة لي في صفحة تتبع الطلب (إيصال #${txn.receiptNo}) وأود الاستفسار أو الحجز.`;
                                              openWhatsApp(settings.studioPhone || '01201260040', msg);
                                          }}
                                          className="mt-1 w-full bg-gradient-to-r from-green-600 to-emerald-500 hover:from-green-500 hover:to-emerald-400 text-white font-bold py-2.5 rounded-lg flex items-center justify-center gap-2 shadow-lg transition-transform hover:scale-[1.02] border border-green-400/50"
                                      >
                                          <i className="ph-fill ph-whatsapp-logo text-xl"></i>
                                          تواصل للاستفسار أو الحجز
                                      </button>

                                      <p className="text-[10px] text-yellow-900 mt-1 font-bold bg-white/40 p-2 rounded-lg text-center">
                                          * يرجى إبراز هذه الشاشة في الاستوديو للحصول على العروض.
                                      </p>
                                  </div>
                              </div>
                          </div>
                      )}

                      {/* 4. Download Link */}
                      {txn.photosLink && (
                          <a href={txn.photosLink} target="_blank" rel="noopener noreferrer" className="w-full max-w-md bg-gradient-to-r from-green-600 to-emerald-500 hover:from-green-500 hover:to-emerald-400 text-white p-5 rounded-3xl shadow-xl shadow-green-900/20 mb-8 flex items-center justify-center gap-3 font-bold text-lg hover:scale-[1.02] transition-all border border-green-400/30 group">
                             <div className="bg-white/20 p-2 rounded-full group-hover:animate-bounce">
                                 <i className="ph-bold ph-download-simple text-2xl"></i>
                             </div>
                             <span>تحميل الصور (رابط خارجي)</span>
                          </a>
                      )}

                      {/* 5. Stages of Preparation */}
                      {!isDelivered ? (
                          <div className="w-full max-w-md bg-slate-900 p-5 sm:p-6 rounded-3xl shadow-xl border border-slate-800 mb-8 transition-all">
                              <div 
                                  className="flex justify-between items-center cursor-pointer group"
                                  onClick={() => setShowStages(!showStages)}
                              >
                                  <h3 className="font-bold text-base sm:text-lg flex items-center gap-2 text-white">
                                      <i className="ph ph-clock-counter-clockwise text-blue-500 text-2xl group-hover:rotate-[-30deg] transition-transform"></i> 
                                      مراحل تجهيز الطلب
                                  </h3>
                                  <div className="flex items-center gap-2 sm:gap-3">
                                      <span className="text-[10px] sm:text-xs font-bold text-blue-400 bg-blue-950/50 border border-blue-900/50 px-2 py-1 rounded-md max-w-[100px] truncate text-center" title="المرحلة الحالية">
                                          {statusesToUse.find(s => s.id === currentStatus)?.label || 'جاري العمل'}
                                      </span>
                                      <i className={`ph-bold ph-caret-${showStages ? 'up' : 'down'} text-slate-400 text-lg sm:text-xl transition-transform`}></i>
                                  </div>
                              </div>
                              
                              <div className={`transition-all duration-500 ease-in-out ${showStages ? 'max-h-[1200px] opacity-100 mt-6 border-t border-slate-800 pt-6' : 'max-h-0 opacity-0 overflow-hidden'}`}>
                                  <div className="relative pl-4 space-y-8 pr-4">
                                      <div className="absolute right-[31px] top-6 bottom-6 w-[2px] bg-slate-800"></div>
                                      {statusesToUse.map((s, index) => {
                                          const isCompleted = currentStatus >= s.id;
                                          const isCurrent = currentStatus === s.id;
                                          return (
                                              <div key={s.id} className="relative flex items-start gap-5">
                                                  <div className={`relative z-10 flex items-center justify-center w-12 h-12 rounded-full shrink-0 border-4 transition-colors ${isCompleted ? s.clientIconCompleted : 'border-slate-900 bg-slate-800 text-slate-600'}`}>
                                                      <i className={`ph ${s.icon} text-xl`}></i>
                                                  </div>
                                                  <div className={`flex-1 p-4 rounded-2xl border transition-all mt-[-4px] ${isCurrent ? s.clientCardCurrent : isCompleted ? 'bg-slate-800/30 border-slate-800/50' : 'bg-slate-950/50 border-slate-800/30'}`}>
                                                      <h4 className={`font-bold text-sm sm:text-base ${isCurrent ? s.clientTextCurrent : isCompleted ? 'text-slate-200' : 'text-slate-600'}`}>{s.label}</h4>
                                                      {isCurrent && <p className={`text-xs mt-2 opacity-80 leading-relaxed ${s.clientTextCurrent}`}>هذه هي المرحلة الحالية لطلبك. سنقوم بتحديثها فور انتقالنا للمرحلة التالية.</p>}
                                                      {(isCompleted && !isCurrent) && <p className="text-xs mt-1 text-slate-500"><i className="ph ph-check"></i> تمت بنجاح</p>}
                                                  </div>
                                              </div>
                                          );
                                      })}
                                  </div>
                              </div>
                          </div>
                      ) : (
                          <div className="w-full max-w-md bg-gradient-to-b from-slate-900 to-slate-950 p-6 sm:p-8 rounded-3xl shadow-2xl border border-green-500/30 mb-8 text-center relative overflow-hidden">
                              <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-green-400 to-emerald-500"></div>
                              <div className="w-20 h-20 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center mx-auto mb-4 border border-green-500/50 shadow-lg shadow-green-900/40">
                                  <i className="ph-fill ph-check-circle text-5xl"></i>
                              </div>
                              <h3 className="font-black text-2xl mb-2 text-white">تم تسليم الطلب بنجاح! 🎉</h3>
                              <p className="text-slate-400 text-sm mb-6 leading-relaxed">
                                  شكراً لاختيارك {settings.studioName}. نتمنى أن تكون الصور والأعمال قد نالت إعجابكم، ونسعد دائماً بتوثيق أجمل لحظاتكم!
                              </p>
                              <p className="text-xs text-yellow-400 mt-6 font-bold flex items-center justify-center gap-1 animate-pulse">
                                  <i className="ph-fill ph-arrow-down"></i> برجاء تقييم تجربتك معنا بالأسفل
                              </p>
                          </div>
                      )}

                      {txn.remaining > 0 && (
                          <div className="w-full max-w-md bg-gradient-to-br from-indigo-950 to-slate-900 p-6 rounded-3xl shadow-xl border border-indigo-500/30 mb-8 text-center relative overflow-hidden">
                              <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                              <div className="flex justify-center mb-4">
                                  <div className="bg-indigo-500/20 p-4 rounded-full text-indigo-400 shadow-lg shadow-indigo-900/20">
                                      <i className="ph ph-wallet text-3xl"></i>
                                  </div>
                              </div>
                              <h3 className="text-lg font-bold text-white mb-2">سداد إلكتروني متاح 💳</h3>
                              <p className="text-sm text-indigo-200/80 leading-relaxed mb-4">
                                  لراحتك، يمكنك الآن سداد باقي المبلغ المستحق (<b className="text-white">{txn.remaining} ج.م</b>) بكل سهولة عبر 
                                  <span className="text-white font-bold mx-1">إنستاباي (InstaPay)</span> أو <span className="text-white font-bold mx-1">المحافظ الإلكترونية</span>.
                              </p>
                              
                              <div className="bg-slate-950/80 py-3 px-4 rounded-2xl border border-indigo-500/20 flex flex-col items-center gap-1 shadow-inner mb-4">
                                  <span className="text-xs text-indigo-300">رقم التحويل (فودافون كاش / إنستاباي):</span>
                                  <div className="flex items-center gap-3 mt-1">
                                      <span className="text-2xl font-black font-mono text-white tracking-widest">{settings.studioPhone || '01201260040'}</span>
                                      <button onClick={(e) => {
                                          const el = document.createElement('textarea');
                                          el.value = settings.studioPhone || '01201260040';
                                          document.body.appendChild(el);
                                          el.select();
                                          document.execCommand('copy');
                                          document.body.removeChild(el);
                                          const originalHTML = e.currentTarget.innerHTML;
                                          e.currentTarget.innerHTML = '<i class="ph ph-check text-lg"></i>';
                                          setTimeout(() => e.currentTarget.innerHTML = originalHTML, 2000);
                                      }} className="text-indigo-400 hover:text-indigo-300 bg-indigo-900/30 p-2 rounded-lg transition-colors" title="نسخ الرقم"><i className="ph ph-copy text-lg"></i></button>
                                  </div>
                              </div>

                              <div className="mb-5 text-right bg-indigo-900/20 p-4 rounded-xl border border-indigo-500/30">
                                  <label className="block text-sm font-bold text-indigo-300 mb-3"><i className="ph ph-upload-simple text-lg align-middle ml-1"></i> إرفاق صورة التحويل أولاً لتأكيد السداد:</label>
                                  <input type="file" accept="image/*" onChange={(e) => {
                                        const file = e.target.files[0];
                                        if (!file) return;
                                        const reader = new FileReader();
                                        reader.readAsDataURL(file);
                                        reader.onload = (event) => {
                                            const img = new Image();
                                            img.src = event.target.result;
                                            img.onload = () => {
                                                const canvas = document.createElement('canvas');
                                                const MAX_WIDTH = 800;
                                                let scaleSize = 1;
                                                if (img.width > MAX_WIDTH) scaleSize = MAX_WIDTH / img.width;
                                                canvas.width = img.width * scaleSize;
                                                canvas.height = img.height * scaleSize;
                                                const ctx = canvas.getContext('2d');
                                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                                setTransferReceipt(canvas.toDataURL('image/jpeg', 0.6));
                                                setClientViewError('');
                                            };
                                        };
                                      }} className="block w-full text-sm text-slate-400 file:ml-3 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 transition-colors bg-slate-950 rounded-xl"
                                  />
                                  {clientViewError && <p className="text-red-400 text-xs mt-2 font-bold flex items-center gap-1"><i className="ph ph-warning text-base"></i> {clientViewError}</p>}
                                  {transferReceipt && <p className="text-green-400 text-xs mt-3 font-bold flex items-center gap-1"><i className="ph ph-check-circle text-base"></i> تم إرفاق الصورة بنجاح وجاهز للتأكيد</p>}
                              </div>

                              <button onClick={async () => {
                                  if (!transferReceipt) { setClientViewError('عذراً، برجاء إرفاق صورة التحويل أولاً لتأكيد السداد.'); return; }
                                  setIsUploading(true);
                                  try {
                                      const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                                      const updated = { ...txn, pendingReceipt: transferReceipt };
                                      const targetCol = isWedding ? 'weddings' : 'transactions';
                                      await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, txn.id), updated);
                                      const confirmMsg = `مرحباً، قمت بتحويل مبلغ ${txn.remaining} ج.م لسداد باقي حساب إيصال رقم #${txn.receiptNo} باسم ${displayName}.\n✅ وقمت برفع صورة التحويل في رابط التتبع لتأكيد الدفع.`;
                                      openWhatsApp(settings.studioPhone || '01201260040', confirmMsg);
                                  } catch (err) { setClientViewError('حدث خطأ أثناء الحفظ، يرجى المحاولة مرة أخرى.'); }
                                  setIsUploading(false);
                              }} disabled={isUploading} className={`w-full font-bold py-3.5 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 ${isUploading || !transferReceipt ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-green-600 hover:bg-green-500 text-white shadow-green-900/20'}`}>
                                  {isUploading ? <div className="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <><i className="ph ph-whatsapp-logo text-2xl"></i> تأكيد التحويل عبر واتساب</>}
                              </button>
                          </div>
                      )}

                      {/* 7. الأرشيف الخاص بالعميل */}
                      <div className="w-full max-w-md bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 mb-8 relative overflow-hidden">
                           <div className="absolute top-0 right-0 w-1 h-full bg-slate-600"></div>
                           
                           <details className="group" open={false}>
                               <summary className="flex items-center justify-between cursor-pointer list-none border-b border-slate-800 pb-4 mb-2 select-none">
                                   <div className="flex items-center gap-2">
                                       <i className="ph-fill ph-folder-open text-2xl text-slate-400 group-open:text-yellow-400 transition-colors"></i> 
                                       <h3 className="font-bold text-lg text-slate-100 group-open:text-yellow-400 transition-colors">أرشيف زياراتي للاستوديو</h3>
                                   </div>
                                   <div className="flex items-center gap-3">
                                       <span className="bg-slate-800 text-slate-300 text-xs px-3 py-1.5 rounded-lg border border-slate-700 font-mono">{clientArchiveRecords.length} زيارات</span>
                                       <i className="ph-bold ph-caret-down text-slate-400 transition-transform group-open:rotate-180"></i>
                                   </div>
                               </summary>
                               
                               <div className="space-y-3 max-h-[350px] overflow-y-auto custom-scrollbar pr-2 mt-4 transition-all duration-300 opacity-0 group-open:opacity-100">
                                   {clientArchiveRecords.map(record => {
                                       const isWedRec = record.type === 'wedding';
                                       const recStatuses = isWedRec ? WEDDING_STATUSES : ORDER_STATUSES;
                                       const recStatusObj = recStatuses.find(s => s.id === (record.status || 0)) || recStatuses[0];
                                       const isActive = record.id === txn.id;
                                       
                                       return (
                                           <a key={record.id} href={window.location.href.split('?')[0] + `?phone=${encodeURIComponent(record.phone)}&receipt=${encodeURIComponent(record.receiptNo)}&type=${isWedRec ? 'w' : 't'}`} className={`block p-4 rounded-2xl border transition-all ${isActive ? 'bg-blue-950/20 border-blue-500/50 shadow-inner' : 'bg-slate-950 border-slate-800 hover:border-slate-600'}`}>
                                               <div className="flex justify-between items-start mb-2">
                                                   <div className="flex items-center gap-2">
                                                       <i className={`text-xl ${isWedRec ? 'ph-fill ph-heart text-pink-500' : 'ph-fill ph-camera text-blue-500'}`}></i>
                                                       <span className="font-bold text-sm text-slate-200">إيصال #{record.receiptNo}</span>
                                                   </div>
                                                   <span className="text-xs text-slate-500 font-mono">{formatDateOnly(record.dateTime)}</span>
                                               </div>
                                               <div className="flex justify-between items-center mt-3">
                                                   <span className={`text-xs font-bold px-2.5 py-1 rounded-md flex items-center gap-1 ${recStatusObj.clientIconCompleted.split(' ')[0]} ${recStatusObj.clientIconCompleted.split(' ')[1]} bg-opacity-20 text-opacity-100 border ${recStatusObj.clientIconCompleted.split(' ')[4]}`}>
                                                       <i className={`ph ${recStatusObj.icon}`}></i> {recStatusObj.label}
                                                   </span>
                                                   <span className="text-sm font-black text-slate-300">{record.total} ج.م</span>
                                               </div>
                                           </a>
                                       );
                                   })}
                               </div>
                           </details>
                      </div>

                      {/* Feedback Box */}
                      <div className="w-full max-w-md bg-gradient-to-br from-slate-900 to-slate-950 p-6 rounded-3xl shadow-xl border border-slate-800 mb-8 relative overflow-hidden">
                          <div className="absolute top-0 right-0 w-1 h-full bg-yellow-500"></div>
                          <h3 className="font-bold text-lg mb-3 flex items-center gap-2 text-slate-100">
                              <i className="ph-fill ph-star text-yellow-500 text-2xl"></i> رأيك يهمنا
                          </h3>
                          <p className="text-xs text-slate-400 mb-4 leading-relaxed">
                              نسعى دائماً لتقديم الأفضل لكم. كيف كانت تجربتكم معنا؟ يسعدنا سماع رأيكم أو أي ملاحظات لتطوير خدماتنا.
                          </p>
                          
                          {feedbackSubmitted || txn.clientRating > 0 ? (
                              <div className="bg-green-950/40 border border-green-500/30 p-4 rounded-xl text-center">
                                  <i className="ph-fill ph-check-circle text-4xl text-green-500 mb-2"></i>
                                  <p className="text-green-400 font-bold">شكراً لك! تم حفظ وإرسال تقييمك بنجاح.</p>
                              </div>
                          ) : (
                              <>
                                  <div className="flex justify-center gap-3 mb-5" dir="ltr">
                                      {[1, 2, 3, 4, 5].map(star => (
                                          <i
                                              key={star}
                                              className={`ph-fill ph-star text-4xl cursor-pointer transition-transform hover:scale-110 ${
                                                  star <= (hoveredStar || rating) ? 'text-yellow-500 drop-shadow-[0_0_8px_rgba(234,179,8,0.5)]' : 'text-slate-700'
                                              }`}
                                              onMouseEnter={() => setHoveredStar(star)}
                                              onMouseLeave={() => setHoveredStar(0)}
                                              onClick={() => setRating(star)}
                                          ></i>
                                      ))}
                                  </div>
                                  <textarea 
                                      value={feedbackText}
                                      onChange={(e) => setFeedbackText(e.target.value)}
                                      placeholder="اكتب رسالتك وتفاصيل تقييمك هنا (اختياري)..." 
                                      className="w-full p-4 rounded-xl bg-slate-950/50 border border-slate-700 text-sm text-white mb-4 outline-none focus:border-yellow-500 focus:bg-slate-900 transition-colors custom-scrollbar resize-none shadow-inner"
                                      rows="4"
                                  ></textarea>
                                  <button 
                                      onClick={async () => {
                                          if(rating === 0 && !feedbackText.trim()) return;
                                          setIsSubmittingFeedback(true);
                                          try {
                                              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                                              const targetCol = isWedding ? 'weddings' : 'transactions';
                                              const updatedTxn = { ...txn, clientRating: rating, clientFeedback: feedbackText };
                                              await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, txn.id), updatedTxn);
                                              
                                              setFeedbackSubmitted(true);
                                          } catch(err) {
                                              console.error("Error saving feedback:", err);
                                          }
                                          setIsSubmittingFeedback(false);
                                      }}
                                      disabled={isSubmittingFeedback || (rating === 0 && !feedbackText.trim())}
                                      className={`w-full text-white font-bold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2 text-sm border shadow-md group ${
                                          (rating === 0 && !feedbackText.trim()) || isSubmittingFeedback
                                              ? 'bg-slate-800 border-slate-700 text-slate-500 cursor-not-allowed'
                                              : 'bg-slate-800 hover:bg-slate-700 border-slate-700 hover:border-yellow-500/50'
                                      }`}
                                  >
                                      {isSubmittingFeedback ? (
                                          <div className="w-5 h-5 border-2 border-slate-400 border-t-transparent rounded-full animate-spin"></div>
                                      ) : (
                                          <><i className="ph-fill ph-paper-plane-right text-lg text-yellow-500 group-hover:scale-110 transition-transform"></i> حفظ التقييم وإرساله للإدارة</>
                                      )}
                                  </button>
                              </>
                          )}
                      </div>
                      
                      {/* رسالة الدفع المنبثقة */}
                      {showClientPaymentPopup && txn.remaining > 0 && (
                          <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-[100] flex items-center justify-center p-4 animate-fadeIn">
                              <div className="bg-gradient-to-br from-indigo-950 to-slate-900 w-full max-w-md rounded-3xl shadow-2xl border border-indigo-500/30 relative flex flex-col max-h-[90vh] overflow-hidden">
                                  <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                                  
                                  <div className="p-6 text-center overflow-y-auto custom-scrollbar">
                                      <div className="flex justify-center mb-4">
                                          <div className="bg-indigo-500/20 p-4 rounded-full text-indigo-400 shadow-lg shadow-indigo-900/20">
                                              <i className="ph ph-wallet text-3xl"></i>
                                          </div>
                                      </div>
                                      <h3 className="text-lg font-bold text-white mb-2">سداد إلكتروني متاح 💳</h3>
                                      <p className="text-sm text-indigo-200/80 leading-relaxed mb-4">
                                          لراحتك، يمكنك الآن سداد باقي المبلغ المستحق (<b className="text-white">{txn.remaining} ج.م</b>) بكل سهولة عبر 
                                          <span className="text-white font-bold mx-1">إنستاباي (InstaPay)</span> أو <span className="text-white font-bold mx-1">المحافظ الإلكترونية</span>.
                                      </p>
                                      
                                      <div className="bg-slate-950/80 py-3 px-4 rounded-2xl border border-indigo-500/20 flex flex-col items-center gap-1 shadow-inner mb-4">
                                          <span className="text-xs text-indigo-300">رقم التحويل (فودافون كاش / إنستاباي):</span>
                                          <div className="flex items-center gap-3 mt-1">
                                              <span className="text-2xl font-black font-mono text-white tracking-widest">{settings.studioPhone || '01201260040'}</span>
                                              <button onClick={(e) => {
                                                  const el = document.createElement('textarea');
                                                  el.value = settings.studioPhone || '01201260040';
                                                  document.body.appendChild(el);
                                                  el.select();
                                                  document.execCommand('copy');
                                                  document.body.removeChild(el);
                                                  const originalHTML = e.currentTarget.innerHTML;
                                                  e.currentTarget.innerHTML = '<i class="ph ph-check text-lg"></i>';
                                                  setTimeout(() => e.currentTarget.innerHTML = originalHTML, 2000);
                                              }} className="text-indigo-400 hover:text-indigo-300 bg-indigo-900/30 p-2 rounded-lg transition-colors" title="نسخ الرقم"><i className="ph ph-copy text-lg"></i></button>
                                          </div>
                                      </div>

                                      <div className="mb-2 text-right bg-indigo-900/20 p-4 rounded-xl border border-indigo-500/30">
                                          <label className="block text-sm font-bold text-indigo-300 mb-3"><i className="ph ph-upload-simple text-lg align-middle ml-1"></i> إرفاق صورة التحويل أولاً لتأكيد السداد:</label>
                                          <input type="file" accept="image/*" onChange={(e) => {
                                                const file = e.target.files[0];
                                                if (!file) return;
                                                const reader = new FileReader();
                                                reader.readAsDataURL(file);
                                                reader.onload = (event) => {
                                                    const img = new Image();
                                                    img.src = event.target.result;
                                                    img.onload = () => {
                                                        const canvas = document.createElement('canvas');
                                                        const MAX_WIDTH = 800;
                                                        let scaleSize = 1;
                                                        if (img.width > MAX_WIDTH) scaleSize = MAX_WIDTH / img.width;
                                                        canvas.width = img.width * scaleSize;
                                                        canvas.height = img.height * scaleSize;
                                                        const ctx = canvas.getContext('2d');
                                                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                                        setTransferReceipt(canvas.toDataURL('image/jpeg', 0.6));
                                                        setClientViewError('');
                                                    };
                                                };
                                              }} className="block w-full text-sm text-slate-400 file:ml-3 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 transition-colors bg-slate-950 rounded-xl"
                                          />
                                          {clientViewError && <p className="text-red-400 text-xs mt-2 font-bold flex items-center gap-1"><i className="ph ph-warning text-base"></i> {clientViewError}</p>}
                                          {transferReceipt && <p className="text-green-400 text-xs mt-3 font-bold flex items-center gap-1"><i className="ph ph-check-circle text-base"></i> تم إرفاق الصورة بنجاح وجاهز للتأكيد</p>}
                                      </div>

                                      <button onClick={async () => {
                                          if (!transferReceipt) { setClientViewError('عذراً، برجاء إرفاق صورة التحويل أولاً لتأكيد السداد.'); return; }
                                          setIsUploading(true);
                                          try {
                                              const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-marakby';
                                              const updated = { ...txn, pendingReceipt: transferReceipt };
                                              const targetCol = isWedding ? 'weddings' : 'transactions';
                                              await setDoc(doc(db, `artifacts/${appId}/public/data/${targetCol}`, txn.id), updated);
                                              const confirmMsg = `مرحباً، قمت بتحويل مبلغ ${txn.remaining} ج.م لسداد باقي حساب إيصال رقم #${txn.receiptNo} باسم ${displayName}.\n✅ وقمت برفع صورة التحويل في رابط التتبع لتأكيد الدفع.`;
                                              openWhatsApp(settings.studioPhone || '01201260040', confirmMsg);
                                              setShowClientPaymentPopup(false);
                                          } catch (err) { setClientViewError('حدث خطأ أثناء الحفظ، يرجى المحاولة مرة أخرى.'); }
                                          setIsUploading(false);
                                      }} disabled={isUploading} className={`w-full font-bold py-3.5 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 mt-4 ${isUploading || !transferReceipt ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-green-600 hover:bg-green-500 text-white shadow-green-900/20'}`}>
                                          {isUploading ? <div className="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <><i className="ph ph-whatsapp-logo text-2xl"></i> تأكيد التحويل عبر واتساب</>}
                                      </button>
                                  </div>

                                  <div className="p-4 border-t border-slate-800 bg-slate-950/50">
                                      <button onClick={() => setShowClientPaymentPopup(false)} className="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
                                          تخطي الآن <i className="ph-bold ph-arrow-left"></i>
                                      </button>
                                  </div>
                              </div>
                          </div>
                      )}

                      <ReceiptModal imageUrl={receiptImageModal} onClose={() => setReceiptImageModal(null)} />
                  </div>
              );
          }

          if (!authReady) {
              return (
                  <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-100">
                      <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                      <p className="font-bold">جاري المزامنة مع السحابة...</p>
                  </div>
              );
          }

          if (!isTracking && !isAuthenticatedAdmin) {
              return <LoginScreen validPassword={settings.adminPassword || '1234'} onLogin={() => { setIsAuthenticatedAdmin(true); localStorage.setItem('studioAdminAuth', 'true'); }} />;
          }

          return (
            <div className="min-h-screen bg-slate-950 text-slate-100 pb-20">
              {authError && <div className="bg-red-600 text-white text-center py-1 font-bold text-xs">{authError}</div>}
              {isTracking ? null : <Navigation activeTab={activeTab} setActiveTab={setActiveTab} settings={settings} onLogout={handleLogout} feedbacks={feedbacks} unreadCount={unreadFeedbackCount} onViewFeedback={handleViewFeedback} />}
              <main className={`max-w-7xl mx-auto ${isTracking ? '' : 'p-4 md:p-6'}`}>
                {isTracking ? null : (
                    <>
                        {activeTab === 'dashboard' && <DashboardTab settings={settings} setSettings={setSettings} transactions={transactions} inventory={inventory} db={db} allRecords={allRecords} uniqueCustomersCount={uniqueCustomersCount} />}
                        {activeTab === 'weddings' && <WeddingsTab settings={settings} setSettings={setSettings} weddings={weddings} inventory={inventory} db={db} allRecords={allRecords} uniqueCustomersCount={uniqueCustomersCount} />}
                        {activeTab === 'expenses' && <ExpensesTab settings={settings} expenses={expenses} inventory={inventory} db={db} />}
                        {activeTab === 'reports' && <ReportsTab settings={settings} transactions={transactions} weddings={weddings} expenses={expenses} setReceiptImageModal={setReceiptImageModal} />}
                        {activeTab === 'settings' && <SettingsTab settings={settings} setSettings={setSettings} inventory={inventory} updateInventoryExact={updateInventoryExact} saveSettingsToDB={saveSettingsToDB} />}
                    </>
                )}
              </main>
              
              <TxnDetailsModal txnDetailsModal={txnDetailsModal} setTxnDetailsModal={setTxnDetailsModal} setReceiptImageModal={setReceiptImageModal} db={db} allRecords={allRecords} />
              <ReceiptModal imageUrl={receiptImageModal} onClose={() => setReceiptImageModal(null)} />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
